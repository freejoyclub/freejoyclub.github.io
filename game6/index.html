<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fearjoy - v8.5.9.2</title>
    <style>
        :root {
            --wood-dark: #2a180b; --wood-mid: #3d2616; --wood-light: #4e3625;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --gold: #ffd700; --ui-bg: rgba(0,0,0,0.98); --vinyl: #111111;
        }

        @keyframes woodFade { 0%, 100% { background-color: #2a180b; } 50% { background-color: #4e3625; } }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        @keyframes redSparkle { 0% { box-shadow: 0 0 10px var(--fear-glow); } 100% { box-shadow: 0 0 50px var(--fear-glow); background: #300; color: white; } }
        @keyframes goldSparkle { 0% { box-shadow: 0 0 10px var(--gold); } 100% { box-shadow: 0 0 50px var(--gold); background: #330; color: white; } }
        @keyframes flipping { 0% { transform: rotateY(0); } 100% { transform: rotateY(1800deg); } }
        
        /* NEW ANIMATIONS */
        @keyframes introGlow { from { text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold); } to { text-shadow: 0 0 20px var(--gold), 0 0 40px #fffad1; } }
        @keyframes turnPulse { 0% { filter: drop-shadow(0 0 2px var(--p-color)); transform: scale(1); } 50% { filter: drop-shadow(0 0 15px var(--p-color)); transform: scale(1.1); } 100% { filter: drop-shadow(0 0 2px var(--p-color)); transform: scale(1); } }

        body {
            animation: woodFade 20s ease-in-out infinite;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px);
            color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow: hidden;
        }

        #board-container { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(6, 1fr); gap: 18px; padding: 50px; width: 1100px; height: 700px; position: relative; z-index: 5; }
        #arrow-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .space { width: 85px; height: 85px; border-radius: 50%; border: 1px solid var(--tape-white); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; background: rgba(255,255,255,0.05); text-align: center; position: relative; transition: 0.3s; cursor: help; }
        .blank { opacity: 0.2; transform: scale(0.8); border-style: dashed; cursor: default; }
        .blank-num { font-size: 0.6rem; opacity: 0.3; }
        .tracklist-space { background: var(--vinyl) !important; border: 3px double #666 !important; box-shadow: inset 0 0 15px #000; transform: scale(1.15); z-index: 5; font-size: 0.6rem !important; }
        .win-track { border: 4px solid var(--gold) !important; box-shadow: 0 0 30px var(--gold); }
        
        .joy-space { border-color: var(--joy-glow) !important; color: var(--joy-glow) !important; }
        .fear-space { border-color: var(--fear-glow) !important; color: var(--fear-glow) !important; }
        .hybrid { border-style: dotted; border-width: 3px; border-color: white; }

        #ui-layer { display: flex; align-items: center; background: var(--ui-bg); padding: 25px 45px; border-radius: 12px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); width: 1000px; justify-content: space-between; z-index: 10; }
        #status-text { width: 350px; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; line-height: 1; }
        #dice-box { width: 90px; height: 90px; background: white; color: black; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 4rem; font-weight: bold; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }

        .floating-emoji { position: absolute; font-size: 3rem; animation: floatUp 1s forwards; pointer-events: none; z-index: 6000; }
        .dice-cinematic { position: fixed !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) scale(3.2) !important; z-index: 5000; opacity: 0.95; }
        .dice-red { animation: redSparkle 0.5s infinite alternate; }
        .dice-gold { animation: goldSparkle 0.5s infinite alternate; }
        .flipping { animation: flipping 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95); }

        #merch-tracker { position: fixed; left: 20px; top: 135px; width: 260px; background: var(--ui-bg); border-radius: 12px; padding: 20px; border: 1px solid #333; z-index: 1; }
        .player-entry { margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 0.8rem; transition: 0.3s; }
        .avatar-roster { width: 45px; height: 45px; border-radius: 50%; background: #111; border: 2px solid #555; }
        
        .player { width: 75px; height: 75px; position: absolute; z-index: 100; transition: all 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28); background-size: contain; background-repeat: no-repeat; background-position: center bottom; pointer-events: none; }
        .active-turn { animation: turnPulse 1.5s infinite ease-in-out; }
        .swap-target { filter: drop-shadow(0 0 20px var(--joy-glow)); animation: pulse 1s infinite; z-index: 1000 !important; pointer-events: auto !important; cursor: pointer; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .popup { background: #111; padding: 45px; border-radius: 30px; border: 2px solid #444; width: 680px; text-align: center; }
        
        #rule-sidebar { position: fixed; right: -350px; top: 135px; width: 280px; background: var(--ui-bg); padding: 30px; border-radius: 20px; border: 2px solid var(--joy-glow); transition: 0.6s; z-index: 100; box-shadow: -10px 0 40px rgba(0,0,0,0.6); cursor: pointer; }
        #rule-sidebar.active { right: 25px; }
        .tag { font-size: 0.55rem; padding: 2px 5px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .tag-investor { background: var(--gold); color: black; }
        .tag-sellout { background: var(--fear-glow); color: white; }

        .intro-header { font-size: 3.5rem; color: var(--gold); animation: introGlow 2s ease-in-out infinite alternate; margin-bottom: 20px; font-weight: 900; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="merch-tracker">
        <h4 style="margin:0 0 10px 0; font-size: 0.65rem; letter-spacing: 2px; opacity: 0.6; color: var(--joy-glow);">TOUR STATS</h4>
        <div id="tracker-list"></div>
    </div>

    <div id="ui-layer">
        <div id="status-text">---</div>
        <div id="roll-btn-center">
            <button id="roll-btn" onclick="doRoll()" disabled style="background: var(--joy-glow); color: black; width: 220px; font-size: 1.6rem; font-weight:bold; padding:15px; border:none; border-radius:8px; cursor:pointer;">ROLL</button>
        </div>
        <div id="dice-slot-right">
            <div id="dice-box">?</div>
        </div>
    </div>

    <div id="board-container">
        <svg id="arrow-layer" viewbox="0 0 1100 700">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#d2b48c" />
                </marker>
            </defs>
        </svg>
    </div>

    <div id="overlay-event" class="overlay">
        <div class="popup">
            <h1 id="event-title"></h1>
            <div id="event-desc" style="font-size: 1.2rem; color: #ccc; margin-bottom:25px; line-height: 1.6;"></div>
            <div id="coin" style="width:140px; height:140px; background:var(--gold); border:8px solid #b8860b; border-radius:50%; margin:25px auto; display:none; align-items:center; justify-content:center; font-size:2.5rem; font-weight:bold; color:#5c4305;">?</div>
            <div id="timer-ui" style="font-size: 5rem; font-weight: 900; color: var(--joy-glow); margin: 20px 0; display: none;"></div>
            <div id="action-bar">
                <button id="event-btn-primary" style="padding:15px 35px; font-size: 1.1rem; font-weight:bold; cursor:pointer; border-radius:8px; border:none;"></button>
                <button id="event-btn-secondary" style="display:none; background: #333; color: white; padding:15px 35px; font-size: 1.1rem; font-weight:bold; cursor:pointer; margin-left:15px; border:none; border-radius:8px;"></button>
            </div>
        </div>
    </div>

    <div id="rule-sidebar" onclick="this.classList.remove('active')"><h3 id="side-title"></h3><p id="side-desc" style="line-height: 1.6;"></p></div>

    <div id="overlay-setup" class="overlay" style="display:flex"><div class="popup"><h1 class="intro-header">Fearjoy - Play This</h1><h2>HOW MANY ARTISTS?</h2><button onclick="setPlayerCount(1)" style="padding:20px 40px; margin:10px;">1</button><button onclick="setPlayerCount(2)" style="padding:20px 40px; margin:10px;">2</button><button onclick="setPlayerCount(3)" style="padding:20px 40px; margin:10px;">3</button><div id="setup-step-2" style="display:none; margin-top:30px;"><input type="text" id="name-input" placeholder="ARTIST NAME" style="padding:15px; width:80%; text-align: center; border-radius: 8px; border: 1px solid #444; background: #000; color: white;"><div style="display:flex; justify-content:center; gap:20px; margin:25px;"><img id="sel-jesse" src="jesse.png" style="width:80px; opacity:0.3; cursor:pointer;" onclick="pickAvatar('jesse', '#007bff')"><img id="sel-marco" src="marco.png" style="width:80px; opacity:0.3; cursor:pointer;" onclick="pickAvatar('marco', '#ffcc00')"><img id="sel-grant" src="grant.png" style="width:80px; opacity:0.3; cursor:pointer;" onclick="pickAvatar('grant', '#ff00ff')"></div><button onclick="confirmArtist()" style="padding:15px 30px; background: white; color: black; font-weight: bold; border-radius: 8px; cursor: pointer;">ADD TO TOUR</button></div></div></div>

<script>
    const boardLayout = [
        "START", "blank", "blank", "blank", "DAYSPRING", "blank", "FEARJOY", "blank", "FIGMENT", "JOY", 
        "THE REMEDY", "FEAR", "VAN BREAKS DOWN", "JOY", "blank", "DMITRI", "blank", "FEARJOY", "NIGHTDRIVE", "JOY", 
        "INVEST IN MERCH", "FEAR", "blank", "5TH DIMENSION", "blank", "IT HAPPENS", "blank", "GHOST 2", "MAYA", "blank", 
        "WIN A GRAMMY", "blank", "blank", "OPENING ACT", "FEAR", "JOY", "blank", "TELLUS", "blank", "FEARJOY", 
        "blank", "ENCORE", "blank", "blank", "VOID", "blank", "blank", "THE ENDLESS SMILE", "GATEKEEPER", "blank", 
        "blank", "blank", "FEARJOY", "VAN BREAKS DOWN", "blank", "LOST RECORDING", "blank", "blank", "blank", "SWIMMIN"
    ];

    const rules = {
        0: { title: "START", emoji: "🏠", desc: "The quiet before the storm." },
        4: { title: "DAYSPRING", emoji: "☀️", shift: 3, isAuto: true, isTrack: true, desc: "Creative clarity strikes! Forward 3." },
        6: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip the coin: JOY = +1, FEAR = -1." },
        8: { title: "FIGMENT", emoji: "🛸", isFigment: true, isTrack: true, desc: "Step outside (1:00) for +2, or rush back for -1." },
        9: { title: "JOY", emoji: "✨", shift: 1, isAuto: true, desc: "Momentum! Forward 1." },
        10: { title: "THE REMEDY", emoji: "💊", choice: 'remedy', isTrack: true, desc: "A major label exec offers a deal: move ahead 6 now, but every 6 you roll later becomes -2." },
        11: { title: "FEAR", emoji: "💀", shift: -1, isAuto: true, desc: "Doubt slows you. Back 1." },
        12: { title: "VAN BREAKS DOWN", emoji: "🛠", skipTurns: 1, desc: "Bummer! Waiting for repairs. Turn consumed." },
        13: { title: "JOY", emoji: "✨", shift: 1, isAuto: true, desc: "Everything aligns. Forward 1." },
        15: { title: "DMITRI", emoji: "👨‍🚀", timer: 15, isDmitri: true, isTrack: true, desc: "Breathe (15s) for the 5D shortcut. Skip = Rewind 2." },
        17: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip for destiny." },
        18: { title: "NIGHTDRIVE", emoji: "🌙", isNightDrive: true, isTrack: true, desc: "Keep eyes closed until next turn! Peek = Rewind 2." },
        19: { title: "JOY", emoji: "✨", shift: 1, isAuto: true, desc: "Rhythm is perfect. Forward 1." },
        20: { title: "INVEST IN MERCH", emoji: "👕", choice: 'merch', desc: "Rewind 4 now, but every 1 or 2 you roll later will be doubled." },
        21: { title: "FEAR", emoji: "💀", shift: -1, isAuto: true, desc: "The road is long. Back 1." },
        23: { title: "5TH DIMENSION", emoji: "✨", shift: 1, isAuto: true, desc: "Higher frequency. Forward 1." },
        25: { title: "IT HAPPENS", emoji: "⚡", isItHappens: true, isTrack: true, desc: "suddenly, instantly, take an extra turn" },
        27: { title: "GHOST 2", emoji: "👻", isGhost: true, isTrack: true, desc: "Silent for two turns. Noise = Rewind 1." },
        30: { title: "WIN A GRAMMY", emoji: "🏆", isGrammy: true, desc: "Switch places with the leader!" },
        33: { title: "OPENING ACT", emoji: "🎤", isOpeningAct: true, desc: "Slide to the space behind the leader." },
        34: { title: "FEAR", emoji: "💀", shift: -1, isAuto: true, desc: "Industry gatekeepers. Back 1." },
        35: { title: "JOY", emoji: "✨", shift: 1, isAuto: true, desc: "Crowd is cheering. Forward 1." },
        37: { title: "TELLUS", emoji: "📣", isTellus: true, isTrack: true, desc: "Swap positions with any artist." },
        39: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip for destiny." },
        41: { title: "ENCORE", emoji: "🎸", shift: 2, isAuto: true, desc: "The crowd demands more! Move forward 2." },
        44: { title: "VOID", emoji: "🌀", shift: -4, isAuto: true, isTrack: true, desc: "Creative block. Rewind 4." },
        48: { title: "GATEKEEPER", emoji: "🚪", isGate: true, desc: "Roll exactly to pass." },
        52: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip for destiny." },
        53: { title: "VAN BREAKS DOWN", emoji: "🛠", skipTurns: 1, desc: "Bummer! Waiting for repairs. Turn consumed." },
        55: { title: "LOST RECORDING", emoji: " cassette", isLostRecording: true, desc: "Tape erased! Roll and rewind that amount." },
        59: { title: "SWIMMIN'", emoji: "🌊", desc: "The tour is over. Legend status achieved." }
    };

    let players = [], turnIdx = 0, isMoving = false, totalP = 0, currentSetupP = 0, selectedAvatar = null, isSwapping = false, sidebarTimer = null;

    function drawArrow(x1, y1, x2, y2) {
        const svg = document.getElementById('arrow-layer');
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1); line.setAttribute("y1", y1);
        line.setAttribute("x2", x2); line.setAttribute("y2", y2);
        line.setAttribute("stroke", "#d2b48c"); line.setAttribute("stroke-width", "3");
        line.setAttribute("stroke-dasharray", "5,5"); line.setAttribute("marker-end", "url(#arrowhead)");
        svg.appendChild(line);
    }

    function setPlayerCount(n) { totalP = n; document.getElementById('setup-step-2').style.display='block'; }
    function pickAvatar(id, color) { selectedAvatar = { id, color, img: id+'.png' }; document.querySelectorAll('img').forEach(i=>i.style.opacity='0.3'); document.getElementById('sel-'+id).style.opacity='1'; }
    
    function confirmArtist() {
        const name = document.getElementById('name-input').value.toUpperCase() || `ARTIST ${currentSetupP+1}`;
        if(!selectedAvatar) return;
        players.push({ name, pos: 0, avatar: selectedAvatar, skipCount: 0, isInvestor: false, isSellout: false, grammys: 0, shirtsSold: 0, pillsTaken: 0, nightDriveActive: false, ghostCounter: 0, totalRollValue: 0 });
        currentSetupP++;
        if(currentSetupP >= totalP) { document.getElementById('overlay-setup').style.display='none'; initBoard(); }
        else { document.getElementById('name-input').value=''; selectedAvatar=null; }
    }

    function initBoard() {
        const board = document.getElementById('board-container'), containerRect = board.getBoundingClientRect(), spaceCoords = [];
        boardLayout.forEach((name, i) => {
            const s = document.createElement('div'); s.id = 's'+i; s.className = 'space';
            if(name === "blank") { s.classList.add('blank'); s.innerHTML = `<span class="blank-num">${i}</span>`; }
            else {
                s.innerHTML = name;
                if(rules[i]?.isTrack) s.classList.add('tracklist-space');
                if(name === "FEAR") s.classList.add('fear-space');
                if(name === "JOY") s.classList.add('joy-space');
                if(name === "FEARJOY") s.classList.add('hybrid');
                if(i === 59) s.classList.add('win-track');
            }
            s.onclick = () => handleSpaceClick(i);
            let row = Math.floor(i / 10), col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));
            s.style.gridRow = 6 - row; s.style.gridColumn = col + 1;
            board.appendChild(s);
            const r = s.getBoundingClientRect();
            spaceCoords.push({ x: r.left + r.width/2 - containerRect.left, y: r.top + r.height/2 - containerRect.top });
        });
        drawArrow(spaceCoords[15].x, spaceCoords[15].y, spaceCoords[23].x, spaceCoords[23].y);
        drawArrow(spaceCoords[44].x, spaceCoords[44].y, spaceCoords[40].x, spaceCoords[40].y);
        players.forEach((p, i) => {
            const el = document.createElement('div'); el.id = 'p'+i; el.className = 'player';
            el.style.backgroundImage = `url('${p.avatar.img}')`;
            el.onclick = () => handlePlayerClick(i);
            board.appendChild(el);
        });
        updateUI(); document.getElementById('roll-btn').disabled = false;
    }

    function handleSpaceClick(i) {
        const r = rules[i] || { title: boardLayout[i], desc: "The road continues." };
        showSidebar(r.title, (r.emoji ? r.emoji + " " : "") + r.desc);
    }

    function updateUI() {
        const p = players[turnIdx], list = document.getElementById('tracker-list');
        document.getElementById('status-text').innerHTML = `<span style="color:${p.avatar.color}">${p.name}'S TURN</span>`;
        list.innerHTML = '';
        players.forEach((pl, i) => {
            let tags = (pl.isInvestor ? '<span class="tag tag-investor">INVESTOR</span>' : '') + (pl.isSellout ? '<span class="tag tag-sellout">SELLOUT</span>' : '');
            let isCurrent = (i === turnIdx);
            list.innerHTML += `<div id="roster-p${i}" class="player-entry ${isCurrent ? 'active-turn' : ''}" style="${isCurrent ? '--p-color:'+pl.avatar.color : ''}">
                <div style="display:flex;align-items:center;gap:10px;"><img src="${pl.avatar.img}" class="avatar-roster"><div><b>${pl.name}</b>${tags}<br>🏆 ${pl.grammys} | 👕 ${pl.shirtsSold} | 💊 ${pl.pillsTaken}</div></div></div>`;
            
            const boardPiece = document.getElementById('p'+i);
            boardPiece.style.zIndex = (isCurrent ? 150 : 100);
            if(isCurrent) { boardPiece.classList.add('active-turn'); boardPiece.style.setProperty('--p-color', pl.avatar.color); }
            else { boardPiece.classList.remove('active-turn'); }
        });
        updatePositions();
    }

    function updatePositions() {
        const countMap = {};
        players.forEach((p, i) => {
            const target = document.getElementById('s'+p.pos), el = document.getElementById('p'+i);
            if(!countMap[p.pos]) countMap[p.pos] = 0;
            el.style.left = (target.offsetLeft + (countMap[p.pos] * 12)) + "px";
            el.style.top = (target.offsetTop + (countMap[p.pos] * 12)) + "px";
            countMap[p.pos]++;
        });
    }

    async function doRoll() {
        if(isMoving || isSwapping) return;
        document.getElementById('rule-sidebar').classList.remove('active');
        const p = players[turnIdx];
        if(p.skipCount > 0) { p.skipCount--; showStatusPopup("🛠 BUMMER", "Van is still in the shop. Turn skipped.", "OK", () => { endTurn(); }, "DARN", () => { endTurn(); }); return; }
        if(p.nightDriveActive) { showStatusPopup("🌙 NIGHTDRIVE CHECK", "Did you keep your eyes closed?", "YES", () => { p.nightDriveActive = false; performActualRoll(); }, "NO", () => { p.nightDriveActive = false; movePlayer(-2); }); return; }
        if(p.ghostCounter > 0) { showStatusPopup("👻 GHOST CHECK", "Did you remain quiet?", "YES", () => { p.ghostCounter--; performActualRoll(); }, "NO", () => { p.ghostCounter = 0; movePlayer(-1); }); return; }
        performActualRoll();
    }

    async function performActualRoll() {
        const p = players[turnIdx]; isMoving = true; document.getElementById('roll-btn').disabled = true;
        const dice = document.getElementById('dice-box'); dice.classList.add('dice-cinematic');
        let roll;
        for(let j=0; j<12; j++) { dice.innerText = Math.floor(Math.random()*6)+1; await new Promise(r => setTimeout(r, 45)); }
        roll = Math.floor(Math.random()*6)+1; dice.innerText = roll;
        if(p.isInvestor && (roll === 1 || roll === 2)) { await new Promise(r => setTimeout(r, 500)); dice.classList.add('dice-gold'); spawnEmoji('👕'); showSidebar("INVESTMENT PAYOFF", "Merch is moving! Roll doubled."); roll *= 2; dice.innerText = roll; await new Promise(r => setTimeout(r, 2000)); }
        if(p.isSellout && roll === 6) { await new Promise(r => setTimeout(r, 500)); dice.classList.add('dice-red'); spawnEmoji('💊'); showSidebar("CONTRACT DEBT", "Forward 6 becomes Back 2."); roll = -2; dice.innerText = roll; await new Promise(r => setTimeout(r, 2000)); }
        p.totalRollValue += Math.abs(roll);
        await new Promise(r => setTimeout(r, 250)); dice.classList.remove('dice-cinematic', 'dice-red', 'dice-gold');
        await new Promise(r => setTimeout(r, 250)); movePlayer(roll);
    }

    function spawnEmoji(char) { const e = document.createElement('div'); e.className = 'floating-emoji'; e.innerText = char; e.style.left = "50%"; e.style.top = "50%"; document.body.appendChild(e); setTimeout(() => e.remove(), 1000); }

    async function movePlayer(n) {
        const p = players[turnIdx]; const dir = n > 0 ? 1 : -1;
        for(let i=0; i<Math.abs(n); i++) {
            if(p.pos + dir >= 0 && p.pos + dir < boardLayout.length) {
                p.pos += dir; updatePositions();
                if(rules[p.pos]?.isGate && i < Math.abs(n)-1) { i = 999; }
                await new Promise(r => setTimeout(r, 300));
                if(p.pos >= 59) { showWinScreen(); return; }
            }
        }
        checkSpace();
    }

    function checkSpace() {
        const p = players[turnIdx], r = rules[p.pos];
        if(!r) { endTurn(); return; }
        if(r.choice === 'remedy' && p.isSellout) { showSidebar("CONTRACT ACTIVE", "Soul already sold."); endTurn(); return; }
        if(r.choice === 'merch' && p.isInvestor) { showSidebar("ALREADY INVESTED", "Inventory full."); endTurn(); return; }
        if(r.isAuto) { showSidebar(r.title, (r.emoji || "") + " " + (r.desc || "Moving...")); setTimeout(() => { movePlayer(r.shift); }, 1200); return; }
        const modal = document.getElementById('overlay-event'), title = document.getElementById('event-title'), desc = document.getElementById('event-desc'), pBtn = document.getElementById('event-btn-primary'), sBtn = document.getElementById('event-btn-secondary'), timerUI = document.getElementById('timer-ui'), coin = document.getElementById('coin');
        coin.style.display = 'none'; pBtn.style.display = 'inline-block'; pBtn.disabled = false;
        title.innerText = (r.emoji || "") + " " + r.title; desc.innerText = r.desc || "";
        pBtn.innerText = "CONTINUE"; sBtn.style.display = 'none'; timerUI.style.display = 'none'; modal.style.display = 'flex';
        if(r.skipTurns) { p.skipCount = r.skipTurns; pBtn.onclick = () => { modal.style.display='none'; endTurn(); }; }
        else if(r.isFigment) {
            pBtn.innerText = "STEP OUTSIDE (1:00)"; sBtn.innerText = "RUSH BACK (-1)"; sBtn.style.display = 'inline-block';
            pBtn.onclick = () => { pBtn.disabled = true; sBtn.style.display = 'none'; timerUI.style.display = 'block'; let t = 60; timerUI.innerText = t; const clock = setInterval(() => { t--; timerUI.innerText = t; if(t <= 0) { clearInterval(clock); pBtn.disabled = false; pBtn.innerText = "I'M BACK (+2)"; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(2); }; } }, 1000); };
            sBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(-1); };
        } else if(r.isFearjoy) {
            pBtn.innerText = "FLIP COIN"; pBtn.onclick = () => { pBtn.style.display='none'; coin.style.display='flex'; coin.innerText = "?"; coin.classList.add('flipping'); setTimeout(() => { const win = Math.random() > 0.5; coin.innerText = win ? "JOY" : "FEAR"; coin.classList.remove('flipping'); setTimeout(async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(win ? 1 : -1); }, 1200); }, 1200); };
        } else if(r.isDmitri) {
            pBtn.innerText = "BREATHE"; sBtn.innerText = "SKIP (-2)"; sBtn.style.display = 'inline-block';
            pBtn.onclick = () => { pBtn.disabled = true; sBtn.style.display='none'; timerUI.style.display='block'; let t = 15; timerUI.innerText = t; const clock = setInterval(() => { t--; timerUI.innerText = t; if(t <= 0) { clearInterval(clock); pBtn.disabled = false; pBtn.innerText = "BREATHING COMPLETED"; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); p.pos = 23; updatePositions(); endTurn(); }; } }, 1000); };
            sBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(-2); };
        } else if(r.choice) {
            pBtn.innerText = r.choice === 'remedy' ? "SIGN CONTRACT (+6)" : "INVEST IN MERCH (-4)"; sBtn.style.display='inline-block'; sBtn.innerText = "PASS";
            pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); if(r.choice==='remedy'){p.isSellout=true; movePlayer(6);} else {p.isInvestor=true; movePlayer(-4); } };
            sBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isGrammy) {
            let lead = players.reduce((prev, curr) => (prev.pos > curr.pos) ? prev : curr); p.grammys++;
            if(lead === p) { pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(2); }; }
            else { pBtn.onclick = () => { let lp = lead.pos; lead.pos = p.pos; p.pos = lp; modal.style.display='none'; updatePositions(); endTurn(); }; }
        } else if(r.isTellus) {
            isSwapping = true; pBtn.style.display='none'; desc.innerText = "CLICK ANOTHER ARTIST TO SWAP PLACES.";
            players.forEach((_, i) => { if(i !== turnIdx) document.getElementById('p'+i).classList.add('swap-target'); });
        } else if(r.isItHappens) { pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); isMoving = false; performActualRoll(); };
        } else if(r.isLostRecording) { pBtn.innerText = "ROLL TO REWIND"; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); let rl = Math.floor(Math.random()*6)+1; movePlayer(-rl); };
        } else { pBtn.onclick = () => { modal.style.display='none'; endTurn(); }; }
    }

    function handlePlayerClick(idx) { if(!isSwapping) return; let p = players[turnIdx], t = players[idx], lp = t.pos; t.pos = p.pos; p.pos = lp; isSwapping = false; document.querySelectorAll('.player').forEach(el => el.classList.remove('swap-target')); document.getElementById('overlay-event').style.display='none'; updatePositions(); endTurn(); }

    function showStatusPopup(t, d, b1, c1, b2, c2) {
        const modal = document.getElementById('overlay-event');
        document.getElementById('event-title').innerText = t; document.getElementById('event-desc').innerText = d;
        const pBtn = document.getElementById('event-btn-primary'); pBtn.innerText = b1; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(r => setTimeout(r, 200)); c1(); };
        const sBtn = document.getElementById('event-btn-secondary'); sBtn.style.display='inline-block'; sBtn.innerText = b2; sBtn.onclick = async () => { modal.style.display='none'; await new Promise(r => setTimeout(r, 200)); c2(); };
        modal.style.display='flex';
    }

    function showSidebar(t, d) { if(sidebarTimer) clearTimeout(sidebarTimer); document.getElementById('side-title').innerText = t; document.getElementById('side-desc').innerText = d; document.getElementById('rule-sidebar').classList.add('active'); sidebarTimer = setTimeout(() => document.getElementById('rule-sidebar').classList.remove('active'), 8000); }

    function showWinScreen() { 
        const p = players[turnIdx];
        let statsHtml = `<div style="text-align:left; margin-top:20px; font-family:monospace;">`;
        players.forEach(pl => { statsHtml += `<div style="margin-bottom:15px; border-bottom: 1px solid #444;"><b style="color:${pl.avatar.color}">${pl.name}</b><br>GRAMMYS: ${pl.grammys} | SHIRTS: ${pl.shirtsSold} | PILLS: ${pl.pillsTaken}<br>TOTAL MILES ROLLED: ${pl.totalRollValue}</div>`; });
        statsHtml += `</div>`;
        document.getElementById('event-title').innerText = "🌊 SWIMMIN'";
        document.getElementById('event-desc').innerHTML = `${p.name} REACHED LEGEND STATUS.<br>${statsHtml}`;
        document.getElementById('event-btn-primary').innerText = "RESTART TOUR"; document.getElementById('event-btn-primary').onclick = () => location.reload();
        document.getElementById('event-btn-secondary').style.display = 'none';
        document.getElementById('overlay-event').style.display='flex'; 
    }
    
    function endTurn() { turnIdx = (turnIdx + 1) % players.length; isMoving = false; document.getElementById('roll-btn').disabled = false; updateUI(); }
</script>
</body>
</html>
