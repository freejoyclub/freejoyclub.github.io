<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fearjoy - v6.0 Tracklist Alpha</title>
    <style>
        :root {
            --wood-dark: #1a1a1a; --wood-mid: #2a2a2a; 
            --joy-glow: #00ff88; --fear-glow: #ff4444;
            --remedy-blue: #00d4ff; --gold: #ffd700;
            --vinyl-black: #111111;
        }

        body {
            background-color: #0a0a0a;
            color: white; font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        /* Vinyl Record Style for Tracklist Spaces */
        .tracklist-space {
            background: var(--vinyl-black) !important;
            border: 3px double #444 !important;
            box-shadow: 0 0 15px rgba(0,0,0,0.8), inset 0 0 10px #000;
            z-index: 5;
            transform: scale(1.1);
        }

        #ui-layer { 
            display: flex; align-items: center; gap: 30px; 
            background: rgba(0,0,0,0.9); padding: 15px 40px; 
            border-radius: 12px; margin: 10px 0; width: 900px; 
            justify-content: space-between; border: 1px solid #333;
        }

        #board-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            grid-template-rows: repeat(6, 1fr); 
            gap: 15px; padding: 30px; 
            width: 1100px; height: 650px; 
            background: #111; border-radius: 20px;
        }

        .space { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.7rem; text-align: center; font-weight: bold;
        }

        .blank { opacity: 0.3; transform: scale(0.8); }
        .special { border-width: 2px; cursor: pointer; }
        .joy { color: var(--joy-glow); border-color: var(--joy-glow); }
        .fear { color: var(--fear-glow); border-color: var(--fear-glow); }
        .hybrid { border-color: white; color: white; border-style: dashed; }

        .player { 
            width: 60px; height: 60px; position: absolute; z-index: 100; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            background-size: contain; background-repeat: no-repeat;
        }

        #dice-box { width: 70px; height: 70px; background: #fff; color: #000; font-size: 3rem; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 900; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .popup { background: #000; padding: 40px; border-radius: 20px; border: 2px solid #444; width: 500px; text-align: center; }
        button { padding: 12px 30px; cursor: pointer; font-family: inherit; font-weight: bold; background: #fff; border: none; margin: 10px; }
        
        #rule-sidebar { position: fixed; right: -300px; top: 100px; width: 250px; background: #000; padding: 20px; border: 2px solid #333; transition: 0.4s; }
        #rule-sidebar.active { right: 20px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="dice-box">?</div>
        <div id="status-text" style="font-size: 2rem;">START THE TOUR</div>
        <button id="roll-btn" onclick="doRoll()">ROLL</button>
    </div>

    <div id="board-container"></div>

    <div id="overlay-event" class="overlay">
        <div class="popup" id="event-box">
            <h1 id="event-title"></h1>
            <p id="event-desc"></p>
            <div id="timer-display" style="font-size: 3rem; color: var(--joy-glow); margin: 10px;"></div>
            <button id="event-btn"></button>
            <button id="skip-btn" style="display:none; background: #333; color: #777;"></button>
        </div>
    </div>

    <div id="rule-sidebar" onclick="this.classList.remove('active')">
        <h3 id="side-title" style="color: var(--joy-glow);"></h3>
        <p id="side-desc"></p>
    </div>

<script>
    // THE MASTER TRACKLIST SEQUENCE (57 Spaces)
    const boardLayout = [
        "START", "blank", "blank", "blank", "DAYSPRING", "blank", "FEARJOY", "blank", "FIGMENT", "blank", 
        "THE REMEDY", "blank", "VAN BREAKS DOWN", "JOY (+1)", "blank", "DMITRI", "FEARJOY", "NIGHTDRIVE", "blank", "INVEST IN MERCH", 
        "FEAR (-1)", "blank", "5TH DIMENSION", "blank", "WIN A GRAMMY", "blank", "blank", "MAYA", "blank", "blank", 
        "OPENING ACT", "FEAR (-1)", "JOY (+1)", "blank", "TELLUS", "blank", "FEARJOY", "blank", "ENCORE", "blank", 
        "blank", "VOID", "blank", "blank", "THE ENDLESS SMILE", "GATEKEEPER", "blank", "blank", "blank", "FEARJOY", 
        "VAN BREAKS DOWN", "blank", "LOST RECORDING", "blank", "blank", "blank", "SWIMMIN'"
    ];

    const rules = {
        4: { id:'joy', title:"DAYSPRING", emoji:"☀️", desc:"Fast Forward 3 spaces!", shift: 3, btnText: "SPRING AHEAD!" },
        6: { id:'hybrid', title:"FEARJOY", emoji:"☯️", desc:"Roll again. 1-3: Back 1, 4-6: Forward 1.", isHybrid: true },
        8: { id:'track', title:"FIGMENT", emoji:"🛸", desc:"Step outdoors for 1 min for +2 on next roll. Honor system.", timer: 60, btnText: "I WENT OUTSIDE", skipShift: -1, skipText: "STAY INSIDE (-1)" },
        10: { id:'remedy', title:"THE REMEDY", emoji:"💊", desc:"Sell out for +6, but 6s become -2." },
        12: { id:'van', title:"VAN BREAKDOWN", emoji:"🛠", desc:"Skip 1 turn.", count: 1, btnText: "FIXING IT" },
        13: { id:'joy', title:"JOY", emoji:"✨", desc:"Move Forward 1.", shift: 1, btnText: "NICE" },
        15: { id:'track', title:"DMITRI", emoji:"👨‍🚀", desc:"5 Deep Breaths. (10s timer)", timer: 10, btnText: "I AM CENTERED", skipShift: -2, skipText: "SKIP (-2)" },
        16: { id:'hybrid', title:"FEARJOY", emoji:"☯️", desc:"Roll again. 1-3: Back 1, 4-6: Forward 1.", isHybrid: true },
        17: { id:'track', title:"NIGHTDRIVE", emoji:"🌙", desc:"Keep eyes closed until next turn. Fail = -2.", isPersistent: true },
        19: { id:'merch', title:"INVEST IN MERCH", emoji:"👕", desc:"Pay 4 spaces to double 1s and 2s." },
        20: { id:'fear', title:"FEAR", emoji:"💀", desc:"Move Back 1.", shift: -1, btnText: "UGH" },
        31: { id:'fear', title:"FEAR", emoji:"💀", desc:"Move Back 1.", shift: -1, btnText: "DARN" },
        32: { id:'joy', title:"JOY", emoji:"✨", desc:"Move Forward 1.", shift: 1, btnText: "YES" },
        45: { id:'gate', title:"GATEKEEPER", emoji:"🚧", desc:"ALL STOP. You must land exactly or end turn here.", isGate: true }
        // Remaining tracklist placeholders to be defined...
    };

    let players = [{ name: "PLAYER 1", pos: 0, head: 'jesse', color: '#00ff88' }];
    let turnIndex = 0;

    function initBoard() {
        const container = document.getElementById('board-container');
        boardLayout.forEach((name, i) => {
            const s = document.createElement('div');
            s.id = 's' + i;
            s.className = 'space';
            
            if(name === "blank") s.classList.add('blank');
            else {
                s.classList.add('special');
                s.innerHTML = name;
                if(rules[i] && rules[i].id === 'track') s.classList.add('tracklist-space');
                if(name.includes("JOY")) s.classList.add('joy');
                if(name.includes("FEAR")) s.classList.add('fear');
                if(name === "FEARJOY") s.classList.add('hybrid');
                s.onclick = () => showPreview(i);
            }

            // Simple snake-like grid pathing
            let row = Math.floor(i / 10);
            let col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));
            s.style.gridRow = 6 - row;
            s.style.gridColumn = col + 1;
            container.appendChild(s);
        });
        renderPlayers();
    }

    function renderPlayers() {
        players.forEach((p, i) => {
            let el = document.getElementById('p' + i);
            if(!el) {
                el = document.createElement('div');
                el.id = 'p' + i; el.className = 'player';
                el.style.backgroundColor = p.color;
                document.getElementById('board-container').appendChild(el);
            }
            const target = document.getElementById('s' + p.pos);
            el.style.left = target.offsetLeft + 10 + "px";
            el.style.top = target.offsetTop + 10 + "px";
        });
    }

    function showPreview(i) {
        const r = rules[i];
        if(!r) return;
        document.getElementById('side-title').innerText = r.title;
        document.getElementById('side-desc').innerText = r.desc;
        document.getElementById('rule-sidebar').classList.add('active');
    }

    async function doRoll() {
        let roll = Math.floor(Math.random()*6)+1;
        document.getElementById('dice-box').innerText = roll;
        let p = players[turnIndex];
        for(let i=0; i<roll; i++) {
            if(p.pos < boardLayout.length - 1) p.pos++;
            renderPlayers();
            await new Promise(r => setTimeout(r, 200));
        }
        checkSpace();
    }

    async function checkSpace() {
        const p = players[turnIndex];
        const r = rules[p.pos];
        if(!r) return;

        const overlay = document.getElementById('overlay-event');
        document.getElementById('event-title').innerText = r.title;
        document.getElementById('event-desc').innerText = r.desc;
        const btn = document.getElementById('event-btn');
        btn.innerText = r.btnText || "CONTINUE";
        overlay.style.display = 'flex';

        if(r.timer) {
            btn.disabled = true;
            let time = r.timer;
            const skip = document.getElementById('skip-btn');
            skip.style.display = 'inline-block';
            skip.innerText = r.skipText;
            
            const timerInt = setInterval(() => {
                time--;
                document.getElementById('timer-display').innerText = time;
                if(time <= 0) {
                    clearInterval(timerInt);
                    btn.disabled = false;
                    document.getElementById('timer-display').innerText = "DONE";
                }
            }, 1000);

            btn.onclick = () => { overlay.style.display = 'none'; skip.style.display='none'; };
            skip.onclick = () => { 
                clearInterval(timerInt); 
                overlay.style.display = 'none'; 
                skip.style.display='none';
                if(r.skipShift) movePlayer(r.skipShift);
            };
        } else {
            btn.onclick = () => { 
                overlay.style.display = 'none';
                if(r.shift) movePlayer(r.shift);
            };
        }
    }

    async function movePlayer(n) {
        const p = players[turnIndex];
        const dir = n > 0 ? 1 : -1;
        for(let i=0; i<Math.abs(n); i++) {
            p.pos += dir;
            renderPlayers();
            await new Promise(r => setTimeout(r, 200));
        }
        checkSpace(); // Recursive check for chains
    }

    initBoard();
</script>
</body>
</html>
