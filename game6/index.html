<style>
    /* New Vinyl Tracklist Styling */
    .tracklist-space {
        background: #000 !important;
        border: 4px double #333 !important;
        border-radius: 50% !important;
        width: 110% !important;
        height: 110% !important;
        z-index: 2;
        box-shadow: inset 0 0 10px #111, 0 0 15px rgba(0,0,0,0.5);
    }
    
    .timer-display {
        font-size: 2rem;
        color: var(--joy-glow);
        margin: 20px 0;
        font-weight: bold;
    }

    /* Shrink standard spaces slightly for distinction */
    .space:not(.tracklist-space):not(.special) {
        transform: scale(0.85);
        opacity: 0.7;
    }
</style>

<script>
// Updated Rules with Tracklist Logic
const rules = {
    4: { id:'joy', title:"DAYSPRING", emoji:"☀️", desc:"Fast Forward 3 spaces!", shift: 3, btnText: "SPRING AHEAD!" },
    8: { 
        id:'task', title:"FIGMENT", emoji:"🛸", 
        desc:"Step outdoors for 1 minute to add +2 to your next roll. (Honor System)", 
        timer: 60, taskType: 'outdoor', btnText: "I'M GOING OUTSIDE", skipText: "STAY INSIDE (REWIND 1)" 
    },
    10: { id:'remedy', title:"THE REMEDY", emoji:"💊", desc:"The Sell-out path." },
    12: { id:'van', title:"VAN BREAKDOWN", emoji:"🛠", desc:"Skip 1 turn.", count: 1 },
    15: { 
        id:'task', title:"DMITRI", emoji:"👨‍🚀", 
        desc:"Take 5 deep breaths to move to 5D. (10s focus)", 
        timer: 10, taskType: 'breathing', btnText: "I'M CENTERED", skipText: "SKIP (REWIND 2)" 
    },
    18: { 
        id:'status', title:"NIGHTDRIVE", emoji:"🌙", 
        desc:"Eyes closed until your next turn! Opening early costs 2 spaces.", 
        statusFlag: 'isAsleep', btnText: "GOODNIGHT" 
    },
    // ... "It Happens" and "Ghost" indices to be placed based on your previous list ...
};

// New Task Handler for the Pop-up
async function triggerEventPopup(idx) {
    return new Promise((resolve) => {
        const r = rules[idx];
        const overlay = document.getElementById('overlay-event');
        const box = document.getElementById('event-popup-box');
        const btn = document.getElementById('event-action-btn');
        
        // Clear previous timer if any
        const oldTimer = document.getElementById('active-timer');
        if(oldTimer) oldTimer.remove();

        document.getElementById('event-title').innerText = r.title + " " + r.emoji;
        document.getElementById('event-desc').innerText = r.desc;
        
        overlay.style.display = 'flex';

        if(r.timer) {
            btn.disabled = true;
            let timeLeft = r.timer;
            const timerEl = document.createElement('div');
            timerEl.id = 'active-timer';
            timerEl.className = 'timer-display';
            timerEl.innerText = timeLeft;
            document.getElementById('event-desc').after(timerEl);

            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    btn.disabled = false;
                    btn.innerText = r.btnText;
                }
            }, 1000);

            // Add Skip Button for tasks
            const skipBtn = document.createElement('button');
            skipBtn.innerText = r.skipText;
            skipBtn.onclick = () => {
                clearInterval(countdown);
                overlay.style.display = 'none';
                skipBtn.remove();
                resolve('skip');
            };
            btn.after(skipBtn);
        }

        btn.onclick = () => {
            overlay.style.display = 'none';
            resolve('success');
        };
    });
}

// Logic to check status flags at the START of a turn
async function startTurn() {
    const p = players[turnIndex];
    
    // Check NIGHTDRIVE
    if(p.isAsleep) {
        const followed = await showConfirmModal("Did you keep your eyes closed?");
        p.isAsleep = false;
        if(!followed) {
            for(let i=0; i<2; i++) { if(p.pos > 0) p.pos--; updatePiecePos(turnIndex); await new Promise(r=>setTimeout(r,200)); }
        }
    }

    // Check GHOST (Silent)
    if(p.silentTurns > 0) {
        const followed = await showConfirmModal("Did you remain silent?");
        if(!followed) {
            if(p.pos > 0) p.pos--; updatePiecePos(turnIndex);
        }
        p.silentTurns--;
    }

    document.getElementById('roll-btn').disabled = false;
    updateUI();
}
</script>
