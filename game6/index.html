<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fearjoy - v8.0 Master Narrative Edition</title>
    <style>
        :root {
            --wood-dark: #2a180b; --wood-mid: #3d2616; --wood-light: #4e3625;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --gold: #ffd700; --ui-bg: rgba(0,0,0,0.95); --vinyl: #111111;
        }

        @keyframes woodFade { 0%, 100% { background-color: #2a180b; } 50% { background-color: #4e3625; } }
        @keyframes goldGlow { 0% { box-shadow: 0 0 10px var(--gold); } 100% { box-shadow: 0 0 30px var(--gold); border-color: var(--gold); } }
        @keyframes flipCoin { 0% { transform: rotateY(0); } 100% { transform: rotateY(1800deg); } }

        body {
            animation: woodFade 20s ease-in-out infinite;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px);
            color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow: hidden;
        }

        #board-container { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(6, 1fr); gap: 18px; padding: 50px; width: 1100px; height: 700px; position: relative; z-index: 5; }
        
        .space { width: 85px; height: 85px; border-radius: 50%; border: 1px solid var(--tape-white); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; background: rgba(255,255,255,0.05); text-align: center; position: relative; transition: 0.3s; cursor: help; }
        .blank { opacity: 0.2; transform: scale(0.8); border-style: dashed; cursor: default; }
        .tracklist-space { background: var(--vinyl) !important; border: 3px double #666 !important; box-shadow: inset 0 0 15px #000; transform: scale(1.15); z-index: 5; font-size: 0.6rem !important; }
        .win-track { animation: goldGlow 1.5s infinite alternate; border: 4px solid var(--gold) !important; }
        
        .joy-space { border-color: var(--joy-glow) !important; color: var(--joy-glow) !important; }
        .fear-space { border-color: var(--fear-glow) !important; color: var(--fear-glow) !important; }
        .hybrid { border-style: dotted; border-width: 3px; border-color: white; }

        /* UI HEADER */
        #ui-layer { display: flex; align-items: center; background: var(--ui-bg); padding: 20px 40px; border-radius: 12px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); width: 1000px; justify-content: space-between; z-index: 10; }
        #status-text { width: 320px; font-size: 1.3rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        #roll-btn-center { flex: 1; display: flex; justify-content: center; }
        #dice-slot-right { width: 320px; display: flex; justify-content: flex-end; }

        #dice-box { 
            width: 85px; height: 85px; background: white; color: black; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: bold; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
        }

        .dice-cinematic {
            position: fixed !important; top: 50% !important; left: 50% !important;
            transform: translate(-50%, -50%) scale(3.5) !important;
            opacity: 0.8; z-index: 5000; box-shadow: 0 0 100px rgba(255,255,255,0.4);
        }

        #merch-tracker { position: fixed; left: 20px; top: 120px; width: 260px; background: var(--ui-bg); border-radius: 12px; padding: 20px; border: 1px solid #333; z-index: 1; }
        .player-entry { margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .avatar-roster { width: 45px; height: 45px; border-radius: 50%; background: #111; border: 2px solid #555; }
        
        .player { width: 75px; height: 75px; position: absolute; z-index: 100; transition: all 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28); background-size: contain; background-repeat: no-repeat; background-position: center bottom; cursor: pointer; }
        .swap-target { filter: drop-shadow(0 0 20px var(--joy-glow)); animation: pulse 1s infinite; z-index: 1000 !important; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .popup { background: #111; padding: 40px; border-radius: 25px; border: 2px solid #444; width: 650px; text-align: center; max-height: 85vh; overflow-y: auto; }
        
        #rule-sidebar { position: fixed; right: -320px; top: 120px; width: 280px; background: var(--ui-bg); padding: 30px; border-radius: 20px; border: 2px solid var(--joy-glow); transition: 0.6s; z-index: 100; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #rule-sidebar.active { right: 25px; }

        #coin { width: 130px; height: 130px; background: var(--gold); border: 8px solid #b8860b; border-radius: 50%; margin: 25px auto; display: none; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; color: #5c4305; }
        .flipping { animation: flipCoin 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards; }
        .tag { font-size: 0.55rem; padding: 2px 5px; border-radius: 4px; margin-left: 4px; font-weight: bold; }
        .tag-investor { background: var(--gold); color: black; }
        .tag-sellout { background: var(--fear-glow); color: white; }
    </style>
</head>
<body>

    <div id="merch-tracker">
        <h4 style="margin:0 0 10px 0; font-size: 0.65rem; letter-spacing: 2px; opacity: 0.6; color: var(--joy-glow);">ARTIST ROSTER</h4>
        <div id="tracker-list"></div>
    </div>

    <div id="ui-layer">
        <div id="status-text">ARTIST TURN: ---</div>
        <div id="roll-btn-center">
            <button id="roll-btn" onclick="doRoll()" disabled style="background: var(--joy-glow); color: black; width: 220px; font-size: 1.6rem; font-weight:bold; padding:15px; border:none; border-radius:8px; cursor:pointer; transition: 0.2s;">ROLL</button>
        </div>
        <div id="dice-slot-right">
            <div id="dice-box">?</div>
        </div>
    </div>

    <div id="board-container"></div>

    <div id="overlay-event" class="overlay">
        <div class="popup">
            <h1 id="event-title"></h1>
            <div id="event-desc" style="font-size: 1.15rem; color: #ccc; margin-bottom:25px; line-height: 1.6;"></div>
            <div id="coin">?</div>
            <div id="timer-ui" style="font-size: 4.5rem; font-weight: 900; color: var(--joy-glow); margin: 20px 0; display: none;"></div>
            <div id="action-bar">
                <button id="event-btn-primary" style="padding:15px 35px; font-size: 1rem; font-weight:bold; cursor:pointer; border-radius:8px; border:none;"></button>
                <button id="event-btn-secondary" style="display:none; background: #333; color: white; padding:15px 35px; font-size: 1rem; font-weight:bold; cursor:pointer; margin-left:15px; border:none; border-radius:8px;"></button>
            </div>
        </div>
    </div>

    <div id="rule-sidebar" onclick="this.classList.remove('active')"><h3 id="side-title"></h3><p id="side-desc" style="line-height: 1.5;"></p></div>

    <div id="overlay-setup" class="overlay" style="display:flex"><div class="popup"><h2>HOW MANY ARTISTS?</h2><button onclick="setPlayerCount(1)" style="padding:20px 40px; margin:10px;">1</button><button onclick="setPlayerCount(2)" style="padding:20px 40px; margin:10px;">2</button><button onclick="setPlayerCount(3)" style="padding:20px 40px; margin:10px;">3</button><div id="setup-step-2" style="display:none; margin-top:30px;"><input type="text" id="name-input" placeholder="ARTIST NAME" style="padding:15px; width:80%; text-align: center; border-radius: 8px; border: 1px solid #444; background: #000; color: white;"><div style="display:flex; justify-content:center; gap:20px; margin:25px;"><img id="sel-jesse" src="jesse.png" style="width:80px; opacity:0.3; cursor:pointer;" onclick="pickAvatar('jesse', '#007bff')"><img id="sel-marco" src="marco.png" style="width:80px; opacity:0.3; cursor:pointer;" onclick="pickAvatar('marco', '#ffcc00')"><img id="sel-grant" src="grant.png" style="width:80px; opacity:0.3; cursor:pointer;" onclick="pickAvatar('grant', '#ff00ff')"></div><button onclick="confirmArtist()" style="padding:15px 30px; background: white; color: black; font-weight: bold; border-radius: 8px; cursor: pointer;">ADD TO TOUR</button></div></div></div>

<script>
    const boardLayout = [
        "START", "blank", "blank", "blank", "DAYSPRING", "blank", "FEARJOY", "blank", "FIGMENT", "JOY", 
        "THE REMEDY", "FEAR", "VAN BREAKS DOWN", "JOY", "blank", "DMITRI", "blank", "FEARJOY", "NIGHTDRIVE", "JOY", 
        "INVEST IN MERCH", "FEAR", "blank", "5TH DIMENSION", "blank", "IT HAPPENS", "blank", "GHOST 2", "MAYA", "blank", 
        "WIN A GRAMMY", "OPENING ACT", "FEAR", "JOY", "blank", "TELLUS", "blank", "FEARJOY", "blank", "ENCORE", 
        "blank", "blank", "VOID", "blank", "blank", "THE ENDLESS SMILE", "GATEKEEPER", "blank", "blank", "blank", 
        "FEARJOY", "VAN BREAKS DOWN", "blank", "LOST RECORDING", "blank", "blank", "blank", "SWIMMIN"
    ];

    const rules = {
        0: { title: "THE BASELINE", emoji: "🏠", desc: "Where it all begins. No tracks yet, just potential." },
        4: { title: "DAYSPRING", emoji: "☀️", shift: 3, isTrack: true, desc: "The clouds break and creative clarity strikes! Move forward 3." },
        6: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "A collision of internal forces. Flip the coin: JOY moves you forward 1, FEAR rewinds you 1." },
        8: { title: "FIGMENT", emoji: "🛸", isFigment: true, isTrack: true, desc: "A call to presence. Step outside for one minute to regain clarity (+2 Move) or rush back into the noise (-1 Rewind)." },
        9: { title: "JOY", emoji: "✨", shift: 1, isAuto: true, desc: "A burst of momentum! Move forward 1." },
        10: { title: "THE REMEDY", emoji: "💊", choice: 'remedy', isTrack: true, desc: "A major label offers a shortcut to the top. Sign the contract to jump ahead 6 spaces now, but you'll owe them—every 6 you roll in the future will become a -2 rewind." },
        11: { title: "FEAR", emoji: "💀", shift: -1, isAuto: true, desc: "Doubt slows you down. Move back 1." },
        12: { title: "VAN BREAKS DOWN", emoji: "🛠", skipTurns: 1, desc: "Steam from the hood. The tour stops while you wait for parts. Skip 1 turn." },
        15: { title: "DMITRI", emoji: "👨‍🚀", timer: 15, skipShift: -2, isDmitri: true, isTrack: true, desc: "The guide appears. Take 5 deep breaths to move to the 5th Dimension (Space 23). Skip the breathing? REWIND TWO SPACES." },
        18: { title: "NIGHTDRIVE", emoji: "🌙", isNightDrive: true, isTrack: true, desc: "The road is dark. Keep your eyes closed until your next turn! If you peek, REWIND TWO." },
        20: { title: "INVEST IN MERCH", emoji: "👕", choice: 'merch', desc: "Sacrifice immediate progress to fund the tour. Rewind 4 spaces now, but you've printed a mountain of shirts—every 1 or 2 you roll for the rest of the game will be doubled." },
        23: { title: "5TH DIMENSION", emoji: "✨", shift: 1, isAuto: true, desc: "The portal is open. Fast forward 1." },
        25: { title: "IT HAPPENS", emoji: "⚡", isItHappens: true, isTrack: true, desc: "Everything aligns. The spark is real. Take an extra turn!" },
        27: { title: "GHOST 2", emoji: "👻", isGhost: true, isTrack: true, desc: "Ethereal silence. You must remain silent for two turns. Any sound made triggers a REWIND ONE." },
        28: { title: "MAYA", emoji: "🌊", isTrack: true, desc: "Lost in the rhythm of the waves. A deep, steady groove." },
        30: { title: "WIN A GRAMMY", emoji: "🏆", isGrammy: true, desc: "The industry notices! Switch places with the current leader. If you are the leader, move forward 2." },
        31: { title: "OPENING ACT", emoji: "🎤", isOpeningAct: true, desc: "Supporting a legend. Slide to the space directly behind the leader." },
        35: { title: "TELLUS", emoji: "📣", isTellus: true, isTrack: true, desc: "The connection is absolute. Select any artist on the board and swap positions with them." },
        42: { title: "VOID", emoji: "🌀", shift: -4, isAuto: true, isTrack: true, desc: "Total creative block. Fall through the black hole and rewind 4 spaces." },
        46: { title: "GATEKEEPER", emoji: "🚪", isGate: true, desc: "The final barrier. You must roll the EXACT number needed to land on Space 57. If you roll over, you stay put." },
        53: { title: "LOST RECORDING", emoji: "📼", isLostRecording: true, desc: "The tape was erased! Roll the dice and rewind the number of spaces rolled." },
        57: { title: "SWIMMIN'", emoji: "🌊", desc: "The tour is over. The album is legendary. You've made it." }
    };

    let players = [], turnIdx = 0, isMoving = false, totalP = 0, currentSetupP = 0, selectedAvatar = null, isSwapping = false;

    function setPlayerCount(n) { totalP = n; document.getElementById('setup-step-2').style.display='block'; }
    function pickAvatar(id, color) { selectedAvatar = { id, color, img: id+'.png' }; document.querySelectorAll('img').forEach(i=>i.style.opacity='0.3'); document.getElementById('sel-'+id).style.opacity='1'; }
    function confirmArtist() {
        const name = document.getElementById('name-input').value.toUpperCase() || `ARTIST ${currentSetupP+1}`;
        if(!selectedAvatar) return;
        players.push({ name, pos: 0, avatar: selectedAvatar, skipCount: 0, isInvestor: false, isSellout: false, grammys: 0, nightDriveActive: false, ghostCounter: 0, nextBonus: 0 });
        currentSetupP++;
        if(currentSetupP >= totalP) { document.getElementById('overlay-setup').style.display='none'; initBoard(); }
        else { document.getElementById('name-input').value=''; selectedAvatar=null; }
    }

    function initBoard() {
        const board = document.getElementById('board-container');
        boardLayout.forEach((name, i) => {
            const s = document.createElement('div'); s.id = 's'+i; s.className = 'space';
            if(name === "blank") s.classList.add('blank');
            else {
                s.innerHTML = name;
                if(rules[i] && rules[i].isTrack) s.classList.add('tracklist-space');
                if(name === "FEAR") s.classList.add('fear-space');
                if(name === "JOY") s.classList.add('joy-space');
                if(name === "FEARJOY") s.classList.add('hybrid');
                if(i === 57) s.classList.add('win-track');
            }
            s.onclick = () => handleSpaceClick(i);
            let row = Math.floor(i / 10), col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));
            s.style.gridRow = 6 - row; s.style.gridColumn = col + 1;
            board.appendChild(s);
        });
        players.forEach((p, i) => {
            const el = document.createElement('div'); el.id = 'p'+i; el.className = 'player';
            el.style.backgroundImage = `url('${p.avatar.img}')`; el.onclick = () => handlePlayerClick(idx);
            board.appendChild(el);
        });
        updateUI(); document.getElementById('roll-btn').disabled = false;
    }

    function handleSpaceClick(i) {
        const r = rules[i];
        if(!r) return;
        showSidebar(r.title, (r.emoji ? r.emoji + " " : "") + r.desc);
    }

    function updateUI() {
        const p = players[turnIdx], list = document.getElementById('tracker-list');
        const status = document.getElementById('status-text');
        status.innerHTML = `ARTIST TURN: <span style="color:${p.avatar.color}">${p.name}</span>`;
        list.innerHTML = '';
        players.forEach((pl, i) => {
            let tags = (pl.isInvestor ? '<span class="tag tag-investor">INVESTOR</span>' : '') + (pl.isSellout ? '<span class="tag tag-sellout">SELLOUT</span>' : '');
            list.innerHTML += `<div class="player-entry"><div style="display:flex;align-items:center;gap:10px;"><img src="${pl.avatar.img}" class="avatar-roster"><div><b>${pl.name}</b>${tags}<div>🏆 ${pl.grammys}</div></div></div></div>`;
            document.getElementById('p'+i).style.zIndex = (i === turnIdx ? 150 : 100);
        });
        updatePositions();
    }

    function updatePositions() {
        const countMap = {};
        players.forEach((p, i) => {
            const target = document.getElementById('s'+p.pos), el = document.getElementById('p'+i);
            if(!countMap[p.pos]) countMap[p.pos] = 0;
            el.style.left = (target.offsetLeft + (countMap[p.pos] * 12)) + "px";
            el.style.top = (target.offsetTop + (countMap[p.pos] * 12)) + "px";
            countMap[p.pos]++;
        });
    }

    async function doRoll() {
        if(isMoving || isSwapping) return;
        const p = players[turnIdx];
        
        // Checks for previous turn conditions
        if(p.nightDriveActive) { showStatusPopup("🌙 NIGHTDRIVE CHECK", "The road was dark. Did you keep your eyes closed?", "YES (Safe)", () => { p.nightDriveActive = false; doRoll(); }, "NO (Rewind 2)", () => { p.nightDriveActive = false; movePlayer(-2); }); return; }
        if(p.ghostCounter > 0) { showStatusPopup("👻 GHOST CHECK", "Ethereal silence. Did you remain quiet during the wait?", "YES (Stay)", () => { p.ghostCounter--; doRoll(); }, "NO (Rewind 1)", () => { p.ghostCounter = 0; movePlayer(-1); }); return; }
        if(p.skipCount > 0) { p.skipCount--; endTurn(); return; }

        isMoving = true; document.getElementById('roll-btn').disabled = true;
        const dice = document.getElementById('dice-box');
        dice.classList.add('dice-cinematic');

        let roll;
        for(let j=0; j<12; j++) {
            dice.innerText = Math.floor(Math.random()*6)+1;
            await new Promise(r => setTimeout(r, 45));
        }
        
        roll = Math.floor(Math.random()*6)+1;
        if(p.isInvestor && (roll <= 2)) roll *= 2;
        if(p.isSellout && roll === 6) roll = -2;
        if(p.nextBonus) { roll += p.nextBonus; p.nextBonus = 0; }

        dice.innerText = roll > 0 ? roll : "!";
        await new Promise(r => setTimeout(r, 600)); 
        dice.classList.remove('dice-cinematic');
        await new Promise(r => setTimeout(r, 500)); 

        movePlayer(roll);
    }

    async function movePlayer(n) {
        const p = players[turnIdx]; const dir = n > 0 ? 1 : -1;
        for(let i=0; i<Math.abs(n); i++) {
            if(p.pos + dir >= 0 && p.pos + dir < boardLayout.length) {
                p.pos += dir; updatePositions();
                if(rules[p.pos] && rules[p.pos].isGate && i < Math.abs(n)-1) { i = 999; }
                await new Promise(r => setTimeout(r, 300));
                if(p.pos >= 57) { showWinScreen(); return; }
            }
        }
        checkSpace();
    }

    function checkSpace() {
        const p = players[turnIdx], r = rules[p.pos];
        if(!r) { endTurn(); return; }

        // Logic Lock Safeguards
        if(r.choice === 'merch' && p.isInvestor) { showSidebar("VESTED INTEREST", "You already have the merch ready. Moving on."); endTurn(); return; }
        if(r.choice === 'remedy' && p.isSellout) { showSidebar("CONTRACT LOCK", "The label owns you already. No second deals."); endTurn(); return; }

        const modal = document.getElementById('overlay-event'), title = document.getElementById('event-title'), desc = document.getElementById('event-desc'), pBtn = document.getElementById('event-btn-primary'), sBtn = document.getElementById('event-btn-secondary'), timerUI = document.getElementById('timer-ui'), coin = document.getElementById('coin');
        
        title.innerText = (r.emoji || "") + " " + r.title; desc.innerText = r.desc || "";
        pBtn.innerText = "CONTINUE"; sBtn.style.display = 'none'; timerUI.style.display = 'none'; coin.style.display = 'none'; modal.style.display = 'flex';

        if(r.isAuto) {
            pBtn.onclick = async () => { modal.style.display = 'none'; await new Promise(res => setTimeout(res, 1000)); movePlayer(r.shift); };
        } else if(r.isFigment) {
            pBtn.innerText = "STEP OUTSIDE (1:00)";
            sBtn.innerText = "RUSH BACK (-1)"; sBtn.style.display = 'inline-block';
            pBtn.onclick = () => {
                pBtn.disabled = true; sBtn.style.display = 'none'; timerUI.style.display = 'block';
                let t = 60; timerUI.innerText = t;
                const clock = setInterval(() => {
                    t--; timerUI.innerText = t;
                    if(t <= 0) { 
                        clearInterval(clock); pBtn.disabled = false; pBtn.innerText = "I'M BACK (+2)";
                        pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 1000)); movePlayer(2); };
                    }
                }, 1000);
            };
            sBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 1000)); movePlayer(-1); };
        } else if(r.isFearjoy) {
            pBtn.innerText = "FLIP COIN";
            pBtn.onclick = () => {
                pBtn.style.display='none'; coin.style.display='flex'; coin.classList.add('flipping');
                setTimeout(() => {
                    const win = Math.random() > 0.5; coin.innerText = win ? "JOY" : "FEAR"; coin.classList.remove('flipping');
                    setTimeout(async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 1000)); movePlayer(win ? 1 : -1); }, 1000);
                }, 1200);
            };
        } else if(r.isDmitri) {
            pBtn.innerText = "BREATHE"; sBtn.innerText = "SKIP / REWIND 2"; sBtn.style.display = 'inline-block';
            pBtn.onclick = () => {
                pBtn.disabled = true; sBtn.style.display='none'; timerUI.style.display='block';
                let t = 15; timerUI.innerText = t;
                const clock = setInterval(() => {
                    t--; timerUI.innerText = t;
                    if(t <= 0) {
                        clearInterval(clock); pBtn.disabled = false; pBtn.innerText = "I BREATHE";
                        pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 1000)); p.pos = 23; updatePositions(); endTurn(); };
                    }
                }, 1000);
            };
            sBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 1000)); movePlayer(-2); };
        } else if(r.choice) {
            pBtn.innerText = r.choice === 'remedy' ? "SIGN CONTRACT (+6)" : "INVEST IN MERCH (-4)"; sBtn.style.display='inline-block'; sBtn.innerText = "PASS";
            pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 1000)); if(r.choice==='remedy'){p.isSellout=true; movePlayer(6);} else {p.isInvestor=true; movePlayer(-4); } };
            sBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isGrammy) {
            let lead = players.reduce((prev, curr) => (prev.pos > curr.pos) ? prev : curr);
            if(lead === p) { desc.innerText += "\n(You are already leading! Industry bonus +2 Move)"; pBtn.onclick = async () => { p.grammys++; modal.style.display='none'; await new Promise(res => setTimeout(res, 1000)); movePlayer(2); }; }
            else { pBtn.onclick = () => { p.grammys++; let lp = lead.pos; lead.pos = p.pos; p.pos = lp; modal.style.display='none'; updatePositions(); endTurn(); }; }
        } else if(r.isTellus) {
            isSwapping = true; pBtn.style.display='none'; desc.innerText = "THE CONNECTION IS ABSOLUTE. CLICK ANOTHER ARTIST ON THE BOARD TO SWAP.";
            players.forEach((_, i) => { if(i !== turnIdx) document.getElementById('p'+i).classList.add('swap-target'); });
        } else {
            pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 1000)); if(r.shift) movePlayer(r.shift); else endTurn(); };
        }
    }

    function handlePlayerClick(idx) {
        if(!isSwapping || idx === turnIdx) return;
        let p = players[turnIdx], t = players[idx], lp = t.pos;
        t.pos = p.pos; p.pos = lp;
        isSwapping = false; document.querySelectorAll('.player').forEach(el => el.classList.remove('swap-target'));
        document.getElementById('overlay-event').style.display='none'; updatePositions(); endTurn();
    }

    function showStatusPopup(t, d, b1, c1, b2, c2) {
        const modal = document.getElementById('overlay-event');
        document.getElementById('event-title').innerText = t; document.getElementById('event-desc').innerText = d;
        const pBtn = document.getElementById('event-btn-primary'); pBtn.innerText = b1; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(r => setTimeout(r, 1000)); c1(); };
        const sBtn = document.getElementById('event-btn-secondary'); sBtn.style.display='inline-block'; sBtn.innerText = b2; sBtn.onclick = async () => { modal.style.display='none'; await new Promise(r => setTimeout(r, 1000)); c2(); };
        modal.style.display='flex';
    }

    function showSidebar(t, d) {
        document.getElementById('side-title').innerText = t; document.getElementById('side-desc').innerText = d;
        document.getElementById('rule-sidebar').classList.add('active');
        setTimeout(() => document.getElementById('rule-sidebar').classList.remove('active'), 4500);
    }

    function showWinScreen() { document.getElementById('event-title').innerText = "🌊 SWIMMIN'"; document.getElementById('event-desc').innerText = "You have reached the end of the tour. The record is complete. You are free."; document.getElementById('event-btn-primary').innerText = "RESTART"; document.getElementById('event-btn-primary').onclick = () => location.reload(); document.getElementById('overlay-event').style.display='flex'; }
    function endTurn() { turnIdx = (turnIdx + 1) % players.length; isMoving = false; document.getElementById('roll-btn').disabled = false; updateUI(); }
</script>
</body>
</html>
