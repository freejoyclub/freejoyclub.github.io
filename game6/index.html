<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fearjoy - v6.3.1 Ultimate Restoration</title>
    <style>
        :root {
            --wood-dark: #2a180b; --wood-mid: #3d2616; --wood-light: #4e3625;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --gold: #ffd700; --ui-bg: rgba(0,0,0,0.95); --remedy-blue: #00d4ff;
            --vinyl: #111111;
        }

        @keyframes woodFade { 0%, 100% { background-color: #2a180b; } 50% { background-color: #4e3625; } }
        @keyframes sparkle { 0% { box-shadow: 0 0 0px var(--gold); transform: scale(1); } 50% { box-shadow: 0 0 50px var(--gold); transform: scale(1.1); } 100% { box-shadow: 0 0 0px var(--gold); transform: scale(1); } }
        @keyframes badDeal { 0% { box-shadow: 0 0 0px var(--fear-glow); } 50% { box-shadow: 0 0 50px var(--fear-glow); border-color: var(--fear-glow); } 100% { box-shadow: 0 0 0px var(--fear-glow); } }

        body {
            animation: woodFade 20s ease-in-out infinite;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px),
                              linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
            color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        /* SPACE TYPES */
        .space { width: 85px; height: 85px; border-radius: 50%; border: 1px solid var(--tape-white); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; background: rgba(255,255,255,0.05); text-align: center; cursor: pointer; transition: 0.3s; }
        .space:hover { background: rgba(255,255,255,0.2); }
        .blank { opacity: 0.2; transform: scale(0.8); border-style: dashed; cursor: default; }
        
        .tracklist-space { 
            background: var(--vinyl) !important; border: 3px double #444 !important; 
            box-shadow: inset 0 0 12px #000, 0 0 10px rgba(0,0,0,0.5); 
            transform: scale(1.15); z-index: 5; color: white !important; font-size: 0.6rem !important; 
        }
        
        .joy { border-color: var(--joy-glow); color: var(--joy-glow); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .fear { border-color: var(--fear-glow); color: var(--fear-glow); box-shadow: 0 0 10px rgba(255,68,68,0.2); }
        .hybrid { border-style: dotted; border-width: 3px; border-color: white; }

        /* UI LAYERS */
        #ui-layer { display: flex; align-items: center; gap: 30px; background: var(--ui-bg); padding: 25px 40px; border-radius: 12px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); width: 950px; justify-content: space-between; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #dice-box { width: 85px; height: 85px; background: white; color: black; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: bold; transition: 0.3s; }
        .sparkle-dice { animation: sparkle 0.6s infinite; background: var(--gold) !important; }
        .bad-dice { animation: badDeal 0.6s infinite; background: var(--fear-glow) !important; color: white !important; }

        #board-container { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(6, 1fr); gap: 18px; padding: 50px; background: rgba(0,0,0,0.1); border-radius: 30px; position: relative; width: 1100px; height: 700px; }
        
        .player { width: 75px; height: 75px; position: absolute; z-index: 100; transition: all 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28); background-size: contain; background-repeat: no-repeat; background-position: center bottom; pointer-events: none; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }

        #merch-tracker { position: fixed; left: 20px; top: 100px; width: 220px; background: var(--ui-bg); border-radius: 12px; padding: 15px; border: 1px solid #333; z-index: 5; }
        .tracker-item { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tracker-head { width: 40px; height: 40px; background-size: contain; background-repeat: no-repeat; border-radius: 50%; border: 1px solid #555; }

        /* OVERLAYS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .popup { background: #111; padding: 50px; border-radius: 25px; border: 2px solid #444; width: 550px; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,1); }
        #mini-dice { width: 100px; height: 100px; background: white; color: black; margin: 20px auto; border-radius: 12px; display: none; align-items: center; justify-content: center; font-size: 4rem; font-weight: bold; }
        
        #rule-sidebar { position: fixed; right: -320px; top: 120px; width: 280px; background: var(--ui-bg); padding: 30px; border-radius: 20px; border: 2px solid var(--joy-glow); transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); z-index: 100; }
        #rule-sidebar.active { right: 25px; }

        button { padding: 15px 30px; font-family: inherit; font-weight: bold; cursor: pointer; background: #fff; border: none; border-radius: 6px; text-transform: uppercase; margin: 10px; font-size: 0.9rem; transition: 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="merch-tracker">
        <h4 style="margin:0 0 10px 0; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6; color: var(--joy-glow);">ARTIST ROSTER</h4>
        <div id="tracker-list"></div>
    </div>

    <div id="ui-layer">
        <div id="dice-box">?</div>
        <div id="status-text" style="font-size:3rem; font-weight:900;">WELCOME</div>
        <button id="roll-btn" onclick="doRoll()" disabled style="background: var(--joy-glow); color: black; width: 150px;">ROLL</button>
    </div>

    <div id="board-container"></div>

    <div id="overlay-event" class="overlay">
        <div class="popup" id="popup-box">
            <h1 id="event-title" style="font-size: 2.5rem; margin-bottom: 10px;"></h1>
            <p id="event-desc" style="font-size: 1.3rem; line-height: 1.5; color: #ccc;"></p>
            <div id="mini-dice">?</div>
            <div id="timer-ui" style="font-size: 4rem; color: var(--joy-glow); margin: 20px 0; display: none; font-weight: bold;"></div>
            <div id="action-area">
                <button id="event-btn-primary"></button>
                <button id="event-btn-secondary" style="display:none; background: #444; color: white;"></button>
            </div>
        </div>
    </div>

    <div id="rule-sidebar" onclick="this.classList.remove('active')">
        <h3 id="side-title" style="color: var(--joy-glow); font-size: 1.8rem; margin-top: 0;"></h3>
        <p id="side-desc" style="line-height: 1.6; font-size: 1rem;"></p>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 20px;">CLICK TO DISMISS</p>
    </div>

    <div id="overlay-setup" class="overlay" style="display:flex">
        <div class="popup" id="setup-content">
            <div id="setup-step-1">
                <h2>HOW MANY ARTISTS ON TOUR?</h2>
                <button onclick="setPlayerCount(1)">1 ARTIST</button>
                <button onclick="setPlayerCount(2)">2 ARTISTS</button>
                <button onclick="setPlayerCount(3)">3 ARTISTS</button>
            </div>
            <div id="setup-step-2" style="display:none">
                <h2 id="setup-prompt">NAME YOUR ARTIST</h2>
                <input type="text" id="name-input" maxlength="12" style="padding:15px; width:80%; font-size: 1.5rem; background: #222; color: white; border: 1px solid #444; margin-bottom: 20px; text-align: center;">
                <p>SELECT YOUR AVATAR</p>
                <div style="display:flex; justify-content:center; gap:20px; margin-bottom:30px;">
                    <img id="sel-jesse" src="jesse.png" style="width:80px; height:80px; cursor:pointer; opacity:0.3; border: 2px solid transparent;" onclick="pickAvatar('jesse', '#007bff')">
                    <img id="sel-marco" src="marco.png" style="width:80px; height:80px; cursor:pointer; opacity:0.3; border: 2px solid transparent;" onclick="pickAvatar('marco', '#ffcc00')">
                    <img id="sel-grant" src="grant.png" style="width:80px; height:80px; cursor:pointer; opacity:0.3; border: 2px solid transparent;" onclick="pickAvatar('grant', '#ff00ff')">
                </div>
                <button id="confirm-artist-btn" onclick="confirmArtist()">ADD TO TOUR</button>
            </div>
        </div>
    </div>

<script>
    const boardLayout = [
        "START", "blank", "blank", "blank", "DAYSPRING", "blank", "FEARJOY", "blank", "FIGMENT", "blank", 
        "THE REMEDY", "blank", "VAN BREAKS DOWN", "JOY (+1)", "blank", "DMITRI", "blank", "FEARJOY", "NIGHTDRIVE", "blank", 
        "INVEST IN MERCH", "FEAR (-1)", "blank", "5TH DIMENSION", "blank", "WIN A GRAMMY", "blank", "blank", "MAYA", "blank", 
        "blank", "OPENING ACT", "FEAR (-1)", "JOY (+1)", "blank", "TELLUS", "blank", "FEARJOY", "blank", "ENCORE", 
        "blank", "blank", "VOID", "blank", "blank", "THE ENDLESS SMILE", "GATEKEEPER", "blank", "blank", "blank", 
        "FEARJOY", "VAN BREAKS DOWN", "blank", "LOST RECORDING", "blank", "blank", "blank", "SWIMMIN'"
    ];

    const rules = {
        4: { title: "DAYSPRING", emoji: "☀️", desc: "A burst of creative energy. Fast forward 3 spaces.", shift: 3 },
        6: { title: "FEARJOY", emoji: "☯️", desc: "The duality of the craft. Roll the Fearjoy die: 1-3 = Rewind 1, 4-6 = Forward 1.", isFearjoy: true },
        8: { title: "FIGMENT", emoji: "🛸", desc: "Step outdoors for 60 seconds of real-world inspiration. Success: +2 on next roll. Stay inside: Rewind 1.", timer: 60, skipShift: -1, bonus: 2, isTrack: true },
        10: { title: "THE REMEDY", emoji: "💊", desc: "A major label offers a shortcut. SELL OUT to move 6 spaces now, but every 6 you roll becomes a -2 penalty later. STAY TRUE to do nothing.", choice: 'remedy', isTrack: true },
        12: { title: "VAN BREAKS DOWN", emoji: "🛠", desc: "Mechanical failure. Skip your next turn while you wait for a tow.", skipTurns: 1 },
        13: { title: "JOY", emoji: "✨", desc: "Momentum! Forward 1.", shift: 1 },
        15: { title: "DMITRI", emoji: "👨‍🚀", desc: "Ground yourself. Take 5 deep breaths (10s timer) to gain focus, or rush through and rewind 2.", timer: 10, skipShift: -2, isTrack: true },
        17: { title: "FEARJOY", emoji: "☯️", desc: "The duality of the craft. Roll the Fearjoy die.", isFearjoy: true },
        18: { title: "NIGHTDRIVE", emoji: "🌙", desc: "Highway hypnosis. Keep your eyes closed until your next turn. Opening them early costs 2 spaces.", statusEffect: 'hypnotized', isTrack: true },
        20: { title: "INVEST IN MERCH", emoji: "👕", desc: "Spend money to make money. Rewind 4 spaces now to permanently double any 1 or 2 you roll for the rest of the game.", choice: 'merch', isTrack: true },
        21: { title: "FEAR", emoji: "💀", desc: "A bad review. Rewind 1.", shift: -1 },
        31: { title: "FEAR", emoji: "💀", desc: "Self-doubt. Rewind 1.", shift: -1 },
        32: { title: "JOY", emoji: "✨", desc: "Euphoria. Forward 1.", shift: 1 },
        37: { title: "FEARJOY", emoji: "☯️", desc: "Roll the Fearjoy die.", isFearjoy: true },
        45: { title: "GATEKEEPER", emoji: "🚧", desc: "INDUSTRY CHECK: You must land exactly on this space or stop here. Movement ends.", isGate: true },
        50: { title: "FEARJOY", emoji: "☯️", desc: "Roll the Fearjoy die.", isFearjoy: true },
        51: { title: "VAN BREAKS DOWN", emoji: "🛠", desc: "The radiator blew. Skip your next turn.", skipTurns: 1 }
    };

    let players = [], turnIdx = 0, isMoving = false, totalP = 0, currentSetupP = 0, selectedAvatar = null;

    // SETUP LOGIC
    function setPlayerCount(n) { totalP = n; document.getElementById('setup-step-1').style.display='none'; document.getElementById('setup-step-2').style.display='block'; }
    function pickAvatar(id, color) { selectedAvatar = { id, color, img: id+'.png' }; document.querySelectorAll('#setup-step-2 img').forEach(i=>i.style.opacity='0.3'); document.getElementById('sel-'+id).style.opacity='1'; }
    function confirmArtist() {
        const name = document.getElementById('name-input').value.toUpperCase() || `ARTIST ${currentSetupP+1}`;
        if(!selectedAvatar) return;
        players.push({ name, pos: 0, avatar: selectedAvatar, skipCount: 0, isInvestor: false, isSellout: false, merchHits: 0, remedyHits: 0, nextBonus: 0, activeStatus: null });
        currentSetupP++;
        if(currentSetupP >= totalP) { document.getElementById('overlay-setup').style.display='none'; initBoard(); }
        else { document.getElementById('name-input').value=''; selectedAvatar=null; document.querySelectorAll('#setup-step-2 img').forEach(i=>i.style.opacity='0.3'); document.getElementById('setup-prompt').innerText=`NAME ARTIST ${currentSetupP+1}`; }
    }

    // BOARD LOGIC
    function initBoard() {
        const board = document.getElementById('board-container');
        boardLayout.forEach((name, i) => {
            const s = document.createElement('div');
            s.id = 's'+i; s.className = 'space';
            if(name === "blank") s.classList.add('blank');
            else {
                s.innerHTML = name; s.classList.add('special');
                const r = rules[i];
                if(r && r.isTrack) s.classList.add('tracklist-space');
                if(name.includes("JOY")) s.classList.add('joy');
                if(name.includes("FEAR")) s.classList.add('fear');
                if(name === "FEARJOY") s.classList.add('hybrid');
                s.onclick = () => { document.getElementById('side-title').innerText = name; document.getElementById('side-desc').innerText = r ? r.desc : "A standard stop on the tour."; document.getElementById('rule-sidebar').classList.add('active'); };
            }
            let row = Math.floor(i / 10), col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));
            s.style.gridRow = 6 - row; s.style.gridColumn = col + 1;
            board.appendChild(s);
        });
        players.forEach((p, i) => {
            const el = document.createElement('div'); el.id = 'p'+i; el.className = 'player';
            el.style.backgroundImage = `url('${p.avatar.img}')`; board.appendChild(el);
            updateVisualPos(i);
        });
        document.getElementById('roll-btn').disabled = false; updateUI();
    }

    function updateVisualPos(idx) {
        const p = players[idx], target = document.getElementById('s'+p.pos), el = document.getElementById('p'+idx);
        el.style.left = target.offsetLeft + 5 + "px"; el.style.top = target.offsetTop + 5 + "px";
    }

    function updateUI() {
        const p = players[turnIdx];
        document.getElementById('status-text').innerText = p.name;
        document.getElementById('status-text').style.color = p.avatar.color;
        const list = document.getElementById('tracker-list'); list.innerHTML = '';
        players.forEach(pl => {
            let icons = "👕".repeat(pl.merchHits) + "💊".repeat(pl.remedyHits);
            list.innerHTML += `<div class="tracker-item"><div style="display:flex;align-items:center;gap:10px;"><div class="tracker-head" style="background-image:url('${pl.avatar.img}')"></div><div style="font-size:0.8rem; font-weight:bold;">${pl.name}</div></div><div style="font-size:1.2rem; padding-left:50px;">${icons}</div></div>`;
        });
    }

    // GAMEPLAY CORE
    async function doRoll() {
        if(isMoving) return;
        const p = players[turnIdx];
        const dice = document.getElementById('dice-box');
        dice.className = '';

        if(p.skipCount > 0) {
            p.skipCount--;
            showModal("VAN REPAIRS", "Turn skipped while the mechanics work on the van.", "DISMISS", () => endTurn());
            return;
        }

        isMoving = true; document.getElementById('roll-btn').disabled = true;
        let roll = Math.floor(Math.random()*6)+1;
        dice.innerText = roll;
        await new Promise(r => setTimeout(r, 600));

        if(p.nextBonus > 0) {
            roll += p.nextBonus; p.nextBonus = 0; dice.innerText = roll; dice.classList.add('sparkle-dice');
            await new Promise(r => setTimeout(r, 1000));
        }

        if(p.isInvestor && (roll === 1 || roll === 2)) {
            roll *= 2; p.merchHits++; dice.innerText = roll; dice.classList.add('sparkle-dice');
            showModal("MERCH SOLD", "The investment pays off. Double movement!", "HELL YES", () => {});
            await new Promise(r => setTimeout(r, 1000));
        } else if(p.isSellout && roll === 6) {
            roll = -2; p.remedyHits++; dice.innerText = "!"; dice.classList.add('bad-dice');
            showModal("BAD DEAL", "Label interference. Rewind 2 spaces.", "DARN", () => {});
            await new Promise(r => setTimeout(r, 1000));
        }

        const dir = roll > 0 ? 1 : -1;
        for(let i=0; i<Math.abs(roll); i++) {
            if(p.pos + dir >= 0 && p.pos + dir < boardLayout.length) {
                p.pos += dir; updateVisualPos(turnIdx);
                if(rules[p.pos] && rules[p.pos].isGate) { i = 999; }
                await new Promise(r => setTimeout(r, 250));
            }
        }
        checkSpace();
    }

    async function checkSpace() {
        const p = players[turnIdx], r = rules[p.pos], modal = document.getElementById('overlay-event');
        if(!r) { endTurn(); return; }

        const title = document.getElementById('event-title'), desc = document.getElementById('event-desc'), pBtn = document.getElementById('event-btn-primary'), sBtn = document.getElementById('event-btn-secondary'), timerUI = document.getElementById('timer-ui'), miniD = document.getElementById('mini-dice');
        
        title.innerText = r.title + " " + r.emoji; desc.innerText = r.desc;
        pBtn.innerText = "CONTINUE"; pBtn.style.display = 'inline-block'; pBtn.disabled = false;
        sBtn.style.display = 'none'; timerUI.style.display = 'none'; miniD.style.display = 'none';
        modal.style.display = 'flex';

        if(r.isFearjoy) {
            pBtn.innerText = "ROLL FEARJOY DIE";
            pBtn.onclick = async () => {
                miniD.style.display = 'flex'; let f = Math.floor(Math.random()*6)+1;
                miniD.innerText = f; await new Promise(res => setTimeout(res, 800));
                modal.style.display = 'none'; movePlayer(f <= 3 ? -1 : 1);
            };
        } else if(r.choice) {
            pBtn.innerText = r.choice === 'remedy' ? "SELL OUT (+6)" : "INVEST (-4)";
            sBtn.innerText = r.choice === 'remedy' ? "STAY TRUE" : "PASS";
            sBtn.style.display = 'inline-block';
            pBtn.onclick = () => { modal.style.display='none'; if(r.choice==='remedy'){p.isSellout=true; movePlayer(6);} else {p.isInvestor=true; movePlayer(-4);} };
            sBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.timer) {
            pBtn.disabled = true; let t = r.timer; timerUI.style.display = 'block'; timerUI.innerText = t;
            sBtn.style.display = 'inline-block'; sBtn.innerText = "SKIP";
            const clock = setInterval(() => { t--; timerUI.innerText = t; if(t<=0){ clearInterval(clock); pBtn.disabled=false; timerUI.innerText="DONE"; } }, 1000);
            pBtn.onclick = () => { clearInterval(clock); modal.style.display='none'; if(r.bonus) p.nextBonus = r.bonus; endTurn(); };
            sBtn.onclick = () => { clearInterval(clock); modal.style.display='none'; movePlayer(r.skipShift); };
        } else {
            pBtn.onclick = () => { modal.style.display='none'; if(r.shift) movePlayer(r.shift); else if(r.skipTurns){ p.skipCount=r.skipTurns; endTurn(); } else endTurn(); };
        }
    }

    async function movePlayer(n) {
        const p = players[turnIdx], dir = n > 0 ? 1 : -1;
        for(let i=0; i<Math.abs(n); i++) {
            p.pos += dir; if(p.pos < 0) p.pos = 0; if(p.pos >= 57) p.pos = 57;
            updateVisualPos(turnIdx); await new Promise(r => setTimeout(r, 250));
        }
        checkSpace();
    }

    function showModal(t, d, b, cb) {
        const m = document.getElementById('overlay-event');
        document.getElementById('event-title').innerText = t;
        document.getElementById('event-desc').innerText = d;
        const btn = document.getElementById('event-btn-primary');
        btn.innerText = b; btn.style.display = 'inline-block';
        document.getElementById('event-btn-secondary').style.display='none';
        m.style.display='flex';
        btn.onclick = () => { m.style.display='none'; if(cb) cb(); };
    }

    function endTurn() { turnIdx = (turnIdx + 1) % players.length; isMoving = false; document.getElementById('roll-btn').disabled = false; updateUI(); }
</script>
</body>
</html>
