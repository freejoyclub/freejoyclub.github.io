<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fearjoy - v6.7 Full Tour Recap</title>
    <style>
        :root {
            --wood-dark: #2a180b; --wood-mid: #3d2616; --wood-light: #4e3625;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --gold: #ffd700; --ui-bg: rgba(0,0,0,0.95); --remedy-blue: #00d4ff;
            --vinyl: #111111;
        }

        @keyframes woodFade { 0%, 100% { background-color: #2a180b; } 50% { background-color: #4e3625; } }
        @keyframes sparkle { 0% { box-shadow: 0 0 40px var(--gold); background: var(--gold) !important; transform: scale(1.1); } }
        @keyframes badPulse { 0% { box-shadow: 0 0 40px var(--fear-glow); background: var(--fear-glow) !important; color: white; transform: scale(1.1); } }
        @keyframes bonusPulse { 0% { box-shadow: 0 0 40px var(--joy-glow); background: var(--joy-glow); color: black; } }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        @keyframes flipCoin { 0% { transform: rotateY(0); } 100% { transform: rotateY(1800deg); } }

        body {
            animation: woodFade 20s ease-in-out infinite;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px);
            color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow: hidden;
        }

        .space { width: 85px; height: 85px; border-radius: 50%; border: 1px solid var(--tape-white); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; background: rgba(255,255,255,0.05); text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .blank { opacity: 0.2; transform: scale(0.8); border-style: dashed; cursor: default; }
        .tracklist-space { background: var(--vinyl) !important; border: 3px double #444 !important; box-shadow: inset 0 0 12px #000; transform: scale(1.15); z-index: 5; font-size: 0.6rem !important; }
        
        .joy-space { border-color: #00ff00 !important; color: #00ff00 !important; }
        .fear-space { border-color: #ff0000 !important; color: #ff0000 !important; }
        .hybrid { border-style: dotted; border-width: 3px; border-color: white; }

        #ui-layer { display: flex; align-items: center; gap: 30px; background: var(--ui-bg); padding: 25px 40px; border-radius: 12px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); width: 950px; justify-content: space-between; z-index: 10; }
        #dice-box { width: 85px; height: 85px; background: white; color: black; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: bold; transition: 0.3s; }
        
        .sparkle-dice { animation: sparkle 0.5s infinite alternate; }
        .bad-dice { animation: badPulse 0.5s infinite alternate; }
        .bonus-dice { animation: bonusPulse 0.5s infinite alternate; }

        #board-container { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(6, 1fr); gap: 18px; padding: 50px; width: 1100px; height: 700px; }
        .player { width: 75px; height: 75px; position: absolute; z-index: 100; transition: all 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28); background-size: contain; background-repeat: no-repeat; background-position: center bottom; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .popup { background: #111; padding: 40px; border-radius: 25px; border: 2px solid #444; width: 650px; text-align: center; max-height: 80vh; overflow-y: auto; }
        
        #rule-sidebar { position: fixed; right: -320px; top: 120px; width: 280px; background: var(--ui-bg); padding: 30px; border-radius: 20px; border: 2px solid var(--joy-glow); transition: 0.6s; z-index: 100; }
        #rule-sidebar.active { right: 25px; }

        .tag { font-size: 0.5rem; padding: 2px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }
        .tag-investor { background: var(--gold); color: black; }
        .tag-sellout { background: var(--fear-glow); color: white; }
        
        .stat-row { display: flex; align-items: center; justify-content: space-between; background: #222; margin: 5px 0; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="merch-tracker" style="position: fixed; left: 20px; top: 100px; width: 240px; background: var(--ui-bg); border-radius: 12px; padding: 15px; border: 1px solid #333; z-index: 5;">
        <h4 style="margin:0 0 10px 0; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6; color: var(--joy-glow);">ARTIST ROSTER</h4>
        <div id="tracker-list"></div>
    </div>

    <div id="ui-layer">
        <div style="position:relative; width:85px; height:85px;">
            <div id="dice-box">?</div>
            <div id="float-icon" class="floating-icon" style="position:absolute; top:0; left:25%; font-size:2.5rem; display:none;">👕</div>
        </div>
        <div id="status-text" style="font-size:3rem; font-weight:900;">WELCOME</div>
        <button id="roll-btn" onclick="doRoll()" disabled style="background: var(--joy-glow); color: black; width: 150px; font-weight:bold; padding:15px; border:none; border-radius:8px; cursor:pointer;">ROLL</button>
    </div>

    <div id="board-container"></div>

    <div id="overlay-event" class="overlay">
        <div class="popup">
            <h1 id="event-title"></h1>
            <div id="event-desc" style="font-size: 1.2rem; color: #ccc; margin-bottom:20px;"></div>
            <div id="coin" style="width:120px; height:120px; background:#ffd700; border:8px solid #b8860b; border-radius:50%; margin:20px auto; display:none; align-items:center; justify-content:center; font-size:3rem; font-weight:bold; color:#b8860b;">?</div>
            <div id="timer-ui" style="font-size: 4rem; color: var(--joy-glow); margin: 20px 0; display: none;"></div>
            <div id="final-stats"></div>
            <button id="event-btn-primary" style="padding:15px 30px; font-weight:bold; cursor:pointer;"></button>
            <button id="event-btn-secondary" style="display:none; background: #444; color: white; padding:15px 30px; font-weight:bold; cursor:pointer; margin-left:10px; border:none;"></button>
        </div>
    </div>

    <div id="rule-sidebar" onclick="this.classList.remove('active')"><h3 id="side-title"></h3><p id="side-desc"></p></div>

    <div id="overlay-setup" class="overlay" style="display:flex"><div class="popup"><div id="setup-step-1"><h2>HOW MANY ARTISTS?</h2><button onclick="setPlayerCount(1)">1</button><button onclick="setPlayerCount(2)">2</button><button onclick="setPlayerCount(3)">3</button></div><div id="setup-step-2" style="display:none"><input type="text" id="name-input" placeholder="ARTIST NAME" style="padding:15px; width:80%; margin-bottom: 20px; text-align: center;"><div style="display:flex; justify-content:center; gap:20px; margin-bottom:30px;"><img id="sel-jesse" src="jesse.png" style="width:80px; height:80px; cursor:pointer; opacity:0.3;" onclick="pickAvatar('jesse', '#007bff')"><img id="sel-marco" src="marco.png" style="width:80px; height:80px; cursor:pointer; opacity:0.3;" onclick="pickAvatar('marco', '#ffcc00')"><img id="sel-grant" src="grant.png" style="width:80px; height:80px; cursor:pointer; opacity:0.3;" onclick="pickAvatar('grant', '#ff00ff')"></div><button onclick="confirmArtist()">ADD TO TOUR</button></div></div></div>

<script>
    const boardLayout = [
        "START", "blank", "blank", "blank", "DAYSPRING", "blank", "FEARJOY", "blank", "FIGMENT", "blank", 
        "THE REMEDY", "blank", "VAN BREAKS DOWN", "JOY (+1)", "blank", "DMITRI", "blank", "FEARJOY", "NIGHTDRIVE", "blank", 
        "INVEST IN MERCH", "FEAR (-1)", "blank", "5TH DIMENSION", "blank", "WIN A GRAMMY", "blank", "blank", "MAYA", "blank", 
        "blank", "OPENING ACT", "FEAR (-1)", "JOY (+1)", "blank", "TELLUS", "blank", "FEARJOY", "blank", "ENCORE", 
        "blank", "blank", "VOID", "blank", "blank", "THE ENDLESS SMILE", "GATEKEEPER", "blank", "blank", "blank", 
        "FEARJOY", "VAN BREAKS DOWN", "blank", "LOST RECORDING", "blank", "blank", "blank", "FINISH"
    ];

    const rules = {
        4: { title: "DAYSPRING", emoji: "☀️", shift: 3 },
        6: { title: "FEARJOY", emoji: "☯️", isFearjoy: true },
        8: { title: "FIGMENT", emoji: "🛸", desc: "60s outside for +2 next roll. Skip for -1.", timer: 60, skipShift: -1, bonus: 2, isTrack: true },
        10: { title: "THE REMEDY", emoji: "💊", choice: 'remedy', isTrack: true },
        12: { title: "VAN BREAKS DOWN", skipTurns: 1 },
        13: { title: "JOY", emoji: "✨", shift: 1 },
        15: { title: "DMITRI", emoji: "👨‍🚀", desc: "10s breath for +2 next roll. Skip for -2.", timer: 10, skipShift: -2, bonus: 2, isTrack: true },
        17: { title: "FEARJOY", isFearjoy: true },
        18: { title: "NIGHTDRIVE", emoji: "🌙", isTrack: true },
        20: { title: "INVEST IN MERCH", emoji: "👕", choice: 'merch', isTrack: true },
        21: { title: "FEAR", shift: -1 },
        25: { title: "WIN A GRAMMY", emoji: "🏆", achievement: "GRAMMY WINNER", desc: "The industry notices. You are now a Grammy winner." },
        31: { title: "FEAR", shift: -1 },
        32: { title: "JOY", shift: 1 },
        37: { title: "FEARJOY", isFearjoy: true },
        46: { title: "GATEKEEPER", emoji: "🚧", isGate: true, desc: "Must land exactly or stop early." },
        50: { title: "FEARJOY", isFearjoy: true },
        51: { title: "VAN BREAKS DOWN", skipTurns: 1 }
    };

    let players = [], turnIdx = 0, isMoving = false, totalP = 0, currentSetupP = 0, selectedAvatar = null, sidebarTimer = null;

    function setPlayerCount(n) { totalP = n; document.getElementById('setup-step-1').style.display='none'; document.getElementById('setup-step-2').style.display='block'; }
    function pickAvatar(id, color) { selectedAvatar = { id, color, img: id+'.png' }; document.querySelectorAll('#setup-step-2 img').forEach(i=>i.style.opacity='0.3'); document.getElementById('sel-'+id).style.opacity='1'; }
    function confirmArtist() {
        const name = document.getElementById('name-input').value.toUpperCase() || `ARTIST ${currentSetupP+1}`;
        if(!selectedAvatar) return;
        players.push({ name, pos: 0, avatar: selectedAvatar, skipCount: 0, isInvestor: false, isSellout: false, merchHits: 0, remedyHits: 0, nextBonus: 0, totalRolls: 0, achievements: [] });
        currentSetupP++;
        if(currentSetupP >= totalP) { document.getElementById('overlay-setup').style.display='none'; initBoard(); }
        else { document.getElementById('name-input').value=''; selectedAvatar=null; }
    }

    function initBoard() {
        const board = document.getElementById('board-container');
        boardLayout.forEach((name, i) => {
            const s = document.createElement('div'); s.id = 's'+i; s.className = 'space';
            if(name === "blank") s.classList.add('blank');
            else {
                s.innerHTML = name; s.classList.add('special');
                if(rules[i] && rules[i].isTrack) s.classList.add('tracklist-space');
                if(i === 21 || i === 31) s.classList.add('fear-space');
                if(i === 13 || i === 32) s.classList.add('joy-space');
                if(name === "FEARJOY") s.classList.add('hybrid');
                s.onclick = () => showSidebar(name, rules[i] ? rules[i].desc || "A tour event." : "Standard tour stop.");
            }
            let row = Math.floor(i / 10), col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));
            s.style.gridRow = 6 - row; s.style.gridColumn = col + 1;
            board.appendChild(s);
        });
        players.forEach((p, i) => {
            const el = document.createElement('div'); el.id = 'p'+i; el.className = 'player';
            el.style.backgroundImage = `url('${p.avatar.img}')`; board.appendChild(el);
            updateVisualPos(i);
        });
        document.getElementById('roll-btn').disabled = false; updateUI();
    }

    function updateVisualPos(idx) {
        const p = players[idx], target = document.getElementById('s'+p.pos), el = document.getElementById('p'+idx);
        el.style.left = target.offsetLeft + 5 + "px"; el.style.top = target.offsetTop + 5 + "px";
    }

    function updateUI() {
        const p = players[turnIdx];
        document.getElementById('status-text').innerText = p.name;
        document.getElementById('status-text').style.color = p.avatar.color;
        const list = document.getElementById('tracker-list'); list.innerHTML = '';
        players.forEach(pl => {
            let tags = (pl.isInvestor ? '<span class="tag tag-investor">INVESTOR</span>' : '') + (pl.isSellout ? '<span class="tag tag-sellout">SELLOUT</span>' : '');
            list.innerHTML += `<div style="margin-bottom:12px; border-bottom:1px solid #333; padding-bottom:5px;"><div style="display:flex;align-items:center;gap:10px;"><img src="${pl.avatar.img}" style="width:30px;"><div><div style="font-size:0.7rem;">${pl.name}${tags}</div><div style="font-size:1.1rem;">${"👕".repeat(pl.merchHits)}${"💊".repeat(pl.remedyHits)}</div></div></div></div>`;
        });
    }

    function showSidebar(t, d) {
        if(sidebarTimer) clearTimeout(sidebarTimer);
        document.getElementById('side-title').innerText = t;
        document.getElementById('side-desc').innerText = d;
        document.getElementById('rule-sidebar').classList.add('active');
        sidebarTimer = setTimeout(() => { document.getElementById('rule-sidebar').classList.remove('active'); }, 4000);
    }

    async function doRoll() {
        if(isMoving) return;
        document.getElementById('rule-sidebar').classList.remove('active');
        const p = players[turnIdx];
        const dice = document.getElementById('dice-box');
        const icon = document.getElementById('float-icon');
        dice.className = ''; icon.style.display = 'none';

        if(p.skipCount > 0) {
            p.skipCount--;
            showCentralPopup("VAN REPAIRS", "Repairs taking time. Turn skipped.", "CONTINUE", () => endTurn());
            return;
        }

        isMoving = true; document.getElementById('roll-btn').disabled = true;
        let roll = Math.floor(Math.random()*6)+1;
        p.totalRolls += roll;
        dice.innerText = roll;
        await new Promise(r => setTimeout(r, 600));

        if(p.isInvestor && (roll === 1 || roll === 2)) {
            icon.innerText = '👕'; icon.style.display = 'block'; icon.style.animation = 'floatUp 1s forwards';
            showSidebar("MERCH SOLD", "Investor payoff doubled the roll!");
            dice.classList.add('sparkle-dice');
            await new Promise(r => setTimeout(r, 800));
            roll *= 2; dice.innerText = roll;
            await new Promise(r => setTimeout(r, 800));
        } else if(p.isSellout && roll === 6) {
            icon.innerText = '💊'; icon.style.display = 'block'; icon.style.animation = 'floatUp 1s forwards';
            showSidebar("BAD DEAL", "Label penalty! Rewind 2.");
            dice.classList.add('bad-dice');
            await new Promise(r => setTimeout(r, 800));
            roll = -2; dice.innerText = "!";
            await new Promise(r => setTimeout(r, 800));
        }

        if(p.nextBonus > 0) {
            dice.classList.add('bonus-dice');
            await new Promise(r => setTimeout(r, 600));
            roll += p.nextBonus; p.nextBonus = 0; dice.innerText = roll;
            await new Promise(r => setTimeout(r, 800));
        }

        const dir = roll > 0 ? 1 : -1;
        for(let i=0; i<Math.abs(roll); i++) {
            if(p.pos + dir >= 0 && p.pos + dir < boardLayout.length) {
                p.pos += dir; updateVisualPos(turnIdx);
                if(rules[p.pos] && rules[p.pos].isGate) { i = 999; }
                await new Promise(r => setTimeout(r, 250));
                if(p.pos >= 57) { showWinScreen(); return; }
            }
        }
        checkSpace();
    }

    async function checkSpace() {
        const p = players[turnIdx], r = rules[p.pos], modal = document.getElementById('overlay-event');
        if(!r) { endTurn(); return; }

        if(r.achievement && !p.achievements.includes(r.achievement)) p.achievements.push(r.achievement);
        if(r.choice === 'merch' && p.isInvestor) { showSidebar("ALREADY INVESTED", "The investment is active."); endTurn(); return; }
        if(r.choice === 'remedy' && p.isSellout) { showSidebar("CONTRACT ACTIVE", "You already sold out."); endTurn(); return; }

        const title = document.getElementById('event-title'), desc = document.getElementById('event-desc'), pBtn = document.getElementById('event-btn-primary'), sBtn = document.getElementById('event-btn-secondary'), timerUI = document.getElementById('timer-ui'), coin = document.getElementById('coin');
        
        title.innerText = (r.title || "EVENT") + " " + (r.emoji || "");
        desc.innerText = r.desc || "Tour event.";
        pBtn.innerText = "CONTINUE"; pBtn.style.display = 'inline-block'; pBtn.disabled = false;
        sBtn.style.display = 'none'; timerUI.style.display = 'none'; coin.style.display = 'none';
        modal.style.display = 'flex';

        if(r.isFearjoy) {
            pBtn.innerText = "FLIP FOR FATE";
            pBtn.onclick = () => {
                pBtn.style.display = 'none'; coin.style.display = 'flex'; coin.innerText = "?"; coin.style.background = "#ffd700"; coin.classList.add('flipping');
                setTimeout(() => {
                    coin.classList.remove('flipping');
                    const win = Math.random() > 0.5;
                    coin.innerText = win ? "JOY" : "FEAR";
                    coin.style.background = win ? "#00ff88" : "#ff4444";
                    setTimeout(() => { modal.style.display = 'none'; movePlayer(win ? 1 : -1); }, 1000);
                }, 1200);
            };
        } else if(r.choice) {
            pBtn.innerText = r.choice === 'remedy' ? "SELL OUT (+6)" : "INVEST (-4)";
            sBtn.innerText = "PASS"; sBtn.style.display = 'inline-block';
            pBtn.onclick = () => { modal.style.display='none'; if(r.choice==='remedy'){p.isSellout=true; movePlayer(6);} else {p.isInvestor=true; movePlayer(-4);} };
            sBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.timer) {
            pBtn.disabled = true; let t = r.timer; timerUI.style.display = 'block'; timerUI.innerText = t;
            sBtn.style.display = 'inline-block'; sBtn.innerText = "SKIP";
            const clock = setInterval(() => { t--; timerUI.innerText = t; if(t<=0){ clearInterval(clock); pBtn.disabled=false; timerUI.innerText="DONE"; } }, 1000);
            pBtn.onclick = () => { clearInterval(clock); modal.style.display='none'; if(r.bonus) p.nextBonus = r.bonus; endTurn(); };
            sBtn.onclick = () => { clearInterval(clock); modal.style.display='none'; movePlayer(r.skipShift); };
        } else {
            pBtn.onclick = () => { modal.style.display='none'; if(r.shift) movePlayer(r.shift); else if(r.skipTurns){ p.skipCount=r.skipTurns; endTurn(); } else endTurn(); };
        }
    }

    async function movePlayer(n) {
        const p = players[turnIdx]; const dir = n > 0 ? 1 : -1;
        for(let i=0; i<Math.abs(n); i++) {
            p.pos += dir; if(p.pos < 0) p.pos = 0;
            updateVisualPos(turnIdx); await new Promise(r => setTimeout(r, 250));
            if(p.pos >= 57) { showWinScreen(); return; }
        }
        checkSpace();
    }

    function showWinScreen() {
        const winner = players[turnIdx];
        const modal = document.getElementById('overlay-event');
        const statsArea = document.getElementById('final-stats');
        document.getElementById('event-title').innerText = winner.name + " FINISHED THE TOUR!";
        document.getElementById('event-desc').innerText = "FINAL ARTIST STANDINGS";
        document.getElementById('event-btn-secondary').style.display='none';
        
        statsArea.innerHTML = "";
        players.forEach(p => {
            statsArea.innerHTML += `
                <div class="stat-row">
                    <img src="${p.avatar.img}" style="width:50px;">
                    <div style="flex:1; padding:0 20px; text-align:left;">
                        <div style="font-weight:bold;">${p.name}</div>
                        <div style="font-size:0.7rem; color: #888;">${p.achievements.join(' | ') || 'Indie Artist'}</div>
                    </div>
                    <div style="text-align:right; font-size:0.8rem;">
                        👕:${p.merchHits} | 💊:${p.remedyHits}<br>Σ Rolls: ${p.totalRolls}
                    </div>
                </div>`;
        });

        const b = document.getElementById('event-btn-primary');
        b.innerText = "RESTART TOUR"; b.onclick = () => location.reload();
        modal.style.display = 'flex';
    }

    function showCentralPopup(t, d, b, cb) {
        const m = document.getElementById('overlay-event');
        document.getElementById('event-title').innerText = t;
        document.getElementById('event-desc').innerText = d;
        document.getElementById('coin').style.display = 'none';
        document.getElementById('timer-ui').style.display = 'none';
        document.getElementById('final-stats').innerHTML = "";
        const btn = document.getElementById('event-btn-primary');
        btn.innerText = b; btn.onclick = () => { m.style.display='none'; if(cb) cb(); };
        m.style.display='flex';
    }

    function endTurn() { turnIdx = (turnIdx + 1) % players.length; isMoving = false; document.getElementById('roll-btn').disabled = false; updateUI(); }
</script>
</body>
</html>
