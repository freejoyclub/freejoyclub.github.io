    // ══════════════════════════════════════════════
    // ROLL FLOW
    // ══════════════════════════════════════════════
    async function doRoll(){
        if(isMoving||isSwapping||isMayaPartner)return;
        document.getElementById('rule-sidebar').classList.remove('active');
        const p=players[turnIdx];
        if(p.grammyNominator){
            const nom=p.grammyNominator;p.grammyNominator=null;
            showStatusPopup("🏆 NOMINATED!",`${nom} nominated you for a Grammy!`,
                "I HUMBLY ACCEPT",()=>doRoll(),"",()=>{});
            document.getElementById('event-btn-secondary').style.display='none';return;
        }
        if(p.skipCount>0){
            p.skipCount--;
            showStatusPopup("🛠 BUMMER","Van is still in the shop. Turn skipped.","BUMMER",()=>endTurn(),"DARN",()=>endTurn());return;
        }
        if(p.nightDriveActive){
            showStatusPopup("🌙 NIGHTDRIVE CHECK","Did you keep your eyes closed?",
                "YES",()=>{p.nightDriveActive=false;checkNextHonor(p);},
                "NO", ()=>{p.nightDriveActive=false;movePlayer(-1);});return;
        }
        checkNextHonor(p);
    }
    function checkNextHonor(p){
        if(p.ghostCounter>0){
            showStatusPopup("👻 GHOST CHECK","Did you stay quiet?",
                "YES",()=>{p.ghostCounter=0;checkNextHonor(p);},
                "NO", ()=>{p.ghostCounter=0;movePlayer(-1);});return;
        }
        if(p.smileActive){
            showStatusPopup("💀 THE ENDLESS SMILE","Did you smile endlessly?",
                "HELD IT", ()=>{p.smileActive=false;checkNextHonor(p);},
                "BROKE IT",()=>{p.smileActive=false;endTurn();});return;
        }
        performActualRoll();
    }

    async function performActualRoll(){
        const p=players[turnIdx];
        isMoving=true;document.getElementById('roll-btn').disabled=true;
        const dice=document.getElementById('dice-box');dice.innerText="?";
        await diceGoToCinematic();
        let roll;
        /* Play a random dice roll sound on each shuffle tick (every ~4 ticks) */
        for(let j=0;j<12;j++){
            dice.innerText=Math.floor(Math.random()*6)+1;
            if(j%4===0)playDiceRoll();
            await new Promise(r=>setTimeout(r,45));
        }
        roll=Math.floor(Math.random()*6)+1;dice.innerText=roll;
        playDiceDone();
        await new Promise(r=>setTimeout(r,500));
        if(p.isInvestor&&(roll===1||roll===2)){
            dice.classList.add('dice-gold');spawnEmoji('👕');
            showSidebar("INVESTMENT PAYOFF","Merch is moving! Roll doubled.","#ffffff");
            playSfx('coin.wav'); /* coin.wav for merch sold */
            await new Promise(r=>setTimeout(r,600));
            p.shirtsSold++;p.accolades.push('👕');roll*=2;dice.innerText=roll;
            await new Promise(r=>setTimeout(r,1400));updateUI();
        }
        if(p.isSellout&&roll===6){
            dice.classList.add('dice-red');spawnEmoji('💊');
            showSidebar("CONTRACT DEBT","Label takes a cut! 6 becomes -2. Should've stayed indie...","var(--fear-glow)");
            playRemedyPunishment();
            await new Promise(r=>setTimeout(r,600));
            p.pillsTaken++;p.accolades.push('💊');roll=-2;dice.innerText=roll;
            /* dicedone again for re-shown result */
            playDiceDone();
            await new Promise(r=>setTimeout(r,1400));updateUI();
        }
        p.totalRollValue+=Math.abs(roll);
        await diceReturnToBar();
        movePlayer(roll);
    }

    function spawnEmoji(char){
        const e=document.createElement('div');e.className='floating-emoji';e.innerText=char;
        e.style.left="50%";e.style.top="50%";document.body.appendChild(e);
        setTimeout(()=>e.remove(),1200);
    }

    // ══════════════════════════════════════════════
    // MOVEMENT
    // Auto-moves trigger after ~1.5s (down from 3s).
    // Slide SFX plays at the start of each step.
    // ══════════════════════════════════════════════
    async function movePlayer(n){
        const p=players[turnIdx];const dir=n>0?1:-1;
        const lastPlaceIdxList=getLastPlaceIdx();
        const isLast=lastPlaceIdxList.includes(turnIdx);

        for(let i=0;i<Math.abs(n);i++){
            if(p.pos+dir>=0&&p.pos+dir<boardLayout.length){
                playSlide(); /* Slide sound at each step */
                p.pos+=dir;updatePositions();
                /* Gatekeeper clip — non-last-place stops exactly on 48 */
                if(dir>0&&p.pos===GATEKEEPER_SPACE&&!isLast&&i<Math.abs(n)-1){
                    break;
                }
                await new Promise(r=>setTimeout(r,300));
                if(p.pos>=59){showWinScreen();return;}
            }
        }
        flashSpaceLanding(p.pos);
        if(TRACKLIST_INDICES.includes(p.pos))triggerVinylSpin(p.pos);
        if(mysterySpaces.has(p.pos)){
            await new Promise(r=>setTimeout(r,750));
            const item=getRandomBucketItem(turnIdx);
            const bucketEl=document.getElementById('side-bucket');
            renderBucketItem(item,bucketEl,turnIdx);
            const sb=document.getElementById('rule-sidebar');
            sb.classList.add('mystery-sidebar');
            showSidebar('Mystery Lore Drop','','var(--mystery-glow)',`Space ${p.pos}`);
            await new Promise(r=>setTimeout(r,500));
            endTurn();return;
        }
        await new Promise(r=>setTimeout(r,750));
        checkSpace();
    }

    // ══════════════════════════════════════════════
    // SPACE LOGIC
    // Auto-move sidebar shows for ~1.5s then moves — about 2x faster
    // Lost Recording dicedone plays after the re-roll result appears
    // ══════════════════════════════════════════════
    function checkSpace(){
        const p=players[turnIdx],r=rules[p.pos];
        if(!r){endTurn();return;}
        const spaceCol=getSpaceColor(p.pos);
        const popupEl=document.getElementById('main-popup');
        popupEl.style.borderColor=spaceCol;popupEl.style.boxShadow=`0 0 30px ${spaceCol}`;
        /* Space sounds routed through playSpaceSfx for crossfade */
        if(r.sound)playSpaceSfx(r.sound);
        if(r.choice==='remedy'&&p.isSellout){showSidebar("CONTRACT ACTIVE","Soul already sold.",spaceCol);endTurn();return;}
        if(r.choice==='merch' &&p.isInvestor) {showSidebar("ALREADY INVESTED","Inventory full.",spaceCol);endTurn();return;}
        /* Auto-spaces: sidebar shows ~1.5s then auto-moves (was 3s) */
        if(r.isAuto){showSidebar(r.title,(r.emoji||"")+" "+(r.desc||"Moving..."),spaceCol);setTimeout(()=>movePlayer(r.shift),1500);return;}

        const modal  =document.getElementById('overlay-event');
        const title  =document.getElementById('event-title');
        const desc   =document.getElementById('event-desc');
        const pBtn   =document.getElementById('event-btn-primary');
        const sBtn   =document.getElementById('event-btn-secondary');
        const timerUI=document.getElementById('timer-ui');
        const coin   =document.getElementById('coin');
        coin.classList.remove('lost-tape-dice');
        coin.style.cssText='width:140px;height:140px;background:var(--gold);border:8px solid #b8860b;border-radius:50%;margin:25px auto;display:none;align-items:center;justify-content:center;font-size:2.5rem;font-weight:bold;color:#5c4305;transform-style:preserve-3d;';
        coin.style.display='none';
        pBtn.style.display='inline-block';pBtn.disabled=false;
        title.innerText=(r.emoji||"")+" "+r.title;
        desc.innerText=r.desc||"";pBtn.innerText="CONTINUE";sBtn.style.display='none';timerUI.style.display='none';
        modal.style.display='flex';resetKbFocus();

        if(r.skipTurns){
            p.skipCount=r.skipTurns;pBtn.onclick=()=>{modal.style.display='none';endTurn();};
        } else if(r.isFigment){
            pBtn.innerText="STEP OUTSIDE (1:00)";sBtn.innerText="STAY INDOORS (-1)";sBtn.style.display='inline-block';
            pBtn.onclick=()=>{
                pBtn.disabled=true;sBtn.style.display='none';timerUI.style.display='block';
                let t=60;timerUI.innerText=t;
                const clock=setInterval(()=>{t--;timerUI.innerText=t;if(t<=0){clearInterval(clock);pBtn.disabled=false;pBtn.innerText="I'M BACK (+2)";pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(2);};}},1000);
            };
            sBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(-1);};
        } else if(r.isFearjoy){
            pBtn.innerText="FLIP COIN";
            pBtn.onclick=()=>{
                pBtn.style.display='none';coin.innerText="?";coin.style.display='flex';coin.classList.add('flipping');
                setTimeout(()=>{const win=Math.random()>0.5;coin.innerText=win?"JOY":"FEAR";coin.classList.remove('flipping');
                    setTimeout(async()=>{modal.style.display='none';coin.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(win?1:-1);},1200);},1200);
            };
        } else if(r.isDmitri){
            pBtn.innerText="BREATHE";sBtn.innerText="SKIP (-2)";sBtn.style.display='inline-block';
            pBtn.onclick=()=>{
                pBtn.disabled=true;sBtn.style.display='none';timerUI.style.display='block';
                let t=15;timerUI.innerText=t;
                const clock=setInterval(()=>{t--;timerUI.innerText=t;if(t<=0){clearInterval(clock);pBtn.disabled=false;pBtn.innerText="BREATHING COMPLETED";pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));p.pos=23;updatePositions();endTurn();};}},1000);
            };
            sBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(-2);};
        } else if(r.choice){
            const fadeOutVideo=(vid)=>{if(!vid)return;let vol=1;const fade=setInterval(()=>{if(vol>0.1){vol-=0.1;vid.volume=vol;}else{vid.pause();clearInterval(fade);}},200);};
            if(r.choice==='remedy'){
                desc.innerHTML=`<div id="video-wrapper" style="position:relative;width:100%;margin-bottom:15px;border-radius:8px;overflow:hidden;background:#000;border:1px solid #444;"><div id="close-video" style="position:absolute;top:5px;right:12px;color:white;cursor:pointer;font-size:24px;font-weight:bold;z-index:10;text-shadow:0 0 5px #000;">×</div><video id="remedy-video" style="width:100%;display:block;" autoplay playsinline><source src="trevortrim.mp4" type="video/mp4"></video></div>`+r.desc;
                setTimeout(()=>{
                    const cv=document.getElementById('close-video');const vid=document.getElementById('remedy-video');
                    if(cv)cv.onclick=(e)=>{e.stopPropagation();fadeOutVideo(vid);document.getElementById('video-wrapper').style.display='none';};
                    if(vid)vid.play().catch(()=>{});
                },50);
            }
            pBtn.innerText=r.choice==='remedy'?"SIGN CONTRACT (+6)":"INVEST IN MERCH (-4)";
            sBtn.style.display='inline-block';sBtn.innerText="PASS";
            pBtn.onclick=async()=>{
                fadeOutVideo(document.getElementById('remedy-video'));
                modal.style.display='none';
                await new Promise(res=>setTimeout(res,800));
                if(r.choice==='remedy'){p.isSellout=true;movePlayer(6);}
                else{
                    /* coin.wav replaces coinclip.wav for the "become investor" choice */
                    playSfx('coin.wav');
                    p.isInvestor=true;movePlayer(-4);
                }
            };
            sBtn.onclick=()=>{fadeOutVideo(document.getElementById('remedy-video'));modal.style.display='none';endTurn();};
        } else if(r.isGrammy){
            let maxPos=Math.max(...players.map(pl=>pl.pos));
            let leaders=players.filter(pl=>pl.pos===maxPos&&pl!==p);
            p.grammys++;p.accolades.push('🏆');updateUI();
            if(p.pos===maxPos){pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(1);};}
            else if(leaders.length>1){
                isSwapping=true;pBtn.innerText="READY";
                pBtn.onclick=()=>{
                    modal.style.display='none';
                    leaders.forEach(l=>{const idx=players.indexOf(l);document.getElementById('p'+idx).classList.add('swap-target');});
                    renderPasses();
                    scheduleReminder("Tap another Artist's face on the board, or their Pass card in the lineup.");
                };
                desc.innerText="Multiple artists tied at the lead. Select another Artist's face on the board or their Pass card.";
                showSidebar("🏆 TIED LEADERS","Multiple artists tied. Click one to swap.","var(--gold)");
            } else {
                pBtn.onclick=()=>{modal.style.display='none';let lead=leaders[0];let lp=lead.pos;lead.pos=p.pos;p.pos=lp;checkPassiveGrammys(p.name);updatePositions();endTurn();};
            }
        } else if(r.isTellus||r.isMaya){
            if(players.length>1){
                isSwapping=r.isTellus;isMayaPartner=r.isMaya;
                pBtn.innerText="READY";
                pBtn.onclick=()=>{
                    modal.style.display='none';
                    players.forEach((_,i)=>{if(i!==turnIdx){const piece=document.getElementById('p'+i);if(piece){piece.style.pointerEvents='auto';piece.classList.add('swap-target');}}});
                    renderPasses();
                    const reminderMsg=r.isMaya
                        ?"Tap another Artist's face on the board, or their Pass card to start the eye contact challenge."
                        :"Tap another Artist's face on the board, or their Pass card to swap places.";
                    scheduleReminder(reminderMsg);
                };
                desc.innerHTML=r.isMaya
                    ?"MAYA'S EYE CONTACT CHALLENGE.<br><br>Select another Artist's face on the board or their Pass card. Hold eye contact for 10s for <b>Both +2</b>. Fail for <b>Both -1</b>."
                    :"TELLUS: THE GREAT SWAP.<br><br>Select another Artist's face on the board or their Pass card to swap places.";
            } else {
                desc.innerText="SOLO TOUR: No other artists to interact with.";
                pBtn.innerText="CONTINUE";pBtn.onclick=()=>{modal.style.display='none';endTurn();};
            }
        } else if(r.isOpeningAct){
            let maxPos=Math.max(...players.map(pl=>pl.pos));let isLead=(p.pos===maxPos);
            if(isLead){
                pBtn.innerText="ACCEPT FATE (-2)";
                pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(-2);};
            } else {
                pBtn.innerText="MOVE UP";
                pBtn.onclick=async()=>{
                    modal.style.display='none';
                    let targetPos=maxPos-2;if(targetPos<0)targetPos=0;
                    let diff=targetPos-p.pos;
                    await new Promise(res=>setTimeout(res,800));
                    if(diff!==0)movePlayer(diff);else endTurn();
                };
            }
        } else if(r.isGhost){p.ghostCounter=1;pBtn.innerText="I WILL BE SILENT";pBtn.onclick=()=>{modal.style.display='none';endTurn();};}
        else if(r.isSmile){
            p.smileActive=true;
            /* smileclip.wav on landing */
            playSpaceSfx('smileclip.wav');
            pBtn.innerText="I WILL SMILE";pBtn.onclick=()=>{modal.style.display='none';endTurn();};
        }
        else if(r.isNightDrive){p.nightDriveActive=true;pBtn.innerText="EYES CLOSED";pBtn.onclick=()=>{modal.style.display='none';endTurn();};}
        else if(r.isGate){
            /* ⚠️ GRANT: doorclip.wav not yet in repo — wire is live */
            playSpaceSfx('doorclip.wav');
            const cp=players[turnIdx];
            if(!cp.isSellout&&!cp.usedColdPitch){cp.hasSeenGatekeeperHint=false;renderPasses();}
            pBtn.innerText="PAY YOUR DUES";pBtn.onclick=()=>{modal.style.display='none';endTurn();};
        }
        else if(r.isItHappens){pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));isMoving=false;performActualRoll();};}
        else if(r.isLostRecording){
            pBtn.innerText="ROLL TO REWIND";
            pBtn.onclick=async()=>{
                pBtn.style.display='none';
                coin.style.display='flex';
                coin.style.cssText='width:130px;height:130px;background:rgba(0,0,0,0.75);border:3px solid rgba(255,255,255,0.7);border-radius:12px;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:bold;color:white;transform-style:preserve-3d;font-family:KCStrikerSans,Courier New,monospace;';
                coin.innerText="?";coin.classList.add('flipping');
                let rl;
                for(let j=0;j<12;j++){
                    coin.innerText=Math.floor(Math.random()*6)+1;
                    if(j%4===0)playDiceRoll();
                    await new Promise(r=>setTimeout(r,45));
                }
                rl=Math.floor(Math.random()*6)+1;coin.innerText=rl;coin.classList.remove('flipping');
                playDiceDone(); /* dicedone after lost recording re-roll */
                await new Promise(r=>setTimeout(r,1500));
                modal.style.display='none';coin.style.display='none';
                await new Promise(res=>setTimeout(res,800));movePlayer(-rl);
            };
        } else {pBtn.onclick=()=>{modal.style.display='none';endTurn();};}
    }

    // ══════════════════════════════════════════════
    // MAYA TIMER
    // ══════════════════════════════════════════════
    function startMayaTimer(partnerIdx){
        dismissReminder();
        const overlay=document.getElementById('overlay-event');
        const desc=document.getElementById('event-desc');
        const pBtn=document.getElementById('event-btn-primary');
        const sBtn=document.getElementById('event-btn-secondary');
        const partner=players[partnerIdx];
        overlay.style.display='flex';pBtn.style.display='none';sBtn.style.display='none';
        let timeLeft=10;
        const update=()=>{desc.innerHTML=`<div style="font-size:5rem;color:var(--blue-glow);text-shadow:0 0 20px var(--blue-glow);margin-bottom:20px;animation:winPulse 1s infinite alternate;">${timeLeft}</div>EYE CONTACT WITH ${partner.name}...<br><span style="color:#888;font-size:0.8rem;letter-spacing:2px;">DON'T LOOK AWAY</span>`;};
        update();
        const clock=setInterval(()=>{
            timeLeft--;update();
            if(timeLeft<=0){
                clearInterval(clock);
                desc.innerHTML=`TIME'S UP.<br><br>Did you both hold eye contact?`;
                pBtn.style.display='inline-block';pBtn.innerText="YES (BOTH +2)";
                pBtn.onclick=()=>{movePlayer(2);players[partnerIdx].pos=Math.min(59,players[partnerIdx].pos+2);updatePositions();checkPassiveGrammys(players[turnIdx].name);overlay.style.display='none';endTurn();};
                sBtn.style.display='inline-block';sBtn.innerText="NO (BOTH -1)";
                sBtn.onclick=()=>{movePlayer(-1);players[partnerIdx].pos=Math.max(0,players[partnerIdx].pos-1);updatePositions();overlay.style.display='none';endTurn();};
                resetKbFocus();
            }
        },1000);
    }

    // ══════════════════════════════════════════════
    // PLAYER CLICK (swap / maya) — board piece or pass card
    // ══════════════════════════════════════════════
    function handlePlayerClick(idx){
        if(idx===turnIdx)return;
        if(isSwapping){
            dismissReminder();
            isSwapping=false;
            document.querySelectorAll('.player').forEach(el=>{el.classList.remove('swap-target');el.style.pointerEvents='none';});
            const p=players[turnIdx],target=players[idx];
            const oldPos=p.pos;p.pos=target.pos;target.pos=oldPos;
            checkPassiveGrammys(p.name);updatePositions();renderPasses();endTurn();
        } else if(isMayaPartner){
            dismissReminder();
            isMayaPartner=false;
            document.querySelectorAll('.player').forEach(el=>{el.classList.remove('swap-target');el.style.pointerEvents='none';});
            renderPasses();
            startMayaTimer(idx);
        }
    }

    // ══════════════════════════════════════════════
    // SIDEBAR
    // ══════════════════════════════════════════════
    function showSidebar(title,desc,color='#ffffff',subtext=''){
        if(sidebarTimer)clearTimeout(sidebarTimer);
        const sb=document.getElementById('rule-sidebar');
        sb.style.borderColor=color;sb.style.boxShadow=`-10px 0 40px ${color}`;
        document.getElementById('side-sub').innerText=subtext;
        document.getElementById('side-title').innerText=title;
        document.getElementById('side-desc').innerText=desc;
        if(!subtext||!subtext.startsWith('Space'))document.getElementById('side-bucket').innerHTML='';
        sb.classList.add('active');
        sidebarTimer=setTimeout(()=>{sb.classList.remove('active','mystery-sidebar');},8000);
    }
    function closeSidebar(){
        const sb=document.getElementById('rule-sidebar');
        sb.classList.remove('active','mystery-sidebar');
        if(sidebarTimer)clearTimeout(sidebarTimer);
    }

    // ══════════════════════════════════════════════
    // STATUS POPUP
    // ══════════════════════════════════════════════
    function showStatusPopup(t,d,b1,c1,b2,c2){
        const modal=document.getElementById('overlay-event'),popupEl=document.getElementById('main-popup');
        popupEl.style.borderColor='#444';popupEl.style.boxShadow='none';
        document.getElementById('event-title').innerText=t;
        document.getElementById('event-desc').innerText=d;
        document.getElementById('coin').style.display='none';
        const pBtn=document.getElementById('event-btn-primary');
        pBtn.style.display='inline-block';pBtn.innerText=b1;
        pBtn.onclick=async()=>{modal.style.display='none';await new Promise(r=>setTimeout(r,200));c1();};
        const sBtn=document.getElementById('event-btn-secondary');
        if(b2){sBtn.style.display='inline-block';sBtn.innerText=b2;sBtn.onclick=async()=>{modal.style.display='none';await new Promise(r=>setTimeout(r,200));c2();};}
        else sBtn.style.display='none';
        modal.style.display='flex';resetKbFocus();
    }

    // ══════════════════════════════════════════════
    // WIN SCREEN
    // ══════════════════════════════════════════════
    function showWinScreen(){
        const p=players[turnIdx];
        playSpaceSfx('swimclip.wav');
        let statsHtml=`<h2 style="color:${p.avatar.color};animation:winPulse 2s infinite ease-in-out;font-family:'KCStrikerSans','Courier New',monospace;margin:5px 0;--p-color:${p.avatar.color};text-shadow:0 0 20px ${p.avatar.color};">${p.name} WINS!</h2>`;
        statsHtml+=`<div style="text-align:left;margin-top:15px;font-family:monospace;background:rgba(0,0,0,0.4);border-radius:12px;padding:12px;border:1px solid #333;">`;
        players.forEach(pl=>{
            const supporterLine=pl.hasThrifty?`<div style="font-size:0.7rem;color:var(--mystery-glow);letter-spacing:2px;margin-top:2px;">CODE: PLAYER${pl.merchdiscountPct} — ${pl.merchdiscountPct}% OFF STORE</div>`:'';
            statsHtml+=`<div style="margin-bottom:12px;border-bottom:1px solid #222;display:flex;align-items:center;gap:12px;padding-bottom:10px;">
                <img src="${pl.avatar.img}" style="width:50px;height:50px;border-radius:50%;background:#000;border:2px solid ${pl.avatar.color};box-shadow:0 0 10px ${pl.avatar.color};">
                <div style="flex-grow:1;"><b style="color:${pl.avatar.color};font-size:1.1rem;letter-spacing:1px;">${pl.name}</b>${supporterLine}
                <div style="font-size:1.2rem;margin:2px 0;">${pl.accolades.join('')}</div></div></div>`;
        });
        statsHtml+=`</div>`;
        const popupEl=document.getElementById('main-popup');
        popupEl.style.borderColor=p.avatar.color;popupEl.style.boxShadow=`0 0 80px ${p.avatar.color}`;
        document.getElementById('event-title').innerText="The tour is over. Go Swimmin!";
        document.getElementById('event-desc').innerHTML=statsHtml;
        const storeLbl=highestDiscountPct>0?`STORE (${highestDiscountPct}% OFF)`:'STORE';
        const linkStack=`
            <div style="display:flex;flex-direction:column;gap:10px;align-items:center;margin-top:20px;">
                <a href="https://freejoy.club" target="_blank" class="win-link-btn win-cta" style="--btn-color:var(--joy-glow);color:var(--joy-glow);font-size:1.1rem;padding:14px 28px;">▶ PLAY THE ALBUM</a>
                <a href="https://freejoy.club" target="_blank" class="win-link-btn" style="--btn-color:#ff00ff;color:#ff00ff;">${storeLbl}</a>
                <a href="https://freejoy.club" target="_blank" class="win-link-btn" style="--btn-color:#ffffff;color:#ffffff;">HOME</a>
                <div style="display:flex;gap:10px;width:min(400px,90%);margin-top:5px;">
                    <button id="hard-reset-win" class="win-link-btn" style="--btn-color:var(--fear-glow);color:var(--fear-glow);flex:1;cursor:pointer;">NEW BAND</button>
                    <button id="soft-reset-win" class="win-link-btn" style="--btn-color:#ffa500;color:#ffa500;flex:1;cursor:pointer;">ANOTHER TOUR</button>
                </div>
            </div>
            <style>
                .win-link-btn{text-decoration:none;font-family:'Courier New',monospace;font-weight:900;font-size:clamp(0.75rem,1.8vw,0.9rem);padding:10px 20px;border:1px solid var(--btn-color);border-radius:12px;width:min(320px,80%);background:transparent;text-align:center;transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);letter-spacing:1.5px;text-transform:uppercase;display:block;}
                .win-cta{border-width:2px;animation:rollPulse 2s ease-in-out infinite;}
                .win-link-btn:hover{background:var(--btn-color)!important;color:black!important;box-shadow:0 0 20px var(--btn-color);transform:scale(1.05) translateY(-2px);}
            </style>`;
        document.getElementById('event-desc').innerHTML+=linkStack;
        document.getElementById('event-btn-primary').style.display='none';
        document.getElementById('event-btn-secondary').style.display='none';
        document.getElementById('hard-reset-win').onclick=()=>location.reload();
        document.getElementById('soft-reset-win').onclick=()=>{document.getElementById('overlay-event').style.display='none';confirmSoftRestart();};
        document.getElementById('overlay-event').style.display='flex';
    }

    // ══════════════════════════════════════════════
    // END TURN
    // ══════════════════════════════════════════════
    function endTurn(){
        dismissReminder();
        isSwapping=false;isMayaPartner=false;
        document.querySelectorAll('.player').forEach(el=>{el.classList.remove('swap-target');el.style.pointerEvents='none';});
        turnIdx=(turnIdx+1)%players.length;
        globalTurnCount++;
        isMoving=false;
        document.getElementById('roll-btn').disabled=false;
        updateUI();
    }
    </script>
</body>
