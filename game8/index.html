<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fearjoy - v15</title>
    <style>
        @font-face {
            font-family: 'KCStrikerSans';
            src: url('KCStrikerSans.otf') format('opentype');
            font-weight: normal; font-style: normal;
        }

        /* ── DESIGN TOKENS ── */
        :root {
            --wood-dark:    #8b7355;
            --wood-mid:     #b39b7d;
            --tape-white:   #fdfdfd;
            --joy-glow:     #00ff88;
            --fear-glow:    #ff4444;
            --gold:         #ffd700;
            --ui-bg:        rgba(0,0,0,0.98);
            --vinyl:        #111111;
            --blue-glow:    #00ccff;
            --pink-glow:    #ff00ff;
            --mystery-glow: #dd99ff;
            --pitch-orange: #ff8800;

            /* Board sizing — fluid, never fixed px */
            --space-size:  clamp(24px, 5.8vw, 85px);
            --space-font:  clamp(0.28rem, 0.75vw, 0.75rem);
            --space-emoji: clamp(0.5rem,  1.1vw, 1.4rem);
            --board-gap:   clamp(2px, 0.85vw, 18px);
            --board-pad:   clamp(4px, 1.2vw, 40px);

            /* UI bar height — shrinks vertically if needed */
            --bar-h: clamp(52px, 10vh, 110px);
        }

        /* ── KEYFRAMES ── */
        @keyframes woodFade      { 0%,100%{background-color:var(--wood-dark);}50%{background-color:var(--wood-mid);} }
        @keyframes floatUp       { 0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-150px) scale(1.5);opacity:0;} }
        @keyframes introGlow     { from{text-shadow:0 0 10px var(--gold),0 0 20px var(--gold);}to{text-shadow:0 0 20px var(--gold),0 0 40px #fffad1;} }
        @keyframes pieceHover    { 0%{transform:translate(0,0);}33%{transform:translate(3px,-3px);}66%{transform:translate(-2px,1px);}100%{transform:translate(0,0);} }
        @keyframes turnPulse     { 0%{filter:drop-shadow(0 0 5px var(--p-color));transform:translate(0,0) scale(1);}50%{filter:drop-shadow(0 0 20px var(--p-color));transform:translate(0,-4px) scale(1.15);}100%{filter:drop-shadow(0 0 5px var(--p-color));transform:translate(0,0) scale(1);} }
        @keyframes borderPulse   { 0%{box-shadow:0 0 5px var(--p-color) inset,0 0 5px var(--p-color);}50%{box-shadow:0 0 15px var(--p-color) inset,0 0 15px var(--p-color);}100%{box-shadow:0 0 5px var(--p-color) inset,0 0 5px var(--p-color);} }
        @keyframes winPulse      { 0%{transform:scale(1);filter:drop-shadow(0 0 5px var(--p-color));}50%{transform:scale(1.1);filter:drop-shadow(0 0 20px var(--p-color));}100%{transform:scale(1);filter:drop-shadow(0 0 5px var(--p-color));} }
        @keyframes flipping      { 0%{transform:rotateY(0);}100%{transform:rotateY(1800deg);} }
        @keyframes rollPulse     { 0%,100%{box-shadow:0 0 8px var(--joy-glow),0 0 16px var(--joy-glow);}50%{box-shadow:0 0 18px var(--joy-glow),0 0 36px var(--joy-glow);} }
        @keyframes shimmer       { 0%{background-position:-200% center;}100%{background-position:200% center;} }
        @keyframes diceGlow      { 0%,100%{box-shadow:0 0 6px rgba(255,255,255,0.4),inset 0 0 8px rgba(255,255,255,0.08);}50%{box-shadow:0 0 14px rgba(255,255,255,0.6),inset 0 0 14px rgba(255,255,255,0.12);} }
        @keyframes passFloat     { 0%,100%{transform:rotate(var(--tilt)) translateY(0);}50%{transform:rotate(var(--tilt)) translateY(-4px);} }
        @keyframes menuBloom     { 0%{opacity:0;transform:scale(0.7);}100%{opacity:1;transform:scale(1);} }
        @keyframes knobFlicker   { 0%,100%{box-shadow:0 0 6px #ff8800,0 0 2px #ff4400;border-color:#ff6600;}50%{box-shadow:0 0 14px #ff6600,0 0 4px #ff8800;border-color:#ff8800;} }
        @keyframes redSparkle    { 0%{box-shadow:0 0 10px var(--fear-glow);}100%{box-shadow:0 0 50px var(--fear-glow);background:#300;color:white;} }
        @keyframes goldSparkle   { 0%{box-shadow:0 0 10px var(--gold);}100%{box-shadow:0 0 50px var(--gold);background:#330;color:white;} }
        @keyframes mysteryPulse  { 0%,100%{box-shadow:0 0 8px var(--mystery-glow);}50%{box-shadow:0 0 22px var(--mystery-glow),0 0 44px var(--mystery-glow);} }
        @keyframes passNotify    { 0%,100%{box-shadow:0 0 5px var(--pitch-orange);}50%{box-shadow:0 0 20px var(--pitch-orange),0 0 40px var(--pitch-orange);} }
        @keyframes vinylSpin     { 0%{transform:scale(1.15) rotate(0deg);animation-timing-function:ease-in;}30%{transform:scale(1.15) rotate(540deg);animation-timing-function:linear;}70%{transform:scale(1.15) rotate(1440deg);animation-timing-function:ease-out;}100%{transform:scale(1.15) rotate(1800deg);} }
        @keyframes spaceLand     { 0%{box-shadow:0 0 0px var(--land-color,white);}40%{box-shadow:0 0 30px var(--land-color,white),0 0 60px var(--land-color,white);}100%{box-shadow:0 0 0px var(--land-color,white);} }
        @keyframes diceRiseOut   { 0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(0,-60px) scale(0.5);} }
        @keyframes diceFallIn    { 0%{opacity:0;transform:translate(0,-80px) scale(0.4);}100%{opacity:1;transform:translate(0,0) scale(1);} }
        @keyframes diceReturnOut { 0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(60px,-60px) scale(0.3);} }
        @keyframes diceReappear  { 0%{opacity:0;transform:scale(0.3);}100%{opacity:1;transform:scale(1);} }
        @keyframes passExpandIn  { 0%{opacity:0;transform:scale(0.4);}100%{opacity:1;transform:scale(1);} }
        @keyframes btnFocusPulse { 0%,100%{outline-color:rgba(255,255,255,0.4);}50%{outline-color:white;} }

        /* ── PAGE SHELL ── */
        html,body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
        body {
            animation: woodFade 20s ease-in-out infinite;
            background-image: repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(0,0,0,0.05) 80px,rgba(0,0,0,0.05) 82px);
            color:white; font-family:'Courier New',monospace;
            display:flex; flex-direction:column;
            height:100vh; height:100dvh; overflow:hidden;
        }

        /* ── TOP UI BAR — height uses --bar-h which shrinks with viewport ── */
        #ui-layer {
            display:flex; align-items:center; justify-content:center;
            background:var(--ui-bg);
            padding:0 clamp(10px,3vw,45px);
            height:var(--bar-h);
            min-height:var(--bar-h);
            max-height:var(--bar-h);
            border-radius:0 0 12px 12px;
            border:1px solid rgba(255,255,255,0.1); border-top:none;
            width:100%; box-sizing:border-box;
            z-index:20; position:relative; flex-shrink:0;
            background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.015) 2px,rgba(255,255,255,0.015) 4px);
        }
        #ui-layer::before {
            content:''; position:absolute; inset:0;
            background:linear-gradient(90deg,var(--current-player-color,transparent) 0%,transparent 40%);
            opacity:0.12; pointer-events:none; border-radius:inherit; transition:background 0.8s ease;
        }

        /* Center cluster */
        #ui-center-cluster { display:flex; align-items:center; gap:clamp(8px,2vw,28px); position:relative; z-index:1; }
        #status-text {
            font-size:clamp(0.9rem,2.8vw,2.2rem);
            font-family:'KCStrikerSans','Courier New',monospace;
            text-transform:uppercase; line-height:1; white-space:nowrap;
            min-width:clamp(80px,14vw,200px); text-align:right;
        }

        /* ── HAMBURGER KNOB ── */
        #nav-knob { position:absolute; left:clamp(10px,2vw,20px); top:50%; transform:translateY(-50%); z-index:30; }
        #nav-knob-btn {
            width:clamp(34px,4.5vw,52px); height:clamp(34px,4.5vw,52px);
            border-radius:50%; background:#111; border:1.5px solid #ff6600;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            flex-direction:column; gap:5px; transition:all 0.3s ease;
            animation:knobFlicker 2.5s ease-in-out infinite; padding:0;
        }
        #nav-knob-btn:hover { border-color:var(--joy-glow); box-shadow:0 0 20px var(--joy-glow); animation:none; }
        .knob-line { width:45%; height:2px; background:white; border-radius:2px; pointer-events:none; }
        #nav-menu {
            display:none; flex-direction:column; gap:8px;
            position:absolute; top:calc(100% + 10px); left:0;
            background:var(--ui-bg); border:1px solid #333; border-radius:14px;
            padding:12px; min-width:200px;
            box-shadow:0 10px 40px rgba(0,0,0,0.7);
            animation:menuBloom 0.2s ease forwards; z-index:500;
        }
        #nav-menu.open { display:flex; }
        .nav-menu-btn {
            display:flex; align-items:center; gap:12px; padding:10px 14px;
            border-radius:8px; background:transparent; border:1px solid #333;
            color:white; font-family:'Courier New',monospace;
            font-size:0.85rem; font-weight:bold; cursor:pointer;
            transition:all 0.25s ease; white-space:nowrap;
        }
        .nav-menu-btn:hover { background:rgba(255,255,255,0.07); transform:translateX(4px); }
        .nav-icon { font-size:1.2rem; }
        .btn-audio:hover   { border-color:var(--gold);      color:var(--gold);      box-shadow:0 0 12px var(--gold); }
        .btn-restart:hover { border-color:#ff4500;           color:#ff4500;          box-shadow:0 0 12px #ff4500; }
        .btn-home:hover    { border-color:var(--tape-white); box-shadow:0 0 12px rgba(255,255,255,0.4); }
        .btn-store:hover   { border-color:var(--pink-glow);  color:var(--pink-glow); box-shadow:0 0 12px var(--pink-glow); }
        .btn-album:hover   { border-color:var(--joy-glow);   color:var(--joy-glow);  box-shadow:0 0 12px var(--joy-glow); }

        /* ── ROLL BUTTON ── */
        #roll-btn {
            background:rgba(0,0,0,0.6); color:var(--joy-glow);
            width:clamp(90px,16vw,200px); font-size:clamp(0.9rem,2vw,1.6rem);
            font-family:'KCStrikerSans','Courier New',monospace;
            font-weight:bold; padding:clamp(7px,1.3vh,15px);
            border:2px solid var(--joy-glow); border-radius:999px;
            cursor:pointer; letter-spacing:3px;
            animation:rollPulse 2s ease-in-out infinite;
            transition:all 0.3s ease; position:relative; overflow:hidden; flex-shrink:0;
        }
        #roll-btn::after {
            content:''; position:absolute; inset:0;
            background:linear-gradient(105deg,transparent 40%,rgba(0,255,136,0.25) 50%,transparent 60%);
            background-size:200% 100%; opacity:0; transition:opacity 0.3s ease;
        }
        #roll-btn:hover::after { opacity:1; animation:shimmer 0.8s ease forwards; }
        #roll-btn:disabled { opacity:0.35; animation:none; cursor:not-allowed; }

        /* ── DICE ── */
        #dice-box {
            width:clamp(38px,5.5vw,72px); height:clamp(38px,5.5vw,72px);
            background:rgba(0,0,0,0.75); color:white;
            border:2px solid rgba(255,255,255,0.7); border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:clamp(1.6rem,3.6vw,3.5rem); font-weight:900;
            font-family:'KCStrikerSans','Courier New',monospace;
            transition:all 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
            position:relative; animation:diceGlow 3s ease-in-out infinite; flex-shrink:0;
        }
        .dice-rise-out   { animation:diceRiseOut   0.35s ease-in  forwards !important; }
        .dice-fall-in    { animation:diceFallIn    0.4s  ease-out forwards !important; }
        .dice-return-out { animation:diceReturnOut 0.35s ease-in  forwards !important; }
        .dice-reappear   { animation:diceReappear  0.35s ease-out forwards !important; }
        .dice-cinematic  {
            position:fixed !important; top:50% !important; left:50% !important;
            transform:translate3d(-50%,-50%,0) scale(2.2) !important;
            z-index:5000; opacity:0.90; box-shadow:0 0 50px rgba(255,255,255,0.4);
        }
        .dice-red  { animation:redSparkle  0.5s infinite alternate !important; }
        .dice-gold { animation:goldSparkle 0.5s infinite alternate !important; }
        .flipping  { animation:flipping 1.2s cubic-bezier(0.45,0.05,0.55,0.95); transform-style:preserve-3d; }

        /* ── MAIN AREA ── */
        #main-area { flex:1; display:flex; flex-direction:row; min-height:0; overflow:hidden; position:relative; }

        /* ── PASS SIDEBAR ── */
        #pass-sidebar {
            z-index:2;
            width:clamp(90px,12.5vw,175px);
            flex-shrink:0;
            display:flex; flex-direction:column;
            justify-content:flex-start; align-items:center;
            gap:clamp(5px,1vh,14px);
            padding:clamp(4px,0.7vw,10px) clamp(3px,0.6vw,8px);
            overflow:hidden; position:relative;
        }

        /* Lineup label — always above passes, 2x size */
        #lineup-label {
            font-size:clamp(0.7rem,1.1vw,1rem);
            letter-spacing:3px; color:rgba(255,255,255,0.45);
            text-transform:uppercase; text-align:center;
            flex-shrink:0; margin-bottom:2px;
            font-family:'Courier New',monospace;
        }

        /* Pass card */
        .access-pass {
            width:clamp(74px,10.5vw,152px);
            background:linear-gradient(160deg,#1a1a1a 60%,#2a2a2a);
            border-radius:10px; border:1px solid rgba(255,255,255,0.15);
            padding:clamp(5px,0.65vw,10px);
            box-shadow:0 4px 20px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.08);
            position:relative;
            transform:rotate(var(--tilt,-1.5deg));
            animation:passFloat 4s ease-in-out infinite;
            transition:border-color 0.4s,box-shadow 0.4s,transform 0.25s;
            cursor:pointer;
        }
        /* Hover expand + glow */
        .access-pass:hover {
            transform:rotate(0deg) scale(1.07) !important;
            animation:none;
            box-shadow:0 8px 30px rgba(0,0,0,0.7), 0 0 18px var(--p-color);
            border-color:var(--p-color);
            z-index:10;
        }
        .access-pass.pass-active {
            border-color:var(--p-color);
            box-shadow:0 4px 20px rgba(0,0,0,0.6),0 0 14px var(--p-color),inset 0 1px 0 rgba(255,255,255,0.08);
        }
        /* Gatekeeper notification glow on pass */
        .access-pass.pass-notify { animation:passNotify 1.2s ease-in-out infinite !important; border-color:var(--pitch-orange) !important; }

        .pass-clip {
            width:clamp(9px,1.5vw,16px); height:clamp(4px,0.7vw,8px);
            background:#888; border-radius:3px 3px 0 0;
            margin:0 auto clamp(2px,0.35vw,5px); position:relative;
        }
        .pass-clip::after { content:''; position:absolute; bottom:-3px; left:50%; transform:translateX(-50%); width:60%; height:3px; background:#666; border-radius:0 0 2px 2px; }
        .pass-all-access {
            font-family:'Courier New',monospace;
            font-size:clamp(0.34rem,0.52vw,0.5rem);
            letter-spacing:2px; color:rgba(255,255,255,0.3);
            text-transform:uppercase; text-align:center;
            margin-bottom:clamp(2px,0.3vw,4px);
        }
        .pass-header { display:flex; align-items:center; gap:clamp(3px,0.4vw,6px); border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:clamp(2px,0.3vw,5px); margin-bottom:clamp(2px,0.3vw,5px); }
        .pass-avatar { width:clamp(17px,2.7vw,34px); height:clamp(17px,2.7vw,34px); border-radius:50%; border:2px solid var(--p-color,#555); background:#000; flex-shrink:0; }
        /* Pass name — 20% larger than before */
        .pass-name  { font-family:'KCStrikerSans','Courier New',monospace; font-size:clamp(0.62rem,1.04vw,1rem); color:var(--p-color,white); letter-spacing:1px; text-transform:uppercase; word-break:break-all; }
        .pass-label { font-size:clamp(0.38rem,0.58vw,0.58rem); letter-spacing:2px; color:rgba(255,255,255,0.35); text-transform:uppercase; margin-bottom:2px; }
        .pass-tags  { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:clamp(2px,0.3vw,4px); min-height:10px; }
        /* Accolades + INDEPENDENT — 20% larger, more spacing */
        .pass-accolades  { font-size:clamp(0.7rem,1.08vw,1rem); letter-spacing:2px; min-height:10px; }
        .pass-independent{ font-size:clamp(0.44rem,0.7vw,0.65rem); letter-spacing:4px; opacity:0.35; }
        .tag             { font-size:clamp(0.36rem,0.52vw,0.6rem); padding:2px 5px; border-radius:3px; font-weight:bold; letter-spacing:0.5px; }
        .tag-investor    { background:var(--gold);          color:black; }
        .tag-sellout     { background:var(--fear-glow);     color:white; }
        .tag-pitched     { background:var(--pitch-orange);  color:black; } /* Cold Pitch signed tag */
        .tag-supporter   { background:var(--mystery-glow);  color:black; } /* Merch discount used */
        .pass-stripe     { background:linear-gradient(90deg,var(--p-color,#333) 0%,transparent 100%); opacity:0.15; height:clamp(2px,0.32vw,4px); border-radius:2px; margin-top:clamp(2px,0.3vw,5px); }

        /* ── PASS EXPANDED OVERLAY ── */
        #pass-expanded-backdrop {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.65); z-index:3000;
            align-items:center; justify-content:center;
        }
        #pass-expanded-backdrop.open { display:flex; }
        #pass-expanded-card {
            background:linear-gradient(160deg,#1c1c1c 60%,#2e2e2e);
            border-radius:18px; border:2px solid var(--exp-color,#555);
            padding:clamp(18px,3vw,36px);
            width:min(340px,88vw); max-height:88vh; overflow-y:auto;
            box-shadow:0 0 60px var(--exp-color,#555);
            animation:passExpandIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
            font-family:'Courier New',monospace; position:relative;
        }
        #pass-expanded-card .exp-close { position:absolute; top:12px; right:16px; font-size:1.4rem; cursor:pointer; opacity:0.6; transition:opacity 0.2s; }
        #pass-expanded-card .exp-close:hover { opacity:1; }
        .exp-avatar  { width:64px; height:64px; border-radius:50%; border:3px solid var(--exp-color,#555); background:#000; display:block; margin:0 auto 10px; }
        .exp-name    { font-family:'KCStrikerSans','Courier New',monospace; font-size:clamp(1.4rem,4vw,2rem); color:var(--exp-color,white); letter-spacing:2px; text-transform:uppercase; margin:0 0 12px; text-align:center; }
        .exp-section-label { font-size:0.6rem; letter-spacing:3px; color:rgba(255,255,255,0.35); text-transform:uppercase; margin:10px 0 4px; }
        .exp-tags    { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
        .exp-accolades { font-size:1.6rem; letter-spacing:4px; min-height:24px; }
        .exp-pass-stripe { background:linear-gradient(90deg,var(--exp-color,#333) 0%,transparent 100%); opacity:0.2; height:4px; border-radius:2px; margin-top:16px; }

        /* Cold Pitch button — only shown in expanded view */
        #pitch-btn {
            display:none; /* shown by JS when eligible */
            width:100%; margin-top:14px; padding:10px;
            background:transparent; border:2px solid var(--pitch-orange);
            color:var(--pitch-orange);
            font-family:'Courier New',monospace; font-weight:bold;
            font-size:0.85rem; letter-spacing:2px; text-transform:uppercase;
            border-radius:8px; cursor:pointer;
            transition:all 0.25s ease;
        }
        #pitch-btn:hover { background:var(--pitch-orange); color:black; box-shadow:0 0 16px var(--pitch-orange); transform:translateY(-2px); }

        /* ── BOARD SCROLL ── */
        #board-scroll {
            flex:1; display:flex; align-items:center; justify-content:center;
            overflow:hidden; /* no scroll — board scales to fit */
            padding:clamp(4px,0.9vw,16px);
            box-sizing:border-box; min-height:0; min-width:0;
            z-index:5; position:relative;
        }
        /* Board scales using CSS transform to always fit without scroll */
        #board-outer {
            display:flex; align-items:center; justify-content:center;
            width:100%; height:100%;
        }
        #board-container {
            display:grid;
            grid-template-columns:repeat(10,var(--space-size));
            grid-template-rows:   repeat(6, var(--space-size));
            gap:var(--board-gap); padding:var(--board-pad);
            position:relative; z-index:5; flex-shrink:0;
        }

        /* ── SPACES ── */
        .space {
            width:var(--space-size); height:var(--space-size);
            border-radius:50%; border:1px solid var(--tape-white);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            font-weight:bold; font-size:var(--space-font); line-height:1.1;
            background:rgba(255,255,255,0.05); text-align:center;
            position:relative; transition:0.3s; cursor:help; box-sizing:border-box;
        }
        .space:not(.blank):not(.mystery-space) { font-family:'KCStrikerSans','Courier New',monospace; }
        .sp-emoji { font-size:var(--space-emoji); margin-bottom:2px; }
        .sp-text  { padding:0 2px; }
        .dir-arrow { position:absolute; font-size:clamp(0.6rem,1.2vw,1.65rem); color:rgba(210,180,140,0.8); font-weight:900; pointer-events:none; z-index:1; }
        .arrow-right { right:clamp(-8px,-1.2vw,-18px); top:50%; transform:translateY(-50%); }
        .arrow-left  { left: clamp(-8px,-1.2vw,-18px); top:50%; transform:translateY(-50%) rotate(180deg); }
        .arrow-up    { top: clamp(-10px,-1.6vw,-22px); left:50%; transform:translateX(-50%) rotate(-90deg); }

            border-style:dashed !important; background:none !important;
            cursor:help; font-family:'Courier New',monospace !important;
            opacity:0.88; transform:scale(0.8);
            animation:mysteryPulse 3s ease-in-out infinite;
            border-color:var(--mystery-glow) !important; color:var(--mystery-glow) !important;
            border-width:2px !important;

        .mystery-q { font-size:clamp(0.85rem,1.6vw,1.5rem); font-weight:bold; opacity:0.9; }

        .tracklist-space { background:var(--vinyl) !important; border:3px double #666 !important; box-shadow:inset 0 0 15px #000; transform:scale(1.15); z-index:5; font-size:var(--space-font) !important; color:white !important; }

        .space-land { animation:spaceLand 1.2s ease-out forwards; }

        .player {
            width:var(--space-size); height:var(--space-size);
            position:absolute; z-index:100;

        }

            background:rgba(10,10,10,0.9); backdrop-filter:blur(8px);
            padding:clamp(16px,3vw,45px); border-radius:30px;
            border:2px solid #444; width:min(680px,92vw);
            max-height:88vh; overflow-y:auto;
            text-align:center; transition:0.4s; box-sizing:border-box;

        #event-btn-primary,#event-btn-secondary {
            padding:clamp(10px,1.5vh,15px) clamp(16px,3vw,35px);
            font-size:clamp(0.85rem,1.8vw,1.1rem);
            font-weight:bold; cursor:pointer; border-radius:8px; border:none;

            /* Keyboard focus ring */
            outline:2px solid transparent; outline-offset:3px;
        }

        #event-btn-secondary { display:none; background:#333; color:white; margin-left:clamp(8px,1.5vw,15px); }

        /* Keyboard-focused button style */
        .btn-kb-focus { outline:2px solid white !important; animation:btnFocusPulse 1s ease-in-out infinite; }

        /* Rule sidebar — StrikerSans header, larger Courier subtext */
        #rule-sidebar {
            position:fixed; right:-400px; top:calc(var(--bar-h) + 8px);

        .bucket-code { font-family:'KCStrikerSans','Courier New',monospace; font-size:1.3rem; letter-spacing:4px; color:var(--gold); background:rgba(255,215,0,0.1); border:1px solid var(--gold); border-radius:6px; padding:8px 14px; display:inline-block; margin:8px 0; cursor:pointer; transition:all 0.2s ease; }
        .bucket-code:hover { background:rgba(255,215,0,0.2); transform:scale(1.05); }
        .bucket-code-hint { font-size:0.65rem; color:rgba(255,255,255,0.4); letter-spacing:1px; margin-bottom:8px; }
        .bucket-btn { display:inline-block; text-decoration:none; background:var(--mystery-glow); color:black; font-weight:bold; font-size:0.85rem; letter-spacing:1px; text-transform:uppercase; padding:10px 20px; border-radius:8px; border:none; cursor:pointer; transition:all 0.25s ease; margin-top:6px; }
        .bucket-btn:hover { transform:translateY(-2px); box-shadow:0 0 16px var(--mystery-glow); }

        .intro-header { font-size:clamp(1.6rem,5vw,3.5rem); color:var(--gold); animation:introGlow 2s ease-in-out infinite alternate; margin-bottom:16px; font-family:'KCStrikerSans','Courier New',monospace; letter-spacing:4px; }

        /* ── SETUP ── */
        .setup-btn-large  { padding:clamp(10px,2vh,20px) clamp(20px,4vw,45px); font-size:clamp(1.4rem,4vw,2.5rem); font-weight:bold; background:transparent; color:white; border:2px solid white; border-radius:12px; cursor:pointer; transition:all 0.2s ease; }
        .setup-btn-large:hover { background:white; color:black; transform:scale(1.1); }
        .setup-avatar     { width:clamp(55px,11vw,90px); height:clamp(55px,11vw,90px); opacity:0.3; cursor:pointer; transition:all 0.3s ease; filter:grayscale(100%); border:3px solid transparent; border-radius:10px; }
        .setup-avatar:hover { opacity:0.7; }
        .setup-avatar.selected { opacity:1; filter:grayscale(0%); transform:scale(1.1); }
        .confirm-btn      { padding:clamp(12px,2vh,20px) 40px; width:90%; background:white; color:black; font-size:clamp(1rem,2.5vw,1.3rem); font-weight:bold; border-radius:8px; border:none; cursor:pointer; transition:all 0.2s ease; }
        .confirm-btn:hover { background:#00ff00; transform:translateY(-2px); }
        .roster-item { text-align:center; font-size:0.7rem; color:white; }
        .roster-img  { width:45px; height:45px; border-radius:50%; display:block; margin:0 auto 5px; }
        .color-swatch { width:clamp(22px,4vw,32px); height:clamp(22px,4vw,32px); border-radius:50%; border:2px solid transparent; cursor:pointer; transition:all 0.2s ease; display:inline-block; }

        /* ── RESPONSIVE: flip to bottom strip at 900px wide ── */
        @media (max-width:900px),(orientation:portrait) {

</head>

    // KEYBOARD ACCESSIBILITY
    // ══════════════════════════════════════════════
    /* Space/Enter → doRoll. Arrow keys cycle choice buttons. */
    let kbFocusIdx = 0; /* index of keyboard-focused choice button */

    document.addEventListener('keydown', e => {
        const modal = document.getElementById('overlay-event');
        const modalOpen = modal && modal.style.display === 'flex';

        if (!modalOpen) {
            /* Space or Enter triggers roll */
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                doRoll();
            }
            return;
        }

        /* Inside a modal — arrow keys cycle visible buttons, Enter/Space confirm */
        const btns = [...document.querySelectorAll('#action-bar button')]
            .filter(b => b.style.display !== 'none' && !b.disabled);
        if (!btns.length) return;

        if (e.code === 'ArrowRight' || e.code === 'ArrowLeft') {
            e.preventDefault();
            btns.forEach(b => b.classList.remove('btn-kb-focus'));
            kbFocusIdx = e.code === 'ArrowRight'
                ? (kbFocusIdx + 1) % btns.length
                : (kbFocusIdx - 1 + btns.length) % btns.length;
            btns[kbFocusIdx].classList.add('btn-kb-focus');
        }
        if (e.code === 'Space' || e.code === 'Enter') {
            e.preventDefault();
            btns[kbFocusIdx]?.click();
        }
    });

    /* Reset keyboard focus index whenever a new modal opens */
    function resetKbFocus() {
        kbFocusIdx = 0;
        document.querySelectorAll('.btn-kb-focus').forEach(b => b.classList.remove('btn-kb-focus'));
    }

    /* Play remedyclip for 2s then fade over 2s — used for contract debt punishment */
    function playRemedyPunishment() {
        if (!audioEnabled) return;
        const a = new Audio('remedyclip.wav');
        a.volume = 1;
        a.play().catch(()=>{});
        setTimeout(() => {
            let vol = 1;
            const fade = setInterval(() => {
                vol = Math.max(0, vol - 0.05);
                a.volume = vol;
                if (vol <= 0) { a.pause(); clearInterval(fade); }
            }, 100);
        }, 2000);
    }

        if (pos<0||pos>=boardLayout.length) return '#ffffff';
        const n=boardLayout[pos];
        if (n==='FEAR') return 'var(--fear-glow)';
        if (n==='JOY')  return 'var(--joy-glow)';

        const el=document.getElementById('s'+pos); if(!el)return;
        const color=getSpaceColor(pos);
        el.style.setProperty('--land-color',color==='#ffffff'?'rgba(255,255,255,0.8)':color);

        const el=document.getElementById('s'+pos); if(!el)return;

    function getRandomBucketItem() {
        if (!BUCKET.length) return null;
        return BUCKET[Math.floor(Math.random()*BUCKET.length)];
    }

    function renderBucketItem(item, container) {
        container.innerHTML='';
        if (!item) return;
        if (item.type==='image') {
            const img=document.createElement('img');
            img.src=item.file; img.className='bucket-img'; img.alt='Mystery drop';
            container.appendChild(img);
        } else if (item.type==='link'||item.type==='download') {
            const card=document.createElement('div'); card.className='bucket-link-card';
            const lbl=document.createElement('div'); lbl.className='bucket-link-label'; lbl.innerText=item.label; card.appendChild(lbl);
            if (item.code) {
                const hint=document.createElement('div'); hint.className='bucket-code-hint'; hint.innerText=item.codeHint||'tap to copy'; card.appendChild(hint);
                const codeEl=document.createElement('div'); codeEl.className='bucket-code'; codeEl.innerText=item.code;
                codeEl.onclick=e=>{
                    e.stopPropagation(); /* don't close sidebar */
                    navigator.clipboard.writeText(item.code).then(()=>{
                        const orig=codeEl.innerText;
                        codeEl.innerText='COPIED!';
                        setTimeout(()=>codeEl.innerText=orig,2000);
                    }).catch(()=>{});
                    /* Mark player as supporter */
                    if(players[turnIdx]&&!players[turnIdx].hasSupporter){
                        players[turnIdx].hasSupporter=true;
                        players[turnIdx].accolades.push('🎫');
                        merchdiscountUsed=true;
                        renderPasses();
                    }
                };
                card.appendChild(codeEl);
            }
            if (item.url) {
                const btn=document.createElement('a'); btn.className='bucket-btn';
                btn.href=item.url; btn.target='_blank';
                btn.innerText=item.type==='download'?'DOWNLOAD':'GO TO STORE';
                card.appendChild(btn);
            }
            container.appendChild(card);
        }
        /* Video/audio — future pass */
    }

        totalP=num;
        document.getElementById('setup-step-1').style.display='none';

        document.getElementById('setup-prompt').innerText=`ARTIST ${currentSetupP+1}: DETAILS`;

        const img=document.getElementById('sel-'+id); img.classList.add('selected');
        img.style.border=`3px solid ${selectedColor||'#fff'}`;

    function confirmArtist() {
        const ni=document.getElementById('name-input');
        const name=ni.value.toUpperCase().trim();
        const errEl=document.getElementById('name-error');
        if(!name||!selectedAvatar){errEl.innerText="NAME & PIC REQUIRED";errEl.style.display='block';return;}
        if(players.some(p=>p.name===name)){errEl.innerText="NAME ALREADY TAKEN";errEl.style.display='block';return;}
        errEl.style.display='none';
        const color=selectedColor||DEFAULT_COLORS[currentSetupP]||'#ffffff';
        players.push({
            name,pos:0,avatar:{id:selectedAvatar.id,img:selectedAvatar.img,color},
            skipCount:0,isInvestor:false,isSellout:false,
            grammys:0,shirtsSold:0,pillsTaken:0,accolades:[],
            ghostCounter:0,totalRollValue:0,smileActive:false,nightDriveActive:false,
            grammyNominator:null,usedColdPitch:false,hasSeenGatekeeperHint:false,hasSupporter:false
        });

        currentSetupP++;
        if(currentSetupP>=totalP){
            document.getElementById('overlay-setup').style.display='none';
            initBoard();
        } else {
            ni.value='';ni.style.borderColor='#333';ni.style.boxShadow='none';
            selectedAvatar=null;selectedColor=null;
            document.querySelectorAll('.setup-avatar').forEach(img=>img.classList.remove('selected'));
            updateSetupPrompt();
        }

    // ══════════════════════════════════════════════
    // BOARD INIT
    // ══════════════════════════════════════════════
    function initBoard() {
        const board=document.getElementById('board-container');
        boardLayout.forEach((name,i)=>{
            const s=document.createElement('div'); s.id='s'+i; s.className='space';
            if(name==="blank"){
                s.classList.add('mystery-space');
                s.innerHTML=`<span class="mystery-q">?</span>`;
                s.onclick=()=>handleMysteryClick(i);
            } else {
                const r=rules[i];
                const emojiHtml=(r&&r.emoji)?`<div class="sp-emoji">${r.emoji}</div>`:'';
                s.innerHTML=`${emojiHtml}<div class="sp-text">${name}</div>`;
                if(TRACKLIST_INDICES.includes(i)) s.classList.add('tracklist-space');
                if(name==="FEAR")    s.classList.add('fear-space');
                if(name==="JOY")     s.classList.add('joy-space');
                if(name==="FEARJOY") s.classList.add('hybrid');
                if(i===59)           s.classList.add('win-track');
                s.onclick=()=>handleSpaceClick(i);
            }
            if(i<59&&name!=="START"){
                let dir='';
                if(i%10===9) dir='arrow-up';
                else if(Math.floor(i/10)%2===0) dir='arrow-right';
                else dir='arrow-left';
                const arr=document.createElement('div'); arr.className=`dir-arrow ${dir}`; arr.innerHTML="➜"; s.appendChild(arr);
            }
            const row=Math.floor(i/10),col=(row%2===0)?(i%10):(9-(i%10));
            s.style.gridRow=6-row; s.style.gridColumn=col+1;
            board.appendChild(s);
        });
        players.forEach((p,i)=>{
            const el=document.createElement('div'); el.id='p'+i; el.className='player';
            el.style.backgroundImage=`url('${p.avatar.img}')`;
            el.onclick=()=>handlePlayerClick(i);
            board.appendChild(el);
        });
        updateUI();
        document.getElementById('roll-btn').disabled=false;
    }

    // ══════════════════════════════════════════════
    // ALL-ACCESS PASS RENDER
    // ══════════════════════════════════════════════
    function renderPasses() {
        const sidebar=document.getElementById('pass-sidebar');
        sidebar.querySelectorAll('.access-pass').forEach(c=>c.remove());
        const tilts=[-2,1.5,-1];
        players.forEach((pl,i)=>{
            const isCurrent=(i===turnIdx);
            const tilt=tilts[i%tilts.length];
            const tags=(pl.isInvestor?'<span class="tag tag-investor">INVESTOR</span>':'')
                      +(pl.isSellout ?'<span class="tag tag-sellout">SELLOUT</span>':'')
                      +(pl.usedColdPitch?'<span class="tag tag-pitched">PITCHED</span>':'')
                      +(pl.hasSupporter?'<span class="tag tag-supporter">SUPPORTER</span>':'');
            /* Gatekeeper hint — glow orange on pass if they just landed on gatekeeper and haven't seen hint */
            const notify=isCurrent&&pl.pos===GATEKEEPER_SPACE&&!pl.hasSeenGatekeeperHint&&!pl.isSellout&&!pl.usedColdPitch;
            const card=document.createElement('div');
            card.className='access-pass'+(isCurrent?' pass-active':'')+(notify?' pass-notify':'');
            card.style.setProperty('--tilt',tilt+'deg');
            card.style.setProperty('--p-color',pl.avatar.color);
            card.style.animationDelay=(i*0.4)+'s';
            card.id='pass-'+i;
            card.innerHTML=`
                <div class="pass-clip"></div>
                <div class="pass-all-access">All-Access Pass</div>
                <div class="pass-header">
                    <img src="${pl.avatar.img}" class="pass-avatar" style="border-color:${pl.avatar.color}">
                    <div class="pass-name">${pl.name}</div>
                </div>
                <div class="pass-label">Status</div>
                <div class="pass-tags">${tags||`<span class="pass-independent">INDEPENDENT</span>`}</div>
                <div class="pass-label">Accolades</div>
                <div class="pass-accolades">${pl.accolades.join('')||'—'}</div>
                <div class="pass-stripe"></div>`;
            card.onclick=()=>expandPass(i);
            sidebar.appendChild(card);
        });
    }

    /* Expand pass to center */
    function expandPass(idx) {
        expandedPassIdx=idx;
        const pl=players[idx];
        const isCurrent=(idx===turnIdx);
        const tags=(pl.isInvestor?'<span class="tag tag-investor" style="font-size:0.75rem;padding:3px 8px;">INVESTOR</span>':'')
                  +(pl.isSellout ?'<span class="tag tag-sellout"  style="font-size:0.75rem;padding:3px 8px;">SELLOUT</span>':'')
                  +(pl.usedColdPitch?'<span class="tag tag-pitched" style="font-size:0.75rem;padding:3px 8px;">PITCHED</span>':'')
                  +(pl.hasSupporter?'<span class="tag tag-supporter" style="font-size:0.75rem;padding:3px 8px;">SUPPORTER</span>':'');
        const card=document.getElementById('pass-expanded-card');
        card.style.setProperty('--exp-color',pl.avatar.color);
        document.getElementById('exp-avatar').src=pl.avatar.img;
        document.getElementById('exp-avatar').style.borderColor=pl.avatar.color;
        document.getElementById('exp-name').innerText=pl.name;
        document.getElementById('exp-name').style.color=pl.avatar.color;
        document.getElementById('exp-tags').innerHTML=tags||'<span style="opacity:0.4;font-size:0.8rem;letter-spacing:3px;">INDEPENDENT</span>';
        document.getElementById('exp-accolades').innerText=pl.accolades.join('')||'—';
        document.getElementById('exp-stripe').style.background=`linear-gradient(90deg,${pl.avatar.color} 0%,transparent 100%)`;

        /* Cold Pitch button — only on their turn, before rolling, not sellout, not already pitched, position <= gatekeeper */
        const pitchBtn=document.getElementById('pitch-btn');
        const pitchEligible = isCurrent && !isMoving && !pl.isSellout && !pl.usedColdPitch && pl.pos<=GATEKEEPER_SPACE;
        pitchBtn.style.display = pitchEligible ? 'block' : 'none';
        if(pl.pos===GATEKEEPER_SPACE&&pitchEligible) pl.hasSeenGatekeeperHint=true; /* dismiss glow */

        card.style.animation='none'; void card.offsetWidth;
        card.style.animation='passExpandIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) forwards';
        document.getElementById('pass-expanded-backdrop').classList.add('open');
        renderPasses(); /* refresh to remove gatekeeper notify glow */
    }
    function collapsePass(e) {
        if(e&&document.getElementById('pass-expanded-card').contains(e.target)&&e.target.className!=='exp-close') return;
        document.getElementById('pass-expanded-backdrop').classList.remove('open');
        expandedPassIdx=null;
    }

    // ══════════════════════════════════════════════
    // COLD PITCH MECHANIC
    // 30% chance: +4 move, mark isSellout (same pill/dice punishment as Remedy)
    // 70% chance: -3 move
    // One use per game per player. Cannot be used if pos > GATEKEEPER_SPACE.
    // ══════════════════════════════════════════════
    function triggerColdPitch() {
        collapsePass(); /* close expanded pass */
        const p=players[turnIdx];
        playSfx('remedyclip.wav');
        showStatusPopup(
            "Long-Shot: Cold Pitch",
            "Pitch your music to major labels for a 30% chance at +4 NOW (one use per game). If they accept, you move +4 NOW, but the label takes -1 from all future rolls. If they decline, Rewind -3 NOW. Cannot be used after Gatekeeper.",
            "Pitch Now!",
            async () => {
                p.usedColdPitch=true;
                document.getElementById('overlay-event').style.display='none';
                const accepted=Math.random()<0.30;
                await new Promise(r=>setTimeout(r,400));
                if(accepted){
                    /* SIGNED */
                    p.isSellout=true; /* reuses sellout mechanic: 6→-2 */
                    p.accolades.push('📝');
                    showStatusPopup(
                        "✅ SIGNED!",
                        "Here's your boost! The label owns you now.",
                        "LET'S GO",
                        async()=>{
                            document.getElementById('overlay-event').style.display='none';
                            spawnEmoji('📝');
                            renderPasses();
                            await new Promise(r=>setTimeout(r,400));
                            movePlayer(4);
                        },
                        "","()=>{}"
                    );
                    document.getElementById('event-btn-secondary').style.display='none';
                } else {
                    /* DECLINED */
                    showStatusPopup(
                        "❌ DECLINED!",
                        "Your music sucks. Get back in the studio!",
                        "BACK TO THE GRIND",
                        async()=>{
                            document.getElementById('overlay-event').style.display='none';
                            spawnEmoji('💀');
                            await new Promise(r=>setTimeout(r,400));
                            movePlayer(-3);
                        },
                        "","()=>{}"
                    );
                    document.getElementById('event-btn-secondary').style.display='none';
                }
                renderPasses();
            },
            "Stay Indie",
            ()=>{ document.getElementById('overlay-event').style.display='none'; }
        );
    }

    // ══════════════════════════════════════════════
    // UI UPDATE
    // ══════════════════════════════════════════════
    function handleSpaceClick(i) {
        const r=rules[i]||{title:boardLayout[i],desc:"The road continues."};
        showSidebar(r.title,(r.emoji?r.emoji+" ":"")+r.desc,getSpaceColor(i));
    }
    function updateUI() {
        const p=players[turnIdx];
        document.getElementById('status-text').innerHTML=`<span style="color:${p.avatar.color}">${p.name}'S TURN</span>`;
        document.getElementById('ui-layer').style.setProperty('--current-player-color',p.avatar.color);
        renderPasses();
        updatePositions();
    }
    function updatePositions() {
        const countMap={};
        players.forEach((p,i)=>{
            const target=document.getElementById('s'+p.pos);
            const el=document.getElementById('p'+i);
            if(!countMap[p.pos]) countMap[p.pos]=0;
            el.style.left=(target.offsetLeft+(countMap[p.pos]*12))+"px";
            el.style.top =(target.offsetTop +(countMap[p.pos]*12))+"px";
            countMap[p.pos]++;
            el.style.zIndex=(i===turnIdx?150:100);
            if(i===turnIdx){el.classList.add('active-turn');el.style.setProperty('--p-color',p.avatar.color);}
            else el.classList.remove('active-turn');
        });
    }

    // ══════════════════════════════════════════════
    // DICE TELEPORT
    // ══════════════════════════════════════════════
    async function diceGoToCinematic() {
        const d=document.getElementById('dice-box');
        d.classList.add('dice-rise-out');
        await new Promise(r=>setTimeout(r,350));
        d.classList.remove('dice-rise-out');
        d.classList.add('dice-cinematic','dice-fall-in');
        await new Promise(r=>setTimeout(r,400));
        d.classList.remove('dice-fall-in');
    }
    async function diceReturnToBar() {
        const d=document.getElementById('dice-box');
        d.classList.add('dice-return-out');
        await new Promise(r=>setTimeout(r,350));
        d.classList.remove('dice-cinematic','dice-return-out','dice-red','dice-gold');
        d.classList.add('dice-reappear');
        await new Promise(r=>setTimeout(r,350));
        d.classList.remove('dice-reappear');
        d.style.animation='diceGlow 3s ease-in-out infinite';

    // ══════════════════════════════════════════════
    // ROLL FLOW
    // ══════════════════════════════════════════════
    async function doRoll() {
        if(isMoving||isSwapping||isMayaPartner) return;
        document.getElementById('rule-sidebar').classList.remove('active');
        const p=players[turnIdx];

        /* Grammy nomination popup before anything else */
        if(p.grammyNominator){
            const nom=p.grammyNominator; p.grammyNominator=null;
            showStatusPopup("🏆 NOMINATED!",`${nom} nominated you for a Grammy!`,
                "I HUMBLY ACCEPT",()=>doRoll(),"",()=>{});
            document.getElementById('event-btn-secondary').style.display='none';
            return;
        }
        if(p.skipCount>0){
            p.skipCount--;
            showStatusPopup("🛠 BUMMER","Van is still in the shop. Turn skipped.","BUMMER",()=>endTurn(),"DARN",()=>endTurn());
            return;
        }
        if(p.nightDriveActive){
            showStatusPopup("🌙 NIGHTDRIVE CHECK","Did you keep your eyes closed?",
                "YES",()=>{p.nightDriveActive=false;checkNextHonor(p);},
                "NO", ()=>{p.nightDriveActive=false;movePlayer(-1);});
            return;
        }
        checkNextHonor(p);
    }
    function checkNextHonor(p) {
        if(p.ghostCounter>0){
            showStatusPopup("👻 GHOST CHECK","Silence required. Did you stay quiet?",
                "YES",()=>{p.ghostCounter=0;checkNextHonor(p);},
                "NO", ()=>{p.ghostCounter=0;movePlayer(-1);});
            return;
        }
        if(p.smileActive){
            showStatusPopup("💀 THE ENDLESS SMILE","Did you keep smiling?",
                "HELD IT", ()=>{p.smileActive=false;checkNextHonor(p);},
                "BROKE IT",()=>{p.smileActive=false;endTurn();});
            return;
        }
        performActualRoll();
    }

    async function performActualRoll() {
        const p=players[turnIdx];
        isMoving=true;
        document.getElementById('roll-btn').disabled=true;
        const dice=document.getElementById('dice-box');
        dice.innerText="?";

        await diceGoToCinematic();

        let roll;
        for(let j=0;j<12;j++){dice.innerText=Math.floor(Math.random()*6)+1;await new Promise(r=>setTimeout(r,45));}
        roll=Math.floor(Math.random()*6)+1; dice.innerText=roll;

        /* +0.5s pause on result before contract logic */
        await new Promise(r=>setTimeout(r,500));

        /* Investor payoff */
        if(p.isInvestor&&(roll===1||roll===2)){
            dice.classList.add('dice-gold'); spawnEmoji('👕');
            showSidebar("INVESTMENT PAYOFF","Merch is moving! Roll doubled.","#ffffff");
            await new Promise(r=>setTimeout(r,600));
            p.shirtsSold++; p.accolades.push('👕'); roll*=2; dice.innerText=roll;
            await new Promise(r=>setTimeout(r,1400));
            updateUI();
        }

        /* Sellout/pitched penalty — CONTRACT DEBT with 2s remedy audio + fade */
        if(p.isSellout&&roll===6){
            dice.classList.add('dice-red'); spawnEmoji('💊');
            /* CONTRACT DEBT: header + subtext in sidebar */
            showSidebar(
                "CONTRACT DEBT",
                "Label takes a cut! 6 becomes -2. Should have stayed indie...",
                "var(--fear-glow)"
            );
            playRemedyPunishment(); /* 2s play + 2s fade */
            await new Promise(r=>setTimeout(r,600));
            p.pillsTaken++; p.accolades.push('💊'); roll=-2; dice.innerText=roll;
            await new Promise(r=>setTimeout(r,1400));
            updateUI();
        }

        p.totalRollValue+=Math.abs(roll);
        await diceReturnToBar();
        movePlayer(roll);
    }

    function spawnEmoji(char) {
        const e=document.createElement('div'); e.className='floating-emoji'; e.innerText=char;
        e.style.left="50%"; e.style.top="50%"; document.body.appendChild(e);
        setTimeout(()=>e.remove(),1200);
    }

    // ══════════════════════════════════════════════
    // MOVEMENT
    // ══════════════════════════════════════════════
    async function movePlayer(n) {
        const p=players[turnIdx]; const dir=n>0?1:-1;
        let minPos=Math.min(...players.map(pl=>pl.pos)); let isLast=(p.pos===minPos);
        let landedViaAuto=false; /* track if auto-space moved them to a mystery space */

        for(let i=0;i<Math.abs(n);i++){
            if(p.pos+dir>=0&&p.pos+dir<boardLayout.length){
                p.pos+=dir; updatePositions();
                if(dir>0&&rules[p.pos]?.isGate&&!isLast&&i<Math.abs(n)-1){i=999;}
                await new Promise(r=>setTimeout(r,300));
                if(p.pos>=59){showWinScreen();return;}
            }
        }

        flashSpaceLanding(p.pos);
        if(TRACKLIST_INDICES.includes(p.pos)) triggerVinylSpin(p.pos);

        /* Mystery space landing — show bucket item in sidebar after 0.75s */
        if(boardLayout[p.pos]==="blank"){
            await new Promise(r=>setTimeout(r,750));
            const item=getRandomBucketItem();
            const bucketEl=document.getElementById('side-bucket');
            renderBucketItem(item,bucketEl);
            showSidebar('Mystery Lore Drop','','var(--mystery-glow)',`Space ${p.pos}`);
            /* If a discount code was in the bucket, note that player is supporter (handled inside renderBucketItem click) */
            await new Promise(r=>setTimeout(r,500));
            endTurn();
            return;
        }

        /* 0.75s delay before popup */
        await new Promise(r=>setTimeout(r,750));
        checkSpace();
    }

    // ══════════════════════════════════════════════
    // AUTO-SPACE WITH SIDEBAR HOLD
    // When an isAuto space moves a player that lands on mystery or special,
    // the original space's sidebar stays 3s min before bucket fires.
    // This is handled by: isAuto shows sidebar, then calls movePlayer after 3s
    // (up from the old 1200ms) ONLY when destination is mystery/special.
    // We pass a flag via the rule handler below.
    // ══════════════════════════════════════════════

    // ══════════════════════════════════════════════
    // SPACE LOGIC
    // ══════════════════════════════════════════════
    function checkSpace() {
        const p=players[turnIdx],r=rules[p.pos];
        if(!r){endTurn();return;}
        const spaceCol=getSpaceColor(p.pos);
        const popupEl=document.getElementById('main-popup');
        popupEl.style.borderColor=spaceCol; popupEl.style.boxShadow=`0 0 30px ${spaceCol}`;
        if(r.sound) playSfx(r.sound);
        if(r.choice==='remedy'&&p.isSellout){showSidebar("CONTRACT ACTIVE","Soul already sold.",spaceCol);endTurn();return;}
        if(r.choice==='merch' &&p.isInvestor){showSidebar("ALREADY INVESTED","Inventory full.",spaceCol);endTurn();return;}

        /* Auto-spaces: show sidebar and hold 3s minimum before moving,
           in case the destination is a mystery space */
        if(r.isAuto){
            showSidebar(r.title,(r.emoji||"")+" "+(r.desc||"Moving..."),spaceCol);
            setTimeout(()=>movePlayer(r.shift),3000); /* 3s hold so player can read why they moved */
            return;
        }

        const modal  =document.getElementById('overlay-event');
        const title  =document.getElementById('event-title');
        const desc   =document.getElementById('event-desc');
        const pBtn   =document.getElementById('event-btn-primary');
        const sBtn   =document.getElementById('event-btn-secondary');
        const timerUI=document.getElementById('timer-ui');
        const coin   =document.getElementById('coin');

        coin.style.display='none'; pBtn.style.display='inline-block'; pBtn.disabled=false;
        title.innerText=(r.emoji||"")+" "+r.title;
        desc.innerText=r.desc||""; pBtn.innerText="CONTINUE"; sBtn.style.display='none'; timerUI.style.display='none';
        modal.style.display='flex'; resetKbFocus();

        if(r.skipTurns){
            p.skipCount=r.skipTurns; pBtn.onclick=()=>{modal.style.display='none';endTurn();};
        } else if(r.isFigment){
            pBtn.innerText="STEP OUTSIDE (1:00)"; sBtn.innerText="STAY INDOORS (-1)"; sBtn.style.display='inline-block';
            pBtn.onclick=()=>{
                pBtn.disabled=true; sBtn.style.display='none'; timerUI.style.display='block';
                let t=60; timerUI.innerText=t;
                const clock=setInterval(()=>{t--;timerUI.innerText=t;if(t<=0){clearInterval(clock);pBtn.disabled=false;pBtn.innerText="I'M BACK (+2)";pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(2);};}},1000);
            };
            sBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(-1);};
        } else if(r.isFearjoy){
            pBtn.innerText="FLIP COIN";
            pBtn.onclick=()=>{
                pBtn.style.display='none'; coin.innerText="?"; coin.style.display='flex'; coin.classList.add('flipping');
                setTimeout(()=>{const win=Math.random()>0.5;coin.innerText=win?"JOY":"FEAR";coin.classList.remove('flipping');
                    setTimeout(async()=>{modal.style.display='none';coin.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(win?1:-1);},1200);},1200);
            };
        } else if(r.isDmitri){
            pBtn.innerText="BREATHE"; sBtn.innerText="SKIP (-2)"; sBtn.style.display='inline-block';
            pBtn.onclick=()=>{
                pBtn.disabled=true; sBtn.style.display='none'; timerUI.style.display='block';
                let t=15; timerUI.innerText=t;
                const clock=setInterval(()=>{t--;timerUI.innerText=t;if(t<=0){clearInterval(clock);pBtn.disabled=false;pBtn.innerText="BREATHING COMPLETED";pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));p.pos=23;updatePositions();endTurn();};}},1000);
            };
            sBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(-2);};
        } else if(r.choice){
            const fadeOutVideo=(vid)=>{if(!vid)return;let vol=1;const fade=setInterval(()=>{if(vol>0.1){vol-=0.1;vid.volume=vol;}else{vid.pause();clearInterval(fade);}},200);};
            if(r.choice==='remedy'){
                desc.innerHTML=`<div id="video-wrapper" style="position:relative;width:100%;margin-bottom:15px;border-radius:8px;overflow:hidden;background:#000;border:1px solid #444;"><div id="close-video" style="position:absolute;top:5px;right:12px;color:white;cursor:pointer;font-size:24px;font-weight:bold;z-index:10;text-shadow:0 0 5px #000;">×</div><video id="remedy-video" style="width:100%;display:block;" autoplay playsinline><source src="trevortrim.mp4" type="video/mp4"></video></div>`+r.desc;
                setTimeout(()=>{
                    const cv=document.getElementById('close-video');const vid=document.getElementById('remedy-video');
                    if(cv)cv.onclick=(e)=>{e.stopPropagation();fadeOutVideo(vid);document.getElementById('video-wrapper').style.display='none';};
                    if(vid)vid.play().catch(()=>{});
                },50);
            }
            pBtn.innerText=r.choice==='remedy'?"SIGN CONTRACT (+6)":"INVEST IN MERCH (-4)";
            sBtn.style.display='inline-block'; sBtn.innerText="PASS";
            pBtn.onclick=async()=>{fadeOutVideo(document.getElementById('remedy-video'));modal.style.display='none';await new Promise(res=>setTimeout(res,800));if(r.choice==='remedy'){p.isSellout=true;movePlayer(6);}else{playSfx("coinclip.wav");p.isInvestor=true;movePlayer(-4);}};
            sBtn.onclick=()=>{fadeOutVideo(document.getElementById('remedy-video'));modal.style.display='none';endTurn();};
        } else if(r.isGrammy){
            let maxPos=Math.max(...players.map(pl=>pl.pos));
            let leaders=players.filter(pl=>pl.pos===maxPos&&pl!==p);
            p.grammys++; p.accolades.push('🏆'); updateUI();
            if(p.pos===maxPos){pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(1);};}
            else if(leaders.length>1){
                isSwapping=true; pBtn.innerText="READY"; pBtn.onclick=()=>{modal.style.display='none';};
                showSidebar("🏆 TIED LEADERS","Multiple artists tied. Click one to swap.","var(--gold)");
                leaders.forEach(l=>{const idx=players.indexOf(l);document.getElementById('p'+idx).classList.add('swap-target');});
            } else {
                pBtn.onclick=()=>{modal.style.display='none';let lead=leaders[0];let lp=lead.pos;lead.pos=p.pos;p.pos=lp;checkPassiveGrammys(p.name);updatePositions();endTurn();};
            }
        } else if(r.isTellus||r.isMaya){
            if(players.length>1){
                isSwapping=r.isTellus; isMayaPartner=r.isMaya;
                pBtn.innerText="READY";
                pBtn.onclick=()=>{
                    modal.style.display='none';
                    players.forEach((_,i)=>{if(i!==turnIdx){const piece=document.getElementById('p'+i);if(piece){piece.style.pointerEvents='auto';piece.classList.add('swap-target');}}});
                };
                desc.innerHTML=r.isMaya
                    ?"MAYA'S EYE CONTACT CHALLENGE.<br><br>Click another Artist's head. Hold eye contact for 10s for <b>Both +2</b>. Fail for <b>Both -1</b>."
                    :"TELLUS: THE GREAT SWAP.<br><br>Click another Artist's head to swap places on the board.";
            } else {
                desc.innerText="SOLO TOUR: No other artists to interact with.";
                pBtn.innerText="CONTINUE"; pBtn.onclick=()=>{modal.style.display='none';endTurn();};
            }
        } else if(r.isOpeningAct){
            let maxPos=Math.max(...players.map(pl=>pl.pos)); let isLead=(p.pos===maxPos);
            pBtn.innerText=" "; pBtn.disabled=true;
            if(isLead){
                showSidebar("OPENING ACT","You are the leader! Go back 2 spaces.",spaceCol);
                setTimeout(()=>{pBtn.innerText="ACCEPT FATE (-2)";pBtn.disabled=false;pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(-2);};},2500);
            } else {
                showSidebar("OPENING ACT","Slide 2 spaces behind the leader.",spaceCol);
                setTimeout(()=>{pBtn.innerText="MOVE UP";pBtn.disabled=false;pBtn.onclick=async()=>{modal.style.display='none';let targetPos=maxPos-2;if(targetPos<0)targetPos=0;let diff=targetPos-p.pos;await new Promise(res=>setTimeout(res,800));if(diff!==0)movePlayer(diff);else endTurn();};},2500);
            }
        } else if(r.isGhost)      {p.ghostCounter=1;pBtn.innerText="I WILL BE SILENT";pBtn.onclick=()=>{modal.style.display='none';endTurn();};}
        else if(r.isSmile)         {p.smileActive=true;pBtn.innerText="I WILL SMILE";pBtn.onclick=()=>{modal.style.display='none';endTurn();};}
        else if(r.isNightDrive)    {p.nightDriveActive=true;pBtn.innerText="EYES CLOSED";pBtn.onclick=()=>{modal.style.display='none';endTurn();};}
        else if(r.isGate){
            /* Show gatekeeper hint on pass card — mark for notification */
            const p=players[turnIdx];
            if(!p.isSellout&&!p.usedColdPitch){p.hasSeenGatekeeperHint=false;renderPasses();}
            pBtn.innerText="PAY YOUR DUES"; pBtn.onclick=()=>{modal.style.display='none';endTurn();};
        }
        else if(r.isItHappens)     {pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));isMoving=false;performActualRoll();};}
        else if(r.isLostRecording) {
            pBtn.innerText="ROLL TO REWIND";
            pBtn.onclick=async()=>{
                pBtn.style.display='none'; coin.style.display='flex'; coin.innerText="?"; coin.classList.add('flipping'); let rl;
                for(let j=0;j<12;j++){coin.innerText=Math.floor(Math.random()*6)+1;await new Promise(r=>setTimeout(r,45));}
                rl=Math.floor(Math.random()*6)+1; coin.innerText=rl; coin.classList.remove('flipping');
                await new Promise(r=>setTimeout(r,1500));
                modal.style.display='none'; coin.style.display='none';
                await new Promise(res=>setTimeout(res,800)); movePlayer(-rl);
            };
        } else {pBtn.onclick=()=>{modal.style.display='none';endTurn();};}
    }

    // ══════════════════════════════════════════════
    // MAYA TIMER
    // ══════════════════════════════════════════════
    function startMayaTimer(partnerIdx) {
        const overlay=document.getElementById('overlay-event');
        const desc=document.getElementById('event-desc');
        const pBtn=document.getElementById('event-btn-primary');
        const sBtn=document.getElementById('event-btn-secondary');
        const partner=players[partnerIdx];
        overlay.style.display='flex'; pBtn.style.display='none'; sBtn.style.display='none';
        let timeLeft=10;
        const update=()=>{desc.innerHTML=`<div style="font-size:5rem;color:var(--blue-glow);text-shadow:0 0 20px var(--blue-glow);margin-bottom:20px;animation:winPulse 1s infinite alternate;">${timeLeft}</div>EYE CONTACT WITH ${partner.name}...<br><span style="color:#888;font-size:0.8rem;letter-spacing:2px;">DON'T LOOK AWAY</span>`;};
        update();
        const clock=setInterval(()=>{
            timeLeft--; update();
            if(timeLeft<=0){
                clearInterval(clock);
                desc.innerHTML=`TIME'S UP.<br><br>Did you both hold eye contact?`;
                pBtn.style.display='inline-block'; pBtn.innerText="YES (BOTH +2)";
                pBtn.onclick=()=>{movePlayer(2);players[partnerIdx].pos=Math.min(59,players[partnerIdx].pos+2);updatePositions();checkPassiveGrammys(players[turnIdx].name);overlay.style.display='none';endTurn();};
                sBtn.style.display='inline-block'; sBtn.innerText="NO (BOTH -1)";
                sBtn.onclick=()=>{movePlayer(-1);players[partnerIdx].pos=Math.max(0,players[partnerIdx].pos-1);updatePositions();overlay.style.display='none';endTurn();};
                resetKbFocus();
            }
        },1000);
    }

    // ══════════════════════════════════════════════
    // PLAYER CLICK (swap / maya)
    // ══════════════════════════════════════════════
    function handlePlayerClick(idx) {
        if(idx===turnIdx) return;
        if(isSwapping){
            isSwapping=false;
            document.querySelectorAll('.player').forEach(el=>{el.classList.remove('swap-target');el.style.pointerEvents='none';});
            const p=players[turnIdx],target=players[idx];
            const oldPos=p.pos; p.pos=target.pos; target.pos=oldPos;
            checkPassiveGrammys(p.name);
            updatePositions(); endTurn();
        } else if(isMayaPartner){
            isMayaPartner=false;
            document.querySelectorAll('.player').forEach(el=>{el.classList.remove('swap-target');el.style.pointerEvents='none';});
            startMayaTimer(idx);
        }
    }

                <a href="https://freejoy.club" target="_blank" class="win-link-btn" style="--btn-color:#ffffff;color:#ffffff;">HOME</a>
                <div style="display:flex;gap:10px;width:min(400px,90%);margin-top:5px;">
                    <button id="hard-reset-win" class="win-link-btn" style="--btn-color:var(--fear-glow);color:var(--fear-glow);flex:1;cursor:pointer;">NEW BAND</button>
                    <button id="soft-reset-win" class="win-link-btn" style="--btn-color:#ffa500;color:#ffa500;flex:1;cursor:pointer;">ANOTHER TOUR</button>
                </div>
            </div>
            <style>
                .win-link-btn{text-decoration:none;font-family:'Courier New',monospace;font-weight:900;font-size:clamp(0.75rem,1.8vw,0.9rem);padding:10px 20px;border:1px solid var(--btn-color);border-radius:12px;width:min(320px,80%);background:transparent;text-align:center;transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);letter-spacing:1.5px;text-transform:uppercase;display:block;}
                .win-cta{border-width:2px;animation:rollPulse 2s ease-in-out infinite;}
                .win-link-btn:hover{background:var(--btn-color)!important;color:black!important;box-shadow:0 0 20px var(--btn-color);transform:scale(1.05) translateY(-2px);}
            </style>`;
        document.getElementById('event-desc').innerHTML+=linkStack;
        document.getElementById('event-btn-primary').style.display='none';
        document.getElementById('event-btn-secondary').style.display='none';
        document.getElementById('hard-reset-win').onclick=()=>location.reload();
        document.getElementById('soft-reset-win').onclick=()=>{document.getElementById('overlay-event').style.display='none';confirmSoftRestart();};
        document.getElementById('overlay-event').style.display='flex';
    }

    // ══════════════════════════════════════════════
    // END TURN
    // ══════════════════════════════════════════════
    function endTurn() {
        turnIdx=(turnIdx+1)%players.length;
        isMoving=false;
        document.getElementById('roll-btn').disabled=false;
        updateUI();
    }
    </script>
</body>
</html>
