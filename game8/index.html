<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fearjoy - v11.7</title>
    <style>
        @font-face {
            font-family: 'KCStrikerSans';
            src: url('KCStrikerSans.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --wood-dark: #8b7355; 
            --wood-mid: #b39b7d; 
            --wood-light: #d2b48c;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --gold: #ffd700; --ui-bg: rgba(0,0,0,0.98); --vinyl: #111111;
            --blue-glow: #00ccff; --pink-glow: #ff00ff;

            /* Responsive space sizing */
            --space-size: clamp(28px, 7.5vw, 85px);
            --space-font: clamp(0.35rem, 1vw, 0.75rem);
            --space-emoji: clamp(0.6rem, 1.5vw, 1.4rem);
            --board-gap: clamp(4px, 1.2vw, 18px);
            --board-pad: clamp(8px, 2vw, 50px);
        }

        @keyframes woodFade { 0%, 100% { background-color: var(--wood-dark); } 50% { background-color: var(--wood-mid); } }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-150px) scale(1.5); opacity: 0; } }
        @keyframes redSparkle { 0% { box-shadow: 0 0 10px var(--fear-glow); } 100% { box-shadow: 0 0 50px var(--fear-glow); background: #300; color: white; } }
        @keyframes goldSparkle { 0% { box-shadow: 0 0 10px var(--gold); } 100% { box-shadow: 0 0 50px var(--gold); background: #330; color: white; } }
        @keyframes flipping { 0% { transform: rotateY(0); } 100% { transform: rotateY(1800deg); } }
        @keyframes winPulse { 0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--p-color)); } 50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--p-color)); } 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--p-color)); } }
        @keyframes introGlow { from { text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold); } to { text-shadow: 0 0 20px var(--gold), 0 0 40px #fffad1; } }
        @keyframes pieceHover { 0% { transform: translate(0, 0); } 33% { transform: translate(3px, -3px); } 66% { transform: translate(-2px, 1px); } 100% { transform: translate(0, 0); } }
        @keyframes turnPulse { 0% { filter: drop-shadow(0 0 5px var(--p-color)); transform: translate(0,0) scale(1); } 50% { filter: drop-shadow(0 0 20px var(--p-color)); transform: translate(0,-4px) scale(1.15); } 100% { filter: drop-shadow(0 0 5px var(--p-color)); transform: translate(0,0) scale(1); } }
        @keyframes borderPulse { 0% { box-shadow: 0 0 5px var(--p-color) inset, 0 0 5px var(--p-color); } 50% { box-shadow: 0 0 15px var(--p-color) inset, 0 0 15px var(--p-color); } 100% { box-shadow: 0 0 5px var(--p-color) inset, 0 0 5px var(--p-color); } }
        @keyframes navFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* ── PAGE SHELL ── */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        body {
            animation: woodFade 20s ease-in-out infinite;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px);
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── TOP UI BAR ── */
        #ui-layer {
            display: flex;
            align-items: center;
            background: var(--ui-bg);
            padding: 0 clamp(10px, 3vw, 45px);
            height: clamp(70px, 12vh, 120px);
            min-height: clamp(70px, 12vh, 120px);
            border-radius: 0 0 12px 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-top: none;
            width: 100%;
            box-sizing: border-box;
            justify-content: space-between;
            z-index: 10;
            position: relative;
            flex-shrink: 0;
        }

        #status-text {
            flex: 1;
            font-size: clamp(0.9rem, 3vw, 2.2rem);
            font-family: 'KCStrikerSans', 'Courier New', monospace;
            text-transform: uppercase;
            line-height: 1;
            min-width: 0;
        }

        #roll-btn-center {
            flex-shrink: 0;
            padding: 0 clamp(5px, 1.5vw, 20px);
        }

        #roll-btn {
            background: var(--joy-glow);
            color: black;
            width: clamp(100px, 20vw, 220px);
            font-size: clamp(1rem, 2.5vw, 1.6rem);
            font-family: 'KCStrikerSans', 'Courier New', monospace;
            font-weight: bold;
            padding: clamp(8px, 1.5vh, 15px);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #dice-slot-right {
            width: clamp(50px, 8vw, 90px);
            height: clamp(50px, 8vw, 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #dice-box {
            width: clamp(42px, 7vw, 75px);
            height: clamp(42px, 7vw, 75px);
            background: white;
            color: black;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 4vw, 3.5rem);
            font-weight: bold;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* ── BOARD SCROLL WRAPPER ── */
        #board-scroll {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: clamp(4px, 1vw, 16px);
            box-sizing: border-box;
            min-height: 0;
        }

        /* ── BOARD ── */
        #board-container {
            display: grid;
            grid-template-columns: repeat(10, var(--space-size));
            grid-template-rows: repeat(6, var(--space-size));
            gap: var(--board-gap);
            padding: var(--board-pad);
            position: relative;
            z-index: 5;
            flex-shrink: 0;
        }

        /* ── BOTTOM BAR (mobile stats + nav) ── */
        #bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--ui-bg);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px 12px 0 0;
            padding: 0 clamp(8px, 2vw, 20px);
            height: clamp(60px, 10vh, 90px);
            min-height: clamp(60px, 10vh, 90px);
            z-index: 1000;
            flex-shrink: 0;
            gap: 10px;
            overflow: hidden;
        }

        /* Tour stats inside bottom bar */
        #merch-tracker {
            display: flex;
            align-items: center;
            gap: clamp(6px, 2vw, 16px);
            overflow-x: auto;
            flex: 1;
            scrollbar-width: none;
        }
        #merch-tracker::-webkit-scrollbar { display: none; }

        #merch-tracker h4 {
            margin: 0;
            font-size: clamp(0.45rem, 1.2vw, 0.6rem);
            letter-spacing: 2px;
            opacity: 0.6;
            color: var(--joy-glow);
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        #tracker-list {
            display: flex;
            flex-direction: row;
            gap: clamp(6px, 2vw, 15px);
            align-items: center;
        }

        .roster-entry {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            pointer-events: auto;
            flex-shrink: 0;
        }
        .roster-entry div {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            line-height: 1.2;
            font-size: clamp(0.7rem, 1.5vw, 1.1rem);
        }

        /* Nav cluster inside bottom bar */
        #nav-cluster {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: clamp(6px, 1.5vw, 12px);
            flex-shrink: 0;
        }

        .nav-btn {
            padding: 0;
            width: clamp(36px, 5vw, 50px);
            height: clamp(36px, 5vw, 50px);
            border-radius: 50%;
            background: #111;
            color: white;
            font-weight: 900;
            font-size: 0;
            border: 1px solid #444;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: navFloat 3.5s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        /* On desktop/landscape: expand on hover */
        @media (hover: hover) {
            .nav-btn:hover {
                width: 200px;
                border-radius: 12px;
                font-size: 0.9rem;
                padding: 0 16px;
                justify-content: flex-start;
                gap: 12px;
            }
        }

        .nav-btn::before {
            font-size: clamp(1rem, 2vw, 1.5rem) !important;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: visible;
        }

        .btn-audio::before { content: "🔇"; }
        .btn-restart::before { content: "🔄"; }
        .btn-home::before { content: "🏠"; }
        .btn-store::before { content: "👕"; }
        .btn-album::before { content: "▶️"; }

        .btn-audio:hover { box-shadow: 0 0 20px var(--gold); border-color: var(--gold); color: var(--gold); }
        .btn-restart:hover { box-shadow: 0 0 20px #ff4500; border-color: #ff4500; color: #ff4500; }
        .btn-home:hover { box-shadow: 0 0 20px var(--tape-white); border-color: var(--tape-white); }
        .btn-store:hover { box-shadow: 0 0 20px var(--pink-glow); border-color: var(--pink-glow); color: var(--pink-glow); }
        .btn-album:hover { box-shadow: 0 0 20px var(--joy-glow); border-color: var(--joy-glow); color: var(--joy-glow); }

        /* ── SPACE STYLES ── */
        #arrow-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .space {
            width: var(--space-size);
            height: var(--space-size);
            border-radius: 50%;
            border: 1px solid var(--tape-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: var(--space-font);
            line-height: 1.1;
            background: rgba(255,255,255,0.05);
            text-align: center;
            position: relative;
            transition: 0.3s;
            cursor: help;
            box-sizing: border-box;
        }
        .sp-emoji { font-size: var(--space-emoji); margin-bottom: 2px; }
        .sp-text { padding: 0 2px; }

        .dir-arrow {
            position: absolute;
            font-size: clamp(0.7rem, 1.5vw, 1.65rem);
            color: rgba(210, 180, 140, 0.8);
            font-weight: 900;
            pointer-events: none;
            z-index: 1;
        }
        .arrow-right { right: clamp(-10px, -1.5vw, -18px); top: 50%; transform: translateY(-50%); }
        .arrow-left  { left:  clamp(-10px, -1.5vw, -18px); top: 50%; transform: translateY(-50%) rotate(180deg); }
        .arrow-up    { top: clamp(-12px, -2vw, -22px); left: 50%; transform: translateX(-50%) rotate(-90deg); }

        .blank { opacity: 0.7; transform: scale(0.8); border-style: dashed !important; background: none !important; cursor: default; }
        .blank-num { font-size: 0.95rem; opacity: 0.5; font-weight: normal; }
        .tracklist-space { background: var(--vinyl) !important; border: 3px double #666 !important; box-shadow: inset 0 0 15px #000; transform: scale(1.15); z-index: 5; font-size: var(--space-font) !important; color: white !important; }
        .win-track { background: var(--vinyl) !important; border: 4px solid var(--blue-glow) !important; box-shadow: 0 0 30px var(--blue-glow); transform: scale(1.4) !important; z-index: 10 !important; }
        .joy-space { border-color: var(--joy-glow) !important; color: var(--joy-glow) !important; }
        .fear-space { border-color: var(--fear-glow) !important; color: var(--fear-glow) !important; }
        .hybrid { border-style: dotted; border-width: 3px; border-color: white; }

        /* ── PLAYER PIECES ── */
        .player {
            width: var(--space-size);
            height: var(--space-size);
            position: absolute;
            z-index: 100;
            transition: all 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            pointer-events: none;
            animation: pieceHover 4s infinite ease-in-out;
        }
        .active-turn { animation: turnPulse 1.5s infinite ease-in-out; }

        /* ── POPUPS & OVERLAYS ── */
        .dice-cinematic {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate3d(-50%, -50%, 0) scale(2.2) !important;
            z-index: 5000;
            opacity: 0.90;
            box-shadow: 0 0 50px rgba(255,255,255,0.4);
        }
        .floating-emoji { position: absolute; font-size: 4rem; animation: floatUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; pointer-events: none; z-index: 6000; }
        .dice-red { animation: redSparkle 0.5s infinite alternate; }
        .dice-gold { animation: goldSparkle 0.5s infinite alternate; }
        .flipping { animation: flipping 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95); transform-style: preserve-3d; }

        .player-entry { margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 0.8rem; transition: 0.3s; border-radius: 8px; padding: 10px; cursor: default; }
        .avatar-roster { width: 45px; height: 45px; border-radius: 50%; background: #111; border: 2px solid #555; }
        .roster-active { animation: borderPulse 2s infinite; border: 1px solid var(--p-color); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 16px; box-sizing: border-box; }
        .popup {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(8px);
            padding: clamp(20px, 4vw, 45px);
            border-radius: 30px;
            border: 2px solid #444;
            width: min(680px, 95vw);
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            transition: 0.4s;
        }
        .popup h1 { font-family: 'KCStrikerSans', 'Courier New', monospace; }

        #rule-sidebar { position: fixed; right: -350px; top: clamp(80px, 14vh, 135px); width: 280px; background: var(--ui-bg); padding: 30px; border-radius: 20px; border: 2px solid var(--joy-glow); transition: 0.6s; z-index: 100; box-shadow: -10px 0 40px rgba(0,0,0,0.6); cursor: pointer; }
        #rule-sidebar.active { right: 25px; }

        .tag { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-left: 5px; letter-spacing: 0.5px; }
        .tag-investor { background: var(--gold); color: black; }
        .tag-sellout { background: var(--fear-glow); color: white; }

        .intro-header { font-size: clamp(2rem, 6vw, 3.5rem); color: var(--gold); animation: introGlow 2s ease-in-out infinite alternate; margin-bottom: 20px; font-family: 'KCStrikerSans', 'Courier New', monospace; letter-spacing: 4px; }

        /* ── SETUP SCREEN ── */
        .setup-btn-large { padding: 20px 45px; font-size: 2.5rem; font-weight: bold; background: transparent; color: white; border: 2px solid white; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; }
        .setup-btn-large:hover { background: white; color: black; transform: scale(1.1); }
        .setup-avatar { width: 90px; height: 90px; opacity: 0.3; cursor: pointer; transition: all 0.3s ease; filter: grayscale(100%); border: 3px solid transparent; border-radius: 10px; }
        .setup-avatar:hover { opacity: 0.7; }
        .setup-avatar.selected { opacity: 1; filter: grayscale(0%); transform: scale(1.1); }
        .confirm-btn { padding: 20px 40px; width: 90%; background: white; color: black; font-size: 1.3rem; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s ease; }
        .confirm-btn:hover { background: #00ff00; transform: translateY(-2px); }
        .roster-item { text-align: center; font-size: 0.7rem; color: white; }
        .roster-img { width: 45px; height: 45px; border-radius: 50%; display: block; margin: 0 auto 5px; }

        /* ── LANDSCAPE: restore desktop feel ── */
        @media (orientation: landscape) and (min-width: 800px) {
            body { flex-direction: column; }

            #bottom-bar {
                height: clamp(60px, 9vh, 90px);
            }

            /* Sidebar rule panel stays usable */
            #rule-sidebar { top: clamp(80px, 13vh, 135px); }
        }

        /* ── PORTRAIT PHONE: tighten everything ── */
        @media (orientation: portrait) and (max-width: 600px) {
            :root {
                --space-size: clamp(24px, 8.5vw, 52px);
                --space-font: clamp(0.28rem, 1.8vw, 0.55rem);
                --space-emoji: clamp(0.5rem, 2vw, 0.9rem);
                --board-gap: clamp(3px, 1.5vw, 8px);
                --board-pad: clamp(4px, 1.5vw, 12px);
            }

            #ui-layer {
                height: clamp(56px, 11vh, 80px);
                min-height: clamp(56px, 11vh, 80px);
            }

            #rule-sidebar { width: min(260px, 80vw); top: clamp(60px, 13vh, 100px); }
            #rule-sidebar.active { right: 8px; }
        }
    </style>
</head>
<body>

    <!-- TOP: UI BAR -->
    <div id="ui-layer">
        <div id="status-text">---</div>
        <div id="roll-btn-center">
            <button id="roll-btn" onclick="doRoll()" disabled>ROLL</button>
        </div>
        <div id="dice-slot-right">
            <div id="dice-box">?</div>
        </div>
    </div>

    <!-- MIDDLE: BOARD -->
    <div id="board-scroll">
        <div id="board-container"></div>
    </div>

    <!-- BOTTOM BAR: TOUR STATS + NAV -->
    <div id="bottom-bar">
        <div id="merch-tracker">
            <h4>Tour Stats</h4>
            <div id="tracker-list"></div>
        </div>
        <div id="nav-cluster">
            <button id="audio-toggle" class="nav-btn btn-audio" onclick="toggleAudio()">
                AUDIO: <span id="audio-status">ON</span>
            </button>
            <button class="nav-btn btn-restart" onclick="confirmSoftRestart()">Restart Tour</button>
            <button class="nav-btn btn-home" onclick="window.open('https://freejoy.club', '_blank')">Home</button>
            <button class="nav-btn btn-store" onclick="window.open('https://freejoy.club', '_blank')">Store</button>
            <button class="nav-btn btn-album" onclick="window.open('https://freejoy.club', '_blank')">Play the Album</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="rule-sidebar" onclick="this.classList.remove('active')"><h3 id="side-title"></h3><p id="side-desc" style="line-height: 1.6;"></p></div>

    <!-- EVENT OVERLAY -->
    <div id="overlay-event" class="overlay">
        <div class="popup" id="main-popup">
            <h1 id="event-title"></h1>
            <div id="event-desc" style="font-size: 1.2rem; color: #ccc; margin-bottom:25px; line-height: 1.6;"></div>
            <div id="coin" style="width:140px; height:140px; background:var(--gold); border:8px solid #b8860b; border-radius:50%; margin:25px auto; display:none; align-items:center; justify-content:center; font-size:2.5rem; font-weight:bold; color:#5c4305; transform-style: preserve-3d;">?</div>
            <div id="timer-ui" style="font-size: 5rem; font-weight: 900; color: var(--joy-glow); margin: 20px 0; display: none;"></div>
            <div id="action-bar">
                <button id="event-btn-primary" style="padding:15px 35px; font-size: 1.1rem; font-weight:bold; cursor:pointer; border-radius:8px; border:none;"></button>
                <button id="event-btn-secondary" style="display:none; background: #333; color: white; padding:15px 35px; font-size: 1.1rem; font-weight:bold; cursor:pointer; margin-left:15px; border:none; border-radius:8px;"></button>
            </div>
        </div>
    </div>

    <!-- SETUP OVERLAY -->
    <div id="overlay-setup" class="overlay" style="display:flex">
        <div class="popup" style="max-width: 500px; width: 90%;">
            <h1 class="intro-header">Fearjoy - Play This</h1>
            
            <div id="setup-step-1">
                <h2 style="font-size: 1.2rem; letter-spacing: 2px;">HOW MANY ARTISTS?</h2>
                <div style="display:flex; justify-content:center; gap:15px; margin-top: 20px;">
                    <button class="setup-btn-large" onclick="setPlayerCount(1)">1</button>
                    <button class="setup-btn-large" onclick="setPlayerCount(2)">2</button>
                    <button class="setup-btn-large" onclick="setPlayerCount(3)">3</button>
                </div>
            </div>

            <div id="setup-step-2" style="display:none; margin-top:20px;">
                <h2 id="setup-prompt" style="font-size: 1rem; color: #888;">ARTIST 1: DETAILS</h2>
                <input type="text" id="name-input" placeholder="ARTIST NAME" 
                       style="padding:20px; width:90%; text-align: center; border-radius: 8px; border: 3px solid #333; background: #000; color: white; font-size: 1.5rem; transition: all 0.3s ease; outline: none;">
                
                <div id="name-error" style="color:var(--fear-glow); font-weight:bold; margin-top:10px; font-size:0.9rem; display:none;">NAME & PIC REQUIRED</div>

                <div style="display:flex; justify-content:center; gap:25px; margin:30px 0;">
                    <img id="sel-jesse" src="jesse.png" class="setup-avatar" onclick="pickAvatar('jesse', '#007bff')">
                    <img id="sel-marco" src="marco.png" class="setup-avatar" onclick="pickAvatar('marco', '#ffcc00')">
                    <img id="sel-grant" src="grant.png" class="setup-avatar" onclick="pickAvatar('grant', '#ff00ff')">
                </div>

                <button id="add-to-tour-btn" onclick="confirmArtist()" class="confirm-btn">ADD TO TOUR</button>
                
                <div id="tour-roster" style="margin-top:30px; border-top:1px solid #444; padding-top:15px; display:none;">
                    <div style="font-size:0.7rem; letter-spacing:2px; color:#888; margin-bottom:10px;">CURRENT ROSTER</div>
                    <div id="roster-list" style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>    
        const boardLayout = [
        "START", "blank", "blank", "blank", "DAYSPRING", "blank", "FEARJOY", "blank", "FIGMENT", "JOY", 
        "THE REMEDY", "FEAR", "VAN BREAKS DOWN", "JOY", "blank", "DMITRI", "blank", "FEARJOY", "NIGHTDRIVE", "JOY", 
        "INVEST IN MERCH", "FEAR", "blank", "5TH DIMENSION", "blank", "IT HAPPENS", "blank", "GHOST 2", "MAYA", "blank", 
        "WIN A GRAMMY", "blank", "FEAR", "OPENING ACT", "blank", "JOY", "blank", "TELLUS", "blank", "FEARJOY", 
        "blank", "blank", "ENCORE", "blank", "VOID", "blank", "blank", "THE ENDLESS SMILE", "GATEKEEPER", "blank", 
        "blank", "blank", "FEARJOY", "VAN BREAKS DOWN", "blank", "LOST RECORDING", "blank", "FEARJOY", "blank", "SWIMMIN"
    ];

    const rules = {
        0: { title: "START", emoji: "▶️", desc: "Play the tape." },
        4: { title: "DAYSPRING", emoji: "☀️", shift: 3, isAuto: true, isTrack: true, desc: "The sun rises! Spring ahead 3.", sound: "dayclip.wav" },
        6: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip the coin: JOY = +1, FEAR = -1.", sound: "coinclip.wav" },
        8: { title: "FIGMENT", emoji: "🛸", isFigment: true, isTrack: true, desc: "Step outside (1:00) for +2, or stay indoors for -1.", sound: "figclip.wav" },
        9: { title: "JOY", emoji: "😄", shift: 1, isAuto: true, desc: "FREEJOY! Forward 1." },
        10: { title: "THE REMEDY", emoji: "💊", choice: 'remedy', isTrack: true, desc: "A major label offers a deal: Move ahead 6 now, but every 6 you roll later becomes -2.", sound: "remedyclip.wav" },
        11: { title: "FEAR", emoji: "😱", shift: -1, isAuto: true, desc: "Get scared. Rewind 1.", sound: "spookyclip1.wav" },
        12: { title: "VAN BREAKS DOWN", emoji: "🛠", skipTurns: 1, desc: "Tour van breaks down! Skip a turn for repairs." },
        13: { title: "JOY", emoji: "😄", shift: 1, isAuto: true, desc: "Choose JOY! Forward 1." },
        15: { title: "DMITRI", emoji: "👨‍🚀", timer: 15, isDmitri: true, isTrack: true, desc: "Take DEEP BREATHS (15 sec) for the 5D shortcut. Skip = Rewind 2.", sound: "dmitriclip.wav" },
        17: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Fear? Joy? Flip to find out.", sound: "coinclip.wav" },
        18: { title: "NIGHTDRIVE", emoji: "🌙", isNightDrive: true, isTrack: true, desc: "Fall asleep at the wheel! EYES CLOSED until next turn." },
        19: { title: "JOY", emoji: "😄", shift: 1, isAuto: true, desc: "PUREJOY! Forward 1." },
        20: { title: "INVEST IN MERCH", emoji: "👕", choice: 'merch', desc: "Do you INVEST by rewinding -4 now? If so, every 1 or 2 you roll later will be doubled." },
        21: { title: "FEAR", emoji: "😱", shift: -1, isAuto: true, desc: "Self-doubt and vices. Rewind 1.", sound: "spookyclip1.wav" },
        23: { title: "5TH DIMENSION", emoji: "✨", shift: 1, isAuto: true, desc: "You have transcended. Forward 1.", sound: "coinclip.wav" },
        25: { title: "IT HAPPENS", emoji: "🔔", isItHappens: true, isTrack: true, desc: "Suddenly, instantly, take an extra turn!" },
        27: { title: "GHOST 2", emoji: "👻", isGhost: true, isTrack: true, desc: "Paralyzed in fear, stay silent for one turn. Make a sound = Rewind 1." },
        28: { title: "MAYA", emoji: "👁️", isMaya: true, desc: "Hold 10 seconds of eye contact with another player. Hold it? BOTH move up 2. Break it? BOTH move back 1." },
        30: { title: "WIN A GRAMMY", emoji: "🏆", isGrammy: true, desc: "Grammy Won! Switch places with the leader! (If you are the leader, Forward 1)" },
        32: { title: "FEAR", emoji: "😱", shift: -1, isAuto: true, desc: "Fear of failure! Rewind 1.", sound: "spookyclip1.wav" },
        33: { title: "OPENING ACT", emoji: "🎤", isOpeningAct: true, desc: "Slide 2 spaces behind the leader. If you are the leader, Rewind 2" },
        35: { title: "JOY", emoji: "😄", shift: 1, isAuto: true, desc: "EARJOY! Forward 1." },
        37: { title: "TELLUS", emoji: "📣", isTellus: true, isTrack: true, desc: "Swap positions with any artist." },
        39: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "FEAR? JOY? Fate decides.", sound: "coinclip.wav" },
        42: { title: "ENCORE", emoji: "🎸", shift: 3, isAuto: true, desc: "Encore! Three more songs! Move forward 3." },
        44: { title: "VOID", emoji: "🌀", shift: -3, isAuto: true, isTrack: true, desc: "Lost in the Void, you can't get by. Rewind 3." },
        47: { title: "THE ENDLESS SMILE", emoji: "💀", isSmile: true, desc: "Remain smiling until your next turn. Break it for a penalty." },
        48: { title: "GATEKEEPER", emoji: "🚪", isGate: true, desc: "Industry Gatekeeper - Mandatory stop here unless you're in last place (emerging artists get a boost)" },
        52: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip for destiny.", sound: "coinclip.wav" },
        53: { title: "VAN BREAKS DOWN", emoji: "🛠", skipTurns: 1, desc: "Van breaks! Skip a turn while it's in the shop." },
        55: { title: "LOST RECORDING", emoji: "📼", isLostRecording: true, desc: "Tape erased! Roll and rewind that amount." },
        57: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "FEAR or JOY: One last choice: JOY = +1, FEAR = -1.", sound: "coinclip.wav" },
        59: { title: "SWIMMIN'", emoji: "🌊", desc: "The tour is a success. Go Swimmin!" }
    };

    let players = [], turnIdx = 0, isMoving = false, totalP = 0, currentSetupP = 0, selectedAvatar = null, isSwapping = false, isMayaPartner = false, sidebarTimer = null, audioEnabled = true;

    function toggleAudio() { audioEnabled = !audioEnabled; document.getElementById('audio-status').innerText = audioEnabled ? 'ON' : 'OFF'; document.getElementById('audio-icon').innerText = audioEnabled ? '🔊' : '🔇'; }
    function playSfx(file) { if(audioEnabled) { const a = new Audio(file); a.play().catch(e => console.log("Audio file not found or blocked: " + file)); } }

    function confirmSoftRestart() { showStatusPopup("RESTART TOUR?", "Are you sure? This will reset all scores and positions, but keep your current artists.", "YES, RESTART", () => { players.forEach(p => { p.pos = 0; p.skipCount = 0; p.isInvestor = false; p.isSellout = false; p.grammys = 0; p.shirtsSold = 0; p.pillsTaken = 0; p.ghostCounter = 0; p.totalRollValue = 0; p.smileActive = false; p.nightDriveActive = false; p.accolades = []; }); turnIdx = 0; isMoving = false; isSwapping = false; updateUI(); updatePositions(); document.getElementById('roll-btn').disabled = false; }, "CANCEL", () => {}); }

    function getSpaceColor(pos) { if (pos === -1 || pos >= boardLayout.length) return '#ffffff'; const name = boardLayout[pos]; if (name === 'FEAR') return 'var(--fear-glow)'; if (name === 'JOY') return 'var(--joy-glow)'; return '#ffffff'; }

    function setPlayerCount(num) {
        totalP = num;
        document.getElementById('setup-step-1').style.display = 'none';
        document.getElementById('setup-step-2').style.display = 'block';
        updateSetupPrompt();
    }

    function updateSetupPrompt() {
        document.getElementById('setup-prompt').innerText = `ARTIST ${currentSetupP + 1}: DETAILS`;
    }

    function pickAvatar(id, color) {
        selectedAvatar = { id, color, img: id + '.png' };
        document.querySelectorAll('.setup-avatar').forEach(img => {
            img.classList.remove('selected');
            img.style.borderColor = 'transparent';
        });
        const selectedImg = document.getElementById('sel-' + id);
        selectedImg.classList.add('selected');
        selectedImg.style.border = `3px solid ${color}`;
        const nameInput = document.getElementById('name-input');
        nameInput.style.borderColor = color;
        nameInput.style.boxShadow = `0 0 15px ${color}`;
    }

    function confirmArtist() {
        const nameInput = document.getElementById('name-input');
        const name = nameInput.value.toUpperCase().trim();
        const errorMsg = document.getElementById('name-error');
        if (!name || !selectedAvatar) { errorMsg.innerText = "NAME & PIC REQUIRED"; errorMsg.style.display = 'block'; return; }
        if (players.some(p => p.name === name)) { errorMsg.innerText = "NAME ALREADY TAKEN ON THIS TOUR"; errorMsg.style.display = 'block'; return; }
        errorMsg.style.display = 'none';
        players.push({ name, pos: 0, avatar: selectedAvatar, skipCount: 0, isInvestor: false, isSellout: false, grammys: 0, accolades: [] });
        const roster = document.getElementById('tour-roster');
        const rosterList = document.getElementById('roster-list');
        roster.style.display = 'block';
        rosterList.innerHTML += `<div class="roster-item"><img src="${selectedAvatar.img}" class="roster-img" style="border: 2px solid ${selectedAvatar.color}"><span>${name}</span></div>`;
        currentSetupP++;
        if (currentSetupP >= totalP) {
            document.getElementById('overlay-setup').style.display = 'none';
            initBoard();
        } else {
            nameInput.value = ''; nameInput.style.borderColor = '#333'; nameInput.style.boxShadow = 'none';
            selectedAvatar = null;
            document.querySelectorAll('.setup-avatar').forEach(img => img.classList.remove('selected'));
            updateSetupPrompt();
        }
    }

    function startMayaTimer(partnerIdx) {
        const overlay = document.getElementById('overlay-event');
        const desc = document.getElementById('event-desc');
        const pBtn = document.getElementById('event-btn-primary');
        const sBtn = document.getElementById('event-btn-secondary');
        const partner = players[partnerIdx];
        
        overlay.style.display = 'flex';
        pBtn.style.display = 'none';
        sBtn.style.display = 'none';
        
        let timeLeft = 10;
        const updateTimerUI = () => {
            desc.innerHTML = `
                <div style="font-size:5rem; color:var(--blue-glow); text-shadow: 0 0 20px var(--blue-glow); margin-bottom:20px; animation: winPulse 1s infinite alternate;">${timeLeft}</div>
                EYE CONTACT WITH ${partner.name}... <br>
                <span style="color:#888; font-size:0.8rem; letter-spacing:2px;">DON'T LOOK AWAY</span>
            `;
        };

        updateTimerUI();

        const clock = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            
            if (timeLeft <= 0) {
                clearInterval(clock);
                desc.innerHTML = `TIME'S UP.<br><br>Did you both successfully hold eye contact for 10 seconds?`;
                pBtn.style.display = 'inline-block';
                pBtn.innerText = "YES (BOTH +2)";
                pBtn.onclick = () => {
                    movePlayer(2);
                    players[partnerIdx].pos = Math.min(59, players[partnerIdx].pos + 2);
                    updatePositions();
                    overlay.style.display = 'none';
                    endTurn();
                };
                
                sBtn.style.display = 'inline-block';
                sBtn.innerText = "NO (BOTH -1)";
                sBtn.onclick = () => {
                    movePlayer(-1);
                    players[partnerIdx].pos = Math.max(0, players[partnerIdx].pos - 1);
                    updatePositions();
                    overlay.style.display = 'none';
                    endTurn();
                };
            }
        }, 1000);
    }
        
    function initBoard() {
        const board = document.getElementById('board-container'), spaceCoords = [];
        boardLayout.forEach((name, i) => {
            const s = document.createElement('div'); s.id = 's'+i; s.className = 'space';
            if(name === "blank") { s.classList.add('blank'); s.innerHTML = `<span class="blank-num">${i}</span>`; } 
            else {
                const r = rules[i]; const emojiHtml = (r && r.emoji) ? `<div class="sp-emoji">${r.emoji}</div>` : '';
                s.innerHTML = `${emojiHtml}<div class="sp-text">${name}</div>`;
                if(rules[i]?.isTrack) s.classList.add('tracklist-space');
                if(name === "FEAR") s.classList.add('fear-space'); if(name === "JOY") s.classList.add('joy-space'); if(name === "FEARJOY") s.classList.add('hybrid'); if(i === 59) s.classList.add('win-track');
            }
            if(i < 59 && name !== "START") {
                let arrowDir = ''; if(i % 10 === 9) arrowDir = 'arrow-up'; else if(Math.floor(i / 10) % 2 === 0) arrowDir = 'arrow-right'; else arrowDir = 'arrow-left';
                const arr = document.createElement('div'); arr.className = `dir-arrow ${arrowDir}`; arr.innerHTML = "➜"; s.appendChild(arr);
            }
            s.onclick = () => handleSpaceClick(i);
            let row = Math.floor(i / 10), col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));
            s.style.gridRow = 6 - row; s.style.gridColumn = col + 1; board.appendChild(s);
        });
        players.forEach((p, i) => {
            const el = document.createElement('div'); el.id = 'p'+i; el.className = 'player';
            el.style.backgroundImage = `url('${p.avatar.img}')`; el.onclick = () => handlePlayerClick(i);
            board.appendChild(el);
        });
        updateUI(); document.getElementById('roll-btn').disabled = false;
    }

    function handleSpaceClick(i) { const r = rules[i] || { title: boardLayout[i], desc: "The road continues." }; showSidebar(r.title, (r.emoji ? r.emoji + " " : "") + r.desc, getSpaceColor(i)); }

    function updateUI() {
        const p = players[turnIdx], list = document.getElementById('tracker-list');
        document.getElementById('status-text').innerHTML = `<span style="color:${p.avatar.color}">${p.name}'S TURN</span>`;
        list.innerHTML = '';
        players.forEach((pl, i) => {
            let tags = (pl.isInvestor ? '<span class="tag tag-investor">INVESTOR</span>' : '') + (pl.isSellout ? '<span class="tag tag-sellout">SELLOUT</span>' : '');
            let isCurrent = (i === turnIdx);
            list.innerHTML += `<div id="roster-p${i}" class="player-entry ${isCurrent ? 'roster-active' : ''}" style="${isCurrent ? '--p-color:'+pl.avatar.color : ''}" onclick="handlePlayerClick(${i})">
                <div style="display:flex;align-items:center;gap:10px;"><img src="${pl.avatar.img}" class="avatar-roster"><div><b>${pl.name}</b>${tags}<br><span style="font-size:1.1rem; letter-spacing:1px;">${pl.accolades.join('')}</span></div></div></div>`;
            const boardPiece = document.getElementById('p'+i); boardPiece.style.zIndex = (isCurrent ? 150 : 100);
            if(isCurrent) { boardPiece.classList.add('active-turn'); boardPiece.style.setProperty('--p-color', pl.avatar.color); }
            else { boardPiece.classList.remove('active-turn'); }
        });
        updatePositions();
    }

    function updatePositions() {
        const countMap = {};
        players.forEach((p, i) => {
            const target = document.getElementById('s'+p.pos), el = document.getElementById('p'+i); if(!countMap[p.pos]) countMap[p.pos] = 0;
            el.style.left = (target.offsetLeft + (countMap[p.pos] * 12)) + "px"; el.style.top = (target.offsetTop + (countMap[p.pos] * 12)) + "px"; countMap[p.pos]++;
        });
    }

    async function doRoll() {
        if(isMoving || isSwapping || isMayaPartner) return; document.getElementById('rule-sidebar').classList.remove('active');
        const p = players[turnIdx];
        if(p.skipCount > 0) { p.skipCount--; showStatusPopup("🛠 BUMMER", "Van is still in the shop. Turn skipped.", "BUMMER", () => { endTurn(); }, "DARN", () => { endTurn(); }); return; }
        if(p.nightDriveActive) { showStatusPopup("🌙 NIGHTDRIVE CHECK", "Did you keep your eyes closed?", "YES", () => { p.nightDriveActive = false; checkNextHonor(p); }, "NO", () => { p.nightDriveActive = false; movePlayer(-1); }); return; }
        checkNextHonor(p);
    }

    function checkNextHonor(p) {
        if(p.ghostCounter > 0) { showStatusPopup("👻 GHOST CHECK", `Silence is required. Did you remain quiet?`, "YES", () => { p.ghostCounter = 0; checkNextHonor(p); }, "NO", () => { p.ghostCounter = 0; movePlayer(-1); }); return; }
        if(p.smileActive) { showStatusPopup("💀 THE ENDLESS SMILE", "Did you keep smiling?", "HELD IT", () => { p.smileActive = false; checkNextHonor(p); }, "BROKE IT", () => { p.smileActive = false; endTurn(); }); return; }
        performActualRoll();
    }

    async function performActualRoll() {
        const p = players[turnIdx]; isMoving = true; document.getElementById('roll-btn').disabled = true;
        const dice = document.getElementById('dice-box'); dice.innerText = "?"; dice.classList.add('dice-cinematic');
        let roll;
        for(let j=0; j<12; j++) { dice.innerText = Math.floor(Math.random()*6)+1; await new Promise(r => setTimeout(r, 45)); }
        roll = Math.floor(Math.random()*6)+1; dice.innerText = roll;
        if(p.isInvestor && (roll === 1 || roll === 2)) { await new Promise(r => setTimeout(r, 500)); dice.classList.add('dice-gold'); spawnEmoji('👕'); showSidebar("INVESTMENT PAYOFF", "Merch is moving! Roll doubled.", "#ffffff"); p.shirtsSold++; p.accolades.push('👕'); roll *= 2; dice.innerText = roll; await new Promise(r => setTimeout(r, 2000)); updateUI(); }
        if(p.isSellout && roll === 6) { await new Promise(r => setTimeout(r, 500)); dice.classList.add('dice-red'); spawnEmoji('💊'); showSidebar("CONTRACT DEBT", "Label takes a cut! 6 becomes -2. Should've stayed indie...", "var(--fear-glow)"); p.pillsTaken++; p.accolades.push('💊'); roll = -2; dice.innerText = roll; await new Promise(r => setTimeout(r, 2000)); updateUI(); }
        p.totalRollValue += Math.abs(roll); await new Promise(r => setTimeout(r, 250)); dice.classList.remove('dice-cinematic', 'dice-red', 'dice-gold'); await new Promise(r => setTimeout(r, 250)); movePlayer(roll);
    }

    function spawnEmoji(char) { const e = document.createElement('div'); e.className = 'floating-emoji'; e.innerText = char; e.style.left = "50%"; e.style.top = "50%"; document.body.appendChild(e); setTimeout(() => e.remove(), 1200); }

    async function movePlayer(n) {
        const p = players[turnIdx]; const dir = n > 0 ? 1 : -1;
        let minPos = Math.min(...players.map(pl => pl.pos)); let isLast = (p.pos === minPos);
        for(let i=0; i<Math.abs(n); i++) {
            if(p.pos + dir >= 0 && p.pos + dir < boardLayout.length) {
                p.pos += dir; updatePositions();
                if(dir > 0 && rules[p.pos]?.isGate && !isLast && i < Math.abs(n)-1) { i = 999; }
                await new Promise(r => setTimeout(r, 300)); if(p.pos >= 59) { showWinScreen(); return; }
            }
        }
        checkSpace();
    }

    function checkSpace() {
        const p = players[turnIdx], r = rules[p.pos]; if(!r) { endTurn(); return; }
        const spaceCol = getSpaceColor(p.pos); const popupEl = document.getElementById('main-popup'); popupEl.style.borderColor = spaceCol; popupEl.style.boxShadow = `0 0 30px ${spaceCol}`;
        if(r.sound) { playSfx(r.sound); }
        if(r.choice === 'remedy' && p.isSellout) { showSidebar("CONTRACT ACTIVE", "Soul already sold.", spaceCol); endTurn(); return; }
        if(r.choice === 'merch' && p.isInvestor) { showSidebar("ALREADY INVESTED", "Inventory full.", spaceCol); endTurn(); return; }
        if(r.isAuto) { showSidebar(r.title, (r.emoji || "") + " " + (r.desc || "Moving..."), spaceCol); setTimeout(() => { movePlayer(r.shift); }, 1200); return; }
        const modal = document.getElementById('overlay-event'), title = document.getElementById('event-title'), desc = document.getElementById('event-desc'), pBtn = document.getElementById('event-btn-primary'), sBtn = document.getElementById('event-btn-secondary'), timerUI = document.getElementById('timer-ui'), coin = document.getElementById('coin');
        coin.style.display = 'none'; pBtn.style.display = 'inline-block'; pBtn.disabled = false; title.innerText = (r.emoji || "") + " " + r.title; desc.innerText = r.desc || ""; pBtn.innerText = "CONTINUE"; sBtn.style.display = 'none'; timerUI.style.display = 'none'; modal.style.display = 'flex';
        
        if(r.skipTurns) { p.skipCount = r.skipTurns; pBtn.onclick = () => { modal.style.display='none'; endTurn(); }; }
        else if(r.isFigment) {
            pBtn.innerText = "STEP OUTSIDE (1:00)"; sBtn.innerText = "STAY INDOORS (-1)"; sBtn.style.display = 'inline-block';
            pBtn.onclick = () => { pBtn.disabled = true; sBtn.style.display = 'none'; timerUI.style.display = 'block'; let t = 60; timerUI.innerText = t; const clock = setInterval(() => { t--; timerUI.innerText = t; if(t <= 0) { clearInterval(clock); pBtn.disabled = false; pBtn.innerText = "I'M BACK (+2)"; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(2); }; } }, 1000); };
            sBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(-1); };
        } else if(r.isFearjoy) {
            pBtn.innerText = "FLIP COIN"; pBtn.onclick = () => { pBtn.style.display='none'; coin.innerText = "?"; coin.style.display='flex'; coin.classList.add('flipping'); setTimeout(() => { const win = Math.random() > 0.5; coin.innerText = win ? "JOY" : "FEAR"; coin.classList.remove('flipping'); setTimeout(async () => { modal.style.display='none'; coin.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(win ? 1 : -1); }, 1200); }, 1200); };
        } else if(r.isDmitri) {
            pBtn.innerText = "BREATHE"; sBtn.innerText = "SKIP (-2)"; sBtn.style.display = 'inline-block';
            pBtn.onclick = () => { pBtn.disabled = true; sBtn.style.display='none'; timerUI.style.display='block'; let t = 15; timerUI.innerText = t; const clock = setInterval(() => { t--; timerUI.innerText = t; if(t <= 0) { clearInterval(clock); pBtn.disabled = false; pBtn.innerText = "BREATHING COMPLETED"; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); p.pos = 23; updatePositions(); endTurn(); }; } }, 1000); };
            sBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(-2); };

        } else if(r.choice) {
            const fadeOutVideo = (vid) => {
                if (!vid) return;
                let volume = 1;
                const interval = 200; 
                const step = 0.1; 
                const fade = setInterval(() => {
                    if (volume > 0.1) {
                        volume -= step;
                        vid.volume = volume;
                    } else {
                        vid.pause();
                        clearInterval(fade);
                    }
                }, interval);
            };

            if (r.choice === 'remedy') {
                desc.innerHTML = `
                    <div id="video-wrapper" style="position:relative; width:100%; margin-bottom:15px; border-radius:8px; overflow:hidden; background:#000; border:1px solid #444;">
                        <div id="close-video" style="position:absolute; top:5px; right:12px; color:white; cursor:pointer; font-size:24px; font-weight:bold; z-index:10; text-shadow: 0 0 5px #000;">×</div>
                        <video id="remedy-video" style="width:100%; display:block;" autoplay playsinline>
                            <source src="trevortrim.mp4" type="video/mp4">
                        </video>
                    </div>
                ` + r.desc;

                setTimeout(() => {
                    const cv = document.getElementById('close-video');
                    const vid = document.getElementById('remedy-video');
                    
                    if(cv) cv.onclick = (e) => { 
                        e.stopPropagation(); 
                        fadeOutVideo(vid);
                        document.getElementById('video-wrapper').style.display = 'none'; 
                    };
                    
                    if(vid) vid.play().catch(err => console.log("Unmuted autoplay blocked by browser:", err));
                }, 50);
            }

            pBtn.innerText = r.choice === 'remedy' ? "SIGN CONTRACT (+6)" : "INVEST IN MERCH (-4)"; 
            sBtn.style.display='inline-block'; 
            sBtn.innerText = "PASS";
            
            pBtn.onclick = async () => { 
                fadeOutVideo(document.getElementById('remedy-video'));
                modal.style.display='none'; 
                await new Promise(res => setTimeout(res, 800)); 
                if(r.choice==='remedy'){
                    p.isSellout=true; 
                    movePlayer(6);
                } else {
                    playSfx("coinclip.wav"); 
                    p.isInvestor=true; 
                    movePlayer(-4); 
                } 
            };
            sBtn.onclick = () => { 
                fadeOutVideo(document.getElementById('remedy-video'));
                modal.style.display='none'; 
                endTurn(); 
            };
            
        } else if(r.isGrammy) {
            let maxPos = Math.max(...players.map(pl => pl.pos)); let leaders = players.filter(pl => pl.pos === maxPos && pl !== p);
            p.grammys++; p.accolades.push('🏆'); updateUI();
            if(p.pos === maxPos) { pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(1); }; }
            else if(leaders.length > 1) {
                isSwapping = true; pBtn.innerText = "READY"; pBtn.onclick = () => { modal.style.display='none'; };
                showSidebar("🏆 TIED LEADERS", "Multiple artists are tied for the lead. Select which one to swap with by clicking their picture on the roster.", "var(--gold)");
                leaders.forEach(l => { const idx = players.indexOf(l); document.getElementById('p'+idx).classList.add('swap-target'); document.getElementById('roster-p'+idx).classList.add('roster-swap'); });
            } else { pBtn.onclick = () => { modal.style.display='none'; let lead = leaders[0]; let lp = lead.pos; lead.pos = p.pos; p.pos = lp; updatePositions(); endTurn(); }; }

           } else if(r.isTellus || r.isMaya) {
            if(players.length > 1) {
                isSwapping = r.isTellus; 
                isMayaPartner = r.isMaya;
                pBtn.innerText = "READY"; 
                pBtn.onclick = () => { 
                    modal.style.display = 'none'; 
                    players.forEach((_, i) => { 
                        if(i !== turnIdx) { 
                            const piece = document.getElementById('p'+i);
                            const roster = document.getElementById('roster-p'+i);
                            if(piece) {
                                piece.style.pointerEvents = 'auto'; 
                                piece.classList.add('swap-target'); 
                            }
                            if(roster) roster.classList.add('roster-swap'); 
                        } 
                    });
                };
                desc.innerHTML = r.isMaya ? 
                    "MAYA'S EYE CONTACT CHALLENGE.<br><br>Click another Artist's head or roster name. Hold eye contact for 10s for <b>Both +2</b>. Fail for <b>Both -1</b>." : 
                    "TELLUS: THE GREAT SWAP.<br><br>Click another Artist's head or roster name to swap places on the board.";
            } else { 
                desc.innerText = "SOLO TOUR: No other artists to interact with.";
                pBtn.innerText = "CONTINUE"; 
                pBtn.onclick = () => { modal.style.display = 'none'; endTurn(); }; 
            }
            
        } else if(r.isOpeningAct) {
            let maxPos = Math.max(...players.map(pl => pl.pos)); let isLead = (p.pos === maxPos); pBtn.innerText = " "; pBtn.disabled = true;
            if(isLead) {
                showSidebar("OPENING ACT", "You are the leader! Go back 2 spaces.", spaceCol);
                setTimeout(() => { pBtn.innerText = "ACCEPT FATE (-2)"; pBtn.disabled = false; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res=>setTimeout(res,800)); movePlayer(-2); }; }, 2500);
            } else {
                showSidebar("OPENING ACT", "Slide 2 spaces behind the leader.", spaceCol);
                setTimeout(() => { pBtn.innerText = "MOVE UP"; pBtn.disabled = false; pBtn.onclick = async () => { modal.style.display='none'; let targetPos = maxPos - 2; if(targetPos < 0) targetPos = 0; let diff = targetPos - p.pos; await new Promise(res=>setTimeout(res,800)); if(diff !== 0) movePlayer(diff); else endTurn(); }; }, 2500);
            }
        } else if(r.isGhost) { p.ghostCounter = 1; pBtn.innerText = "I WILL BE SILENT"; pBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isSmile) { p.smileActive = true; pBtn.innerText = "I WILL SMILE"; pBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isNightDrive) { p.nightDriveActive = true; pBtn.innerText = "EYES CLOSED"; pBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isGate) { pBtn.innerText = "PAY YOUR DUES"; pBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isItHappens) { pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); isMoving = false; performActualRoll(); };
        } else if(r.isLostRecording) { 
            pBtn.innerText = "ROLL TO REWIND"; 
            pBtn.onclick = async () => { 
                pBtn.style.display='none'; coin.style.display='flex'; coin.innerText = "?"; coin.classList.add('flipping'); let rl;
                for(let j=0; j<12; j++) { coin.innerText = Math.floor(Math.random()*6)+1; await new Promise(r => setTimeout(r, 45)); }
                rl = Math.floor(Math.random()*6)+1; coin.innerText = rl; coin.classList.remove('flipping');
                await new Promise(r => setTimeout(r, 1500)); modal.style.display='none'; coin.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(-rl); 
            };
        } else { pBtn.onclick = () => { modal.style.display='none'; endTurn(); }; }
    }

    function handlePlayerClick(idx) {
        if (idx === turnIdx) return; 

        if (isSwapping) {
            isSwapping = false;
            document.querySelectorAll('.player').forEach(el => el.classList.remove('swap-target'));
            document.querySelectorAll('.player-entry').forEach(el => el.classList.remove('roster-swap'));
            
            const p = players[turnIdx];
            const target = players[idx];
            const oldPos = p.pos;
            p.pos = target.pos;
            target.pos = oldPos;
            
            updatePositions();
            endTurn();
        } 
        else if (isMayaPartner) {
            isMayaPartner = false;
            document.querySelectorAll('.player').forEach(el => {
                el.classList.remove('swap-target');
                el.style.pointerEvents = 'none'; 
            });
            document.querySelectorAll('.player-entry').forEach(el => el.classList.remove('roster-swap'));
            startMayaTimer(idx);
        }
    }

    function showStatusPopup(t, d, b1, c1, b2, c2) {
        const modal = document.getElementById('overlay-event'), popupEl = document.getElementById('main-popup'); popupEl.style.borderColor = '#444'; popupEl.style.boxShadow = 'none';
        document.getElementById('event-title').innerText = t; document.getElementById('event-desc').innerText = d; document.getElementById('coin').style.display = 'none';
        const pBtn = document.getElementById('event-btn-primary'); pBtn.style.display='inline-block'; pBtn.innerText = b1; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(r => setTimeout(r, 200)); c1(); };
        const sBtn = document.getElementById('event-btn-secondary'); sBtn.style.display='inline-block'; sBtn.innerText = b2; sBtn.onclick = async () => { modal.style.display='none'; await new Promise(r => setTimeout(r, 200)); c2(); };
        modal.style.display='flex';
    }

    function showSidebar(t, d, color = '#ffffff') { 
        if(sidebarTimer) clearTimeout(sidebarTimer); const sb = document.getElementById('rule-sidebar'); sb.style.borderColor = color; sb.style.boxShadow = `-10px 0 40px ${color}`;
        document.getElementById('side-title').innerText = t; document.getElementById('side-desc').innerText = d; sb.classList.add('active'); sidebarTimer = setTimeout(() => sb.classList.remove('active'), 8000); 
    }
        
    function showWinScreen() { 
        const p = players[turnIdx]; 
        
        const winSfx = new Audio('swimclip.wav');
        winSfx.play().catch(e => console.log("Audio play blocked"));

        let statsHtml = `<h2 style="color:${p.avatar.color}; animation: winPulse 2s infinite ease-in-out; font-size: 2.2rem; font-family: 'KCStrikerSans', 'Courier New', monospace; margin: 5px 0; --p-color: ${p.avatar.color}; text-shadow: 0 0 20px ${p.avatar.color};">${p.name} WINS!</h2>`;
        statsHtml += `<div class="recap-container" style="text-align:left; margin-top:15px; font-family:monospace; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 12px; border: 1px solid #333;">`;
        
        players.forEach(pl => { 
            const merchEmojis = "👕".repeat(pl.shirtsSold || 0);
            const pillEmojis = "💊".repeat(pl.pillsTaken || 0);
            const trophyEmojis = "🏆".repeat(pl.grammys || 0);

            statsHtml += `
                <div style="margin-bottom:12px; border-bottom: 1px solid #222; display:flex; align-items:center; gap:12px; padding-bottom:10px;">
                    <img src="${pl.avatar.img}" style="width:50px; height:50px; border-radius:50%; background:#000; border:2px solid ${pl.avatar.color}; box-shadow: 0 0 10px ${pl.avatar.color};">
                    <div style="flex-grow:1;">
                        <b style="color:${pl.avatar.color}; font-size:1.1rem; letter-spacing:1px;">${pl.name}</b>
                        <div style="font-size:1.2rem; margin:2px 0;">
                            ${pl.accolades.join('')} ${merchEmojis}${pillEmojis}${trophyEmojis}
                        </div>
                    </div>
                </div>`; 
        });
        statsHtml += `</div>`;

        const popupEl = document.getElementById('main-popup'); 
        popupEl.style.borderColor = p.avatar.color; 
        popupEl.style.boxShadow = `0 0 80px ${p.avatar.color}`;
        popupEl.style.width = "600px";
        
        document.getElementById('event-title').innerText = "The tour is over. Go Swimmin!"; 
        document.getElementById('event-desc').innerHTML = statsHtml;

        const btnContainer = document.getElementById('event-desc');
        const linkStack = `
            <div style="display:flex; flex-direction:column; gap:10px; align-items:center; margin-top:20px;">
                <a href="https://freejoy.club" target="_blank" class="win-link-btn" style="--btn-color: #ff00ff; color:#ff00ff;">STORE</a>
                <a href="https://freejoy.club" target="_blank" class="win-link-btn" style="--btn-color: #00ff00; color:#00ff00;">STREAM ALBUM</a>
                <a href="https://freejoy.club" target="_blank" class="win-link-btn" style="--btn-color: #ffffff; color:#ffffff;">HOME</a>
                
                <div style="display:flex; gap:10px; width:80%; margin-top:5px;">
                    <button id="hard-reset-win" class="win-link-btn" style="--btn-color: var(--fear-glow); color:var(--fear-glow); flex:1; cursor:pointer;">NEW BAND (NEW PLAYERS)</button>
                    <button id="soft-reset-win" class="win-link-btn" style="--btn-color: #ffa500; color:#ffa500; flex:1; cursor:pointer;">ANOTHER TOUR (SAME PLAYERS)</button>
                </div>
            </div>
            <style>
                .win-link-btn {
                    text-decoration: none;
                    font-family: 'Courier New', monospace;
                    font-weight: 900;
                    font-size: 0.9rem;
                    padding: 10px 20px;
                    border: 1px solid var(--btn-color);
                    border-radius: 12px;
                    width: 80%;
                    background: transparent;
                    text-align: center;
                    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                    animation: floatBtn 3.5s infinite ease-in-out;
                    letter-spacing: 1.5px;
                    text-transform: uppercase;
                }
                .win-link-btn:hover {
                    background: var(--btn-color) !important;
                    color: black !important;
                    box-shadow: 0 0 20px var(--btn-color);
                    transform: scale(1.05) translateY(-2px);
                }
                @keyframes floatBtn {
                    0%, 100% { transform: translateY(0px); }
                    50% { transform: translateY(-5px); }
                }
            </style>
        `;
        btnContainer.innerHTML += linkStack;

        document.getElementById('event-btn-primary').style.display = 'none';
        document.getElementById('event-btn-secondary').style.display = 'none';

        document.getElementById('hard-reset-win').onclick = () => location.reload();
        document.getElementById('soft-reset-win').onclick = () => { 
            document.getElementById('overlay-event').style.display='none'; 
            confirmSoftRestart(); 
        };
        
        document.getElementById('overlay-event').style.display='flex'; 
    }
    
    function endTurn() { turnIdx = (turnIdx + 1) % players.length; isMoving = false; document.getElementById('roll-btn').disabled = false; updateUI(); }
    
    </script>
</body>
</html>
