    // ══════════════════════════════════════════════
    // ROLL FLOW
    // Roll is ALWAYS available. If lore is showing, doRoll resolves the lore
    // awaiter (loreDoneResolver) which unblocks movePlayer, then normal roll.
    // Modal popups (isMoving=true, not in lore) block roll normally.
    // ══════════════════════════════════════════════
    async function doRoll(){
        /* If in lore drop: dismiss it and immediately roll for the current player */
        if(isInLoreDrop){
            stopActiveLoreVid();
            closeSidebar();
            hideLoreBackdrop();
            isInLoreDrop=false;
            if(loreDoneResolver){loreDoneResolver();loreDoneResolver=null;}
            /* Fall through to normal roll below */
        }
        /* Hard guard — isRolling blocks re-entry during entire roll+move sequence */
        if(isRolling||isMoving||isSwapping||isMayaPartner)return;
        stopActiveLoreVid();
        closeSidebar();
        const p=players[turnIdx];
        if(p.grammyNominator){
            const nom=p.grammyNominator;p.grammyNominator=null;
            showStatusPopup("🏆 NOMINATED!",`${nom} nominated you for a Grammy!`,"I HUMBLY ACCEPT",()=>doRoll(),"",()=>{});
            document.getElementById('event-btn-secondary').style.display='none';return;
        }
        if(p.skipCount>0){
            p.skipCount--;
            showStatusPopup("🛠 BUMMER","Van is still in the shop. Turn skipped.","BUMMER",()=>endTurn(),"DARN",()=>endTurn());return;
        }
        if(p.nightDriveActive){
            showStatusPopup("🌙 NIGHTDRIVE CHECK","Did you keep your eyes closed?",
                "YES",()=>{p.nightDriveActive=false;checkNextHonor(p);},"NO",()=>{p.nightDriveActive=false;movePlayer(-1,false,turnIdx);});return;
        }
        checkNextHonor(p);
    }
    function checkNextHonor(p){
        if(p.ghostCounter>0){
            showStatusPopup("👻 GHOST CHECK","Did you stay quiet?",
                "YES",()=>{p.ghostCounter=0;checkNextHonor(p);},"NO",()=>{p.ghostCounter=0;movePlayer(-1);});return;
        }
        if(p.smileActive){
            showStatusPopup("💀 THE ENDLESS SMILE","Did you smile endlessly?",
                "HELD IT",()=>{p.smileActive=false;checkNextHonor(p);},"BROKE IT",()=>{p.smileActive=false;endTurn();});return;
        }
        performActualRoll();
    }

    async function performActualRoll(){
        const capturedTurnIdx=turnIdx;
        const p=players[capturedTurnIdx];
        /* Set both guards — isRolling stays true until endTurn */
        isRolling=true;isMoving=true;
        document.getElementById('roll-btn').disabled=true;
        const dice=document.getElementById('dice-box');dice.innerText="?";
        await diceGoToCinematic();
        let roll;
        for(let j=0;j<16;j++){
            dice.innerText=Math.floor(Math.random()*6)+1;
            if(j%4===0)playDiceRoll();
            await new Promise(r=>setTimeout(r,50));
        }
        roll=Math.floor(Math.random()*6)+1;dice.innerText=roll;
        /* VU needle settles on roll value */
        vuRollAnimation(roll);
        playDiceDone();
        await new Promise(r=>setTimeout(r,750));

        /* Investor — teal dice */
        if(p.isInvestor&&(roll===1||roll===2)){
            dice.classList.add('dice-teal');spawnEmoji('👕',true);
            showSidebar("INVESTMENT PAYOFF","Merch is moving! Roll doubled.","#ffffff");
            playCoinSfx();
            await new Promise(r=>setTimeout(r,800));
            p.shirtsSold++;p.accolades.push('👕');roll*=2;dice.innerText=roll;
            await new Promise(r=>setTimeout(r,1800));updateUI();
        }
        /* Remedy sellout — red dice */
        if(p.isSellout&&roll===6){
            dice.classList.add('dice-red');spawnEmoji('💊',true);
            showSidebar("CONTRACT DEBT","Label takes a cut! 6 becomes -2.","var(--fear-glow)");
            playRemedyPunishment();
            await new Promise(r=>setTimeout(r,800));
            p.pillsTaken++;p.accolades.push('💊');roll=-2;dice.innerText=roll;
            playDiceDone();
            await new Promise(r=>setTimeout(r,1800));updateUI();
        }
        /* Cold Pitch — every OTHER roll */
        if(p.isColdPitchSellout&&roll>0){
            p.coldPitchRollCount++;
            if(p.coldPitchRollCount%2===1){
                /* Plot armor can block the label cut */
                if(checkPlotArmor(capturedTurnIdx,true)){
                    /* blocked — no cut */
                } else {
                    dice.classList.add('dice-contract');spawnEmoji('📝',true);
                    showSidebar("CONTRACT CUT","Label takes their cut this roll. -1 total.","var(--pitch-orange)");
                    await new Promise(r=>setTimeout(r,700));
                    roll=Math.max(1,roll-1);dice.innerText=roll;
                    await new Promise(r=>setTimeout(r,1200));updateUI();
                }
            }
        }
        p.totalRollValue+=Math.abs(roll);
        await diceReturnToBar();
        movePlayer(roll,false,capturedTurnIdx);
    }

    function spawnEmoji(char,slow=false){
        const e=document.createElement('div');e.className=slow?'floating-emoji-slow':'floating-emoji';
        e.innerText=char;e.style.left="50%";e.style.top="50%";document.body.appendChild(e);
        setTimeout(()=>e.remove(),slow?2400:1200);
    }

    // ══════════════════════════════════════════════
    // MOVEMENT — capturedIdx prevents cross-assignment
    // Gatekeeper: any sellout (isSellout OR isColdPitchSellout) passes freely
    // ══════════════════════════════════════════════
    async function movePlayer(n,skipSpaceCheck=false,capturedIdx){
        /* Use capturedIdx if provided (from performActualRoll), else current turnIdx */
        const idx=(capturedIdx!==undefined)?capturedIdx:turnIdx;
        const p=players[idx];
        /* Re-verify idx is still the right turn — safety check */
        const dir=n>0?1:-1;
        const lastPlaceIdxList=getLastPlaceIdx();
        const isLast=lastPlaceIdxList.includes(idx);
        const anyLabelDeal=p.isSellout||p.isColdPitchSellout;

        for(let i=0;i<Math.abs(n);i++){
            if(p.pos+dir>=0&&p.pos+dir<boardLayout.length){
                /* Plot armor blocks backward movement */
                if(dir<0&&checkPlotArmor(idx,true)){
                    /* Armor absorbed — stop moving, don't advance further backward */
                    break;
                }
                playSlide();p.pos+=dir;updatePositions();
                if(dir>0&&p.pos===GATEKEEPER_SPACE&&!isLast&&!anyLabelDeal&&i<Math.abs(n)-1)break;
                await new Promise(r=>setTimeout(r,300));
                if(p.pos>=59){showWinScreen();return;}
            }
        }
        if(skipSpaceCheck){updatePositions();return;}
        flashSpaceLanding(p.pos);
        if(TRACKLIST_INDICES.includes(p.pos))triggerVinylSpin(p.pos);

        /* ── MYSTERY LORE DROP ── */
        if(mysterySpaces.has(p.pos)){
            await new Promise(r=>setTimeout(r,750));

            /* Small chance to award Plot Armor instead of regular lore */
            let item;
            if(tryAwardPlotArmor(idx)){
                /* Show armor award as sidebar */
                document.getElementById('rule-sidebar').classList.add('mystery-sidebar');
                showSidebar('🛡️ Plot Armor!',`${p.name} is protected from the next bad outcome!`,'var(--mystery-glow)',`Space ${p.pos}`);
                isMoving=false;document.getElementById('roll-btn').disabled=false;
                isInLoreDrop=true;showLoreBackdrop();
                await new Promise(res=>{loreDoneResolver=res;setTimeout(res,6000);});
                isInLoreDrop=false;loreDoneResolver=null;hideLoreBackdrop();
                lorePeekSidebar();endTurn();return;
            }

            item=getRandomBucketItem(idx);
            renderBucketItem(item,document.getElementById('side-bucket'),idx);
            document.getElementById('rule-sidebar').classList.add('mystery-sidebar');
            showSidebar('Mystery Lore Drop','','var(--mystery-glow)',`Space ${p.pos}`);

            /* Show backdrop so clicking outside dismisses */
            showLoreBackdrop();

            /* Roll is now available — unlock before waiting */
            isMoving=false;
            document.getElementById('roll-btn').disabled=false;
            isInLoreDrop=true;

            const bucketVid=document.getElementById('side-bucket').querySelector('video');
            if(bucketVid){
                await new Promise(res=>{
                    loreDoneResolver=res;
                    const onEnd=()=>{fadeVideoAudioOut(bucketVid,true);if(activeLoreVid===bucketVid)activeLoreVid=null;res();};
                    bucketVid.addEventListener('ended',onEnd,{once:true});
                    const setCap=()=>{
                        const cap=Math.min((bucketVid.duration||30)*1000,90000);
                        setTimeout(()=>{bucketVid.removeEventListener('ended',onEnd);fadeVideoAudioOut(bucketVid,true);if(activeLoreVid===bucketVid)activeLoreVid=null;res();},cap);
                    };
                    if(bucketVid.readyState>=1){setCap();}
                    else{bucketVid.addEventListener('loadedmetadata',setCap,{once:true});}
                });
            } else {
                /* Image / discount — linger 40s */
                await new Promise(res=>{
                    loreDoneResolver=res;
                    const t=setTimeout(res,40000);
                    const sb=document.getElementById('rule-sidebar');
                    const origClose=sb.onclick;
                    sb.onclick=(e)=>{
                        clearTimeout(t);loreDoneResolver=null;
                        stopActiveLoreVid();
                        sb.onclick=origClose;if(origClose)origClose(e);res();
                    };
                });
            }

            isInLoreDrop=false;loreDoneResolver=null;
            hideLoreBackdrop();
            /* Peek sidebar off-screen so it lingers tappably */
            lorePeekSidebar();
            endTurn();return;
        }

        await new Promise(r=>setTimeout(r,750));
        checkSpace();
    }

    function movePlayerDirect(playerIdx,targetPos){
        playSlide();
        players[playerIdx].pos=Math.max(0,Math.min(59,targetPos));

    }

    // ══════════════════════════════════════════════
    // SPACE LOGIC — capturedTurnIdx used everywhere
    // to prevent cross-assignment bugs
    // ══════════════════════════════════════════════
    function checkSpace(){
        const capturedTurnIdx=turnIdx;
        const p=players[capturedTurnIdx];
        /* If this player was moved passively (on someone else's turn), skip rule and clear flag */
        if(p.wasPassivelyMoved){
            p.wasPassivelyMoved=false;
            endTurn();return;
        }
        const r=rules[p.pos];
        if(!r){endTurn();return;}
        const spaceCol=getSpaceColor(p.pos);
        const popupEl=document.getElementById('main-popup');
        popupEl.style.borderColor=spaceCol;popupEl.style.boxShadow=`0 0 30px ${spaceCol}`;
        if(r.sound&&r.choice!=='remedy')playSpaceSfx(r.sound);
        /* Remedy: blocked if ANY label deal is active */
        if(r.choice==='remedy'&&(p.isSellout||p.isColdPitchSellout)){showSidebar("CONTRACT ACTIVE","Already signed with a major label.",spaceCol);endTurn();return;}
        if(r.choice==='merch'&&p.isInvestor){showSidebar("ALREADY INVESTED","Inventory full.",spaceCol);endTurn();return;}
        if(r.isAuto){showSidebar(r.title,(r.emoji||"")+" "+(r.desc||"Moving..."),spaceCol);setTimeout(()=>movePlayer(r.shift,false,capturedTurnIdx),1500);return;}

        const modal=document.getElementById('overlay-event');
        const title=document.getElementById('event-title');
        const desc=document.getElementById('event-desc');
        const pBtn=document.getElementById('event-btn-primary');
        const sBtn=document.getElementById('event-btn-secondary');
        const timerUI=document.getElementById('timer-ui');
        const coin=document.getElementById('coin');
        /* Clear any leftover fear button */
        const fb=document.getElementById('maya-fear-btn');if(fb)fb.remove();
        coin.classList.remove('lost-tape-dice');
        coin.style.cssText='width:140px;height:140px;background:var(--gold);border:8px solid #b8860b;border-radius:50%;margin:25px auto;display:none;align-items:center;justify-content:center;font-size:2.5rem;font-weight:bold;color:#5c4305;transform-style:preserve-3d;';
        coin.style.display='none';
        pBtn.style.display='inline-block';pBtn.disabled=false;
        title.innerText=(r.emoji||"")+" "+r.title;
        desc.innerText=r.desc||"";pBtn.innerText="CONTINUE";sBtn.style.display='none';timerUI.style.display='none';
        modal.style.display='flex';resetKbFocus();

        if(r.skipTurns){
            p.skipCount=r.skipTurns;pBtn.onclick=()=>{modal.style.display='none';endTurn();};
        } else if(r.isFigment){
            pBtn.innerText="STEP OUTSIDE (1:00)";sBtn.innerText="STAY INDOORS (-1)";sBtn.style.display='inline-block';
            pBtn.onclick=()=>{
                pBtn.disabled=true;sBtn.style.display='none';timerUI.style.display='block';
                let t=60;timerUI.innerText=t;
                const clock=setInterval(()=>{t--;timerUI.innerText=t;if(t<=0){clearInterval(clock);pBtn.disabled=false;pBtn.innerText="I'M BACK (+2)";pBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(2,false,capturedTurnIdx);};}},1000);
            };
            sBtn.onclick=async()=>{modal.style.display='none';await new Promise(res=>setTimeout(res,800));movePlayer(-1,false,capturedTurnIdx);};
        } else if(r.isFearjoy){

    // ══════════════════════════════════════════════
    // MAYA TIMER — Grammy check for both players after move
    // ══════════════════════════════════════════════
    function startMayaTimer(partnerIdx){
        dismissReminder();
        const fb=document.getElementById('maya-fear-btn');if(fb)fb.remove();
        const overlay=document.getElementById('overlay-event');
        const desc=document.getElementById('event-desc');
        const pBtn=document.getElementById('event-btn-primary');
        const sBtn=document.getElementById('event-btn-secondary');
        const partner=players[partnerIdx];
        /* Capture turnIdx for callbacks */
        const capturedTurnIdx=turnIdx;
        overlay.style.display='flex';pBtn.style.display='none';sBtn.style.display='none';
        let timeLeft=10;
        const update=()=>{desc.innerHTML=`<div style="font-size:5rem;color:var(--blue-glow);text-shadow:0 0 20px var(--blue-glow);margin-bottom:20px;animation:winPulse 1s infinite alternate;">${timeLeft}</div>EYE CONTACT WITH ${partner.name}...<br><span style="color:#888;font-size:0.8rem;letter-spacing:2px;">DON'T LOOK AWAY</span>`;};
        update();
        const clock=setInterval(()=>{
            timeLeft--;update();
            if(timeLeft<=0){
                clearInterval(clock);
                desc.innerHTML=`TIME'S UP.<br><br>Did you both hold eye contact?`;
                pBtn.style.display='inline-block';pBtn.innerText="YES (BOTH +2)";
                pBtn.onclick=()=>{
                    const curPos=players[capturedTurnIdx].pos;
                    const partPos=players[partnerIdx].pos;
                    const curIsTrack=TRACKLIST_INDICES.includes(curPos);
                    const partIsTrack=TRACKLIST_INDICES.includes(partPos);
                    playSlide();players[capturedTurnIdx].pos=Math.min(59,players[capturedTurnIdx].pos+2);
                    /* Partner is passively moved */
                    players[partnerIdx].wasPassivelyMoved=true;
                    playSlide();players[partnerIdx].pos=Math.min(59,players[partnerIdx].pos+2);
                    updatePositions();
                    const landPos=curIsTrack?curPos:(partIsTrack?partPos:curPos);
                    const landR=rules[landPos];
                    /* Only play non-maya tracklist sound — maya sound already played */
                    if(landR&&landR.sound&&!landR.isMaya)playSpaceSfx(landR.sound);
                    /* Grammy check for BOTH players after move */
                    checkGrammyForCurrent();
                    checkPassiveGrammys(players[capturedTurnIdx].name);
                    overlay.style.display='none';endTurn();
                };
                sBtn.style.display='inline-block';sBtn.innerText="NO (BOTH -1)";
                sBtn.onclick=()=>{
                    playSlide();players[capturedTurnIdx].pos=Math.max(0,players[capturedTurnIdx].pos-1);
                    players[partnerIdx].wasPassivelyMoved=true;
                    playSlide();players[partnerIdx].pos=Math.max(0,players[partnerIdx].pos-1);
                    updatePositions();overlay.style.display='none';endTurn();
                };
                resetKbFocus();
            }
        },1000);
    }

    // ══════════════════════════════════════════════
    // PLAYER CLICK
    // ══════════════════════════════════════════════
    function handlePlayerClick(idx){
        if(idx===turnIdx)return;
        if(isSwapping){
            dismissReminder();isSwapping=false;
            document.querySelectorAll('.player').forEach(el=>{el.classList.remove('swap-target');el.style.pointerEvents='none';});
            const p=players[turnIdx],target=players[idx];
            const oldPos=p.pos;
            if(checkPlotArmor(idx,true)){
                playSlide();p.pos=target.pos;
            } else {
                /* Mark target as passively moved */
                target.wasPassivelyMoved=true;
                playSlide();p.pos=target.pos;
                playSlide();target.pos=oldPos;
                if(target.pos===GRAMMY_SPACE)awardSwapGrammy(idx);
            }
            if(p.pos===GRAMMY_SPACE)awardSwapGrammy(turnIdx);
            checkPassiveGrammys(p.name);updatePositions();renderPasses();endTurn();
        } else if(isMayaPartner){
            dismissReminder();isMayaPartner=false;
            document.querySelectorAll('.player').forEach(el=>{el.classList.remove('swap-target');el.style.pointerEvents='none';});
            renderPasses();startMayaTimer(idx);
        }
    }

        dismissReminder();

        document.querySelectorAll('.player').forEach(el=>{el.classList.remove('swap-target');el.style.pointerEvents='none';});
        turnIdx=(turnIdx+1)%players.length;
        globalTurnCount++;
        isMoving=false;isRolling=false;  /* clear both guards */
        isInLoreDrop=false;loreDoneResolver=null;
        document.getElementById('roll-btn').disabled=false;
        /* Update status text immediately so new player's name shows without delay */
        const nextP=players[turnIdx];
        document.getElementById('status-text').innerHTML=`<span style="color:${nextP.avatar.color}">${nextP.name}'S TURN</span>`;
        document.getElementById('ui-layer-color-wash').style.background=`linear-gradient(90deg,${nextP.avatar.color} 0%,transparent 35%)`;

    }
    // ══════════════════════════════════════════════
    // LORE BACKDROP — click outside sidebar to dismiss lore
    // ══════════════════════════════════════════════
    function showLoreBackdrop(){document.getElementById('lore-backdrop').style.display='block';}
    function hideLoreBackdrop(){document.getElementById('lore-backdrop').style.display='none';}
    function handleLoreBackdropClick(){
        if(isInLoreDrop){
            stopActiveLoreVid();
            closeSidebar();
            hideLoreBackdrop();
            isInLoreDrop=false;
            if(loreDoneResolver){loreDoneResolver();loreDoneResolver=null;}
            setTimeout(()=>doRoll(),80);
        } else {
            closeSidebar();
            hideLoreBackdrop();
        }
    }

    // ══════════════════════════════════════════════
    // ACCOLADES KEY
    // ══════════════════════════════════════════════
    function showAccoladeKey(){
        showStatusPopup(
            "🔑 Accolades Key",
            "🏆 Grammy Won\n📝 Label Contract Signed\n👕 Merch Sold (Investor)\n💊 Label Debt Paid (Remedy)\n🎫 Merch Discount Unlocked\n🛡️ Plot Armor (next bad luck blocked)\n📼 Lost Recording survived",
            "Got it!",()=>{},"",()=>{}
        );
        document.getElementById('event-btn-secondary').style.display='none';
    }

    // ══════════════════════════════════════════════
    // PLOT ARMOR — mystery space special event
    // ══════════════════════════════════════════════
    /* Try to give plot armor from a mystery space landing — 1-in-6 chance,
       once per player per game, only if they don't already have it */
    function tryAwardPlotArmor(playerIdx){
        const p=players[playerIdx];
        if(p.hasPlotArmor)return false;
        if(Math.random()>1/6)return false;
        p.hasPlotArmor=true;
        p.accolades.push('🛡️');
        renderPasses();
        return true;
    }

    /* Call before any detrimental move — returns true if blocked by armor */
    function checkPlotArmor(playerIdx,isDetrimental=true){
        if(!isDetrimental)return false;
        const p=players[playerIdx];
        if(!p.hasPlotArmor)return false;
        p.hasPlotArmor=false; /* armor consumed */
        /* Flash shield emoji */
        const e=document.createElement('div');e.className='floating-emoji-slow';
        e.innerText='🛡️';e.style.left='50%';e.style.top='50%';document.body.appendChild(e);
        setTimeout(()=>e.remove(),2400);
        showSidebar('🛡️ PLOT ARMOR!','Shield absorbed the hit. Lucky!','var(--mystery-glow)');
        renderPasses();
        return true; /* blocked */
    }

    // ══════════════════════════════════════════════
    // INIT AUDIO UI on first load
    // ══════════════════════════════════════════════
    /* Deferred so DOM is ready */
    setTimeout(syncAudioUI,100);

    </script>
</body>
</html>
