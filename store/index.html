<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEARJOY | STORE</title>
    <style>
        /* Font Paths - Using Absolute Root Paths */
        @font-face {
            font-family: 'KCOraleSans';
            src: url('/KCOraleSans.otf') format('opentype');
        }
        @font-face {
            font-family: 'KCStrikerSans';
            src: url('/KCStrikerSans.otf') format('opentype');
        }

        :root {
            --glow-color: rgba(255, 255, 255, 0.7);
            --blue-glow: rgba(173, 216, 230, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #000;
            text-align: center;
            overflow-x: hidden;
        }

        /* Darkened Warm Gradient */
        body {
            background: linear-gradient(45deg, #8b443a, #5c2a22, #7a4a31, #3d1a1a);
            background-size: 400% 400%;
            animation: sweep 20s ease infinite;
        }

        @keyframes sweep {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Subtle Float Animation */
        @keyframes subtleFloat {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(3px, -5px) rotate(0.5deg); }
            50% { transform: translate(-2px, -3px) rotate(-0.5deg); }
            75% { transform: translate(-4px, 2px) rotate(0.3deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes flicker {
            0%, 100% { text-shadow: 0 0 12px var(--glow-color), 0 0 22px var(--glow-color); opacity: 1; }
            33% { text-shadow: 0 0 18px var(--glow-color), 0 0 30px var(--glow-color); opacity: 0.9; }
            66% { text-shadow: 0 0 8px var(--glow-color); opacity: 1; }
        }

        .container {
            padding: 60px 20px 180px 20px;
            max-width: 800px;
            width: 100%;
        }

        /* 50% Font Size Increases applied below */

        h1 {
            font-family: 'KCOraleSans', sans-serif;
            font-size: 4.5rem; /* Increased from 3rem */
            margin-bottom: 0.75rem;
            animation: flicker 4s infinite, subtleFloat 6s ease-in-out infinite;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .description {
            font-family: 'KCStrikerSans', sans-serif;
            font-size: 1.65rem; /* Increased from 1.1rem */
            margin-bottom: 5rem;
            text-shadow: 0 0 15px var(--glow-color);
            letter-spacing: 2px;
            animation: subtleFloat 8s ease-in-out infinite reverse;
        }

        .section-title {
            font-family: 'KCOraleSans', sans-serif;
            font-size: 2.1rem; /* Increased from 1.4rem */
            margin-top: 4rem;
            margin-bottom: 2rem;
            animation: flicker 5s infinite alternate, subtleFloat 7s ease-in-out infinite;
            letter-spacing: 3px;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            font-family: 'KCStrikerSans', sans-serif;
            text-decoration: none;
            color: #000;
            border: 2px solid #000;
            padding: 18px 30px;
            border-radius: 60px;
            width: 320px;
            background: transparent;
            box-shadow: 0 0 12px var(--glow-color);
            transition: all 0.3s ease;
            display: block;
            font-size: 1.5rem; /* Increased from 1.0rem baseline */
            /* Light Blue Backdrop Glow on Text */
            text-shadow: 0 0 10px var(--blue-glow);
            animation: subtleFloat 9s ease-in-out infinite;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 0 25px var(--glow-color);
            background: rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 15px var(--blue-glow), 0 0 5px white;
        }

        /* Stylized Navigation Cluster Centered */
        .nav-cluster {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            padding: 8px 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 100;
            white-space: nowrap;
        }

        .nav-cluster a {
            font-family: 'KCStrikerSans', sans-serif;
            text-decoration: none;
            color: #fff;
            padding: 10px 20px;
            font-size: 1.1rem; /* Increased from 0.75rem */
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .nav-cluster a:hover {
            color: #ffecd2;
            text-shadow: 0 0 15px var(--glow-color);
            transform: scale(1.1);
        }

        .nav-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            align-self: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FEARJOY - STORE</h1>
        <p class="description">Debut Album out 2026</p>

        <h2 class="section-title">$TORE (support the homies):</h2>
        <div class="button-stack">
            <a href="/store" class="btn">Shirts</a>
            <a href="/store" class="btn">Pre-order Vinyl</a>
            <a href="/store" class="btn">Pre-order Album (digital)</a>
            <a href="/store" class="btn">Game Pieces - Unique</a>
            <a href="/store" class="btn">Posters</a>
        </div>

        <h2 class="section-title">FREE (enjoy!)</h2>
        <div class="button-stack">
            <a href="/store" class="btn">Playtest: The Game (Web)</a>
            <a href="/store" class="btn">Pre-save (Streaming)</a>
        </div>
    </div>

    <div class="nav-cluster">
        <a href="https://freejoy.club">Home</a>
        <div class="nav-divider"></div>
        <a href="/breathe">Breathe</a>
        <div class="nav-divider"></div>
        <a href="/move">Move</a>
        <div class="nav-divider"></div>
        <a href="/game">Game</a>
    </div>

</body>
</html>
