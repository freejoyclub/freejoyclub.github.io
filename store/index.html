<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEARJOY | STORE</title>
    <style>
        /* Font Paths - Using Absolute Root Paths */
        @font-face {
            font-family: 'KCOraleSans';
            src: url('/KCOraleSans.otf') format('opentype');
        }
        @font-face {
            font-family: 'StrikerSans';
            src: url('/KCStrikerSans.otf') format('opentype');
        }

        :root {
            --glow-color: rgba(255, 255, 255, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #000;
            text-align: center;
        }

        /* Darkened Warm Gradient */
        body {
            background: linear-gradient(45deg, #8b443a, #5c2a22, #7a4a31, #3d1a1a);
            background-size: 400% 400%;
            animation: sweep 20s ease infinite;
        }

        @keyframes sweep {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes flicker {
            0%, 100% { text-shadow: 0 0 8px var(--glow-color), 0 0 15px var(--glow-color); opacity: 1; }
            33% { text-shadow: 0 0 12px var(--glow-color), 0 0 22px var(--glow-color); opacity: 0.9; }
            66% { text-shadow: 0 0 5px var(--glow-color); opacity: 1; }
        }

        .container {
            padding: 60px 20px 150px 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-family: 'KCOraleSans', sans-serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            animation: flicker 4s infinite;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .description {
            font-family: 'StrikerSans', sans-serif;
            font-size: 1.1rem;
            margin-bottom: 4rem;
            text-shadow: 0 0 10px var(--glow-color);
            letter-spacing: 1px;
        }

        .section-title {
            font-family: 'KCOraleSans', sans-serif;
            font-size: 1.4rem;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            animation: flicker 5s infinite alternate;
            letter-spacing: 2px;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .btn {
            font-family: 'StrikerSans', sans-serif;
            text-decoration: none;
            color: #000;
            border: 1.5px solid #000;
            padding: 14px 20px;
            border-radius: 50px;
            width: 260px;
            background: transparent;
            box-shadow: 0 0 8px var(--glow-color);
            transition: all 0.3s ease;
            display: block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 18px var(--glow-color);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Stylized Navigation Cluster */
        .nav-cluster {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-cluster a {
            font-family: 'StrikerSans', sans-serif;
            text-decoration: none;
            color: #fff;
            padding: 10px 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .nav-cluster a:hover {
            color: #ffecd2;
            text-shadow: 0 0 10px var(--glow-color);
        }

        .nav-divider {
            width: 1px;
            height: 15px;
            background: rgba(255, 255, 255, 0.2);
            align-self: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FEARJOY - STORE</h1>
        <p class="description">Debut Album [ ] out [ / /2026]</p>

        <h2 class="section-title">$TORE (support the homies):</h2>
        <div class="button-stack">
            <a href="/store" class="btn">Shirts</a>
            <a href="/store" class="btn">Pre-order Vinyl</a>
            <a href="/store" class="btn">Pre-order Album (digital)</a>
            <a href="/store" class="btn">Game Pieces / Unique</a>
            <a href="/store" class="btn">Posters</a>
        </div>

        <h2 class="section-title">FREE (enjoy!)</h2>
        <div class="button-stack">
            <a href="/store" class="btn">Playtest: The Game (Web)</a>
            <a href="/store" class="btn">Pre-save (Streaming)</a>
        </div>
    </div>

    <div class="nav-cluster">
        <a href="https://freejoy.club">Home</a>
        <div class="nav-divider"></div>
        <a href="/breathe">Breathe</a>
        <div class="nav-divider"></div>
        <a href="/move">Move</a>
        <div class="nav-divider"></div>
        <a href="/game">Game</a>
    </div>

</body>
</html>
