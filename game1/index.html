<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fearjoy - v5.5</title>
    <style>
        :root {
            --wood-dark: #2a180b; --wood-mid: #3d2616; --wood-light: #4e3625;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --gold: #ffd700; --ui-bg: rgba(0,0,0,0.9); --remedy-blue: #00d4ff;
        }

        @keyframes woodFade {
            0% { background-color: #2a180b; }
            33% { background-color: #3d2616; }
            66% { background-color: #4e3625; }
            100% { background-color: #2a180b; }
        }

        @keyframes sparkle {
            0% { box-shadow: 0 0 0px var(--gold); transform: scale(1); }
            50% { box-shadow: 0 0 40px var(--gold); transform: scale(1.15); }
            100% { box-shadow: 0 0 0px var(--gold); transform: scale(1); }
        }

        body {
            animation: woodFade 15s ease-in-out infinite;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px),
                              linear-gradient(to bottom, rgba(0,0,0,0.2), transparent);
            color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow: hidden;
        }

        #merch-tracker {
            position: fixed; left: 20px; top: 100px; width: 220px; background: var(--ui-bg); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); z-index: 5;
        }
        .tracker-item { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .tracker-head { width: 35px; height: 35px; background-size: contain; background-repeat: no-repeat; border-radius: 50%; }
        .icon-stack { font-size: 1.1rem; line-height: 1; display: flex; flex-wrap: wrap; gap: 2px; }

        #bottom-nav { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 4px; text-decoration: none; font-size: 0.7rem; font-weight: bold; transition: 0.3s; }
        .nav-btn:hover { background: white; color: black; }

        #ui-layer { display: flex; align-items: center; gap: 30px; background: var(--ui-bg); padding: 20px 40px; border-radius: 12px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); width: 850px; justify-content: space-between; z-index: 10; }
        #dice-box { position: relative; width: 80px; height: 80px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: bold; box-shadow: 0 6px 0 #bbb; }
        #dice-box.payoff { animation: sparkle 0.8s ease-in-out infinite; background: var(--gold); }
        #dice-box.remedy-hit { animation: sparkle 0.8s ease-in-out infinite; background: var(--remedy-blue); color: white; }

        #board-container { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(5, 1fr); gap: 12px; padding: 20px; background: rgba(0,0,0,0.1); border-radius: 20px; position: relative; width: 950px; height: 550px; }
        .space { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--tape-white); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; background: rgba(255,255,255,0.05); text-align: center; }
        
        .special { border-color: var(--gold); color: var(--gold); font-size: 2rem !important; cursor: pointer; }
        .remedy-space { border-color: var(--remedy-blue) !important; color: var(--remedy-blue) !important; font-size: 2rem !important; }
        .fear { border-color: var(--fear-glow); color: var(--fear-glow); font-size: 0.9rem !important; font-weight: 900; }
        .joy { border-color: var(--joy-glow); color: var(--joy-glow); font-size: 0.9rem !important; font-weight: 900; }

        .player { width: 70px; height: 70px; position: absolute; z-index: 100; transition: all 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); background-size: contain; background-repeat: no-repeat; background-position: center bottom; pointer-events: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .popup { background: #111; padding: 40px; border-radius: 20px; border: 2px solid #444; width: 480px; text-align: center; }
        button { padding: 12px 25px; font-family: inherit; font-weight: bold; cursor: pointer; background: #fff; border: none; border-radius: 4px; text-transform: uppercase; font-size: 0.9rem; margin: 10px; }

        #rule-sidebar { position: fixed; right: 20px; top: 50%; transform: translateY(-50%) translateX(400px); width: 240px; background: var(--ui-bg); padding: 25px; border-radius: 15px; border: 2px solid var(--joy-glow); transition: 0.5s; z-index: 100; text-align: center; }
        #rule-sidebar.active { transform: translateY(-50%) translateX(0); }
    </style>
</head>
<body>

    <div id="bottom-nav">
        <a href="https://freejoy.club" class="nav-btn">HOME</a>
        <a href="https://freejoy.club" class="nav-btn">STORE</a>
    </div>

    <div id="merch-tracker">
        <h4 style="margin:0 0 10px 0; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6;">PROJECT DATA</h4>
        <div id="tracker-list"></div>
    </div>

    <div id="rule-sidebar" onclick="this.classList.remove('active')">
        <h3 id="sidebar-title" style="color: var(--joy-glow); font-size: 1.5rem; margin-top: 0;"></h3>
        <p id="sidebar-desc" style="font-size: 1rem; line-height: 1.4;"></p>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 20px;">(CLICK TO DISMISS)</p>
    </div>

    <div id="overlay-win" class="overlay"><div class="popup" style="border-color: var(--joy-glow);"><h1>SUCCESS</h1><p>THE TOUR IS OVER.</p><button onclick="location.reload()">REPLAY</button></div></div>
    <div id="overlay-count" class="overlay" style="display:flex"><div class="popup"><h2>PLAYERS?</h2><button onclick="startSetup(1)">1</button><button onclick="startSetup(2)">2</button><button onclick="startSetup(3)">3</button></div></div>
    <div id="overlay-names" class="overlay"><div class="popup"><h2 id="setup-label">PLAYER 1</h2><input type="text" id="name-input" style="padding:10px; width:80%; margin-bottom:20px; font-family:inherit;" placeholder="NAME"><div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;"><div id="btn-jesse" style="width:60px; height:60px; background-image:url('jesse.png'); background-size:contain; cursor:pointer; opacity:0.4;" onclick="selectHead('jesse', '#007bff')"></div><div id="btn-marco" style="width:60px; height:60px; background-image:url('marco.png'); background-size:contain; cursor:pointer; opacity:0.4;" onclick="selectHead('marco', '#ffcc00')"></div><div id="btn-grant" style="width:60px; height:60px; background-image:url('grant.png'); background-size:contain; cursor:pointer; opacity:0.4;" onclick="selectHead('grant', '#ff00ff')"></div></div><button onclick="confirmPlayer()">NEXT</button></div></div>

    <div id="overlay-merch" class="overlay">
        <div class="popup" style="border-color: var(--gold);">
            <h2>👕 INVEST IN MERCH?</h2>
            <p>Rewind 4 spaces now.</p>
            <p style="color:var(--gold); font-weight:bold;">THE PAYOFF: Double any 1 or 2 you roll.</p>
            <button style="background:var(--joy-glow); color:black;" onclick="handleChoice('merch', true)">INVEST</button>
            <button onclick="handleChoice('merch', false)">PASS</button>
        </div>
    </div>

    <div id="overlay-remedy" class="overlay">
        <div class="popup" style="border-color: var(--remedy-blue);">
            <h2>💊 THE REMEDY</h2>
            <p>Sell out? Fast forward 6 spaces now.</p>
            <p style="color:var(--fear-glow); font-weight:bold;">THE CATCH: Any 6 you roll makes you REWIND 2 spaces.</p>
            <button style="background:var(--remedy-blue); color:white;" onclick="handleChoice('remedy', true)">SELL OUT</button>
            <button onclick="handleChoice('remedy', false)">STAY TRUE</button>
        </div>
    </div>

    <h1 style="letter-spacing: 0.5em; opacity: 0.3; margin: 10px 0;">FEARJOY</h1>

    <div id="ui-layer">
        <div id="dice-box">?</div>
        <div id="turn-info"><div id="status-text" style="font-size:3rem; font-weight:900;">...</div></div>
        <button id="roll-btn" onclick="doRoll()" disabled>ROLL</button>
    </div>

    <div id="board-container"></div>

<script>
    let players = [], setupIdx = 0, totalPlayers = 0, tempHead = null, turnIndex = 0, isMoving = false;

    const rules = {
        4: { id:'joy', title:"DAYSPRING", emoji:"☀️", desc:"The sun rises! Spring ahead 3 spaces.", shift: 3 },
        8: { id:'merch', title:"INVESTMENT", emoji:"👕", desc:"Buy into the merch line. High risk, high payoff." },
        11: { id:'joy', title:"JOY", emoji:"JOY", desc:"Momentum is building. Move forward 1 space.", shift: 1 },
        13: { id:'remedy', title:"THE REMEDY", emoji:"💊", desc:"A shortcut with a bitter aftertaste. Choose wisely." },
        18: { id:'fear', title:"FEAR", emoji:"FEAR", desc:"Self-doubt slows the van. Move back 1 space.", shift: -1 },
        22: { id:'van', title:"BREAKDOWN", emoji:"🛠", desc:"Mechanical issues. Skip your next turn.", count: 1 },
        28: { id:'fear', title:"FEAR", emoji:"FEAR", desc:"The road is long. Move back 2 spaces.", shift: -2 },
        32: { id:'joy', title:"JOY", emoji:"JOY", desc:"The crowd is cheering. Move forward 2 spaces.", shift: 2 },
        36: { id:'fear', title:"FEAR", emoji:"FEAR", desc:"Fatigue sets in. Move back 1 space.", shift: -1 }
    };

    function startSetup(n) { totalPlayers = n; document.getElementById('overlay-count').style.display = 'none'; document.getElementById('overlay-names').style.display = 'flex'; }
    function selectHead(id, c) { tempHead = { id, color: c, img: id + '.png' }; document.querySelectorAll('[id^="btn-"]').forEach(b => b.style.opacity = '0.4'); document.getElementById('btn-' + id).style.opacity = '1'; }
    function confirmPlayer() {
        let n = document.getElementById('name-input').value.trim() || `P${setupIdx+1}`;
        if(!tempHead) return;
        players.push({ name: n.toUpperCase(), head: tempHead, pos: 0, skipCount: 0, isInvestor: false, merchSales: 0, isSellout: false, remedyHITS: 0 });
        setupIdx++;
        if(setupIdx < totalPlayers) { document.getElementById('name-input').value = ''; tempHead = null; }
        else { document.getElementById('overlay-names').style.display = 'none'; initGame(); }
    }

    function initGame() {
        const board = document.getElementById('board-container');
        for(let i=0; i<40; i++) {
            const s = document.createElement('div');
            s.id = 's' + i; s.className = 'space';
            if(rules[i]) {
                s.innerText = rules[i].emoji; s.classList.add('special');
                if(rules[i].id === 'remedy') s.classList.add('remedy-space');
                if(rules[i].id === 'fear') s.classList.add('fear');
                if(rules[i].id === 'joy' && rules[i].emoji === 'JOY') s.classList.add('joy');
                s.onclick = (e) => { e.stopPropagation(); triggerRuleSidebar(i); };
            } else s.innerText = (i===0) ? "START" : (i===39) ? "END" : i;
            
            let row = Math.floor(i/8);
            s.style.gridRow = (5 - row);
            s.style.gridColumn = (row % 2 === 1) ? (8 - (i%8)) : (i%8) + 1;
            board.appendChild(s);
        }
        players.forEach((p, i) => {
            const pElem = document.createElement('div'); pElem.id = 'piece' + i; pElem.className = 'player';
            pElem.style.backgroundImage = `url(${p.head.img})`; board.appendChild(pElem);
            updatePiecePos(i);
        });
        document.getElementById('roll-btn').disabled = false; updateUI();
    }

    function triggerRuleSidebar(idx) {
        const r = rules[idx];
        if(!r) return;
        document.getElementById('sidebar-title').innerText = r.title;
        document.getElementById('sidebar-desc').innerText = r.desc;
        const bar = document.getElementById('rule-sidebar');
        bar.style.borderColor = r.id === 'fear' ? 'var(--fear-glow)' : r.id === 'remedy' ? 'var(--remedy-blue)' : 'var(--joy-glow)';
        bar.classList.add('active');
    }

    function updatePiecePos(idx) {
        const p = players[idx], target = document.getElementById('s' + p.pos), pElem = document.getElementById('piece' + idx);
        if(!target || !pElem) return;
        pElem.style.left = `${target.offsetLeft + (target.offsetWidth/2) - 35 + (idx*10 - 10)}px`;
        pElem.style.top = `${target.offsetTop + (target.offsetHeight/2) - 55}px`;
    }

    function updateUI() {
        const p = players[turnIndex], s = document.getElementById('status-text');
        s.innerText = p.name; s.style.color = p.head.color;
        const list = document.getElementById('tracker-list'); list.innerHTML = '';
        players.forEach(p => {
            if(!p.isInvestor && !p.isSellout) return;
            let icons = "";
            for(let i=0; i<p.merchSales; i++) icons += "👕";
            for(let i=0; i<p.remedyHITS; i++) icons += "💊";
            list.innerHTML += `<div class="tracker-item"><div style="display:flex;align-items:center;gap:8px;"><div class="tracker-head" style="background-image:url('${p.head.img}')"></div><div style="font-size:0.7rem;">${p.name}</div></div><div class="icon-stack">${icons}</div></div>`;
        });
    }

    async function doRoll() {
        if(isMoving) return;
        document.getElementById('rule-sidebar').classList.remove('active');
        const p = players[turnIndex];
        if(p.skipCount > 0) { p.skipCount--; updateUI(); endTurn(); return; }
        
        isMoving = true; document.getElementById('roll-btn').disabled = true;
        const box = document.getElementById('dice-box'); box.className = '';
        
        let roll = Math.floor(Math.random()*6)+1;
        for(let i=0; i<8; i++) { box.innerText = Math.floor(Math.random()*6)+1; await new Promise(r => setTimeout(r, 60)); }
        box.innerText = roll; await new Promise(r => setTimeout(r, 400));

        if(p.isInvestor && (roll === 1 || roll === 2)) {
            box.classList.add('payoff'); roll *= 2; box.innerText = roll; p.merchSales++; updateUI();
            await new Promise(r => setTimeout(r, 800));
        } else if(p.isSellout && roll === 6) {
            box.classList.add('remedy-hit'); roll = -2; box.innerText = roll; p.remedyHITS++; updateUI();
            await new Promise(r => setTimeout(r, 800));
        }

        if(roll > 0) { for(let s=0; s<roll; s++) { if(p.pos < 39) { p.pos++; updatePiecePos(turnIndex); await new Promise(r => setTimeout(r, 250)); } } }
        else { for(let s=0; s>roll; s--) { if(p.pos > 0) { p.pos--; updatePiecePos(turnIndex); await new Promise(r => setTimeout(r, 250)); } } }
        
        checkFinal();
    }

    async function checkFinal() {
        const p = players[turnIndex], r = rules[p.pos];
        if(r) {
            triggerRuleSidebar(p.pos);
            await new Promise(res => setTimeout(res, 600));

            if(r.id === 'merch') document.getElementById('overlay-merch').style.display = 'flex';
            else if(r.id === 'remedy') document.getElementById('overlay-remedy').style.display = 'flex';
            else if(r.id === 'van') { p.skipCount = r.count; endTurn(); }
            else if(r.shift) { 
                await new Promise(res => setTimeout(res, 800)); 
                p.pos += r.shift; 
                if(p.pos < 0) p.pos = 0;
                updatePiecePos(turnIndex); 
                endTurn(); 
            }
        } else if(p.pos >= 39) { document.getElementById('overlay-win').style.display = 'flex'; }
        else endTurn();
    }

    async function handleChoice(type, choice) {
        document.getElementById('overlay-merch').style.display = 'none';
        document.getElementById('overlay-remedy').style.display = 'none';
        const p = players[turnIndex];
        if(type === 'merch' && choice) { p.isInvestor = true; for(let i=0; i<4; i++) { if(p.pos > 0) { p.pos--; updatePiecePos(turnIndex); await new Promise(r => setTimeout(r, 200)); } } }
        if(type === 'remedy' && choice) { p.isSellout = true; for(let i=0; i<6; i++) { if(p.pos < 39) { p.pos++; updatePiecePos(turnIndex); await new Promise(r => setTimeout(r, 200)); } } }
        endTurn();
    }

    function endTurn() { turnIndex = (turnIndex + 1) % players.length; updateUI(); isMoving = false; document.getElementById('roll-btn').disabled = false; }
</script>
</body>
</html>
