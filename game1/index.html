<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fearjoy - Play This</title>
    <style>
        :root {
            --wood-dark: #2a180b;
            --wood-mid: #3d2616;
            --wood-light: #4e3625;
            --tape-white: #fdfdfd;
            --joy-glow: #00ff88;
            --fear-glow: #ff4444;
            --ui-bg: rgba(0,0,0,0.85);
        }

        body {
            /* Faded Wood Plank Pattern */
            background-color: var(--wood-mid);
            background-image: 
                repeating-linear-gradient(90deg, 
                    transparent, 
                    transparent 80px, 
                    rgba(0,0,0,0.1) 80px, 
                    rgba(0,0,0,0.1) 82px),
                linear-gradient(to right, 
                    var(--wood-dark), 
                    var(--wood-mid) 20%, 
                    var(--wood-light) 40%, 
                    var(--wood-mid) 60%, 
                    var(--wood-dark) 80%, 
                    var(--wood-mid) 100%);
            color: white; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            min-height: 100vh; 
            overflow: hidden;
        }

        h1 { font-size: 2.2rem; margin: 20px 0; text-transform: uppercase; letter-spacing: 0.4em; font-weight: 900; }

        /* UI Panel */
        #ui-layer { 
            display: flex; align-items: center; gap: 20px; 
            background: var(--ui-bg); padding: 20px 30px; 
            border-radius: 12px; margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
            width: 700px; justify-content: space-between;
            z-index: 10;
        }
        
        #dice-box { width: 60px; height: 60px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; box-shadow: 0 5px 0 #bbb; }
        
        #turn-text-container { flex-grow: 1; padding: 0 30px; text-align: left; }
        #status-text { font-size: 1rem; opacity: 0.6; margin-bottom: 4px; }
        #turn-text { 
            font-size: 2.8rem; /* MASSIVE FONT */
            font-weight: 900; 
            color: white; 
            text-transform: uppercase; 
            line-height: 1;
        }

        /* Rule Sidebar (Fixed to Right) */
        #rule-sidebar { 
            position: fixed; right: 40px; top: 50%; transform: translateY(-50%) translateX(300px);
            width: 240px; background: var(--ui-bg); padding: 25px; 
            border-radius: 15px; border: 2px solid var(--joy-glow); 
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left; z-index: 100;
        }
        #rule-sidebar.active { transform: translateY(-50%) translateX(0); }
        #rule-sidebar h3 { color: var(--joy-glow); margin: 0 0 10px 0; font-size: 1.2rem; }
        #rule-sidebar p { font-size: 0.95rem; line-height: 1.5; color: #eee; margin: 0; }

        /* The Board (Centered) */
        #board-container { 
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); 
            gap: 25px; padding: 40px; background: rgba(0,0,0,0.1); 
            border-radius: 20px; position: relative; 
            width: 750px; height: 550px;
        }

        .space { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 3px solid var(--tape-white); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 1.2rem; 
            background: rgba(255,255,255,0.05); position: relative; 
        }
        .special { border-color: #ffd700; color: #ffd700; font-size: 2rem; }

        /* Raw PNG Players (No Circles) */
        .player { 
            width: 85px; height: 85px; /* 80% Bigger */
            position: absolute; z-index: 100; 
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); 
            background-size: contain; background-repeat: no-repeat; 
            background-position: center bottom; pointer-events: none;
        }

        /* Setup Overlays */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.98); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .popup-window { background: #111; padding: 50px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 500px; }
        .avatar-option { width: 80px; height: 80px; background-size: contain; background-repeat: no-repeat; cursor: pointer; border: 2px solid transparent; padding: 5px; }
        .avatar-option:hover { transform: scale(1.1); }
        .avatar-option.selected { border-bottom: 4px solid var(--joy-glow); }
        
        button { padding: 15px 30px; font-family: inherit; font-weight: bold; cursor: pointer; background: #fff; border: none; border-radius: 5px; text-transform: uppercase; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="setup-count" class="overlay">
        <h2>HOW MANY PLAYERS?</h2>
        <div style="display:flex; gap:15px;">
            <button onclick="initSetup(1)">1</button>
            <button onclick="initSetup(2)">2</button>
            <button onclick="initSetup(3)">3</button>
            <button onclick="initSetup(4)">4</button>
        </div>
    </div>

    <div id="setup-names" class="overlay" style="display:none">
        <div class="popup-window">
            <h2 id="setup-title">PLAYER 1</h2>
            <input type="text" id="p-name" placeholder="ENTER NAME" style="width: 80%; padding: 15px; background: #222; color: white; border: 1px solid #444; font-family: inherit; font-size: 1.2rem; margin-bottom: 20px;">
            <div id="avatar-list" style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
                </div>
            <button onclick="savePlayer()">NEXT PLAYER</button>
        </div>
    </div>

    <h1>Fearjoy - Play This</h1>

    <div id="ui-layer">
        <div id="dice-box">?</div>
        <div id="turn-text-container">
            <div id="status-text">WAITING...</div>
            <div id="turn-text">---</div>
        </div>
        <button id="roll-btn" onclick="handleRoll()" disabled>ROLL</button>
    </div>

    <div id="board-container"></div>
    
    <div id="rule-sidebar">
        <h3 id="rule-title"></h3>
        <p id="rule-desc"></p>
    </div>

<script>
    const avatarData = [
        { id: 'jesse', img: 'jesse.png', color: '#007bff' },
        { id: 'marco', img: 'marco.png', color: '#ffcc00' },
        { id: 'grant', img: 'grant.png', color: '#ff00ff' }
    ];

    const rules = {
        3: { title: "🛠 Van Breaks Down", emoji: "🛠", desc: "Mechanical failure. Skip your next turn.", type: "skip" },
        12: { title: "🌞 Dayspring", emoji: "🌞", desc: "The sun rises. Fast forward 3 spaces!", type: "forward", val: 3 },
        19: { title: "🛠 Van Breaks Down", emoji: "🛠", desc: "Mechanical failure. Skip your next turn.", type: "skip" },
        25: { title: "🌞 Dayspring", emoji: "🌞", desc: "The sun rises. Fast forward 3 spaces!", type: "forward", val: 3 }
    };

    let players = [];
    let totalCount = 0;
    let setupIndex = 0;
    let selectedAv = null;
    let turnIndex = 0;
    let moving = false;

    // --- SETUP LOGIC ---
    function initSetup(num) {
        totalCount = num;
        document.getElementById('setup-count').style.display = 'none';
        document.getElementById('setup-names').style.display = 'flex';
        renderAvatars();
    }

    function renderAvatars() {
        const list = document.getElementById('avatar-list');
        list.innerHTML = '';
        avatarData.forEach(av => {
            const div = document.createElement('div');
            div.className = 'avatar-option';
            div.style.backgroundImage = `url(${av.img})`;
            div.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                selectedAv = av;
            };
            list.appendChild(div);
        });
    }

    function savePlayer() {
        const nameInput = document.getElementById('p-name');
        if(!selectedAv) return alert("Select your head!");
        
        players.push({
            name: nameInput.value || `PLAYER ${setupIndex + 1}`,
            avatar: selectedAv,
            pos: 0,
            skip: false
        });

        setupIndex++;
        if(setupIndex < totalCount) {
            nameInput.value = '';
            selectedAv = null;
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('setup-title').innerText = `PLAYER ${setupIndex + 1}`;
        } else {
            startGame();
        }
    }

    // --- GAME ENGINE ---
    function startGame() {
        document.getElementById('setup-names').style.display = 'none';
        document.getElementById('roll-btn').disabled = false;
        initBoard();
        updateUI();
    }

    function initBoard() {
        const board = document.getElementById('board-container');
        for(let i=0; i<30; i++) {
            const s = document.createElement('div');
            s.id = `s${i}`;
            s.className = 'space';
            if(rules[i]) {
                s.innerText = rules[i].emoji;
                s.classList.add('special');
            } else {
                s.innerText = (i===0) ? "START" : (i===29) ? "END" : i;
            }
            // Snake logic
            let r = Math.floor(i/6);
            s.style.gridRow = (5 - r);
            s.style.gridColumn = (r%2 === 1) ? (6 - (i%6)) : (i%6) + 1;
            board.appendChild(s);
        }

        players.forEach((p, i) => {
            const pElem = document.createElement('div');
            pElem.id = `piece${i}`;
            pElem.className = 'player';
            pElem.style.backgroundImage = `url(${p.avatar.img})`;
            board.appendChild(pElem);
            placePiece(i);
        });
    }

    function placePiece(idx) {
        const p = players[idx];
        const target = document.getElementById(`s${p.pos}`);
        const pElem = document.getElementById(`piece${idx}`);
        const offset = (idx * 8) - (players.length * 4); // Slight overlap spread
        pElem.style.left = `${target.offsetLeft + (target.offsetWidth/2) - 42 + offset}px`;
        pElem.style.top = `${target.offsetTop + (target.offsetHeight/2) - 60}px`;
    }

    function updateUI() {
        const p = players[turnIndex];
        document.getElementById('status-text').innerText = p.skip ? "NEXT TURN SKIPPED" : "YOUR TURN";
        document.getElementById('turn-text').innerText = p.name;
        document.getElementById('turn-text').style.textShadow = `0 0 20px ${p.avatar.color}`;
    }

    async function handleRoll() {
        if(moving) return;
        moving = true;
        document.getElementById('roll-btn').disabled = true;
        document.getElementById('rule-sidebar').classList.remove('active');

        if(players[turnIndex].skip) {
            players[turnIndex].skip = false;
            await new Promise(r => setTimeout(r, 1000));
            endTurn();
            return;
        }

        let roll = 0;
        for(let i=0; i<10; i++) {
            roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-box').innerText = roll;
            await new Promise(r => setTimeout(r, 60));
        }

        await new Promise(r => setTimeout(r, 900));

        for(let step=0; step<roll; step++) {
            if(players[turnIndex].pos < 29) {
                players[turnIndex].pos++;
                placePiece(turnIndex);
                await new Promise(r => setTimeout(r, 450));
            }
        }

        // Rule Trigger
        const finalPos = players[turnIndex].pos;
        if(rules[finalPos]) {
            const rule = rules[finalPos];
            document.getElementById('rule-title').innerText = rule.title;
            document.getElementById('rule-desc').innerText = rule.desc;
            document.getElementById('rule-sidebar').classList.add('active');
            
            await new Promise(r => setTimeout(r, 2000));
            
            if(rule.type === 'forward') {
                players[turnIndex].pos = Math.min(29, players[turnIndex].pos + rule.val);
                placePiece(turnIndex);
            } else if(rule.type === 'skip') {
                players[turnIndex].skip = true;
            }
        }

        if(players[turnIndex].pos === 29) {
            alert(players[turnIndex].name + " WON THE TAPE!");
            location.reload();
        } else {
            endTurn();
        }
    }

    function endTurn() {
        turnIndex = (turnIndex + 1) % players.length;
        updateUI();
        moving = false;
        document.getElementById('roll-btn').disabled = false;
    }
</script>
</body>
</html>
