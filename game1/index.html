<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fearjoy - Play This</title>
    <style>
        :root {
            --wood-dark: #2a180b; --wood-mid: #3d2616; --wood-light: #4e3625;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --ui-bg: rgba(0,0,0,0.9);
        }

        body {
            background-color: var(--wood-mid);
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px),
                linear-gradient(to right, var(--wood-dark), var(--wood-mid) 20%, var(--wood-light) 40%, var(--wood-mid) 60%, var(--wood-dark) 80%, var(--wood-mid) 100%);
            color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow: hidden;
        }

        #ui-layer { 
            display: flex; align-items: center; gap: 20px; background: var(--ui-bg); padding: 20px 30px; 
            border-radius: 12px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); width: 700px; justify-content: space-between; z-index: 10;
        }
        
        #dice-box { width: 60px; height: 60px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; box-shadow: 0 5px 0 #bbb; }
        #turn-text { font-size: 2.8rem; font-weight: 900; text-transform: uppercase; line-height: 1; }

        #board-container { 
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); 
            gap: 25px; padding: 40px; background: rgba(0,0,0,0.1); border-radius: 20px; position: relative; width: 750px; height: 550px;
        }

        .space { 
            width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--tape-white); 
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; background: rgba(255,255,255,0.05);
        }
        .special { border-color: #ffd700; color: #ffd700; font-size: 3.5rem !important; cursor: pointer; }

        .player { width: 90px; height: 90px; position: absolute; z-index: 100; transition: all 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); background-size: contain; background-repeat: no-repeat; background-position: center bottom; pointer-events: none; }

        /* Overlays */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .popup { background: #111; padding: 40px; border-radius: 20px; border: 2px solid #444; width: 450px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        .avatar-select { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .av-btn { width: 70px; height: 70px; background-size: contain; background-repeat: no-repeat; cursor: pointer; border-bottom: 4px solid transparent; opacity: 0.4; }
        .av-btn.selected { opacity: 1; border-color: var(--joy-glow); transform: scale(1.1); }

        button { padding: 12px 24px; font-family: inherit; font-weight: bold; cursor: pointer; background: #fff; border: none; border-radius: 4px; text-transform: uppercase; margin: 5px; }
        .btn-invest { background: var(--joy-glow); color: black; }
        .btn-skip { background: var(--fear-glow); color: white; }
        input { padding: 12px; background: #222; border: 1px solid #555; color: white; width: 80%; margin-bottom: 20px; text-align: center; font-size: 1.2rem; font-family: inherit; }

        #rule-sidebar { 
            position: fixed; right: 40px; top: 50%; transform: translateY(-50%) translateX(400px);
            width: 240px; background: var(--ui-bg); padding: 25px; border-radius: 15px; border: 2px solid var(--joy-glow); transition: 0.5s; text-align: left; z-index: 100;
        }
        #rule-sidebar.active { transform: translateY(-50%) translateX(0); }
    </style>
</head>
<body>

    <div id="overlay-count" class="overlay" style="display:flex">
        <div class="popup">
            <h2>HOW MANY PLAYERS?</h2>
            <button onclick="startSetup(1)">1</button>
            <button onclick="startSetup(2)">2</button>
            <button onclick="startSetup(3)">3</button>
        </div>
    </div>

    <div id="overlay-names" class="overlay">
        <div class="popup">
            <h2 id="setup-label">PLAYER 1</h2>
            <input type="text" id="name-input" placeholder="ENTER NAME">
            <div class="avatar-select">
                <div class="av-btn" id="btn-jesse" style="background-image:url('jesse.png')" onclick="selectHead('jesse', '#007bff')"></div>
                <div class="av-btn" id="btn-marco" style="background-image:url('marco.png')" onclick="selectHead('marco', '#ffcc00')"></div>
                <div class="av-btn" id="btn-grant" style="background-image:url('grant.png')" onclick="selectHead('grant', '#ff00ff')"></div>
            </div>
            <button onclick="confirmPlayer()">NEXT</button>
        </div>
    </div>

    <div id="overlay-merch" class="overlay">
        <div class="popup" style="border-color: #ffd700;">
            <h2>👕 INVEST IN MERCH?</h2>
            <p>Rewind 4 spaces now to double all 1s and 2s for the rest of the game.</p>
            <button class="btn-invest" onclick="handleMerch(true)">INVEST & REWIND</button>
            <button onclick="handleMerch(false)">PASS</button>
        </div>
    </div>

    <div id="overlay-skip" class="overlay">
        <div class="popup" style="border-color: var(--fear-glow);">
            <h2 id="skip-player-name">PLAYER</h2>
            <p>Your van is in the shop. You must skip this turn.</p>
            <button class="btn-skip" onclick="acknowledgeSkip()">BUMMER (SKIP)</button>
        </div>
    </div>

    <h1>Fearjoy - Play This</h1>

    <div id="ui-layer">
        <div id="dice-box">?</div>
        <div id="turn-info">
            <div id="status-text" style="font-size: 0.8rem; opacity: 0.5;">...</div>
            <div id="turn-text">---</div>
        </div>
        <button id="roll-btn" onclick="doRoll()" disabled>ROLL</button>
    </div>

    <div id="board-container"></div>

    <div id="rule-sidebar" onclick="this.classList.remove('active')">
        <h3 id="sidebar-title"></h3>
        <p id="sidebar-desc"></p>
    </div>

<script>
    let players = [];
    let totalNeeded = 0;
    let setupIndex = 0;
    let tempHead = null;
    let turnIndex = 0;
    let isMoving = false;

    const rules = {
        1: { id: 'merch', title: "👕 Invest in Merch", emoji: "👕", desc: "CHOOSE: You may REWIND FOUR SPACES now. THE PAYOFF: For the rest of the game, double any 1 or 2 you roll." },
        2: { id: 'van', title: "🛠 Van Breaks Down", emoji: "🛠", desc: "Mechanical failure. Skip your next turn." },
        3: { id: 'merch', title: "👕 Invest in Merch", emoji: "👕", desc: "CHOOSE: You may REWIND FOUR SPACES now. THE PAYOFF: For the rest of the game, double any 1 or 2 you roll." },
        4: { id: 'van', title: "🛠 Van Breaks Down", emoji: "🛠", desc: "Mechanical failure. Skip your next turn." },
        5: { id: 'merch', title: "👕 Invest in Merch", emoji: "👕", desc: "CHOOSE: You may REWIND FOUR SPACES now. THE PAYOFF: For the rest of the game, double any 1 or 2 you roll." },
        6: { id: 'van', title: "🛠 Van Breaks Down", emoji: "🛠", desc: "Mechanical failure. Skip your next turn." }
    };

    function startSetup(num) {
        totalNeeded = num;
        document.getElementById('overlay-count').style.display = 'none';
        document.getElementById('overlay-names').style.display = 'flex';
    }

    function selectHead(id, color) {
        tempHead = { id, color, img: id + '.png' };
        document.querySelectorAll('.av-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('btn-' + id).classList.add('selected');
    }

    function confirmPlayer() {
        const nameVal = document.getElementById('name-input').value.trim() || ("PLAYER " + (setupIndex + 1));
        if(!tempHead) return alert("Pick a head first!");
        players.push({ name: nameVal.toUpperCase(), head: tempHead, pos: 0, skip: false, isInvestor: false });
        setupIndex++;
        if(setupIndex < totalNeeded) {
            document.getElementById('name-input').value = '';
            tempHead = null;
            document.querySelectorAll('.av-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('setup-label').innerText = "PLAYER " + (setupIndex + 1);
        } else {
            document.getElementById('overlay-names').style.display = 'none';
            initGame();
        }
    }

    function initGame() {
        const board = document.getElementById('board-container');
        for(let i=0; i<30; i++) {
            const s = document.createElement('div');
            s.className = 'space';
            s.id = 's' + i;
            if(rules[i]) {
                s.innerText = rules[i].emoji;
                s.classList.add('special');
                s.onclick = (e) => { e.stopPropagation(); triggerRuleSidebar(i); };
            } else {
                s.innerText = (i===0) ? "START" : (i===29) ? "END" : i;
            }
            let row = Math.floor(i/6);
            s.style.gridRow = (5 - row);
            s.style.gridColumn = (row % 2 === 1) ? (6 - (i%6)) : (i%6) + 1;
            board.appendChild(s);
        }
        players.forEach((p, i) => {
            const pElem = document.createElement('div');
            pElem.id = 'piece' + i; pElem.className = 'player';
            pElem.style.backgroundImage = `url(${p.head.img})`;
            board.appendChild(pElem);
            updatePiecePos(i);
        });
        document.getElementById('roll-btn').disabled = false;
        updateUI();
    }

    function triggerRuleSidebar(idx) {
        document.getElementById('sidebar-title').innerText = rules[idx].title;
        document.getElementById('sidebar-desc').innerText = rules[idx].desc;
        document.getElementById('rule-sidebar').classList.add('active');
    }

    function updatePiecePos(idx) {
        const p = players[idx];
        const target = document.getElementById('s' + p.pos);
        const pElem = document.getElementById('piece' + idx);
        const spread = (idx * 12) - (players.length * 6);
        pElem.style.left = `${target.offsetLeft + (target.offsetWidth/2) - 45 + spread}px`;
        pElem.style.top = `${target.offsetTop + (target.offsetHeight/2) - 70}px`;
    }

    function updateUI() {
        const p = players[turnIndex];
        const txt = document.getElementById('turn-text');
        txt.innerText = p.name;
        txt.style.textShadow = `0 0 20px ${p.head.color}`;
        document.getElementById('status-text').innerText = p.isInvestor ? "MERCH INVESTOR ACTIVE" : "YOUR TURN";
    }

    async function doRoll() {
        if(isMoving) return;
        const p = players[turnIndex];

        // CHECK SKIP STATUS AT START OF TURN
        if(p.skip) {
            document.getElementById('skip-player-name').innerText = p.name;
            document.getElementById('overlay-skip').style.display = 'flex';
            return;
        }

        isMoving = true;
        document.getElementById('roll-btn').disabled = true;
        document.getElementById('rule-sidebar').classList.remove('active');

        let roll = Math.floor(Math.random() * 6) + 1;
        if(p.isInvestor && roll <= 2) roll *= 2;

        for(let i=0; i<10; i++) {
            document.getElementById('dice-box').innerText = Math.floor(Math.random()*6)+1;
            await new Promise(r => setTimeout(r, 60));
        }
        document.getElementById('dice-box').innerText = roll;
        await new Promise(r => setTimeout(r, 400));

        for(let s=0; s<roll; s++) {
            if(p.pos < 29) {
                p.pos++;
                updatePiecePos(turnIndex);
                await new Promise(r => setTimeout(r, 400));
            }
        }

        checkFinalSpace();
    }

    function checkFinalSpace() {
        const p = players[turnIndex];
        const rule = rules[p.pos];

        if(rule) {
            if(rule.id === 'merch') {
                document.getElementById('overlay-merch').style.display = 'flex';
            } else if(rule.id === 'van') {
                p.skip = true;
                triggerRuleSidebar(p.pos);
                setTimeout(endTurn, 1500);
            }
        } else if(p.pos >= 29) {
            alert(p.name + " WINS!");
            location.reload();
        } else {
            endTurn();
        }
    }

    async function handleMerch(didInvest) {
        document.getElementById('overlay-merch').style.display = 'none';
        const p = players[turnIndex];
        if(didInvest) {
            p.isInvestor = true;
            for(let i=0; i<4; i++) {
                if(p.pos > 0) {
                    p.pos--;
                    updatePiecePos(turnIndex);
                    await new Promise(r => setTimeout(r, 300));
                }
            }
        }
        endTurn();
    }

    function acknowledgeSkip() {
        document.getElementById('overlay-skip').style.display = 'none';
        players[turnIndex].skip = false;
        endTurn();
    }

    function endTurn() {
        turnIndex = (turnIndex + 1) % players.length;
        updateUI();
        isMoving = false;
        document.getElementById('roll-btn').disabled = false;
    }
</script>
</body>
</html>
