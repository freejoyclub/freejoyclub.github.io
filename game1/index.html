<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fearjoy - Play This</title>
    <style>
        :root {
            --wood-dark: #2a180b; --wood-mid: #3d2616; --wood-light: #4e3625;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --ui-bg: rgba(0,0,0,0.85);
        }

        body {
            background-color: var(--wood-mid);
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px),
                linear-gradient(to right, var(--wood-dark), var(--wood-mid) 20%, var(--wood-light) 40%, var(--wood-mid) 60%, var(--wood-dark) 80%, var(--wood-mid) 100%);
            color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow: hidden;
        }

        h1 { font-size: 2.2rem; margin: 20px 0; text-transform: uppercase; letter-spacing: 0.4em; font-weight: 900; }

        #ui-layer { 
            display: flex; align-items: center; gap: 20px; background: var(--ui-bg); padding: 20px 30px; 
            border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); width: 700px; justify-content: space-between; z-index: 10;
        }
        
        #dice-box { width: 60px; height: 60px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; box-shadow: 0 5px 0 #bbb; }
        #turn-text-container { flex-grow: 1; padding: 0 30px; text-align: left; }
        #turn-text { font-size: 2.8rem; font-weight: 900; color: white; text-transform: uppercase; line-height: 1; }

        /* Rule Sidebar (Fixed to Right) */
        #rule-sidebar { 
            position: fixed; right: 40px; top: 50%; transform: translateY(-50%) translateX(400px);
            width: 240px; background: var(--ui-bg); padding: 25px; border-radius: 15px; border: 2px solid var(--joy-glow); transition: 0.5s; text-align: left; z-index: 100;
        }
        #rule-sidebar.active { transform: translateY(-50%) translateX(0); }

        /* Popups */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .popup-window { background: #111; padding: 40px; border-radius: 20px; border: 3px solid #555; width: 450px; }

        #board-container { 
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); 
            gap: 25px; padding: 40px; background: rgba(0,0,0,0.1); border-radius: 20px; position: relative; width: 750px; height: 550px;
        }

        .space { 
            width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--tape-white); 
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; background: rgba(255,255,255,0.05); cursor: pointer;
        }
        .special { border-color: #ffd700; color: #ffd700; font-size: 3.5rem !important; }

        .player { width: 85px; height: 85px; position: absolute; z-index: 100; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); background-size: contain; background-repeat: no-repeat; background-position: center bottom; pointer-events: none; }

        button { padding: 15px 30px; font-family: inherit; font-weight: bold; cursor: pointer; background: #fff; border: none; border-radius: 5px; text-transform: uppercase; font-size: 1rem; margin: 10px; }
        .btn-gold { background: #ffd700; color: black; }
    </style>
</head>
<body>

    <div id="setup-count" class="overlay" style="display:flex;">
        <div class="popup-window">
            <h2>HOW MANY PLAYERS?</h2>
            <button onclick="initSetup(1)">1</button>
            <button onclick="initSetup(2)">2</button>
            <button onclick="initSetup(3)">3</button>
        </div>
    </div>

    <div id="skip-overlay" class="overlay">
        <div class="popup-window" style="border-color: var(--fear-glow);">
            <h2 id="skip-title">VAN IN THE SHOP</h2>
            <p id="skip-msg" style="font-size: 1.2rem;"></p>
            <button onclick="closeSkip()" style="background: var(--fear-glow); color: white;">BUMMER (SKIP TURN)</button>
        </div>
    </div>

    <div id="choice-overlay" class="overlay">
        <div class="popup-window" style="border-color: #ffd700;">
            <h2 id="choice-title">INVEST?</h2>
            <p id="choice-desc" style="line-height: 1.6;"></p>
            <button class="btn-gold" onclick="handleChoice(true)">INVEST & REWIND</button>
            <button onclick="handleChoice(false)">PASS</button>
        </div>
    </div>

    <h1>Fearjoy - Play This</h1>

    <div id="ui-layer">
        <div id="dice-box">?</div>
        <div id="turn-text-container">
            <div id="status-text" style="opacity: 0.6;">...</div>
            <div id="turn-text">---</div>
        </div>
        <button id="roll-btn" onclick="handleRoll()" disabled>ROLL</button>
    </div>

    <div id="board-container"></div>
    
    <div id="rule-sidebar" onclick="this.classList.remove('active')">
        <h3 id="rule-title"></h3>
        <p id="rule-desc"></p>
        <p style="font-size: 0.7rem; margin-top: 15px; opacity: 0.5;">(Click to close)</p>
    </div>

<script>
    const avatarData = [
        { id: 'jesse', img: 'jesse.png', color: '#007bff' },
        { id: 'marco', img: 'marco.png', color: '#ffcc00' },
        { id: 'grant', img: 'grant.png', color: '#ff00ff' }
    ];

    const rules = {
        2: { title: "👕 Invest in Merch", emoji: "👕", desc: "Pay the cost: Rewind 4 spaces. The Payoff: Double every 1 or 2 you roll for the rest of the game.", type: "choice" },
        8: { title: "🛠 Van Breaks Down", emoji: "🛠", desc: "Mechanical failure. Skip your next turn.", type: "skip" },
        15: { title: "🌞 Dayspring", emoji: "🌞", desc: "The sun rises. Fast forward 3 spaces!", type: "forward", val: 3 },
        21: { title: "🛠 Van Breaks Down", emoji: "🛠", desc: "More van trouble. Skip your next turn.", type: "skip" }
    };

    let players = [];
    let turnIndex = 0;
    let moving = false;

    function initSetup(num) {
        for(let i=0; i<num; i++) {
            players.push({ name: avatarData[i].id.toUpperCase(), avatar: avatarData[i], pos: 0, skip: false, isInvestor: false });
        }
        document.getElementById('setup-count').style.display = 'none';
        document.getElementById('roll-btn').disabled = false;
        initBoard();
        updateUI();
    }

    function initBoard() {
        const board = document.getElementById('board-container');
        for(let i=0; i<30; i++) {
            const s = document.createElement('div');
            s.id = `s${i}`;
            s.className = 'space';
            if(rules[i]) {
                s.innerText = rules[i].emoji;
                s.classList.add('special');
                s.onclick = (e) => { e.stopPropagation(); showSidebar(i); };
            } else {
                s.innerText = (i===0) ? "START" : (i===29) ? "END" : i;
            }
            let r = Math.floor(i/6);
            s.style.gridRow = (5 - r);
            s.style.gridColumn = (r%2 === 1) ? (6 - (i%6)) : (i%6) + 1;
            board.appendChild(s);
        }
        players.forEach((p, i) => {
            const pElem = document.createElement('div');
            pElem.id = `piece${i}`;
            pElem.className = 'player';
            pElem.style.backgroundImage = `url(${p.avatar.img})`;
            board.appendChild(pElem);
            placePiece(i);
        });
    }

    function showSidebar(idx) {
        const rule = rules[idx];
        document.getElementById('rule-title').innerText = rule.title;
        document.getElementById('rule-desc').innerText = rule.desc;
        document.getElementById('rule-sidebar').classList.add('active');
    }

    function placePiece(idx) {
        const p = players[idx];
        const target = document.getElementById(`s${p.pos}`);
        const pElem = document.getElementById(`piece${idx}`);
        const offset = (idx * 10) - (players.length * 5); 
        pElem.style.left = `${target.offsetLeft + (target.offsetWidth/2) - 42 + offset}px`;
        pElem.style.top = `${target.offsetTop + (target.offsetHeight/2) - 65}px`;
    }

    function updateUI() {
        const p = players[turnIndex];
        document.getElementById('status-text').innerText = p.isInvestor ? "INVESTOR (1-2x2)" : "YOUR TURN";
        document.getElementById('turn-text').innerText = p.name;
        document.getElementById('turn-text').style.textShadow = `0 0 20px ${p.avatar.color}`;
    }

    async function handleRoll() {
        if(moving) return;
        moving = true;
        document.getElementById('roll-btn').disabled = true;
        document.getElementById('rule-sidebar').classList.remove('active');

        // Check Skip
        if(players[turnIndex].skip) {
            document.getElementById('skip-msg').innerText = `${players[turnIndex].name}, skip this turn while the mechanic works.`;
            document.getElementById('skip-overlay').style.display = 'flex';
            return; 
        }

        let roll = Math.floor(Math.random() * 6) + 1;
        let original = roll;
        if(players[turnIndex].isInvestor && roll <= 2) roll *= 2;

        for(let i=0; i<10; i++) {
            document.getElementById('dice-box').innerText = Math.floor(Math.random()*6)+1;
            await new Promise(r => setTimeout(r, 60));
        }
        document.getElementById('dice-box').innerText = roll;
        
        // Wait a little less now
        await new Promise(r => setTimeout(r, 400));

        for(let step=0; step<roll; step++) {
            if(players[turnIndex].pos < 29) {
                players[turnIndex].pos++;
                placePiece(turnIndex);
                await new Promise(r => setTimeout(r, 400));
            }
        }

        const finalPos = players[turnIndex].pos;
        if(rules[finalPos]) {
            const rule = rules[finalPos];
            if(rule.type === "choice") {
                document.getElementById('choice-overlay').style.display = 'flex';
                document.getElementById('choice-desc').innerText = rule.desc;
            } else {
                showSidebar(finalPos);
                await new Promise(r => setTimeout(r, 1500));
                if(rule.type === 'forward') {
                    for(let i=0; i<rule.val; i++) {
                        players[turnIndex].pos = Math.min(29, players[turnIndex].pos + 1);
                        placePiece(turnIndex);
                        await new Promise(r => setTimeout(r, 300));
                    }
                } else if(rule.type === 'skip') {
                    players[turnIndex].skip = true;
                }
                endTurn();
            }
        } else {
            endTurn();
        }
    }

    function closeSkip() {
        document.getElementById('skip-overlay').style.display = 'none';
        players[turnIndex].skip = false;
        endTurn();
    }

    async function handleChoice(didInvest) {
        document.getElementById('choice-overlay').style.display = 'none';
        if(didInvest) {
            players[turnIndex].isInvestor = true;
            for(let i=0; i<4; i++) {
                if(players[turnIndex].pos > 0) {
                    players[turnIndex].pos--;
                    placePiece(turnIndex);
                    await new Promise(r => setTimeout(r, 300));
                }
            }
        }
        endTurn();
    }

    function endTurn() {
        if(players[turnIndex].pos >= 29) {
            alert(players[turnIndex].name + " WON!");
            location.reload();
            return;
        }
        turnIndex = (turnIndex + 1) % players.length;
        updateUI();
        moving = false;
        document.getElementById('roll-btn').disabled = false;
    }
</script>
</body>
</html>
