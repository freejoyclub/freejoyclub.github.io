<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fearjoy - Play This</title>
    <style>
        :root {
            /* Wood Grain Gradient Colors */
            --wood-base: #3d2616;
            --wood-grain-1: #4a2f1c;
            --wood-grain-2: #2e1d11;
            
            --tape-white: #fdfdfd;
            --joy-glow: #00ff88;
            --fear-glow: #ff4444;
        }

        body {
            /* Simulated Wood Grain Gradient */
            background: linear-gradient(
                90deg, 
                var(--wood-base) 0%, 
                var(--wood-grain-1) 15%, 
                var(--wood-base) 30%, 
                var(--wood-grain-2) 45%, 
                var(--wood-base) 60%, 
                var(--wood-grain-1) 75%, 
                var(--wood-base) 100%
            );
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 10px;
            box-sizing: border-box;
        }

        h1 { 
            font-size: clamp(1.5rem, 5vw, 2.5rem); /* Scales with screen */
            margin: 10px 0; 
            text-transform: uppercase; 
            letter-spacing: 0.3em;
            font-weight: 900;
            text-align: center;
        }

        /* UI Panel */
        #ui-layer {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 600px;
            justify-content: space-between;
        }

        #dice-box {
            width: 50px;
            height: 50px;
            background: white;
            color: black;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #ccc;
        }

        /* Adaptive Board Layout */
        #board-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 2vmin; /* Gap scales with screen size */
            padding: 4vmin;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            position: relative;
            /* This ensures the board stays square-ish and fits the screen */
            width: 85vw; 
            max-width: 650px;
            height: 70vw; 
            max-height: 550px;
        }

        .space {
            width: 100%;
            height: 100%;
            aspect-ratio: 1 / 1; /* Keeps them circular */
            border-radius: 50%;
            border: 2px solid var(--tape-white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: clamp(0.6rem, 2vw, 1rem);
            background: rgba(255,255,255,0.03);
            position: relative;
            box-sizing: border-box;
        }

        .joy { border-color: var(--joy-glow); color: var(--joy-glow); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .fear { border-color: var(--fear-glow); color: var(--fear-glow); box-shadow: 0 0 10px rgba(255,68,68,0.2); }

        /* Player Markers */
        .player {
            width: 4vmin;
            height: 4vmin;
            min-width: 15px;
            min-height: 15px;
            max-width: 30px;
            max-height: 30px;
            border-radius: 50%;
            position: absolute;
            z-index: 100;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1.5px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        /* Overlay */
        #setup-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            background: #fff;
            border: none;
            border-radius: 4px;
        }
        .setup-btn { margin: 5px; width: 140px; }
        #roll-btn:disabled { opacity: 0.2; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <h2>HOW MANY PLAYERS?</h2>
        <div style="display: flex; flex-wrap: wrap; justify-content: center;">
            <button class="setup-btn" onclick="startGame(1)">1</button>
            <button class="setup-btn" onclick="startGame(2)">2</button>
            <button class="setup-btn" onclick="startGame(3)">3</button>
            <button class="setup-btn" onclick="startGame(4)">4</button>
            <button class="setup-btn" onclick="startGame(5)">5</button>
            <button class="setup-btn" onclick="startGame(6)">6</button>
        </div>
    </div>

    <h1>Fearjoy - Play This</h1>

    <div id="ui-layer">
        <div id="dice-box">?</div>
        <div style="flex-grow: 1; padding: 0 15px; font-size: 0.9rem;">
            <div id="status-text">Select players</div>
            <div id="turn-text" style="opacity: 0.6; margin-top: 3px;">---</div>
        </div>
        <button id="roll-btn" onclick="handleRoll()" disabled>ROLL</button>
    </div>

    <div id="board-container" id="board">
        </div>

<script>
    const spacesCount = 30;
    const cols = 6;
    const rows = 5;
    
    let playerPositions = [];
    let currentPlayer = 0;
    let isMoving = false;
    let playerCount = 0;

    const joySpaces = [5, 12, 21, 27];
    const fearSpaces = [3, 15, 19, 25];
    const playerColors = ['#007bff', '#ffcc00', '#ff00ff', '#00ffd5', '#ff5e00', '#ffffff'];

    function startGame(num) {
        playerCount = num;
        playerPositions = new Array(num).fill(0);
        document.getElementById('setup-overlay').style.display = 'none';
        document.getElementById('roll-btn').disabled = false;
        initBoard();
        window.addEventListener('resize', () => { // Reposition players if window resizes
            for(let i=0; i<playerCount; i++) updatePiece(i);
        });
    }

    function initBoard() {
        const container = document.getElementById('board-container');
        container.innerHTML = ''; // Clear for players
        
        for (let i = 0; i < spacesCount; i++) {
            const space = document.createElement('div');
            space.id = `space-${i}`;
            space.className = 'space';
            
            if (i === 0) space.innerText = "START";
            else if (i === 29) space.innerText = "END";
            else if (joySpaces.includes(i)) { space.innerText = "JOY"; space.classList.add('joy'); }
            else if (fearSpaces.includes(i)) { space.innerText = "FEAR"; space.classList.add('fear'); }
            else space.innerText = i;

            let row = Math.floor(i / cols);
            let col = i % cols;
            let displayCol = (row % 2 === 1) ? (cols - 1 - col) : col;
            
            space.style.gridRow = (rows - row);
            space.style.gridColumn = (displayCol + 1);
            container.appendChild(space);
        }

        for (let p = 0; p < playerCount; p++) {
            const pElem = document.createElement('div');
            pElem.id = `p${p}`;
            pElem.className = 'player';
            pElem.style.backgroundColor = playerColors[p];
            container.appendChild(pElem);
            updatePiece(p);
        }

        document.getElementById('status-text').innerText = "Game Start!";
        document.getElementById('turn-text').innerText = `Player 1's turn`;
    }

    function updatePiece(pIdx) {
        const pElem = document.getElementById(`p${pIdx}`);
        const target = document.getElementById(`space-${playerPositions[pIdx]}`);
        if (!target) return;
        
        // Distribution so they don't overlap
        const angle = (pIdx / playerCount) * 2 * Math.PI;
        const radius = target.offsetWidth * 0.2; 
        const offsetX = Math.cos(angle) * radius;
        const offsetY = Math.sin(angle) * radius;

        const x = target.offsetLeft + (target.offsetWidth / 2) - (pElem.offsetWidth / 2) + offsetX;
        const y = target.offsetTop + (target.offsetHeight / 2) - (pElem.offsetHeight / 2) + offsetY;
        
        pElem.style.left = `${x}px`;
        pElem.style.top = `${y}px`;
    }

    async function handleRoll() {
        if (isMoving) return;
        isMoving = true;
        const rollBtn = document.getElementById('roll-btn');
        rollBtn.disabled = true;

        const diceBox = document.getElementById('dice-box');
        let roll = 0;
        for(let i=0; i<12; i++) {
            roll = Math.floor(Math.random() * 6) + 1;
            diceBox.innerText = roll;
            await new Promise(r => setTimeout(r, 70));
        }
        
        document.getElementById('status-text').innerText = `Rolled a ${roll}!`;

        await new Promise(r => setTimeout(r, 1000)); // Deliberate pause

        for(let j=0; j < roll; j++) {
            if (playerPositions[currentPlayer] < spacesCount - 1) {
                playerPositions[currentPlayer]++;
                updatePiece(currentPlayer);
                await new Promise(r => setTimeout(r, 550)); // Slowed down
            }
        }

        const finalSpace = playerPositions[currentPlayer];
        if (joySpaces.includes(finalSpace)) {
            document.getElementById('status-text').innerText = "JOY! +1";
            await new Promise(r => setTimeout(r, 900));
            playerPositions[currentPlayer] = Math.min(29, playerPositions[currentPlayer] + 1);
        } else if (fearSpaces.includes(finalSpace)) {
            document.getElementById('status-text').innerText = "FEAR. -1";
            await new Promise(r => setTimeout(r, 900));
            playerPositions[currentPlayer] = Math.max(0, playerPositions[currentPlayer] - 1);
        }
        updatePiece(currentPlayer);

        if (playerPositions[currentPlayer] === 29) {
            document.getElementById('status-text').innerText = `WINNER: PLAYER ${currentPlayer+1}!`;
            return;
        }

        currentPlayer = (currentPlayer + 1) % playerCount;
        document.getElementById('turn-text').innerText = `Player ${currentPlayer+1}'s turn`;
        document.getElementById('turn-text').style.color = playerColors[currentPlayer];
        rollBtn.disabled = false;
        isMoving = false;
    }
</script>
</body>
</html>
