<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fearjoy - Play This</title>
    <style>
        :root {
            --wood-dark: #2a180b; --wood-mid: #3d2616; --wood-light: #4e3625;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --ui-bg: rgba(0,0,0,0.85);
        }

        body {
            background-color: var(--wood-mid);
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px),
                linear-gradient(to right, var(--wood-dark), var(--wood-mid) 20%, var(--wood-light) 40%, var(--wood-mid) 60%, var(--wood-dark) 80%, var(--wood-mid) 100%);
            color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow: hidden;
        }

        h1 { font-size: 2.2rem; margin: 20px 0; text-transform: uppercase; letter-spacing: 0.4em; font-weight: 900; }

        #ui-layer { 
            display: flex; align-items: center; gap: 20px; background: var(--ui-bg); padding: 20px 30px; 
            border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); width: 700px; justify-content: space-between; z-index: 10;
        }
        
        #dice-box { width: 60px; height: 60px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; box-shadow: 0 5px 0 #bbb; }
        #turn-text-container { flex-grow: 1; padding: 0 30px; text-align: left; }
        #turn-text { font-size: 2.8rem; font-weight: 900; color: white; text-transform: uppercase; line-height: 1; }

        #rule-sidebar { 
            position: fixed; right: 40px; top: 50%; transform: translateY(-50%) translateX(400px);
            width: 240px; background: var(--ui-bg); padding: 25px; border-radius: 15px; border: 2px solid var(--joy-glow); transition: 0.5s; text-align: left; z-index: 100;
        }
        #rule-sidebar.active { transform: translateY(-50%) translateX(0); }

        /* Popups */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .popup-window { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #444; width: 450px; text-align: center; }

        /* Setup Specifics */
        .avatar-btn { width: 70px; height: 70px; background-size: contain; background-repeat: no-repeat; cursor: pointer; border-bottom: 4px solid transparent; opacity: 0.5; transition: 0.2s; }
        .avatar-btn.selected { opacity: 1; border-color: var(--joy-glow); transform: scale(1.1); }

        #board-container { 
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); 
            gap: 25px; padding: 40px; background: rgba(0,0,0,0.1); border-radius: 20px; position: relative; width: 750px; height: 550px;
        }

        .space { 
            width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--tape-white); 
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; background: rgba(255,255,255,0.05); cursor: pointer;
        }
        .special { border-color: #ffd700; color: #ffd700; font-size: 3.5rem !important; }
        .joy { border-color: var(--joy-glow); color: var(--joy-glow); }
        .fear { border-color: var(--fear-glow); color: var(--fear-glow); }

        .player { width: 85px; height: 85px; position: absolute; z-index: 100; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); background-size: contain; background-repeat: no-repeat; background-position: center bottom; pointer-events: none; }

        button { padding: 12px 24px; font-family: inherit; font-weight: bold; cursor: pointer; background: #fff; border: none; border-radius: 4px; text-transform: uppercase; margin: 10px; }
        input { padding: 12px; background: #222; border: 1px solid #555; color: white; font-family: inherit; font-size: 1.2rem; width: 80%; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="setup-count" class="overlay" style="display:flex;">
        <div class="popup-window">
            <h2>HOW MANY PLAYERS?</h2>
            <button onclick="setPlayerCount(1)">1</button>
            <button onclick="setPlayerCount(2)">2</button>
            <button onclick="setPlayerCount(3)">3</button>
            <button onclick="setPlayerCount(4)">4</button>
        </div>
    </div>

    <div id="setup-names" class="overlay">
        <div class="popup-window">
            <h2 id="setup-title">PLAYER 1</h2>
            <input type="text" id="p-name-input" placeholder="ENTER NAME">
            <div id="avatar-list" style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
                <div class="avatar-btn" id="av-jesse" style="background-image:url('jesse.png')" onclick="pickAv('jesse', '#007bff')"></div>
                <div class="avatar-btn" id="av-marco" style="background-image:url('marco.png')" onclick="pickAv('marco', '#ffcc00')"></div>
                <div class="avatar-btn" id="av-grant" style="background-image:url('grant.png')" onclick="pickAv('grant', '#ff00ff')"></div>
            </div>
            <button id="setup-next-btn" onclick="saveCurrentPlayer()">NEXT</button>
        </div>
    </div>

    <div id="skip-overlay" class="overlay">
        <div class="popup-window" style="border-color: var(--fear-glow);">
            <h2>VAN IN THE SHOP</h2>
            <p id="skip-msg"></p>
            <button onclick="closeSkip()" style="background: var(--fear-glow); color: white;">BUMMER (SKIP TURN)</button>
        </div>
    </div>

    <div id="choice-overlay" class="overlay">
        <div class="popup-window" style="border-color: #ffd700;">
            <h2 id="choice-title">INVEST?</h2>
            <p id="choice-desc" style="line-height:1.5; margin-bottom:20px;"></p>
            <button style="background: #ffd700; color: black;" onclick="handleChoice(true)">INVEST & REWIND</button>
            <button onclick="handleChoice(false)">PASS</button>
        </div>
    </div>

    <h1>Fearjoy - Play This</h1>

    <div id="ui-layer">
        <div id="dice-box">?</div>
        <div id="turn-text-container">
            <div id="status-text" style="opacity: 0.6;">...</div>
            <div id="turn-text">---</div>
        </div>
        <button id="roll-btn" onclick="handleRoll()" disabled>ROLL</button>
    </div>

    <div id="board-container"></div>
    
    <div id="rule-sidebar" onclick="this.classList.remove('active')">
        <h3 id="rule-title"></h3>
        <p id="rule-desc"></p>
    </div>

<script>
    const rules = {
        1: { title: "👕 Invest in Merch", emoji: "👕", desc: "Rewind 4 spaces now. Double every 1 or 2 you roll forever.", type: "choice" },
        2: { title: "🛠 Van Breaks Down", emoji: "🛠", desc: "Mechanical failure. Skip your next turn.", type: "skip" },
        3: { title: "👕 Invest in Merch", emoji: "👕", desc: "Rewind 4 spaces now. Double every 1 or 2 you roll forever.", type: "choice" },
        4: { title: "🛠 Van Breaks Down", emoji: "🛠", desc: "Mechanical failure. Skip your next turn.", type: "skip" },
        5: { title: "👕 Invest in Merch", emoji: "👕", desc: "Rewind 4 spaces now. Double every 1 or 2 you roll forever.", type: "choice" },
        6: { title: "🛠 Van Breaks Down", emoji: "🛠", desc: "Mechanical failure. Skip your next turn.", type: "skip" },
        12: { title: "🌞 Dayspring", emoji: "🌞", desc: "Fast forward 3 spaces!", type: "forward", val: 3 },
        15: { title: "JOY", type: "joy" },
        20: { title: "FEAR", type: "fear" },
        24: { title: "JOY", type: "joy" },
        28: { title: "FEAR", type: "fear" }
    };

    let players = [];
    let totalPlayers = 0;
    let setupIdx = 0;
    let currentPick = null;
    let turnIdx = 0;
    let moving = false;

    // --- SETUP FLOW ---
    function setPlayerCount(num) {
        totalPlayers = num;
        document.getElementById('setup-count').style.display = 'none';
        document.getElementById('setup-names').style.display = 'flex';
    }

    function pickAv(id, color) {
        currentPick = { id: id, color: color, img: id + '.png' };
        document.querySelectorAll('.avatar-btn').forEach(el => el.classList.remove('selected'));
        document.getElementById('av-'+id).classList.add('selected');
    }

    function saveCurrentPlayer() {
        const nameInput = document.getElementById('p-name-input');
        if(!currentPick) return alert("Select a head!");
        
        players.push({
            name: nameInput.value.toUpperCase() || `PLAYER ${setupIdx+1}`,
            avatar: currentPick,
            pos: 0,
            skip: false,
            isInvestor: false
        });

        setupIdx++;
        if(setupIdx < totalPlayers) {
            nameInput.value = '';
            currentPick = null;
            document.querySelectorAll('.avatar-btn').forEach(el => el.classList.remove('selected'));
            document.getElementById('setup-title').innerText = `PLAYER ${setupIdx+1}`;
        } else {
            document.getElementById('setup-names').style.display = 'none';
            document.getElementById('roll-btn').disabled = false;
            initBoard();
            updateUI();
        }
    }

    // --- GAME LOGIC ---
    function initBoard() {
        const board = document.getElementById('board-container');
        for(let i=0; i<30; i++) {
            const s = document.createElement('div');
            s.id = `s${i}`;
            s.className = 'space';
            if(rules[i]) {
                if(rules[i].emoji) {
                    s.innerText = rules[i].emoji;
                    s.classList.add('special');
                } else if(rules[i].type === 'joy') {
                    s.innerText = '+1'; s.classList.add('joy');
                } else if(rules[i].type === 'fear') {
                    s.innerText = '-1'; s.classList.add('fear');
                }
                s.onclick = (e) => { e.stopPropagation(); if(rules[i].desc) showSidebar(i); };
            } else {
                s.innerText = (i===0) ? "START" : (i===29) ? "END" : i;
            }
            let r = Math.floor(i/6);
            s.style.gridRow = (5 - r);
            s.style.gridColumn = (r%2 === 1) ? (6 - (i%6)) : (i%6) + 1;
            board.appendChild(s);
        }
        players.forEach((p, i) => {
            const pElem = document.createElement('div');
            pElem.id = `piece${i}`;
            pElem.className = 'player';
            pElem.style.backgroundImage = `url(${p.avatar.img})`;
            board.appendChild(pElem);
            placePiece(i);
        });
    }

    function showSidebar(idx) {
        const rule = rules[idx];
        document.getElementById('rule-title').innerText = rule.title;
        document.getElementById('rule-desc').innerText = rule.desc;
        document.getElementById('rule-sidebar').classList.add('active');
    }

    function placePiece(idx) {
        const p = players[idx];
        const target = document.getElementById(`s${p.pos}`);
        const pElem = document.getElementById(`piece${idx}`);
        const offset = (idx * 12) - (players.length * 6); 
        pElem.style.left = `${target.offsetLeft + (target.offsetWidth/2) - 42 + offset}px`;
        pElem.style.top = `${target.offsetTop + (target.offsetHeight/2) - 65}px`;
    }

    function updateUI() {
        const p = players[turnIdx];
        document.getElementById('status-text').innerText = p.isInvestor ? "MERCH INVESTOR: ROLLS DOUBLED" : "YOUR TURN";
        document.getElementById('turn-text').innerText = p.name;
        document.getElementById('turn-text').style.textShadow = `0 0 20px ${p.avatar.color}`;
    }

    async function handleRoll() {
        if(moving) return;
        moving = true;
        document.getElementById('roll-btn').disabled = true;
        document.getElementById('rule-sidebar').classList.remove('active');

        if(players[turnIdx].skip) {
            document.getElementById('skip-msg').innerText = `${players[turnIdx].name}, you're stuck at the shop.`;
            document.getElementById('skip-overlay').style.display = 'flex';
            return;
        }

        let roll = Math.floor(Math.random() * 6) + 1;
        if(players[turnIdx].isInvestor && roll <= 2) roll *= 2;

        for(let i=0; i<10; i++) {
            document.getElementById('dice-box').innerText = Math.floor(Math.random()*6)+1;
