<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fearjoy - Play This</title>
    <style>
        :root {
            --wood-grain: #3d2616;
            --wood-light: #5d3a24;
            --tape-white: #f0f0f0;
            --joy-glow: #00ff88;
            --fear-glow: #ff4444;
        }

        body {
            /* Rich Wood Gradient */
            background: radial-gradient(circle at center, var(--wood-light) 0%, var(--wood-grain) 100%);
            background-attachment: fixed;
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 { 
            font-size: 2.2rem; 
            margin: 10px 0; 
            text-transform: uppercase; 
            letter-spacing: 5px;
            text-shadow: 3px 3px 5px rgba(0,0,0,0.5);
        }

        /* The Control Panel */
        #ui-layer {
            display: flex;
            align-items: center;
            gap: 30px;
            background: rgba(0,0,0,0.4);
            padding: 20px 40px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }

        /* The Dice Visual */
        #dice-box {
            width: 60px;
            height: 60px;
            background: white;
            color: black;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.5);
        }

        /* The Board (6 columns x 5 rows = 30 spaces) */
        #board-container {
            display: grid;
            grid-template-columns: repeat(6, 80px);
            grid-template-rows: repeat(5, 80px);
            gap: 20px;
            padding: 30px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .space {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--tape-white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .joy { border-color: var(--joy-glow); box-shadow: 0 0 15px var(--joy-glow); color: var(--joy-glow); }
        .fear { border-color: var(--fear-glow); box-shadow: 0 0 15px var(--fear-glow); color: var(--fear-glow); }

        /* Players */
        .player {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            position: absolute;
            z-index: 20;
            transition: all 0.5s cubic-bezier(0.5, -0.5, 0.5, 1.5);
            border: 2px solid white;
        }
        #p1 { background: #007bff; box-shadow: 0 0 10px #007bff; }
        #p2 { background: #ffcc00; box-shadow: 0 0 10px #ffcc00; color: black;}

        button {
            padding: 12px 25px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            background: #eee;
            border: none;
            border-radius: 5px;
        }
        button:hover:not(:disabled) { background: var(--joy-glow); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

    </style>
</head>
<body>

    <h1>Fearjoy - Play This</h1>

    <div id="ui-layer">
        <div id="dice-box">?</div>
        <div style="text-align: left;">
            <div id="status-text">Ready to roll...</div>
            <div id="turn-text" style="font-size: 0.8rem; opacity: 0.7; margin-top: 5px;">Player 1's turn</div>
        </div>
        <button id="roll-btn" onclick="handleRoll()">Roll Tape</button>
    </div>

    <div id="board-container">
        <div id="p1" class="player"></div>
        <div id="p2" class="player"></div>
        </div>

<script>
    const spacesCount = 30;
    const cols = 6;
    const rows = 5;
    
    let playerPos = [0, 0];
    let currentPlayer = 0;
    let isMoving = false;

    // Define special indices
    const joySpaces = [5, 12, 21, 27];
    const fearSpaces = [3, 15, 19, 25];

    function initBoard() {
        const container = document.getElementById('board-container');
        
        for (let i = 0; i < spacesCount; i++) {
            const space = document.createElement('div');
            space.id = `space-${i}`;
            space.className = 'space';
            
            // Text labeling
            if (i === 0) space.innerText = "START";
            else if (i === 29) space.innerText = "END";
            else if (joySpaces.includes(i)) { space.innerText = "JOY"; space.classList.add('joy'); }
            else if (fearSpaces.includes(i)) { space.innerText = "FEAR"; space.classList.add('fear'); }
            else space.innerText = i;

            // B-L to U-R Snake Logic
            let row = Math.floor(i / cols); // 0 to 4
            let col = i % cols;           // 0 to 5

            // Reverse columns on odd rows (1, 3) to create the snake winding
            let displayCol = (row % 2 === 1) ? (cols - 1 - col) : col;
            
            // grid-row: 1 is top, 5 is bottom. So "row 0" needs to be grid-row 5.
            space.style.gridRow = (rows - row);
            space.style.gridColumn = (displayCol + 1);

            container.appendChild(space);
        }
        updatePieces(0);
        updatePieces(1);
    }

    function updatePieces(pIdx) {
        const pElem = document.getElementById(`p${pIdx+1}`);
        const target = document.getElementById(`space-${playerPos[pIdx]}`);
        
        // Centering logic
        const x = target.offsetLeft + (target.offsetWidth / 2) - (pElem.offsetWidth / 2);
        const y = target.offsetTop + (target.offsetHeight / 2) - (pElem.offsetHeight / 2);
        
        // Slight offset for P2 so they don't hide P1
        const offset = pIdx === 1 ? 10 : -10;
        pElem.style.left = `${x + offset}px`;
        pElem.style.top = `${y + offset}px`;
    }

    async function handleRoll() {
        if (isMoving) return;
        isMoving = true;
        document.getElementById('roll-btn').disabled = true;

        // 1. Visual Dice Roll
        const diceBox = document.getElementById('dice-box');
        let roll = 0;
        for(let i=0; i<10; i++) {
            roll = Math.floor(Math.random() * 6) + 1;
            diceBox.innerText = roll;
            await new Promise(r => setTimeout(r, 60));
        }
        
        document.getElementById('status-text').innerText = `Player ${currentPlayer+1} rolled a ${roll}!`;

        // 2. Sequential Hops
        for(let j=0; j < roll; j++) {
            if (playerPos[currentPlayer] < spacesCount - 1) {
                playerPos[currentPlayer]++;
                updatePieces(currentPlayer);
                await new Promise(r => setTimeout(r, 250));
            }
        }

        // 3. Special Space Check
        const finalSpace = playerPos[currentPlayer];
        if (joySpaces.includes(finalSpace)) {
            document.getElementById('status-text').innerText = "JOY! Bursting forward...";
            await new Promise(r => setTimeout(r, 600));
            playerPos[currentPlayer] = Math.min(29, playerPos[currentPlayer] + 1);
        } else if (fearSpaces.includes(finalSpace)) {
            document.getElementById('status-text').innerText = "FEAR. Slipping back...";
            await new Promise(r => setTimeout(r, 600));
            playerPos[currentPlayer] = Math.max(0, playerPos[currentPlayer] - 1);
        }
        updatePieces(currentPlayer);

        // 4. Win Check
        if (playerPos[currentPlayer] === 29) {
            document.getElementById('status-text').innerText = `🏆 PLAYER ${currentPlayer+1} WINS!`;
            return;
        }

        // 5. Swap Turns
        currentPlayer = currentPlayer === 0 ? 1 : 0;
        document.getElementById('turn-text').innerText = `Player ${currentPlayer+1}'s turn`;
        document.getElementById('roll-btn').disabled = false;
        isMoving = false;
    }

    initBoard();
</script>
</body>
</html>
