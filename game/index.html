<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <title>Fearjoy - v11.5</title>
    <style>
        :root {
            --wood-dark: #8b7355; 
            --wood-mid: #b39b7d; 
            --wood-light: #d2b48c;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --gold: #ffd700; --ui-bg: rgba(0,0,0,0.98); --vinyl: #111111;
            --blue-glow: #00ccff; --pink-glow: #ff00ff;
        }

        @keyframes woodFade { 0%, 100% { background-color: var(--wood-dark); } 50% { background-color: var(--wood-mid); } }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-150px) scale(1.5); opacity: 0; } }
        @keyframes redSparkle { 0% { box-shadow: 0 0 10px var(--fear-glow); } 100% { box-shadow: 0 0 50px var(--fear-glow); background: #300; color: white; } }
        @keyframes goldSparkle { 0% { box-shadow: 0 0 10px var(--gold); } 100% { box-shadow: 0 0 50px var(--gold); background: #330; color: white; } }
        @keyframes flipping { 0% { transform: rotateY(0); } 100% { transform: rotateY(1800deg); } }
        @keyframes winPulse { 0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--p-color)); } 50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--p-color)); } 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--p-color)); } }
        @keyframes introGlow { from { text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold); } to { text-shadow: 0 0 20px var(--gold), 0 0 40px #fffad1; } }
        @keyframes pieceHover { 0% { transform: translate(0, 0); } 33% { transform: translate(3px, -3px); } 66% { transform: translate(-2px, 1px); } 100% { transform: translate(0, 0); } }
        @keyframes turnPulse { 0% { filter: drop-shadow(0 0 5px var(--p-color)); transform: translate(0,0) scale(1); } 50% { filter: drop-shadow(0 0 20px var(--p-color)); transform: translate(0,-4px) scale(1.15); } 100% { filter: drop-shadow(0 0 5px var(--p-color)); transform: translate(0,0) scale(1); } }
        @keyframes borderPulse { 0% { box-shadow: 0 0 5px var(--p-color) inset, 0 0 5px var(--p-color); } 50% { box-shadow: 0 0 15px var(--p-color) inset, 0 0 15px var(--p-color); } 100% { box-shadow: 0 0 5px var(--p-color) inset, 0 0 5px var(--p-color); } }
        @keyframes navFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        body { animation: woodFade 20s ease-in-out infinite; background-image: repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px); color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow: hidden; }
        
        #board-container { 
            display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(6, 1fr); 
            gap: 18px; padding: 50px; width: 1100px; height: 700px; 
            position: relative; z-index: 5; 
        }

        #arrow-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .space { width: 85px; height: 85px; border-radius: 50%; border: 1px solid var(--tape-white); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 0.75rem; line-height: 1.1; background: rgba(255,255,255,0.05); text-align: center; position: relative; transition: 0.3s; cursor: help; }
        .sp-emoji { font-size: 1.4rem; margin-bottom: 2px; }
        .sp-text { padding: 0 2px; }
        .dir-arrow { position: absolute; font-size: 1.65rem; color: rgba(210, 180, 140, 0.8); font-weight: 900; pointer-events: none; z-index: 1; }
        .arrow-right { right: -18px; top: 50%; transform: translateY(-50%); }
        .arrow-left { left: -18px; top: 50%; transform: translateY(-50%) rotate(180deg); }
        .arrow-up { top: -22px; left: 50%; transform: translateX(-50%) rotate(-90deg); }
        .blank { opacity: 0.7; transform: scale(0.8); border-style: dashed !important; background: none !important; cursor: default; }
        .blank-num { font-size: 0.95rem; opacity: 0.5; font-weight: normal; }
        .tracklist-space { background: var(--vinyl) !important; border: 3px double #666 !important; box-shadow: inset 0 0 15px #000; transform: scale(1.15); z-index: 5; font-size: 0.7rem !important; color: white !important; }
        .win-track { background: var(--vinyl) !important; border: 4px solid var(--blue-glow) !important; box-shadow: 0 0 30px var(--blue-glow); transform: scale(1.4) !important; z-index: 10 !important; }
        .joy-space { border-color: var(--joy-glow) !important; color: var(--joy-glow) !important; }
        .fear-space { border-color: var(--fear-glow) !important; color: var(--fear-glow) !important; }
        .hybrid { border-style: dotted; border-width: 3px; border-color: white; }
        
        #ui-layer { 
            display: flex; align-items: center; background: var(--ui-bg); 
            padding: 0 45px; height: 120px; min-height: 120px; 
            border-radius: 12px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); 
            width: 1000px; justify-content: space-between; z-index: 10; position: relative; 
        }

        #status-text { width: 350px; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; line-height: 1; }
        
        #dice-slot-right { width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; }
        
        #dice-box { 
            width: 75px; height: 75px; 
            background: white; color: black; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3.5rem; font-weight: bold; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; 
        }

        .dice-cinematic { 
            position: fixed !important; 
            top: 50% !important; 
            left: 50% !important; 
            transform: translate3d(-50%, -50%, 0) scale(1.8) !important; 
            z-index: 5000; 
            opacity: 0.95; 
            box-shadow: 0 0 50px rgba(255,255,255,0.4);
        }
        
        .floating-emoji { position: absolute; font-size: 4rem; animation: floatUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; pointer-events: none; z-index: 6000; }
        .dice-red { animation: redSparkle 0.5s infinite alternate; }
        .dice-gold { animation: goldSparkle 0.5s infinite alternate; }
        .flipping { animation: flipping 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95); transform-style: preserve-3d; }
        #merch-tracker { position: fixed; left: 20px; top: 135px; width: 280px; background: var(--ui-bg); border-radius: 12px; padding: 20px; border: 1px solid #333; z-index: 1; }
        .player-entry { margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 0.8rem; transition: 0.3s; border-radius: 8px; padding: 10px; cursor: default; }
        .avatar-roster { width: 45px; height: 45px; border-radius: 50%; background: #111; border: 2px solid #555; }
        .player { width: 75px; height: 75px; position: absolute; z-index: 100; transition: all 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28); background-size: contain; background-repeat: no-repeat; background-position: center bottom; pointer-events: none; animation: pieceHover 4s infinite ease-in-out; }
        .active-turn { animation: turnPulse 1.5s infinite ease-in-out; }
        .roster-active { animation: borderPulse 2s infinite; border: 1px solid var(--p-color); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .popup { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(8px); padding: 45px; border-radius: 30px; border: 2px solid #444; width: 680px; text-align: center; transition: 0.4s; }
        #rule-sidebar { position: fixed; right: -350px; top: 135px; width: 280px; background: var(--ui-bg); padding: 30px; border-radius: 20px; border: 2px solid var(--joy-glow); transition: 0.6s; z-index: 100; box-shadow: -10px 0 40px rgba(0,0,0,0.6); cursor: pointer; }
        #rule-sidebar.active { right: 25px; }
        .tag { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-left: 5px; letter-spacing: 0.5px; }
        .tag-investor { background: var(--gold); color: black; }
        .tag-sellout { background: var(--fear-glow); color: white; }
        .intro-header { font-size: 3.5rem; color: var(--gold); animation: introGlow 2s ease-in-out infinite alternate; margin-bottom: 20px; font-weight: 900; letter-spacing: 4px; }
        
        #restart-btn { width: 100%; margin-top: 10px; background: #333; color: #888; border: 1px solid #444; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.2s; }
        #restart-btn:hover { background: var(--fear-glow); color: white; border-color: white; }

        #nav-cluster { position: fixed; bottom: 25px; left: 25px; display: flex; flex-direction: column; align-items: flex-start; gap: 12px; z-index: 1000; }
        .nav-btn { padding: 14px 24px; border-radius: 12px; background: #111; color: white; font-weight: 900; font-size: 1rem; border: 1px solid #444; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); animation: navFloat 3.5s infinite ease-in-out; letter-spacing: 1.5px; text-transform: uppercase; width: 220px; text-align: left; }
        .nav-btn:hover { transform: scale(1.05) translateX(10px); z-index: 1001; }
        .btn-home:hover { box-shadow: 0 0 20px var(--tape-white); border-color: var(--tape-white); }
        .btn-store:hover { box-shadow: 0 0 20px var(--pink-glow); border-color: var(--pink-glow); color: var(--pink-glow); }
        .btn-album:hover { box-shadow: 0 0 20px var(--joy-glow); border-color: var(--joy-glow); color: var(--joy-glow); }
        .btn-home { animation-delay: 0s; }
        .btn-store { animation-delay: 0.2s; }
        .btn-album { animation-delay: 0.4s; }

        #audio-toggle { background: #222; border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 10px; width: 220px; box-sizing: border-box; transition: 0.3s; }
        #audio-toggle:hover { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
    </style></head><body>

    <div id="nav-cluster">
        <button id="audio-toggle" onclick="toggleAudio()">
            <span id="audio-icon">🔊</span> AUDIO: <span id="audio-status">ON</span>
        </button>
        <button class="nav-btn btn-home" onclick="window.open('https://freejoy.club', '_blank')">Home</button>
        <button class="nav-btn btn-store" onclick="window.open('https://freejoy.club', '_blank')">Store</button>
        <button class="nav-btn btn-album" onclick="window.open('https://freejoy.club', '_blank')">Play the Album</button>
    </div>

    <div id="merch-tracker">
        <h4 style="margin:0 0 10px 0; font-size: 0.65rem; letter-spacing: 2px; opacity: 0.6; color: var(--joy-glow);">TOUR STATS</h4>
        <div id="tracker-list"></div>
        <button id="restart-btn" onclick="confirmSoftRestart()">RESTART TOUR</button>
    </div>

    <div id="ui-layer">
        <div id="status-text">---</div>
        <div id="roll-btn-center">
            <button id="roll-btn" onclick="doRoll()" disabled style="background: var(--joy-glow); color: black; width: 220px; font-size: 1.6rem; font-weight:bold; padding:15px; border:none; border-radius:8px; cursor:pointer;">ROLL</button>
        </div>
        <div id="dice-slot-right">
            <div id="dice-box">?</div>
        </div>
    </div>

    <div id="board-container">
        <svg id="arrow-layer" viewbox="0 0 1100 700">
        </svg>
    </div>

    <div id="overlay-event" class="overlay">
        <div class="popup" id="main-popup">
            <h1 id="event-title"></h1>
            <div id="event-desc" style="font-size: 1.2rem; color: #ccc; margin-bottom:25px; line-height: 1.6;"></div>
            <div id="coin" style="width:140px; height:140px; background:var(--gold); border:8px solid #b8860b; border-radius:50%; margin:25px auto; display:none; align-items:center; justify-content:center; font-size:2.5rem; font-weight:bold; color:#5c4305; transform-style: preserve-3d;">?</div>
            <div id="timer-ui" style="font-size: 5rem; font-weight: 900; color: var(--joy-glow); margin: 20px 0; display: none;"></div>
            <div id="action-bar">
                <button id="event-btn-primary" style="padding:15px 35px; font-size: 1.1rem; font-weight:bold; cursor:pointer; border-radius:8px; border:none;"></button>
                <button id="event-btn-secondary" style="display:none; background: #333; color: white; padding:15px 35px; font-size: 1.1rem; font-weight:bold; cursor:pointer; margin-left:15px; border:none; border-radius:8px;"></button>
            </div>
        </div>
    </div>

    <div id="rule-sidebar" onclick="this.classList.remove('active')"><h3 id="side-title"></h3><p id="side-desc" style="line-height: 1.6;"></p></div>

    <div id="overlay-setup" class="overlay" style="display:flex"><div class="popup"><h1 class="intro-header">Fearjoy - Play This</h1><h2>HOW MANY ARTISTS?</h2><button onclick="setPlayerCount(1)" style="padding:20px 40px; margin:10px;">1</button><button onclick="setPlayerCount(2)" style="padding:20px 40px; margin:10px;">2</button><button onclick="setPlayerCount(3)" style="padding:20px 40px; margin:10px;">3</button><div id="setup-step-2" style="display:none; margin-top:30px;"><input type="text" id="name-input" placeholder="ARTIST NAME" style="padding:15px; width:80%; text-align: center; border-radius: 8px; border: 1px solid #000; background: #000; color: white;"><div id="name-error" style="color:var(--fear-glow); font-weight:bold; margin-top:10px; font-size:0.8rem; display:none;">NAME ALREADY TAKEN ON THIS TOUR</div><div style="display:flex; justify-content:center; gap:20px; margin:25px;"><img id="sel-jesse" src="jesse.png" style="width:80px; opacity:0.3; cursor:pointer;" onclick="pickAvatar('jesse', '#007bff')"><img id="sel-marco" src="marco.png" style="width:80px; opacity:0.3; cursor:pointer;" onclick="pickAvatar('marco', '#ffcc00')"><img id="sel-grant" src="grant.png" style="width:80px; opacity:0.3; cursor:pointer;" onclick="pickAvatar('grant', '#ff00ff')"></div><button onclick="confirmArtist()" style="padding:15px 30px; background: white; color: black; font-weight: bold; border-radius: 8px; cursor: pointer;">ADD TO TOUR</button></div></div></div><script>
    const boardLayout = [
        "START", "blank", "blank", "blank", "DAYSPRING", "blank", "FEARJOY", "blank", "FIGMENT", "JOY", 
        "THE REMEDY", "FEAR", "VAN BREAKS DOWN", "JOY", "blank", "DMITRI", "blank", "FEARJOY", "NIGHTDRIVE", "JOY", 
        "INVEST IN MERCH", "FEAR", "blank", "5TH DIMENSION", "blank", "IT HAPPENS", "blank", "GHOST 2", "MAYA", "blank", 
        "WIN A GRAMMY", "blank", "FEAR", "OPENING ACT", "blank", "JOY", "blank", "TELLUS", "blank", "FEARJOY", 
        "blank", "blank", "ENCORE", "blank", "VOID", "blank", "blank", "THE ENDLESS SMILE", "GATEKEEPER", "blank", 
        "blank", "blank", "FEARJOY", "VAN BREAKS DOWN", "blank", "LOST RECORDING", "blank", "FEARJOY", "blank", "SWIMMIN"
    ];

    const rules = {
        0: { title: "START", emoji: "▶️", desc: "The quiet before the storm." },
        4: { title: "DAYSPRING", emoji: "☀️", shift: 3, isAuto: true, isTrack: true, desc: "Creative clarity strikes! Forward 3.", sound: "dayclip.wav" },
        6: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip the coin: JOY = +1, FEAR = -1." },
        8: { title: "FIGMENT", emoji: "🛸", isFigment: true, isTrack: true, desc: "Step outside (1:00) for +2, or stay indoors for -1.", sound: "figclip.wav" },
        9: { title: "JOY", emoji: "😄", shift: 1, isAuto: true, desc: "Momentum! Forward 1." },
        10: { title: "THE REMEDY", emoji: "💊", choice: 'remedy', isTrack: true, desc: "A major label exec offers a deal: move ahead 6 now, but every 6 you roll later becomes -2.", sound: "remedyclip.wav" },
        11: { title: "FEAR", emoji: "😱", shift: -1, isAuto: true, desc: "Doubt slows you. Back 1." },
        12: { title: "VAN BREAKS DOWN", emoji: "🛠", skipTurns: 1, desc: "Bummer! Waiting for repairs. Turn consumed." },
        13: { title: "JOY", emoji: "😄", shift: 1, isAuto: true, desc: "Everything aligns. Forward 1." },
        15: { title: "DMITRI", emoji: "👨‍🚀", timer: 15, isDmitri: true, isTrack: true, desc: "Breathe (15s) for the 5D shortcut. Skip = Rewind 2.", sound: "dayclip.wav" },
        17: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip for destiny." },
        18: { title: "NIGHTDRIVE", emoji: "🌙", isNightDrive: true, isTrack: true, desc: "Keep eyes closed until next turn!" },
        19: { title: "JOY", emoji: "😄", shift: 1, isAuto: true, desc: "Rhythm is perfect. Forward 1." },
        20: { title: "INVEST IN MERCH", emoji: "👕", choice: 'merch', desc: "Rewind 4 now, but every 1 or 2 you roll later will be doubled." },
        21: { title: "FEAR", emoji: "😱", shift: -1, isAuto: true, desc: "Doubt slows you. Back 1." },
        23: { title: "5TH DIMENSION", emoji: "✨", shift: 1, isAuto: true, desc: "Higher frequency. Forward 1." },
        25: { title: "IT HAPPENS", emoji: "🔔", isItHappens: true, isTrack: true, desc: "suddenly, instantly, take an extra turn" },
        27: { title: "GHOST 2", emoji: "👻", isGhost: true, isTrack: true, desc: "Silent for one turn. Noise = Rewind 1." },
        28: { title: "MAYA", emoji: "👁️", isMaya: true, desc: "Hold 10 seconds of eye contact with another player." },
        30: { title: "WIN A GRAMMY", emoji: "🏆", isGrammy: true, desc: "Switch places with the leader!" },
        32: { title: "FEAR", emoji: "😱", shift: -1, isAuto: true, desc: "Industry gatekeepers. Back 1." },
        33: { title: "OPENING ACT", emoji: "🎤", isOpeningAct: true, desc: "Slide 2 spaces behind the leader." },
        35: { title: "JOY", emoji: "😄", shift: 1, isAuto: true, desc: "Crowd is cheering. Forward 1." },
        37: { title: "TELLUS", emoji: "📣", isTellus: true, isTrack: true, desc: "Swap positions with any artist." },
        39: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip for destiny." },
        42: { title: "ENCORE", emoji: "🎸", shift: 3, isAuto: true, desc: "The crowd demands more! Move forward 3." },
        44: { title: "VOID", emoji: "🌀", shift: -3, isAuto: true, isTrack: true, desc: "Creative block. Rewind 3." },
        47: { title: "THE ENDLESS SMILE", emoji: "💀", isSmile: true, desc: "Remain smiling until your next turn." },
        48: { title: "GATEKEEPER", emoji: "🚪", isGate: true, desc: "Industry Gatekeeper - Mandatory stop here unless you are in last place." },
        52: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip for destiny." },
        53: { title: "VAN BREAKS DOWN", emoji: "🛠", skipTurns: 1, desc: "Bummer! Waiting for repairs. Turn consumed." },
        55: { title: "LOST RECORDING", emoji: "📼", isLostRecording: true, desc: "Tape erased! Roll and rewind that amount." },
        57: { title: "FEARJOY", emoji: "☯️", isFearjoy: true, desc: "Flip the coin: JOY = +1, FEAR = -1." },
        59: { title: "SWIMMIN'", emoji: "🌊", desc: "The tour is over. Legend status achieved." }
    };

    let players = [], turnIdx = 0, isMoving = false, totalP = 0, currentSetupP = 0, selectedAvatar = null, isSwapping = false, isMayaPartner = false, sidebarTimer = null, audioEnabled = true;

    function toggleAudio() { audioEnabled = !audioEnabled; document.getElementById('audio-status').innerText = audioEnabled ? 'ON' : 'OFF'; document.getElementById('audio-icon').innerText = audioEnabled ? '🔊' : '🔇'; }
    function playSfx(file) { if(audioEnabled) { const a = new Audio(file); a.play().catch(e => console.log("Audio file not found or blocked: " + file)); } }

    function confirmSoftRestart() { showStatusPopup("RESTART TOUR?", "Are you sure? This will reset all scores and positions, but keep your current artists.", "YES, RESTART", () => { players.forEach(p => { p.pos = 0; p.skipCount = 0; p.isInvestor = false; p.isSellout = false; p.grammys = 0; p.shirtsSold = 0; p.pillsTaken = 0; p.ghostCounter = 0; p.totalRollValue = 0; p.smileActive = false; p.nightDriveActive = false; p.accolades = []; }); turnIdx = 0; isMoving = false; isSwapping = false; updateUI(); updatePositions(); document.getElementById('roll-btn').disabled = false; }, "CANCEL", () => {}); }

    function getSpaceColor(pos) { if (pos === -1 || pos >= boardLayout.length) return '#ffffff'; const name = boardLayout[pos]; if (name === 'FEAR') return 'var(--fear-glow)'; if (name === 'JOY') return 'var(--joy-glow)'; return '#ffffff'; }

    function drawCurvedArrow(x1, y1, x2, y2, bendOffset) {
        const svg = document.getElementById('arrow-layer');
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        let cx = (x1 + x2)/2 + bendOffset.x; let cy = (y1 + y2)/2 + bendOffset.y;
        path.setAttribute("d", `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`);
        path.setAttribute("stroke", "rgba(210, 180, 140, 0.4)"); path.setAttribute("fill", "none"); path.setAttribute("stroke-width", "2"); path.setAttribute("stroke-dasharray", "4,4"); path.setAttribute("marker-end", "url(#arrowhead-subtle)");
        svg.appendChild(path);
    }

    function setPlayerCount(n) { totalP = n; document.getElementById('setup-step-2').style.display='block'; }
    function pickAvatar(id, color) { selectedAvatar = { id, color, img: id+'.png' }; document.querySelectorAll('img').forEach(i=>i.style.opacity='0.3'); document.getElementById('sel-'+id).style.opacity='1'; }
    
    function confirmArtist() {
        const nameInput = document.getElementById('name-input'); const name = nameInput.value.toUpperCase().trim() || `ARTIST ${currentSetupP+1}`;
        const errorMsg = document.getElementById('name-error'); if(players.some(p => p.name === name)) { errorMsg.style.display = 'block'; return; }
        errorMsg.style.display = 'none'; if(!selectedAvatar) return;
        players.push({ name, pos: 0, avatar: selectedAvatar, skipCount: 0, isInvestor: false, isSellout: false, grammys: 0, shirtsSold: 0, pillsTaken: 0, ghostCounter: 0, totalRollValue: 0, smileActive: false, nightDriveActive: false, accolades: [] });
        currentSetupP++; if(currentSetupP >= totalP) { document.getElementById('overlay-setup').style.display='none'; initBoard(); }
        else { nameInput.value=''; selectedAvatar=null; }
    }

    function initBoard() {
        const board = document.getElementById('board-container'), containerRect = board.getBoundingClientRect(), spaceCoords = [];
        boardLayout.forEach((name, i) => {
            const s = document.createElement('div'); s.id = 's'+i; s.className = 'space';
            if(name === "blank") { s.classList.add('blank'); s.innerHTML = `<span class="blank-num">${i}</span>`; } 
            else {
                const r = rules[i]; const emojiHtml = (r && r.emoji) ? `<div class="sp-emoji">${r.emoji}</div>` : '';
                s.innerHTML = `${emojiHtml}<div class="sp-text">${name}</div>`;
                if(rules[i]?.isTrack) s.classList.add('tracklist-space');
                if(name === "FEAR") s.classList.add('fear-space'); if(name === "JOY") s.classList.add('joy-space'); if(name === "FEARJOY") s.classList.add('hybrid'); if(i === 59) s.classList.add('win-track');
            }
            if(i < 59 && name !== "START") {
                let arrowDir = ''; if(i % 10 === 9) arrowDir = 'arrow-up'; else if(Math.floor(i / 10) % 2 === 0) arrowDir = 'arrow-right'; else arrowDir = 'arrow-left';
                const arr = document.createElement('div'); arr.className = `dir-arrow ${arrowDir}`; arr.innerHTML = "➜"; s.appendChild(arr);
            }
            s.onclick = () => handleSpaceClick(i);
            let row = Math.floor(i / 10), col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));
            s.style.gridRow = 6 - row; s.style.gridColumn = col + 1; board.appendChild(s);
            const rRect = s.getBoundingClientRect(); spaceCoords.push({ x: rRect.left + rRect.width/2 - containerRect.left, y: rRect.top + rRect.height/2 - containerRect.top });
        });
        players.forEach((p, i) => {
            const el = document.createElement('div'); el.id = 'p'+i; el.className = 'player';
            el.style.backgroundImage = `url('${p.avatar.img}')`; el.onclick = () => handlePlayerClick(i);
            board.appendChild(el);
        });
        updateUI(); document.getElementById('roll-btn').disabled = false;
    }

    function handleSpaceClick(i) { const r = rules[i] || { title: boardLayout[i], desc: "The road continues." }; showSidebar(r.title, (r.emoji ? r.emoji + " " : "") + r.desc, getSpaceColor(i)); }

    function updateUI() {
        const p = players[turnIdx], list = document.getElementById('tracker-list');
        document.getElementById('status-text').innerHTML = `<span style="color:${p.avatar.color}">${p.name}'S TURN</span>`;
        list.innerHTML = '';
        players.forEach((pl, i) => {
            let tags = (pl.isInvestor ? '<span class="tag tag-investor">INVESTOR</span>' : '') + (pl.isSellout ? '<span class="tag tag-sellout">SELLOUT</span>' : '');
            let isCurrent = (i === turnIdx);
            list.innerHTML += `<div id="roster-p${i}" class="player-entry ${isCurrent ? 'roster-active' : ''}" style="${isCurrent ? '--p-color:'+pl.avatar.color : ''}" onclick="handlePlayerClick(${i})">
                <div style="display:flex;align-items:center;gap:10px;"><img src="${pl.avatar.img}" class="avatar-roster"><div><b>${pl.name}</b>${tags}<br><span style="font-size:1.1rem; letter-spacing:1px;">${pl.accolades.join('')}</span></div></div></div>`;
            const boardPiece = document.getElementById('p'+i); boardPiece.style.zIndex = (isCurrent ? 150 : 100);
            if(isCurrent) { boardPiece.classList.add('active-turn'); boardPiece.style.setProperty('--p-color', pl.avatar.color); }
            else { boardPiece.classList.remove('active-turn'); }
        });
        updatePositions();
    }

    function updatePositions() {
        const countMap = {};
        players.forEach((p, i) => {
            const target = document.getElementById('s'+p.pos), el = document.getElementById('p'+i); if(!countMap[p.pos]) countMap[p.pos] = 0;
            el.style.left = (target.offsetLeft + (countMap[p.pos] * 12)) + "px"; el.style.top = (target.offsetTop + (countMap[p.pos] * 12)) + "px"; countMap[p.pos]++;
        });
    }

    async function doRoll() {
        if(isMoving || isSwapping || isMayaPartner) return; document.getElementById('rule-sidebar').classList.remove('active');
        const p = players[turnIdx];
        if(p.skipCount > 0) { p.skipCount--; showStatusPopup("🛠 BUMMER", "Van is still in the shop. Turn skipped.", "OK", () => { endTurn(); }, "DARN", () => { endTurn(); }); return; }
        if(p.nightDriveActive) { showStatusPopup("🌙 NIGHTDRIVE CHECK", "Did you keep your eyes closed?", "YES", () => { p.nightDriveActive = false; checkNextHonor(p); }, "NO", () => { p.nightDriveActive = false; movePlayer(-1); }); return; }
        checkNextHonor(p);
    }

    function checkNextHonor(p) {
        if(p.ghostCounter > 0) { showStatusPopup("👻 GHOST CHECK", `Silence is required. Did you remain quiet?`, "YES", () => { p.ghostCounter = 0; checkNextHonor(p); }, "NO", () => { p.ghostCounter = 0; movePlayer(-1); }); return; }
        if(p.smileActive) { showStatusPopup("💀 THE ENDLESS SMILE", "Did you keep smiling?", "HELD IT", () => { p.smileActive = false; checkNextHonor(p); }, "BROKE IT", () => { p.smileActive = false; endTurn(); }); return; }
        performActualRoll();
    }

    async function performActualRoll() {
        const p = players[turnIdx]; isMoving = true; document.getElementById('roll-btn').disabled = true;
        const dice = document.getElementById('dice-box'); dice.innerText = "?"; dice.classList.add('dice-cinematic');
        let roll;
        for(let j=0; j<12; j++) { dice.innerText = Math.floor(Math.random()*6)+1; await new Promise(r => setTimeout(r, 45)); }
        roll = Math.floor(Math.random()*6)+1; dice.innerText = roll;
        if(p.isInvestor && (roll === 1 || roll === 2)) { await new Promise(r => setTimeout(r, 500)); dice.classList.add('dice-gold'); spawnEmoji('👕'); showSidebar("INVESTMENT PAYOFF", "Merch is moving! Roll doubled.", "#ffffff"); p.shirtsSold++; p.accolades.push('👕'); roll *= 2; dice.innerText = roll; await new Promise(r => setTimeout(r, 2000)); updateUI(); }
        if(p.isSellout && roll === 6) { await new Promise(r => setTimeout(r, 500)); dice.classList.add('dice-red'); spawnEmoji('💊'); showSidebar("CONTRACT DEBT", "Forward 6 becomes Back 2.", "var(--fear-glow)"); p.pillsTaken++; p.accolades.push('💊'); roll = -2; dice.innerText = roll; await new Promise(r => setTimeout(r, 2000)); updateUI(); }
        p.totalRollValue += Math.abs(roll); await new Promise(r => setTimeout(r, 250)); dice.classList.remove('dice-cinematic', 'dice-red', 'dice-gold'); await new Promise(r => setTimeout(r, 250)); movePlayer(roll);
    }

    function spawnEmoji(char) { const e = document.createElement('div'); e.className = 'floating-emoji'; e.innerText = char; e.style.left = "50%"; e.style.top = "50%"; document.body.appendChild(e); setTimeout(() => e.remove(), 1200); }

    async function movePlayer(n) {
        const p = players[turnIdx]; const dir = n > 0 ? 1 : -1;
        let minPos = Math.min(...players.map(pl => pl.pos)); let isLast = (p.pos === minPos);
        for(let i=0; i<Math.abs(n); i++) {
            if(p.pos + dir >= 0 && p.pos + dir < boardLayout.length) {
                p.pos += dir; updatePositions();
                if(dir > 0 && rules[p.pos]?.isGate && !isLast && i < Math.abs(n)-1) { i = 999; }
                await new Promise(r => setTimeout(r, 300)); if(p.pos >= 59) { showWinScreen(); return; }
            }
        }
        checkSpace();
    }

    function checkSpace() {
        const p = players[turnIdx], r = rules[p.pos]; if(!r) { endTurn(); return; }
        const spaceCol = getSpaceColor(p.pos); const popupEl = document.getElementById('main-popup'); popupEl.style.borderColor = spaceCol; popupEl.style.boxShadow = `0 0 30px ${spaceCol}`;
        if(r.sound) { playSfx(r.sound); }
        if(r.choice === 'remedy' && p.isSellout) { showSidebar("CONTRACT ACTIVE", "Soul already sold.", spaceCol); endTurn(); return; }
        if(r.choice === 'merch' && p.isInvestor) { showSidebar("ALREADY INVESTED", "Inventory full.", spaceCol); endTurn(); return; }
        if(r.isAuto) { showSidebar(r.title, (r.emoji || "") + " " + (r.desc || "Moving..."), spaceCol); setTimeout(() => { movePlayer(r.shift); }, 1200); return; }
        const modal = document.getElementById('overlay-event'), title = document.getElementById('event-title'), desc = document.getElementById('event-desc'), pBtn = document.getElementById('event-btn-primary'), sBtn = document.getElementById('event-btn-secondary'), timerUI = document.getElementById('timer-ui'), coin = document.getElementById('coin');
        coin.style.display = 'none'; pBtn.style.display = 'inline-block'; pBtn.disabled = false; title.innerText = (r.emoji || "") + " " + r.title; desc.innerText = r.desc || ""; pBtn.innerText = "CONTINUE"; sBtn.style.display = 'none'; timerUI.style.display = 'none'; modal.style.display = 'flex';
        
        if(r.skipTurns) { p.skipCount = r.skipTurns; pBtn.onclick = () => { modal.style.display='none'; endTurn(); }; }
        else if(r.isFigment) {
            pBtn.innerText = "STEP OUTSIDE (1:00)"; sBtn.innerText = "STAY INDOORS (-1)"; sBtn.style.display = 'inline-block';
            pBtn.onclick = () => { pBtn.disabled = true; sBtn.style.display = 'none'; timerUI.style.display = 'block'; let t = 60; timerUI.innerText = t; const clock = setInterval(() => { t--; timerUI.innerText = t; if(t <= 0) { clearInterval(clock); pBtn.disabled = false; pBtn.innerText = "I'M BACK (+2)"; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(2); }; } }, 1000); };
            sBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(-1); };
        } else if(r.isFearjoy) {
            pBtn.innerText = "FLIP COIN"; pBtn.onclick = () => { pBtn.style.display='none'; coin.innerText = "?"; coin.style.display='flex'; coin.classList.add('flipping'); setTimeout(() => { const win = Math.random() > 0.5; coin.innerText = win ? "JOY" : "FEAR"; coin.classList.remove('flipping'); setTimeout(async () => { modal.style.display='none'; coin.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(win ? 1 : -1); }, 1200); }, 1200); };
        } else if(r.isDmitri) {
            pBtn.innerText = "BREATHE"; sBtn.innerText = "SKIP (-2)"; sBtn.style.display = 'inline-block';
            pBtn.onclick = () => { pBtn.disabled = true; sBtn.style.display='none'; timerUI.style.display='block'; let t = 15; timerUI.innerText = t; const clock = setInterval(() => { t--; timerUI.innerText = t; if(t <= 0) { clearInterval(clock); pBtn.disabled = false; pBtn.innerText = "BREATHING COMPLETED"; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); p.pos = 23; updatePositions(); endTurn(); }; } }, 1000); };
            sBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(-2); };
        } else if(r.choice) {
            pBtn.innerText = r.choice === 'remedy' ? "SIGN CONTRACT (+6)" : "INVEST IN MERCH (-4)"; sBtn.style.display='inline-block'; sBtn.innerText = "PASS";
            pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); if(r.choice==='remedy'){p.isSellout=true; movePlayer(6);} else {p.isInvestor=true; movePlayer(-4); } };
            sBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isGrammy) {
            let maxPos = Math.max(...players.map(pl => pl.pos)); let leaders = players.filter(pl => pl.pos === maxPos && pl !== p);
            p.grammys++; p.accolades.push('🏆'); updateUI();
            if(p.pos === maxPos) { pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(1); }; }
            else if(leaders.length > 1) {
                isSwapping = true; pBtn.innerText = "READY"; pBtn.onclick = () => { modal.style.display='none'; };
                showSidebar("🏆 TIED LEADERS", "Multiple artists are tied for the lead. Select which one to swap with by clicking their picture on the roster.", "var(--gold)");
                leaders.forEach(l => { const idx = players.indexOf(l); document.getElementById('p'+idx).classList.add('swap-target'); document.getElementById('roster-p'+idx).classList.add('roster-swap'); });
            } else { pBtn.onclick = () => { let lead = leaders[0]; let lp = lead.pos; lead.pos = p.pos; p.pos = lp; modal.style.display='none'; updatePositions(); endTurn(); }; }
        } else if(r.isTellus) {
            isSwapping = true; pBtn.innerText = "READY"; pBtn.onclick = () => { modal.style.display='none'; };
            desc.innerText = "CLICK ANOTHER ARTIST (ON BOARD OR ROSTER) TO SWAP PLACES.";
            players.forEach((_, i) => { if(i !== turnIdx) { document.getElementById('p'+i).classList.add('swap-target'); document.getElementById('roster-p'+i).classList.add('roster-swap'); } });
        } else if(r.isMaya) {
            if(players.length > 1) {
                isMayaPartner = true; pBtn.innerText = "READY"; pBtn.onclick = () => { modal.style.display='none'; };
                desc.innerText = "CLICK ANOTHER ARTIST TO MAKE EYE CONTACT.";
                players.forEach((_, i) => { if(i !== turnIdx) { document.getElementById('p'+i).classList.add('swap-target'); document.getElementById('roster-p'+i).classList.add('roster-swap'); } });
            } else { pBtn.innerText = "LONELY TOUR"; pBtn.onclick = () => { modal.style.display='none'; endTurn(); }; }
        } else if(r.isOpeningAct) {
            let maxPos = Math.max(...players.map(pl => pl.pos)); let isLead = (p.pos === maxPos); pBtn.innerText = " "; pBtn.disabled = true;
            if(isLead) {
                showSidebar("OPENING ACT", "You are the leader! Go back 2 spaces.", spaceCol);
                setTimeout(() => { pBtn.innerText = "ACCEPT FATE (-2)"; pBtn.disabled = false; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res=>setTimeout(res,800)); movePlayer(-2); }; }, 2500);
            } else {
                showSidebar("OPENING ACT", "Slide 2 spaces behind the leader.", spaceCol);
                setTimeout(() => { pBtn.innerText = "MOVE UP"; pBtn.disabled = false; pBtn.onclick = async () => { modal.style.display='none'; let targetPos = maxPos - 2; if(targetPos < 0) targetPos = 0; let diff = targetPos - p.pos; await new Promise(res=>setTimeout(res,800)); if(diff !== 0) movePlayer(diff); else endTurn(); }; }, 2500);
            }
        } else if(r.isGhost) { p.ghostCounter = 1; pBtn.innerText = "I WILL BE SILENT"; pBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isSmile) { p.smileActive = true; pBtn.innerText = "I WILL SMILE"; pBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isNightDrive) { p.nightDriveActive = true; pBtn.innerText = "EYES CLOSED"; pBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isGate) { pBtn.innerText = "PAY YOUR DUES"; pBtn.onclick = () => { modal.style.display='none'; endTurn(); };
        } else if(r.isItHappens) { pBtn.onclick = async () => { modal.style.display='none'; await new Promise(res => setTimeout(res, 800)); isMoving = false; performActualRoll(); };
        } else if(r.isLostRecording) { 
            pBtn.innerText = "ROLL TO REWIND"; 
            pBtn.onclick = async () => { 
                pBtn.style.display='none'; coin.style.display='flex'; coin.innerText = "?"; coin.classList.add('flipping'); let rl;
                for(let j=0; j<12; j++) { coin.innerText = Math.floor(Math.random()*6)+1; await new Promise(r => setTimeout(r, 45)); }
                rl = Math.floor(Math.random()*6)+1; coin.innerText = rl; coin.classList.remove('flipping');
                await new Promise(r => setTimeout(r, 1500)); modal.style.display='none'; coin.style.display='none'; await new Promise(res => setTimeout(res, 800)); movePlayer(-rl); 
            };
        } else { pBtn.onclick = () => { modal.style.display='none'; endTurn(); }; }
    }

    function handlePlayerClick(idx) { 
        if(isSwapping) { 
            if(!document.getElementById('roster-p'+idx).classList.contains('roster-swap') && !document.getElementById('p'+idx).classList.contains('swap-target')) return;
            let p = players[turnIdx], t = players[idx], lp = t.pos; t.pos = p.pos; p.pos = lp; isSwapping = false; 
            document.querySelectorAll('.player').forEach(el => el.classList.remove('swap-target')); document.querySelectorAll('.player-entry').forEach(el => el.classList.remove('roster-swap'));
            updatePositions(); endTurn(); 
        } else if(isMayaPartner) {
            if(idx === turnIdx) return; isMayaPartner = false; let partnerIdx = idx;
            document.querySelectorAll('.player').forEach(el => el.classList.remove('swap-target')); document.querySelectorAll('.player-entry').forEach(el => el.classList.remove('roster-swap'));
            const modal = document.getElementById('overlay-event'), title = document.getElementById('event-title'), desc = document.getElementById('event-desc'), pBtn = document.getElementById('event-btn-primary'), sBtn = document.getElementById('event-btn-secondary'), timerUI = document.getElementById('timer-ui'), coin = document.getElementById('coin');
            title.innerText = "👁️ MAYA"; desc.innerText = `Hold eye contact with ${players[partnerIdx].name}!`;
            coin.style.display = 'none'; sBtn.style.display = 'none'; timerUI.style.display = 'none'; pBtn.style.display = 'inline-block'; pBtn.disabled = false; pBtn.innerText = "START 10s TIMER";
            pBtn.onclick = () => {
                pBtn.disabled = true; pBtn.style.display = 'none'; timerUI.style.display = 'block'; let t = 10; timerUI.innerText = t;
                const clock = setInterval(() => { t--; timerUI.innerText = t; if(t <= 0) { clearInterval(clock); timerUI.style.display = 'none'; pBtn.style.display = 'inline-block'; pBtn.disabled = false; pBtn.innerText = "WE HELD IT (+2)"; sBtn.style.display = 'inline-block'; sBtn.innerText = "WE BROKE (-1)";
                    pBtn.onclick = async () => { modal.style.display = 'none'; await new Promise(r=>setTimeout(r,500)); players[partnerIdx].pos += 2; updatePositions(); movePlayer(2); };
                    sBtn.onclick = async () => { modal.style.display = 'none'; await new Promise(r=>setTimeout(r,500)); players[partnerIdx].pos -= 1; if(players[partnerIdx].pos < 0) players[partnerIdx].pos = 0; updatePositions(); movePlayer(-1); };
                } }, 1000);
            }; modal.style.display = 'flex';
        }
    }

    function showStatusPopup(t, d, b1, c1, b2, c2) {
        const modal = document.getElementById('overlay-event'), popupEl = document.getElementById('main-popup'); popupEl.style.borderColor = '#444'; popupEl.style.boxShadow = 'none';
        document.getElementById('event-title').innerText = t; document.getElementById('event-desc').innerText = d; document.getElementById('coin').style.display = 'none';
        const pBtn = document.getElementById('event-btn-primary'); pBtn.style.display='inline-block'; pBtn.innerText = b1; pBtn.onclick = async () => { modal.style.display='none'; await new Promise(r => setTimeout(r, 200)); c1(); };
        const sBtn = document.getElementById('event-btn-secondary'); sBtn.style.display='inline-block'; sBtn.innerText = b2; sBtn.onclick = async () => { modal.style.display='none'; await new Promise(r => setTimeout(r, 200)); c2(); };
        modal.style.display='flex';
    }

    function showSidebar(t, d, color = '#ffffff') { 
        if(sidebarTimer) clearTimeout(sidebarTimer); const sb = document.getElementById('rule-sidebar'); sb.style.borderColor = color; sb.style.boxShadow = `-10px 0 40px ${color}`;
        document.getElementById('side-title').innerText = t; document.getElementById('side-desc').innerText = d; sb.classList.add('active'); sidebarTimer = setTimeout(() => sb.classList.remove('active'), 8000); 
    }

    function showWinScreen() { 
        const p = players[turnIdx]; 
        let statsHtml = `<h2 style="color:${p.avatar.color}; animation: winPulse 2s infinite ease-in-out; font-size: 2.8rem; margin: 10px 0; --p-color: ${p.avatar.color};">${p.name} WINS!</h2><div style="text-align:left; margin-top:20px; font-family:monospace; max-height: 400px; overflow-y: auto; padding-right: 10px;">`;
        players.forEach(pl => { statsHtml += `<div style="margin-bottom:15px; border-bottom: 1px solid #444; display:flex; align-items:center; gap:15px; padding-bottom:15px;"><img src="${pl.avatar.img}" style="width:65px; height:65px; border-radius:50%; background:#111; border:3px solid ${pl.avatar.color};"><div style="flex-grow:1;"><b style="color:${pl.avatar.color}; font-size:1.3rem;">${pl.name}</b><br><span style="font-size:1.3rem; letter-spacing:2px; display:inline-block; margin:5px 0;">${pl.accolades.join('') || "—"}</span><br>GRAMMYS: ${pl.grammys} | SHIRTS: ${pl.shirtsSold} | PILLS: ${pl.pillsTaken}</div></div>`; });
        statsHtml += `</div>`;
        const popupEl = document.getElementById('main-popup'); popupEl.style.borderColor = 'var(--blue-glow)'; popupEl.style.boxShadow = '0 0 60px var(--blue-glow)';
        document.getElementById('event-title').innerText = "The tour is over. Go Swimmin!"; document.getElementById('event-desc').innerHTML = statsHtml;
        document.getElementById('event-btn-primary').innerText = "NEW TOUR (SELECT ARTISTS)"; document.getElementById('event-btn-primary').onclick = () => location.reload();
        document.getElementById('event-btn-secondary').style.display = 'inline-block'; document.getElementById('event-btn-secondary').innerText = "SAME ARTISTS (SOFT RESTART)";
        document.getElementById('event-btn-secondary').onclick = () => { document.getElementById('overlay-event').style.display='none'; confirmSoftRestart(); };
        document.getElementById('overlay-event').style.display='flex'; 
    }
    
    function endTurn() { turnIdx = (turnIdx + 1) % players.length; isMoving = false; document.getElementById('roll-btn').disabled = false; updateUI(); }</script></body></html>
