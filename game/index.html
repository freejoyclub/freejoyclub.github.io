<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fearjoy - v10.2</title>
    <style>
        :root {
            --wood-dark: #8b7355; --wood-mid: #b39b7d; --wood-light: #d2b48c;
            --tape-white: #fdfdfd; --joy-glow: #00ff88; --fear-glow: #ff4444;
            --gold: #ffd700; --ui-bg: rgba(0,0,0,0.98); --vinyl: #111111;
        }

        @keyframes woodFade { 0%, 100% { background-color: var(--wood-dark); } 50% { background-color: var(--wood-mid); } }
        @keyframes iconFloat { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-160px) scale(1.8); opacity: 0; } }
        @keyframes sparklePop { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        @keyframes pulseRed { 0% { box-shadow: 0 0 10px var(--fear-glow); } 50% { box-shadow: 0 0 40px var(--fear-glow); } 100% { box-shadow: 0 0 10px var(--fear-glow); } }

        body { animation: woodFade 20s ease-in-out infinite; background-image: repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,0.05) 80px, rgba(0,0,0,0.05) 82px); color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow: hidden; }
        
        #board-container { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(6, 1fr); gap: 18px; padding: 50px; width: 1100px; height: 700px; position: relative; z-index: 5; }
        .space { width: 85px; height: 85px; border-radius: 50%; border: 1px solid var(--tape-white); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 0.75rem; background: rgba(255,255,255,0.08); text-align: center; }
        .tracklist-space { background: var(--vinyl) !important; border: 3px double #777 !important; transform: scale(1.1); box-shadow: 0 0 15px rgba(0,0,0,0.5); }

        #ui-layer { display: flex; align-items: center; background: var(--ui-bg); padding: 0 45px; height: 115px; border-radius: 15px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.15); width: 1000px; justify-content: space-between; z-index: 10; }
        #dice-box { width: 80px; height: 80px; background: white; color: black; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: bold; transition: 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); border: 2px solid #ccc; }
        .dice-cinematic { z-index: 5000 !important; transform: scale(2.5); border-color: white; }
        .investor-glow { box-shadow: 0 0 70px var(--gold); background: var(--gold) !important; color: black !important; }
        .sellout-glow { animation: pulseRed 0.5s infinite; background: #500 !important; color: white !important; }

        .floating-icon { position: absolute; pointer-events: none; font-size: 3rem; z-index: 5001; animation: iconFloat 1.2s forwards ease-out; }
        .sparkle { position: absolute; width: 10px; height: 10px; border-radius: 50%; pointer-events: none; z-index: 5001; animation: sparklePop 0.8s forwards; }

        #merch-tracker { position: fixed; left: 20px; top: 135px; width: 270px; background: var(--ui-bg); border-radius: 12px; padding: 20px; border: 1px solid #444; }
        .player-entry { padding: 12px; border-bottom: 1px solid #333; margin-bottom: 5px; }
        .status-tag { font-size: 0.7rem; font-weight: 900; display: block; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .tag-investor { color: var(--joy-glow); text-shadow: 0 0 5px var(--joy-glow); }
        .tag-sellout { color: var(--fear-glow); text-shadow: 0 0 5px var(--fear-glow); }

        #nav-controls { position: fixed; bottom: 25px; left: 25px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .nav-btn { padding: 14px 22px; border-radius: 10px; background: #000; color: white; font-weight: 900; border: 1px solid #555; cursor: pointer; width: 210px; text-align: left; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .popup { background: rgba(5, 5, 5, 0.98); padding: 50px; border-radius: 30px; border: 2px solid #555; width: 620px; text-align: center; }
        .action-btn { padding: 18px 40px; font-weight: 900; border-radius: 10px; border: none; cursor: pointer; font-size: 1.1rem; }
        .btn-locked { background: #222 !important; color: #666 !important; cursor: not-allowed; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="nav-controls">
        <button id="audio-toggle" class="nav-btn" onclick="toggleAudio()">🔊 AUDIO: <span id="audio-status">ON</span></button>
        <button class="nav-btn" onclick="window.open('https://freejoy.club', '_blank')">HOME</button>
        <button class="nav-btn" onclick="window.open('https://freejoy.club', '_blank')">STORE</button>
        <button class="nav-btn" onclick="window.open('https://freejoy.club', '_blank')">PLAY ALBUM</button>
    </div>

    <div id="merch-tracker">
        <h4 style="margin:0 0 10px 0; font-size: 0.65rem; letter-spacing: 2px; color: var(--joy-glow); opacity: 0.8;">TOUR ROSTER</h4>
        <div id="tracker-list"></div>
    </div>

    <div id="ui-layer">
        <div id="status-text" style="text-transform: uppercase;">Awaiting Artists...</div>
        <button id="roll-btn" onclick="doRoll()" disabled style="background: var(--joy-glow); color: black; width: 200px; height: 60px; font-size: 1.6rem; font-weight:900; border-radius:10px; cursor:pointer;">ROLL</button>
        <div id="dice-box">?</div>
    </div>

    <div id="board-container"></div>

    <div id="overlay-event" class="overlay">
        <div class="popup">
            <h1 id="event-title" style="letter-spacing: 2px;"></h1>
            <div id="event-desc" style="font-size: 1.25rem; color: #bbb; margin: 25px 0; line-height: 1.5;"></div>
            <div id="action-bar">
                <button id="event-btn-primary" class="action-btn"></button>
            </div>
        </div>
    </div>

<script>
    const boardLayout = ["START", "blank", "blank", "blank", "DAYSPRING", "blank", "FEARJOY", "blank", "FIGMENT", "JOY", "THE REMEDY", "FEAR", "VAN BREAKS DOWN", "JOY", "blank", "DMITRI", "blank", "FEARJOY", "NIGHTDRIVE", "JOY", "INVEST IN MERCH", "FEAR", "blank", "5TH DIMENSION", "blank", "IT HAPPENS", "blank", "GHOST 2", "MAYA", "blank", "WIN A GRAMMY", "blank", "FEAR", "OPENING ACT", "blank", "JOY", "blank", "TELLUS", "blank", "FEARJOY", "blank", "ENCORE", "blank", "blank", "VOID", "blank", "blank", "THE ENDLESS SMILE", "GATEKEEPER", "blank", "blank", "blank", "FEARJOY", "VAN BREAKS DOWN", "blank", "LOST RECORDING", "blank", "FEARJOY", "blank", "SWIMMIN'"];
    const rules = {
        4: { title: "DAYSPRING", shift: 3, sound: "dayclip.wav", isAuto: true },
        8: { title: "FIGMENT", sound: "figclip.wav", desc: "Step outside for 1:00 (+2) or stay indoors (-1)." },
        10: { title: "THE REMEDY", choice: 'remedy', sound: "remedyclip.wav", desc: "Sign the major contract: Move +6, but all 6s rolled later become -2." },
        15: { title: "DMITRI", sound: "dmitriclip.wav", desc: "15s of deep breaths to hit the 5D shortcut." },
        20: { title: "INVEST IN MERCH", choice: 'merch', desc: "Invest now (-4) to double all future 1s and 2s rolled." }
    };

    let players = [], turnIdx = 0, isMoving = false, audioEnabled = true;

    function toggleAudio() { audioEnabled = !audioEnabled; document.getElementById('audio-status').innerText = audioEnabled ? 'ON' : 'OFF'; }
    function playSfx(file) { if(audioEnabled && file) new Audio(file).play().catch(e => {}); }

    function spawnFX(x, y, emoji, color) {
        for(let i=0; i<6; i++) {
            setTimeout(() => {
                const icon = document.createElement('div'); icon.className = 'floating-icon';
                icon.innerText = emoji; icon.style.left = (x - 20) + 'px'; icon.style.top = (y - 30) + 'px';
                document.body.appendChild(icon); setTimeout(() => icon.remove(), 1200);
                
                const s = document.createElement('div'); s.className = 'sparkle';
                s.style.left = x + 'px'; s.style.top = y + 'px'; s.style.background = color;
                document.body.appendChild(s); setTimeout(() => s.remove(), 800);
            }, i * 100);
        }
    }

    // Auto-setup for testing or immediate play
    window.onload = () => {
        players.push({name: "ARTIST 1", pos: 0, isInvestor: false, isSellout: false, accolades: []});
        initBoard();
    };

    function initBoard() {
        const board = document.getElementById('board-container');
        boardLayout.forEach((name, i) => {
            const s = document.createElement('div'); s.id = 's'+i; s.className = 'space';
            s.innerHTML = name === "blank" ? `<span style="opacity:0.3">${i}</span>` : name;
            if(name.length > 8 || rules[i]?.sound) s.classList.add('tracklist-space');
            let row = Math.floor(i / 10), col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));
            s.style.gridRow = 6 - row; s.style.gridColumn = col + 1; board.appendChild(s);
        });
        updateUI(); document.getElementById('roll-btn').disabled = false;
    }

    function updateUI() {
        const p = players[turnIdx], list = document.getElementById('tracker-list');
        document.getElementById('status-text').innerHTML = `<span style="color:var(--joy-glow)">${p.name}'S TURN</span>`;
        list.innerHTML = '';
        players.forEach((pl) => {
            list.innerHTML += `<div class="player-entry">
                <b style="font-size: 1rem;">${pl.name}</b>
                ${pl.isInvestor ? '<span class="status-tag tag-investor">[INVESTOR]</span>' : ''}
                ${pl.isSellout ? '<span class="status-tag tag-sellout">[SELLOUT]</span>' : ''}
                <div style="font-size:1.4rem; margin-top:5px;">${pl.accolades.join('')}</div>
            </div>`;
        });
    }

    async function doRoll() {
        const p = players[turnIdx];
        isMoving = true; document.getElementById('roll-btn').disabled = true;
        const diceBox = document.getElementById('dice-box');
        diceBox.classList.add('dice-cinematic');

        for(let j=0; j<12; j++) { diceBox.innerText = Math.floor(Math.random()*6)+1; await new Promise(r => setTimeout(r, 70)); }
        let roll = Math.floor(Math.random()*6)+1; diceBox.innerText = roll;

        const rect = diceBox.getBoundingClientRect();
        const x = rect.left + rect.width/2, y = rect.top + rect.height/2;

        if(p.isInvestor && (roll === 1 || roll === 2)) {
            diceBox.classList.add('investor-glow');
            spawnFX(x, y, '👕', 'var(--gold)'); roll *= 2; diceBox.innerText = roll;
            await new Promise(r => setTimeout(r, 1200));
        } else if(p.isSellout && roll === 6) {
            diceBox.classList.add('sellout-glow');
            spawnFX(x, y, '💊', 'var(--fear-glow)'); roll = -2; diceBox.innerText = roll;
            await new Promise(r => setTimeout(r, 1200));
        } else {
            await new Promise(r => setTimeout(r, 800));
        }

        diceBox.className = ''; movePlayer(roll);
    }

    async function movePlayer(n) {
        const p = players[turnIdx];
        const dir = n > 0 ? 1 : -1;
        for(let i=0; i<Math.abs(n); i++) {
            p.pos = Math.max(0, Math.min(59, p.pos + dir));
            updateUI(); 
            // Minimal positioning logic (can be expanded to move physical avatars)
            await new Promise(r => setTimeout(r, 180));
        }
        checkSpace();
    }

    function checkSpace() {
        const p = players[turnIdx], r = rules[p.pos];
        if(!r) { endTurn(); return; }
        if(r.sound) playSfx(r.sound);
        
        const modal = document.getElementById('overlay-event');
        const btn = document.getElementById('event-btn-primary');
        document.getElementById('event-title').innerText = r.title;
        document.getElementById('event-desc').innerText = r.desc || "Keep your eyes on the road.";
        modal.style.display = 'flex';

        // THE RIGID GUARD RAIL
        const alreadySigned = (r.choice === 'remedy' && p.isSellout);
        const alreadyStocked = (r.choice === 'merch' && p.isInvestor);

        if(alreadySigned || alreadyStocked) {
            btn.innerText = alreadySigned ? "CONTRACTED" : "STOCKED UP";
            btn.className = "action-btn btn-locked";
            btn.onclick = null;
            setTimeout(() => { modal.style.display='none'; endTurn(); }, 1800);
        } else {
            btn.innerText = r.choice === 'remedy' ? "SIGN CONTRACT" : (r.choice === 'merch' ? "BUY MERCH" : "CONTINUE");
            btn.className = "action-btn";
            btn.style.background = "var(--joy-glow)"; btn.style.color = "black";
            btn.onclick = () => {
                modal.style.display = 'none';
                if(r.choice === 'remedy') { p.isSellout = true; p.accolades.push('💊'); movePlayer(6); }
                else if(r.choice === 'merch') { p.isInvestor = true; p.accolades.push('👕'); movePlayer(-4); }
                else if(r.isAuto) { movePlayer(r.shift); }
                else { endTurn(); }
            };
        }
    }

    function endTurn() { isMoving = false; document.getElementById('roll-btn').disabled = false; updateUI(); }
</script>
</body>
</html>
