<!-- LAB v6 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>The Lab — Freejoy Club (v6)</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg:#0d0a07; --warm1:#1a1208; --warm2:#251a0a;
  --edison:#c8781a; --edison-dim:#8b5012; --filament:#f5d080;
  --cream:#f0e0c0; --cream-dim:#a08060;
  --metal:#4a3f32; --metal-light:#6b5c4a;
  --glow:rgba(200,120,26,0.18); --glow-strong:rgba(200,120,26,0.5);
  --tag-music:#2a4a3a; --tag-music-text:#5de8a0;
  --tag-elec:#1a2a4a;  --tag-elec-text:#5ab0f0;
  --tag-print:#3a2a1a; --tag-print-text:#e0a050;
  --pillar-w:clamp(110px,13vw,165px);
  --side-w:clamp(58px,7.5vw,86px);
  --float-size:clamp(100px,14vw,170px);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;overflow:hidden;}

/* ══════════════════════════════════
   EDISON WORDMARK FLICKER
══════════════════════════════════ */
@keyframes edisonFlicker {
  0%,100%{ text-shadow:0 0 10px var(--edison),0 0 26px var(--edison-dim),0 0 2px var(--filament); opacity:1; }
  92%    { text-shadow:0 0 10px var(--edison),0 0 26px var(--edison-dim),0 0 2px var(--filament); opacity:1; }
  93%    { text-shadow:0 0 4px var(--edison-dim); opacity:0.7; }
  94%    { text-shadow:0 0 10px var(--edison),0 0 30px var(--edison),0 0 4px var(--filament); opacity:1; }
  96%    { text-shadow:0 0 6px var(--edison-dim); opacity:0.75; }
  97%    { text-shadow:0 0 12px var(--edison),0 0 28px var(--edison-dim); opacity:1; }
}

/* ══════════════════════════════════
   EDISON BULB ANIMATIONS
══════════════════════════════════ */
@keyframes bulbFlicker {
  0%,100%{ opacity:0.92; filter:drop-shadow(0 0 6px rgba(200,120,26,0.9)); }
  88%    { opacity:0.92; filter:drop-shadow(0 0 6px rgba(200,120,26,0.9)); }
  89%    { opacity:0.55; filter:drop-shadow(0 0 2px rgba(200,120,26,0.3)); }
  90%    { opacity:0.95; filter:drop-shadow(0 0 8px rgba(200,120,26,1)); }
  93%    { opacity:0.6;  filter:drop-shadow(0 0 2px rgba(200,120,26,0.4)); }
  94%    { opacity:0.9;  filter:drop-shadow(0 0 6px rgba(200,120,26,0.85)); }
}
@keyframes bulbFlicker2 {
  0%,100%{ opacity:0.88; filter:drop-shadow(0 0 5px rgba(200,120,26,0.8)); }
  45%    { opacity:0.6;  filter:drop-shadow(0 0 2px rgba(200,120,26,0.3)); }
  46%    { opacity:0.95; filter:drop-shadow(0 0 8px rgba(200,120,26,1)); }
  80%    { opacity:0.88; filter:drop-shadow(0 0 5px rgba(200,120,26,0.8)); }
  81%    { opacity:0.5;  filter:drop-shadow(0 0 1px rgba(200,120,26,0.2)); }
  82%    { opacity:0.9;  filter:drop-shadow(0 0 6px rgba(200,120,26,0.9)); }
}

/* String sway */
@keyframes stringSway {
  0%,100%{ transform:rotate(0deg); }
  30%    { transform:rotate(1.2deg); }
  70%    { transform:rotate(-0.9deg); }
}
@keyframes stringSway2 {
  0%,100%{ transform:rotate(0deg); }
  25%    { transform:rotate(-1.4deg); }
  65%    { transform:rotate(1.1deg); }
}

/* ══════════════════════════════════
   TOP BAR
══════════════════════════════════ */
.topbar{
  position:fixed;top:0;left:0;right:0;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:200;
  background:linear-gradient(to bottom,rgba(13,10,7,0.97) 70%,transparent);
  pointer-events:none;
}
.topbar-left{pointer-events:all;}
.lab-wordmark{
  font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:5px;
  color:var(--filament);
  animation:edisonFlicker 7s ease-in-out infinite;
  line-height:1;
}
.lab-sub{font-family:'Share Tech Mono',monospace;font-size:0.54rem;letter-spacing:3px;color:var(--cream-dim);text-transform:uppercase;margin-top:-2px;}
.topbar-right{display:flex;align-items:center;gap:10px;pointer-events:all;}
.view-toggle{display:flex;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:30px;overflow:hidden;}
.view-btn{font-family:'Share Tech Mono',monospace;font-size:0.58rem;letter-spacing:2px;padding:5px 13px;background:transparent;color:var(--cream-dim);border:none;cursor:pointer;transition:all 0.25s;text-transform:uppercase;}
.view-btn.active{background:var(--edison-dim);color:var(--filament);text-shadow:0 0 8px var(--edison);}

/* ══════════════════════════════════
   CORRIDOR
══════════════════════════════════ */
#corridor-view{position:fixed;inset:0;overflow:hidden;}

.depth-lines{position:absolute;inset:0;pointer-events:none;z-index:1;}
.depth-lines svg{width:100%;height:100%;opacity:0.055;}

.ceiling-bar{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,rgba(200,120,26,0.45),rgba(245,208,128,0.65),rgba(200,120,26,0.45),transparent);
  filter:blur(3px);z-index:4;pointer-events:none;
}
.ceiling-bar::after{content:'';position:absolute;top:0;left:10%;right:10%;height:100px;background:radial-gradient(ellipse at 50% 0%,rgba(200,120,26,0.05),transparent 70%);}

.floor-fade{position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(to top,rgba(13,10,7,0.95),transparent);z-index:4;pointer-events:none;}

/* ══════════════════════════════════
   EDISON CORNER LIGHTS
══════════════════════════════════ */
.edison-corner{
  position:absolute;z-index:6;pointer-events:none;
  width:48px;
}
/* Left bulb starts below the topbar so it clears the wordmark */
.edison-corner.left{ left:clamp(30px,5vw,80px); top:52px; }
/* Right bulb also starts a little below top */
.edison-corner.right{ right:clamp(30px,5vw,80px); top:32px; }

.string-wrap{
  display:flex;flex-direction:column;align-items:center;
  transform-origin:top center;
}
.string-wrap.sway1{ animation:stringSway 8s ease-in-out infinite; }
.string-wrap.sway2{ animation:stringSway2 10s ease-in-out infinite; }

.string-line{
  width:1px;
  height:clamp(50px,8vh,90px);
  background:linear-gradient(to bottom,rgba(107,92,74,0.7),rgba(107,92,74,0.3));
}

.bulb-outer{
  width:14px;height:18px;
  display:flex;flex-direction:column;align-items:center;
}
.bulb-cap{
  width:8px;height:4px;
  background:rgba(107,92,74,0.8);
  border-radius:1px 1px 0 0;
}
.bulb-body{
  width:14px;height:14px;
  border-radius:50% 50% 40% 40%;
  background:radial-gradient(ellipse at 40% 35%,var(--filament),var(--edison) 60%,var(--edison-dim) 100%);
}
.bulb-body.flicker1{ animation:bulbFlicker  5s ease-in-out infinite; }
.bulb-body.flicker2{ animation:bulbFlicker2 7s ease-in-out infinite; }

/* Glow halo on floor under bulb */
.bulb-halo{
  width:60px;height:30px;
  background:radial-gradient(ellipse at 50% 0%,rgba(200,120,26,0.12),transparent 70%);
  margin-top:2px;
}

/* ══════════════════════════════════
   3D PERSPECTIVE WRAP
══════════════════════════════════ */
.perspective-wrap{
  position:absolute;inset:0;
  perspective:800px;
  perspective-origin:50% 12%;
}

.corridor-track{
  position:absolute;top:0;left:0;width:100%;height:100%;
  transform-style:preserve-3d;
  z-index:2;
  /* No CSS transition — JS handles it for seamless loop */
  will-change:transform;
}

/* ══════════════════════════════════
   ITEM SLOT — CTA | PILLAR | VIDEO
══════════════════════════════════ */
.item-slot{
  position:absolute;
  left:50%;top:42%;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:clamp(8px,1.4vw,18px);
  transform-origin:center bottom;
  pointer-events:none;
  user-select:none;
  will-change:transform,opacity,filter;
}
.item-slot.focused{ pointer-events:all; }

/* LEFT: CTA */
.side-cta{
  width:var(--side-w);
  display:flex;flex-direction:column;align-items:flex-end;gap:6px;
  padding-bottom:clamp(68px,10.5vw,126px);
  opacity:0;transition:opacity 0.45s ease;flex-shrink:0;
}
.item-slot.focused .side-cta{ opacity:1; }
.cta-btn{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.36rem,0.58vw,0.5rem);
  letter-spacing:1.2px;text-transform:uppercase;
  padding:5px 8px;border-radius:3px;
  cursor:pointer;border:none;transition:all 0.2s;
  white-space:nowrap;text-align:right;width:100%;
}
.cta-primary{background:var(--edison-dim);color:var(--filament);box-shadow:0 0 8px var(--glow);}
.cta-primary:hover{background:var(--edison);box-shadow:0 0 16px var(--glow-strong);}
.cta-secondary{background:transparent;border:1px solid var(--metal-light)!important;color:var(--cream-dim);}
.cta-secondary:hover{border-color:var(--edison-dim)!important;color:var(--filament);}
.cta-note{font-family:'Share Tech Mono',monospace;font-size:0.4rem;letter-spacing:1px;color:var(--cream-dim);text-transform:uppercase;text-align:right;}

/* CENTER: PILLAR */
.pillar-wrap{
  display:flex;flex-direction:column;align-items:center;
  width:var(--pillar-w);flex-shrink:0;position:relative;
  margin-top:clamp(60px,10vw,120px); /* pushes pillar down so torus floats above viewport center */
}

/* Floating torus — lifted well above the capital */
.float-object{
  position:absolute;
  top:clamp(-110px,-16vw,-75px);
  left:50%;transform:translateX(-50%);
  width:var(--float-size);height:var(--float-size);
  z-index:10;pointer-events:all;
}
.float-canvas{width:100%;height:100%;cursor:grab;display:block;}
.float-canvas:active{cursor:grabbing;}

/* Capital layers */
.capital{width:100%;display:flex;flex-direction:column;align-items:center;}
.cap-slab{
  width:100%;height:clamp(10px,1.4vw,18px);
  background:linear-gradient(to bottom,#4a3822,#2e2210);
  border-radius:3px 3px 0 0;
  box-shadow:0 -1px 0 rgba(255,230,180,0.08),inset 0 1px 0 rgba(255,230,180,0.05);
}
.cap-ogee{
  width:96%;height:clamp(6px,0.9vw,11px);
  background:linear-gradient(to bottom,#3a2c18,#22180a);
  clip-path:polygon(0 100%,2% 0,98% 0,100% 100%);
}
.cap-shelf{
  width:90%;height:clamp(16px,2.2vw,28px);
  background:linear-gradient(160deg,#281e0e,#1a1208);
  border:1px solid rgba(107,92,74,0.45);border-bottom:none;
  position:relative;overflow:hidden;
  transition:box-shadow 0.5s ease;
}
.cap-shelf::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(200,120,26,0.09),transparent 65%);}
.cap-neck{
  width:84%;height:clamp(5px,0.7vw,9px);
  background:linear-gradient(to bottom,#1e1609,#141009);
  border-left:1px solid rgba(107,92,74,0.3);border-right:1px solid rgba(107,92,74,0.3);
}
.item-slot.focused .cap-shelf{
  box-shadow:0 0 30px var(--glow-strong),0 0 60px var(--glow);
}

/* Column shaft — same width as cap-neck, straight sides, fades out */
.column-shaft{
  width:84%;
  height:clamp(78px,10.5vw,135px);
  background:linear-gradient(to bottom,
    rgba(100,78,50,0.85) 0%,
    rgba(70,54,34,0.55) 25%,
    rgba(45,33,18,0.22) 55%,
    rgba(20,14,6,0.06) 80%,
    transparent 100%
  );
  border-left:1px solid rgba(107,92,74,0.18);
  border-right:1px solid rgba(107,92,74,0.18);
  -webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,1) 0%,rgba(0,0,0,0) 100%);
  mask-image:linear-gradient(to bottom,rgba(0,0,0,1) 0%,rgba(0,0,0,0) 100%);
}

.capital-glow{
  position:absolute;
  bottom:clamp(76px,10.5vw,133px);
  left:50%;transform:translateX(-50%);
  width:80%;height:28px;
  background:radial-gradient(ellipse at 50% 100%,rgba(200,120,26,0.11),transparent 70%);
  pointer-events:none;
}

/* Item label */
.item-label{margin-top:7px;text-align:center;padding:0 5px;width:100%;}
.item-number{font-family:'Share Tech Mono',monospace;font-size:0.5rem;letter-spacing:3px;color:var(--edison-dim);text-transform:uppercase;margin-bottom:3px;}
.item-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(0.88rem,1.45vw,1.22rem);letter-spacing:3px;color:var(--filament);text-shadow:0 0 8px var(--edison-dim);line-height:1.1;}
.item-tags{display:flex;gap:4px;justify-content:center;margin-top:4px;flex-wrap:wrap;}
.tag{font-family:'Share Tech Mono',monospace;font-size:0.42rem;letter-spacing:1.5px;padding:2px 5px;border-radius:2px;text-transform:uppercase;}
.tag-music{background:var(--tag-music);color:var(--tag-music-text);}
.tag-elec{background:var(--tag-elec);color:var(--tag-elec-text);}
.tag-print{background:var(--tag-print);color:var(--tag-print-text);}

/* RIGHT: VIDEO */
.side-video{
  width:var(--side-w);aspect-ratio:9/16;
  background:#080604;border:1px solid rgba(107,92,74,0.28);border-radius:4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  flex-shrink:0;
  margin-bottom:clamp(78px,11vw,138px);
  opacity:0;transition:opacity 0.45s ease;
  position:relative;overflow:hidden;
}
.side-video::after{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(to right,transparent,rgba(200,120,26,0.38),transparent);}
.item-slot.focused .side-video{ opacity:1; }
.video-play-icon{font-size:0.95rem;opacity:0.28;}
.video-label{font-family:'Share Tech Mono',monospace;font-size:0.38rem;letter-spacing:1.5px;color:var(--cream-dim);text-transform:uppercase;text-align:center;padding:0 4px;line-height:1.5;}

/* ══════════════════════════════════
   NAV
══════════════════════════════════ */
.nav-arrow{
  position:fixed;left:50%;transform:translateX(-50%);z-index:150;
  background:rgba(13,10,7,0.5);border:1px solid var(--metal-light);color:var(--filament);
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.9rem;transition:all 0.2s;backdrop-filter:blur(8px);user-select:none;
}
.nav-arrow:hover{background:var(--edison-dim);border-color:var(--edison);box-shadow:0 0 14px var(--glow-strong);}
#nav-next{top:60px;}
#nav-prev{bottom:108px;opacity:0.3;font-size:0.75rem;}
#nav-prev:hover{opacity:1;}

/* COUNTER */
.counter{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:0.56rem;letter-spacing:4px;color:var(--cream-dim);z-index:150;white-space:nowrap;text-align:center;}
.counter-dots{display:flex;gap:6px;justify-content:center;margin-top:7px;}
.counter-dot{width:5px;height:5px;border-radius:50%;background:var(--metal-light);transition:all 0.3s;cursor:pointer;}
.counter-dot.active{background:var(--edison);box-shadow:0 0 6px var(--edison);}

/* BOTTOM NAV */
.nav-cluster{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:100px;padding:7px 14px;z-index:200;white-space:nowrap;}
.nav-cluster a{font-family:'Share Tech Mono',monospace;text-decoration:none;color:var(--cream-dim);padding:6px 10px;font-size:0.56rem;text-transform:uppercase;letter-spacing:1.5px;transition:all 0.25s;}
.nav-cluster a:hover{color:var(--filament);text-shadow:0 0 10px var(--edison);}
.nav-divider{width:1px;height:12px;background:rgba(255,255,255,0.1);align-self:center;margin:0 3px;}

/* ══════════════════════════════════
   DETAIL PANEL
══════════════════════════════════ */
.detail-panel{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s ease;background:rgba(13,10,7,0.92);backdrop-filter:blur(20px);}
.detail-panel.open{opacity:1;pointer-events:all;}
.detail-box{width:100%;max-width:580px;max-height:90vh;overflow-y:auto;background:linear-gradient(160deg,#1e160a,#141009);border:1px solid var(--metal-light);border-radius:12px;padding:26px;position:relative;box-shadow:0 0 60px rgba(0,0,0,0.9),0 0 30px var(--glow);transform:translateY(14px);transition:transform 0.3s ease;}
.detail-panel.open .detail-box{transform:translateY(0);}
.detail-close{position:absolute;top:14px;right:14px;background:transparent;border:1px solid var(--metal-light);color:var(--cream-dim);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.detail-close:hover{border-color:var(--edison);color:var(--filament);}
.detail-num{font-family:'Share Tech Mono',monospace;font-size:0.54rem;letter-spacing:3px;color:var(--edison-dim);margin-bottom:4px;text-transform:uppercase;}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:4px;color:var(--filament);text-shadow:0 0 14px var(--edison-dim);line-height:1;margin-bottom:10px;}
.detail-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}

/* Detail top: torus viewer + video side by side */
.detail-top{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start;}
.detail-torus-wrap{
  width:clamp(110px,20%,150px);flex-shrink:0;
  aspect-ratio:1/1;
  background:radial-gradient(ellipse at 40% 30%,rgba(200,120,26,0.06),transparent 70%);
  border:1px solid rgba(107,92,74,0.3);border-radius:6px;overflow:hidden;
}
.detail-torus-canvas{width:100%;height:100%;display:block;cursor:grab;}
.detail-torus-canvas:active{cursor:grabbing;}
.detail-video-col{
  width:clamp(60px,10%,80px);flex-shrink:0;
  aspect-ratio:9/16;
  background:#080604;border:1px solid rgba(107,92,74,0.4);border-radius:4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  color:var(--cream-dim);font-family:'Share Tech Mono',monospace;
  font-size:0.42rem;letter-spacing:1.5px;text-transform:uppercase;opacity:0.6;
}
.detail-desc{flex:1;font-size:0.85rem;line-height:1.75;color:var(--cream-dim);font-weight:300;}

.detail-specs{border-top:1px solid rgba(255,255,255,0.06);padding-top:13px;margin-bottom:16px;}
.spec-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.8rem;}
.spec-label{font-family:'Share Tech Mono',monospace;font-size:0.52rem;letter-spacing:2px;color:var(--cream-dim);text-transform:uppercase;}
.spec-value{color:var(--filament);}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;}
.action-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.action-btn{font-family:'Share Tech Mono',monospace;font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;padding:9px 13px;border-radius:4px;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;}
.action-primary{background:var(--edison-dim);color:var(--filament);box-shadow:0 0 12px var(--glow);}
.action-primary:hover{background:var(--edison);box-shadow:0 0 22px var(--glow-strong);}
.action-secondary{background:transparent;border:1px solid var(--metal-light)!important;color:var(--cream-dim);}
.action-secondary:hover{border-color:var(--edison-dim)!important;color:var(--filament);}
.action-note{font-family:'Share Tech Mono',monospace;font-size:0.48rem;letter-spacing:1.5px;color:var(--cream-dim);text-transform:uppercase;}

/* ══════════════════════════════════
   GRID VIEW
══════════════════════════════════ */
#grid-view{position:fixed;inset:0;overflow-y:auto;padding:66px 20px 100px;display:none;}
#grid-view.active{display:block;}
.grid-container{max-width:820px;margin:0 auto;}
.grid-header{font-family:'Share Tech Mono',monospace;font-size:0.52rem;letter-spacing:3px;color:var(--cream-dim);text-transform:uppercase;margin-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:9px;}
.grid-list{display:flex;flex-direction:column;gap:4px;}
.grid-item{display:flex;align-items:center;gap:12px;padding:15px 16px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:6px;cursor:pointer;transition:all 0.2s;}
.grid-item:hover{background:rgba(200,120,26,0.07);border-color:var(--metal-light);}

// ═══════════════════════════
// CAROUSEL STATE
// True infinite loop: we place items at fixed Z positions.
// Logical indices 0-6. We maintain a "real" position counter
// that goes negative or beyond 6. CSS Z position = realPos * SPACING.
// When realPos drifts too far, we silently snap without animation.
// ═══════════════════════════
const TOTAL   = items.length;
const SPACING = 600;
let realPos   = 0;          // float position in item-space (wraps logically)
let logicalIdx = 0;         // which real item is shown
let isAnimating = false;
let currentView = 'walk';

// Clamp realPos into [-TOTAL, 2*TOTAL] to avoid huge numbers
// Silently correct without CSS transition
function clampRealPos() {
  // We keep a virtual position. Items are rendered at (item index - realPos)*SPACING
  // so when realPos === i, item i is centered.
  // No actual clamping needed with this approach — see renderSlots().
}

// ═══════════════════════════
// THREE.JS — torus factory
// Each canvas gets its own renderer
// ═══════════════════════════
const torusInstances = {};

function makeTorus(canvas, id) {
  if (!canvas || torusInstances[id]) return;
  const W = canvas.clientWidth  || 140;
  const H = canvas.clientHeight || 140;

  const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0,0);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(38, W/H, 0.1, 100);
  camera.position.set(0, 0.35, 3.1);
  camera.lookAt(0,0,0);

  scene.add(new THREE.AmbientLight(0xc8781a, 0.5));
  const key = new THREE.DirectionalLight(0xf5d080, 1.6);
  key.position.set(2,3,2); scene.add(key);
  const rim = new THREE.DirectionalLight(0x5ab0f0, 0.3);
  rim.position.set(-2,-1,-2); scene.add(rim);

  const geo = new THREE.TorusGeometry(0.60, 0.23, 20, 72);
  const mat = new THREE.MeshStandardMaterial({color:0x8b5c1a, metalness:0.75, roughness:0.28});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = Math.PI * 0.25;
  scene.add(mesh);

  let dragging=false, pX=0, pY=0, rotY=0, rotX=0.25;

  const onDown = (e, cx, cy) => {
    dragging=true; pX=cx; pY=cy; e.stopPropagation();
  };
  const onMove = (cx, cy) => {
    if(!dragging) return;
    rotY+=(cx-pX)*0.013; rotX+=(cy-pY)*0.013; pX=cx; pY=cy;
  };
  const onUp = ()=>{ dragging=false; };

  canvas.addEventListener('mousedown',  e=>onDown(e, e.clientX, e.clientY));
  canvas.addEventListener('touchstart', e=>onDown(e, e.touches[0].clientX, e.touches[0].clientY), {passive:true});
  window.addEventListener('mousemove',  e=>onMove(e.clientX, e.clientY));
  window.addEventListener('touchmove',  e=>onMove(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
  window.addEventListener('mouseup',    onUp);
  window.addEventListener('touchend',   onUp);

  torusInstances[id] = {renderer, scene, camera, mesh};

  (function loop(){
    requestAnimationFrame(loop);
    if(!dragging) rotY+=0.006;
    mesh.rotation.y = rotY;
    mesh.rotation.x = rotX;
    renderer.render(scene, camera);
  })();
}

// ═══════════════════════════
// BUILD CORRIDOR
// We render TOTAL+2 "ghost" slots around the ring for seamless wrap.
// Actually simplest: just render all 7 items at fixed positions,
// and shift the track. Loop is handled by remapping logical→real index.
// ═══════════════════════════
function buildCorridor() {
  const track = document.getElementById('corridorTrack');
  track.innerHTML = '';
  track.style.transition = 'none';

  items.forEach((item, i) => {
    const slot = document.createElement('div');
    slot.className = 'item-slot';
    slot.id = `slot-${i}`;
    // Fixed Z position per item — never changes
    slot.style.transform = `translateX(-50%) translateZ(${i * SPACING}px) scale(1)`;

    const ctaHTML = item.actions.map(a => `
      <div>
        <button class="cta-btn cta-${a.type}">${a.label}</button>
        ${a.note?`<div class="cta-note">${a.note}</div>`:''}
      </div>`).join('');

    slot.innerHTML = `
      <div class="side-cta">${ctaHTML}</div>
      <div class="pillar-wrap">
        <div class="float-object">
          <canvas class="float-canvas" id="canvas-${i}"></canvas>
        </div>
        <div class="capital-glow"></div>
        <div class="capital">
          <div class="cap-slab"></div>
          <div class="cap-ogee"></div>
          <div class="cap-shelf"></div>
          <div class="cap-neck"></div>
        </div>
        <div class="column-shaft"></div>
        <div class="item-label">
          <div class="item-number">JC — ${String(item.id).padStart(2,'0')}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-tags">${item.tags.map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join('')}</div>
        </div>
      </div>
      <div class="side-video">
        <div class="video-play-icon">▶</div>
        <div class="video-label">${item.video}<br>soon</div>
      </div>`;

    slot.addEventListener('click', e => {
      if (e.target.closest('.float-canvas')) return;
      if (i === logicalIdx) openDetail(i);
      else navigate(i < logicalIdx ? -1 : 1);
    });

    track.appendChild(slot);
  });

  renderSlots(false);
  buildDots();

  setTimeout(()=>{
    items.forEach((_,i)=>{
      const c = document.getElementById(`canvas-${i}`);
      if(c) makeTorus(c, `slot-${i}`);
    });
    // Init detail torus
    const dc = document.getElementById('detailTorusCanvas');
    if(dc) makeTorus(dc, 'detail');
  },160);
}

// ═══════════════════════════
// RENDER SLOTS
// Core loop logic:
// - Track translates by -(logicalIdx * SPACING) to bring focused item to camera
// - Each slot's visual distance = (slotIndex - logicalIdx) mod TOTAL
// - dist=0 → focused; dist=1 → one ahead; dist=-1 (i.e. TOTAL-1) → one behind
// - Items ahead: visible fading, always BEHIND focused in Z (lower zIndex)
// - Items behind: nearly invisible, lowest zIndex
// ═══════════════════════════
function renderSlots(animate = true) {
  const track = document.getElementById('corridorTrack');

  if (animate) {
    track.style.transition = 'transform 0.58s cubic-bezier(0.4,0,0.2,1)';
  } else {
    track.style.transition = 'none';
  }

  track.style.transform = `translateZ(${-(logicalIdx * SPACING)}px)`;

  items.forEach((_, i) => {
    const slot = document.getElementById(`slot-${i}`);
    if (!slot) return;

    // Circular distance — signed, clamped to [-floor, +ceil]
    let dist = i - logicalIdx;
    if (dist >  Math.floor(TOTAL/2)) dist -= TOTAL;
    if (dist < -Math.ceil(TOTAL/2))  dist += TOTAL;

    const focused = dist === 0;
    slot.classList.toggle('focused', focused);

    // Z ordering: focused always on top.
    // Items AHEAD (dist > 0) are in front in Z-space but we set zIndex lower.
    // Items BEHIND (dist < 0) are behind and lowest zIndex.
    let scale, opacity, blur, zIdx;
    if (dist === 0) {
      scale=1.16; opacity=1;    blur=0;   zIdx=20;
    } else if (dist === 1) {
      scale=0.74; opacity=0.30; blur=1.5; zIdx=10;  // visible ahead, behind focused
    } else if (dist === 2) {
      scale=0.54; opacity=0.11; blur=3;   zIdx=8;
    } else if (dist === 3) {
      scale=0.40; opacity=0.04; blur=5;   zIdx=5;
    } else {
      // Behind or far ahead — nearly gone
      scale=0.36; opacity=0.02; blur=6;   zIdx=dist<0?1:3;
    }

    slot.style.transform     = `translateX(-50%) translateZ(${i*SPACING}px) scale(${scale})`;
    slot.style.opacity       = opacity;
    slot.style.filter        = blur>0?`blur(${blur}px)`:'none';
    slot.style.zIndex        = zIdx;
    slot.style.pointerEvents = focused?'all':'none';
    slot.style.transition    = 'opacity 0.5s ease, filter 0.5s ease, transform 0.58s cubic-bezier(0.4,0,0.2,1)';
  });

  // Counter
  document.getElementById('counter-text').textContent =
    `${String(logicalIdx+1).padStart(2,'0')} / ${String(TOTAL).padStart(2,'0')}`;
  document.querySelectorAll('.counter-dot').forEach((d,i)=>d.classList.toggle('active',i===logicalIdx));
}

function buildDots() {
  const c = document.getElementById('counterDots');
  c.innerHTML='';
  items.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='counter-dot'+(i===0?' active':'');
    d.onclick=()=>{ logicalIdx=i; renderSlots(); };
    c.appendChild(d);
  });
}

// ═══════════════════════════
// NAVIGATE — true seamless loop
// We use a virtual position approach:
// realPos is a continuous number. logicalIdx = realPos mod TOTAL.
// When animating from item 6 → item 0, we:
//   1. Set transition on track
//   2. Move track forward by 1 SPACING
//   3. After transition ends, silently jump track back by TOTAL*SPACING and reset
// ═══════════════════════════
let isTransitioning = false;

function navigate(delta) {
  if (isTransitioning) return;
  isTransitioning = true;

  const nextLogical = ((logicalIdx + delta) % TOTAL + TOTAL) % TOTAL;

  // Detect wrap: going from last to first or first to last
  const wrapsForward  = (logicalIdx === TOTAL-1 && delta > 0);
  const wrapsBackward = (logicalIdx === 0        && delta < 0);

  if (wrapsForward || wrapsBackward) {
    // Step 1: clone approach — animate to a phantom position
    // We temporarily add a clone slot at either end, animate to it,
    // then silently jump. Simpler: just cross-fade via opacity.
    // Even simpler for 7 items: just do the modulo jump with a brief fade.
    doWrapTransition(nextLogical, ()=>{ isTransitioning=false; });
  } else {
    logicalIdx = nextLogical;
    renderSlots(true);
    setTimeout(()=>{ isTransitioning=false; }, 620);
  }
}

function doWrapTransition(nextIdx, done) {
  // Fade out, jump, fade back in — seamless enough for 7 items
  const track = document.getElementById('corridorTrack');
  track.style.transition = 'opacity 0.18s ease';
  track.style.opacity = '0';
  setTimeout(()=>{
    track.style.transition = 'none';
    logicalIdx = nextIdx;
    renderSlots(false);
    track.style.opacity = '0';
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        track.style.transition = 'opacity 0.22s ease';
        track.style.opacity = '1';
        setTimeout(()=>{ track.style.transition=''; done(); }, 240);
      });
    });
  }, 190);
}

// ═══════════════════════════
// GRID
// ═══════════════════════════
function buildGrid() {
  const list=document.getElementById('gridList');
  list.innerHTML='';
  items.forEach((item,i)=>{
    const row=document.createElement('div');
    row.className='grid-item';
    row.innerHTML=`
      <div class="grid-num">JC-${String(item.id).padStart(2,'0')}</div>
      <div class="grid-thumb">${item.icon}</div>
      <div class="grid-vid">▶</div>
      <div class="grid-info">
        <div class="grid-name">${item.name}</div>
        <div class="grid-tags">${item.tags.map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join('')}</div>
      </div>
      <div class="grid-avail">${item.availability}</div>`;
    row.addEventListener('click',()=>openDetail(i));
    list.appendChild(row);
  });
}

// ═══════════════════════════
// DETAIL
// ═══════════════════════════

  const item=items[idx];
  document.getElementById('dNum').textContent   =`JC — ${String(item.id).padStart(2,'0')}`;
  document.getElementById('dTitle').textContent =item.name;
  document.getElementById('dTags').innerHTML    =item.tags.map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join('');
  document.getElementById('dVideo').innerHTML   =`<span style="font-size:0.85rem;opacity:0.24;">▶</span><span>${item.video}</span><span>Soon</span>`;
  document.getElementById('dDesc').textContent  =item.desc;
  document.getElementById('dSpecs').innerHTML   =item.specs.map(s=>`<div class="spec-row"><span class="spec-label">${s.label}</span><span class="spec-value">${s.value}</span></div>`).join('');
  document.getElementById('dActions').innerHTML =item.actions.map(a=>`<div class="action-wrap"><button class="action-btn action-${a.type}">${a.label}</button>${a.note?`<span class="action-note">${a.note}</span>`:''}</div>`).join('');
  document.getElementById('detailPanel').classList.add('open');

  // Re-init detail torus in case canvas size changed
  setTimeout(()=>{
    const dc=document.getElementById('detailTorusCanvas');
    if(dc && !torusInstances['detail']) makeTorus(dc,'detail');
  },50);
}

function closeDetail(){ document.getElementById('detailPanel').classList.remove('open'); }
function handlePanelClick(e){ if(e.target===document.getElementById('detailPanel')) closeDetail(); }

// ═══════════════════════════
// VIEW SWITCH
// ═══════════════════════════
function setView(v){
  currentView=v;
  document.getElementById('corridor-view').style.display=v==='walk'?'block':'none';
  document.getElementById('grid-view').classList.toggle('active',v==='grid');
  document.getElementById('btn-walk').classList.toggle('active',v==='walk');
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
}

// ═══════════════════════════
// INPUT
// ═══════════════════════════
document.addEventListener('keydown',e=>{
  if(document.getElementById('detailPanel').classList.contains('open')){if(e.key==='Escape')closeDetail();return;}
  if(e.key==='ArrowUp'||e.key==='ArrowRight')    navigate(1);
  if(e.key==='ArrowDown'||e.key==='ArrowLeft')   navigate(-1);
  if(e.key==='Enter'||e.key===' ')               openDetail(logicalIdx);
});

let tX=0,tY=0,tOnCanvas=false;
document.addEventListener('touchstart',e=>{
  tX=e.touches[0].clientX;
  tY=e.touches[0].clientY;
  // Check if the touch started on a torus canvas — if so, block nav swipe
  tOnCanvas = !!e.target.closest('.float-canvas, .detail-torus-canvas');
},{passive:true});
document.addEventListener('touchend',e=>{
  if(document.getElementById('detailPanel').classList.contains('open'))return;
  if(tOnCanvas)return; // STL drag — never navigate
  const dx=tX-e.changedTouches[0].clientX, dy=tY-e.changedTouches[0].clientY;
  if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>36) navigate(dy>0?1:-1);
},{passive:true});

// ═══════════════════════════
// INIT
// ═══════════════════════════
buildCorridor();
buildGrid();
setTimeout(()=>{
  const h=document.getElementById('keyHint');
  h.classList.add('visible');
  setTimeout(()=>h.classList.remove('visible'),6000);
},900);
</script>
</body>
</html>
