<!-- LAB v11 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Jesse's Lab — Freejoy Club (v11)</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg:#0d0a07;
  --warm1:#1a1208; --warm2:#251a0a;
  --edison:#c8781a; --edison-dim:#8b5012; --filament:#f5d080;
  --dark-brown:#3a1f08;
  --cream:#f0e0c0; --cream-dim:#a08060;
  --metal:#4a3f32; --metal-light:#6b5c4a;
  --glow:rgba(200,120,26,0.18); --glow-strong:rgba(200,120,26,0.5);
  --tag-music:#2a4a3a; --tag-music-text:#5de8a0;
  --tag-elec:#1a2a4a;  --tag-elec-text:#5ab0f0;
  --tag-print:#3a2a1a; --tag-print-text:#e0a050;
  --pillar-w:clamp(120px,14vw,180px);
  --float-size:clamp(90px,12vw,155px);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;
  background:radial-gradient(ellipse at 50% 40%, #f2ece0 0%, #e8dfc8 45%, #ddd0b4 80%, #d0c09e 100%);
  color:var(--cream);font-family:'DM Sans',sans-serif;overflow:hidden;
}

@keyframes edisonFlicker {
  0%,100%{ text-shadow:0 0 10px var(--edison),0 0 26px var(--edison-dim); opacity:1; }
  92%    { opacity:1; }
  93%    { text-shadow:0 0 4px var(--edison-dim); opacity:0.7; }
  94%    { text-shadow:0 0 12px var(--edison),0 0 30px var(--edison); opacity:1; }
  96%    { opacity:0.75; }
  97%    { opacity:1; }
}
@keyframes bulbFlicker {
  0%,88%,100%{ opacity:0.92; filter:drop-shadow(0 0 6px rgba(200,120,26,0.9)); }
  89%{ opacity:0.5; filter:drop-shadow(0 0 2px rgba(200,120,26,0.3)); }
  90%{ opacity:0.95; filter:drop-shadow(0 0 9px rgba(200,120,26,1)); }
  93%{ opacity:0.6; }  94%{ opacity:0.9; }
}
@keyframes bulbFlicker2 {
  0%,80%,100%{ opacity:0.88; filter:drop-shadow(0 0 5px rgba(200,120,26,0.8)); }
  45%{ opacity:0.55; } 46%{ opacity:0.95; filter:drop-shadow(0 0 9px rgba(200,120,26,1)); }
  81%{ opacity:0.48; } 82%{ opacity:0.9; }
}
@keyframes stringSway  { 0%,100%{transform:rotate(0deg)} 30%{transform:rotate(1.2deg)} 70%{transform:rotate(-0.9deg)} }
@keyframes stringSway2 { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-1.4deg)} 65%{transform:rotate(1.1deg)} }

.topbar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:200;background:linear-gradient(to bottom,rgba(220,205,175,0.97) 70%,transparent);pointer-events:none;}
.topbar-left{pointer-events:all;}
.lab-wordmark{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:5px;color:var(--filament);animation:edisonFlicker 7s ease-in-out infinite;line-height:1;}
.lab-sub{font-family:'Share Tech Mono',monospace;font-size:0.54rem;letter-spacing:3px;color:var(--cream-dim);text-transform:uppercase;margin-top:-2px;}
.topbar-right{display:flex;align-items:center;gap:10px;pointer-events:all;}
.view-toggle{display:flex;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:30px;overflow:hidden;box-shadow:0 0 16px rgba(255,255,255,0.28), 0 0 6px rgba(255,255,255,0.15);}
.toggle-hint{position:fixed;top:62px;right:20px;font-family:'Share Tech Mono',monospace;font-size:0.5rem;letter-spacing:1.8px;color:rgba(80,50,20,0.8);text-transform:uppercase;text-align:right;line-height:1.7;z-index:195;pointer-events:none;opacity:0;transition:opacity 0.6s ease;text-shadow:0 0 8px rgba(255,255,255,0.7), 0 1px 3px rgba(255,255,255,0.5);}
.view-btn{font-family:'Share Tech Mono',monospace;font-size:0.72rem;letter-spacing:2px;padding:6px 15px;background:transparent;color:var(--cream-dim);border:none;cursor:pointer;transition:all 0.25s;text-transform:uppercase;}
.view-btn.active{background:var(--edison-dim);color:var(--dark-brown);text-shadow:0 0 8px var(--edison);}
@keyframes btnShine { 0%{background-position:-200% center} 100%{background-position:200% center} }
.view-toggle.hint-shine .view-btn{background-image:linear-gradient(105deg,transparent 40%,rgba(255,240,180,0.5) 50%,transparent 60%);background-size:200% 100%;animation:btnShine 0.7s ease forwards;}

.edison-corner{position:absolute;z-index:6;pointer-events:none;width:48px;}
.edison-corner.left{left:clamp(30px,5vw,80px);top:52px;}
.edison-corner.right{right:clamp(30px,5vw,80px);top:32px;}
.string-wrap{display:flex;flex-direction:column;align-items:center;transform-origin:top center;}
.string-wrap.sway1{animation:stringSway 3s ease-in-out infinite;}
.string-wrap.sway2{animation:stringSway2 4s ease-in-out infinite;}
.string-line{width:1px;height:clamp(50px,8vh,90px);background:linear-gradient(to bottom,rgba(107,92,74,0.7),rgba(107,92,74,0.3));}
.bulb-outer{width:9px;height:12px;display:flex;flex-direction:column;align-items:center;}
.bulb-cap{width:5px;height:3px;background:rgba(107,92,74,0.8);border-radius:1px 1px 0 0;}
.bulb-body{width:9px;height:9px;border-radius:50% 50% 40% 40%;background:radial-gradient(ellipse at 40% 35%,var(--filament),var(--edison) 60%,var(--edison-dim) 100%);}
.bulb-body.flicker1{animation:bulbFlicker 5s ease-in-out infinite;}
.bulb-body.flicker2{animation:bulbFlicker2 7s ease-in-out infinite;}
.bulb-halo{width:36px;height:18px;background:radial-gradient(ellipse at 50% 0%,rgba(200,120,26,0.1),transparent 70%);margin-top:2px;}

#gallery-view{position:fixed;inset:0;overflow:hidden;}
.gallery-stage{position:absolute;inset:0;perspective:900px;perspective-origin:50% 30%;transform-style:preserve-3d;z-index:3;pointer-events:none;}
.paintings-layer{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;}

.painting{position:absolute;top:12%;cursor:pointer;pointer-events:all;opacity:0.78;filter:blur(0.6px);transition:opacity 0.3s,filter 0.3s;transform:translateX(-50%);}
.painting .frame-outer{transition:transform 0.25s ease;}
.painting:hover{opacity:1;filter:blur(0px);}
.painting:hover .frame-outer{transform:translateY(-3px);}
.frame-outer{border:3px solid #5a4a32;border-radius:2px;padding:4px;background:#3a2e1e;box-shadow:3px 3px 10px rgba(0,0,0,0.5),inset 0 0 6px rgba(0,0,0,0.3);display:inline-block;}
.frame-mount{padding:5px;background:#e8d8b8;border:1px solid #c8b890;display:inline-block;}
.frame-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden;min-width:clamp(60px,7vw,100px);min-height:clamp(80px,9vw,130px);}
.frame-inner img{display:block;width:clamp(70px,9vw,130px);height:auto;object-fit:cover;}
.frame-inner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 40% 30%,rgba(200,120,26,0.06),transparent 65%);pointer-events:none;}
.frame-label{font-family:'Bebas Neue',sans-serif;font-size:clamp(0.5rem,1vw,0.8rem);letter-spacing:3px;color:var(--dark-brown);text-align:center;padding:0 5px;position:relative;z-index:1;}
.frame-icon{font-size:clamp(0.9rem,1.8vw,1.5rem);opacity:0.5;position:relative;z-index:1;}
.painting-light{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:50%;height:2px;background:linear-gradient(to right,transparent,rgba(245,208,128,0.7),transparent);filter:blur(1px);}
.painting-light::after{content:'';position:absolute;top:0;left:25%;right:25%;height:16px;background:radial-gradient(ellipse at 50% 0%,rgba(245,208,128,0.18),transparent 80%);}

.gallery-track{position:absolute;width:100%;height:100%;transform-style:preserve-3d;will-change:transform;z-index:2;pointer-events:none;}
.pillar-slot{position:absolute;left:50%;top:50%;transform-style:preserve-3d;pointer-events:none;will-change:transform,opacity,filter;}
.pillar-slot.focused{pointer-events:all;}

.pillar-wrap{display:flex;flex-direction:column;align-items:center;width:var(--pillar-w);position:relative;margin-top:clamp(110px,18vw,200px);cursor:pointer;}
.float-object{position:absolute;top:clamp(-130px,-18vw,-85px);left:50%;transform:translateX(-50%);width:var(--float-size);height:var(--float-size);z-index:10;pointer-events:all;}
.float-canvas{width:100%;height:100%;cursor:grab;display:block;}
.float-canvas:active{cursor:grabbing;}

/* Loading indicator inside float-object */
.stl-loading{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;font-size:0.48rem;letter-spacing:2px;
  color:rgba(90,60,20,0.5);text-transform:uppercase;
}

.capital{width:100%;display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.cap-slab{width:100%;height:clamp(9px,1.3vw,16px);background:linear-gradient(to bottom,#f0e8d8,#e0d4be);border-radius:3px 3px 0 0;box-shadow:0 -1px 0 rgba(255,255,255,0.6),inset 0 1px 0 rgba(255,255,255,0.4);}
.cap-ogee{width:96%;height:clamp(5px,0.8vw,10px);background:linear-gradient(to bottom,#e8dcc8,#ddd0b8);clip-path:polygon(0 100%,2% 0,98% 0,100% 100%);}
.cap-shelf{width:90%;height:clamp(14px,2vw,26px);background:linear-gradient(160deg,#ede4d0,#e4d8c0);border:1px solid rgba(200,185,155,0.6);border-bottom:none;position:relative;overflow:hidden;transition:box-shadow 0.5s ease;}
.cap-shelf::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,240,200,0.3),transparent 65%);}
.cap-neck{width:84%;height:clamp(4px,0.6vw,8px);background:linear-gradient(to bottom,#e0d4bc,#d8ccb0);border-left:1px solid rgba(200,185,155,0.4);border-right:1px solid rgba(200,185,155,0.4);}
.pillar-slot.focused .cap-shelf{box-shadow:0 0 28px rgba(200,160,80,0.35),0 0 55px rgba(200,160,80,0.15);}

.column-shaft{width:84%;height:clamp(70px,9.5vw,125px);background:linear-gradient(to bottom,rgba(220,210,190,0.9) 0%,rgba(210,198,175,0.6) 30%,rgba(200,185,158,0.25) 65%,transparent 100%);border-left:1px solid rgba(200,185,155,0.3);border-right:1px solid rgba(200,185,155,0.3);-webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,1) 0%,rgba(0,0,0,0) 100%);mask-image:linear-gradient(to bottom,rgba(0,0,0,1) 0%,rgba(0,0,0,0) 100%);}

.pillar-below{position:relative;width:100%;display:flex;flex-direction:column;align-items:center;margin-top:clamp(-65px,-9vw,-44px);z-index:5;}
.item-label{text-align:center;padding:6px 5px 0;width:100%;cursor:pointer;}
.item-number{font-family:'Share Tech Mono',monospace;font-size:clamp(0.38rem,0.6vw,0.5rem);letter-spacing:2px;color:var(--edison-dim);text-transform:uppercase;margin-bottom:2px;text-shadow:0 1px 4px rgba(255,255,255,0.6);}
.item-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(0.75rem,1.2vw,1.05rem);letter-spacing:2px;color:var(--dark-brown);line-height:1.1;text-shadow:0 1px 5px rgba(255,255,255,0.7);}

.item-cta{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;padding:5px 4px 0;opacity:0;transition:opacity 0.4s ease;width:100%;}
.pillar-slot.focused .item-cta{opacity:1;}
.cta-btn{font-family:'Share Tech Mono',monospace;font-size:clamp(0.38rem,0.6vw,0.52rem);letter-spacing:1px;text-transform:uppercase;padding:5px 8px;border-radius:3px;cursor:pointer;border:none;transition:all 0.2s;white-space:nowrap;}
.cta-primary{background:var(--edison-dim);color:#f5e8c0;box-shadow:0 0 6px var(--glow);text-shadow:0 1px 3px rgba(0,0,0,0.3);}
.cta-primary:hover{background:var(--edison);color:#fff8e8;}
.cta-secondary{background:rgba(255,255,255,0.55);border:1px solid rgba(90,60,20,0.35)!important;color:var(--dark-brown);text-shadow:0 1px 4px rgba(255,255,255,0.8);}
.cta-secondary:hover{background:rgba(255,255,255,0.8);border-color:var(--edison-dim)!important;}
.cta-note{font-family:'Share Tech Mono',monospace;font-size:0.38rem;letter-spacing:1px;color:var(--edison-dim);text-transform:uppercase;align-self:center;text-shadow:0 1px 3px rgba(255,255,255,0.6);}

.nav-arrow{position:fixed;bottom:clamp(74px,11vh,115px);z-index:150;background:transparent;border:none;cursor:pointer;user-select:none;padding:12px 16px;transition:filter 0.2s,opacity 0.2s;filter:drop-shadow(0 2px 5px rgba(0,0,0,0.25));}
.nav-arrow:hover{filter:drop-shadow(0 2px 8px rgba(0,0,0,0.35)) drop-shadow(0 0 5px rgba(255,255,255,0.25));opacity:0.9!important;}
#nav-prev{left:8px;opacity:0.55;}
#nav-next{right:8px;opacity:0.55;}

.counter{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:0.56rem;letter-spacing:4px;color:var(--cream-dim);z-index:150;white-space:nowrap;text-align:center;}
.counter-dots{display:flex;gap:6px;justify-content:center;margin-top:7px;}
.counter-dot{width:5px;height:5px;border-radius:50%;background:var(--metal-light);transition:all 0.3s;cursor:pointer;}
.counter-dot.active{background:var(--edison);box-shadow:0 0 6px var(--edison);}

.nav-cluster{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;background:rgba(200,185,150,0.75);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.3);border-radius:100px;padding:7px 14px;z-index:200;white-space:nowrap;}
.nav-cluster a{font-family:'Share Tech Mono',monospace;text-decoration:none;color:var(--dark-brown);padding:6px 10px;font-size:0.56rem;text-transform:uppercase;letter-spacing:1.5px;transition:all 0.25s;opacity:0.75;}
.nav-cluster a:hover{color:var(--dark-brown);opacity:1;text-shadow:0 0 10px var(--edison);}
.nav-divider{width:1px;height:12px;background:rgba(255,255,255,0.1);align-self:center;margin:0 3px;}

.floor-fade{position:absolute;bottom:0;left:0;right:0;height:38%;background:linear-gradient(to top,rgba(140,110,70,0.7),transparent);z-index:5;pointer-events:none;}
.ceiling-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,rgba(200,120,26,0.4),rgba(245,208,128,0.6),rgba(200,120,26,0.4),transparent);filter:blur(3px);z-index:4;pointer-events:none;}

.detail-panel{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s ease;background:rgba(200,185,150,0.88);backdrop-filter:blur(20px);}
.detail-panel.open{opacity:1;pointer-events:all;}
.detail-box{width:100%;max-width:560px;max-height:90vh;overflow-y:auto;background:linear-gradient(160deg,#ede0c4,#e0ceaa);border:1px solid rgba(200,170,110,0.5);border-radius:12px;padding:26px;position:relative;box-shadow:0 0 40px rgba(120,90,30,0.25),0 0 20px var(--glow);transform:translateY(14px);transition:transform 0.3s ease;}
.detail-panel.open .detail-box{transform:translateY(0);}
.detail-close{position:absolute;top:14px;right:14px;background:transparent;border:1px solid var(--metal-light);color:var(--cream-dim);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.detail-close:hover{border-color:var(--edison);color:var(--dark-brown);}
.detail-num{font-family:'Share Tech Mono',monospace;font-size:0.54rem;letter-spacing:3px;color:var(--edison-dim);margin-bottom:4px;text-transform:uppercase;}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:4px;color:var(--dark-brown);text-shadow:0 0 14px var(--edison-dim);line-height:1;margin-bottom:10px;}
.detail-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.detail-top{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start;}
.detail-torus-wrap{width:clamp(100px,18%,140px);flex-shrink:0;aspect-ratio:1/1;background:radial-gradient(ellipse at 40% 30%,rgba(200,120,26,0.06),transparent 70%);border:1px solid rgba(107,92,74,0.3);border-radius:6px;overflow:hidden;}
.detail-torus-canvas{width:100%;height:100%;display:block;cursor:grab;}
.detail-torus-canvas:active{cursor:grabbing;}
.detail-video-col{width:clamp(55px,9%,75px);flex-shrink:0;aspect-ratio:9/16;background:#080604;border:1px solid rgba(107,92,74,0.4);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--cream-dim);font-family:'Share Tech Mono',monospace;font-size:0.42rem;letter-spacing:1.5px;text-transform:uppercase;opacity:0.6;}
.detail-desc{flex:1;font-size:0.92rem;line-height:1.75;color:var(--dark-brown);font-weight:300;}
.detail-specs{border-top:1px solid rgba(90,60,20,0.2);padding-top:14px;margin-bottom:18px;}
.spec-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(90,60,20,0.12);font-size:0.95rem;}
.spec-label{font-family:'Share Tech Mono',monospace;font-size:0.62rem;letter-spacing:2px;color:var(--edison-dim);text-transform:uppercase;}
.spec-value{color:var(--dark-brown);font-weight:500;}
.detail-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start;}
.action-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.action-btn{font-family:'Share Tech Mono',monospace;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;padding:12px 18px;border-radius:5px;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.action-primary{background:var(--edison-dim);color:#f5e8c0;box-shadow:0 0 14px var(--glow);}
.action-primary:hover{background:var(--edison);color:#fff8e8;}
.action-secondary{background:rgba(255,255,255,0.6);border:1px solid rgba(90,60,20,0.3)!important;color:var(--dark-brown);}
.action-secondary:hover{background:rgba(255,255,255,0.88);border-color:var(--edison-dim)!important;}
.action-note{font-family:'Share Tech Mono',monospace;font-size:0.55rem;letter-spacing:1.5px;color:var(--edison-dim);text-transform:uppercase;}

.painting-panel{position:fixed;inset:0;z-index:310;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s ease;background:rgba(200,185,150,0.82);backdrop-filter:blur(18px);}
.painting-panel.open{opacity:1;pointer-events:all;}
.painting-box{width:100%;max-width:420px;background:linear-gradient(160deg,#ede0c4,#e0ceaa);border:1px solid rgba(200,170,110,0.4);border-radius:12px;padding:24px;position:relative;box-shadow:0 0 40px rgba(120,90,30,0.2);transform:translateY(14px);transition:transform 0.3s ease;}
.painting-panel.open .painting-box{transform:translateY(0);}
.painting-close{position:absolute;top:12px;right:12px;background:transparent;border:1px solid var(--metal-light);color:var(--cream-dim);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.painting-close:hover{border-color:var(--edison);color:var(--dark-brown);}
.painting-popup-icon{font-size:2.2rem;margin-bottom:10px;}
.painting-popup-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:4px;color:var(--warm1);margin-bottom:10px;}
.painting-popup-desc{font-size:0.85rem;line-height:1.7;color:var(--edison-dim);font-weight:300;margin-bottom:18px;}
.painting-cta{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;padding:11px 20px;border-radius:5px;background:var(--edison-dim);color:#f5e8c0;text-decoration:none;box-shadow:0 0 12px var(--glow);transition:all 0.2s;}
.painting-cta:hover{background:var(--edison);color:#fff8e8;}

#grid-view{position:fixed;inset:0;overflow-y:auto;padding:66px 20px 100px;display:none;background:radial-gradient(ellipse at 50% 40%, #f0e8d8 0%, #e0d0b8 100%);}
#grid-view.active{display:block;}
.grid-container{max-width:820px;margin:0 auto;}
.grid-header{font-family:'Share Tech Mono',monospace;font-size:0.52rem;letter-spacing:3px;color:var(--edison-dim);text-transform:uppercase;margin-bottom:14px;border-bottom:1px solid rgba(150,110,50,0.3);padding-bottom:9px;}
.grid-list{display:flex;flex-direction:column;gap:4px;}
.grid-item{display:flex;align-items:center;gap:12px;padding:15px 16px;background:rgba(255,240,200,0.4);border:1px solid rgba(180,140,70,0.3);border-radius:6px;cursor:pointer;transition:all 0.2s;}
.grid-item:hover{background:rgba(200,120,26,0.18);border-color:var(--edison-dim);}
.grid-num{font-family:'Share Tech Mono',monospace;font-size:0.52rem;letter-spacing:2px;color:var(--edison-dim);min-width:36px;}

  {id:3, shape:'stl',  name:"iPad 6 Holder",      icon:"📱", tags:[{label:"Printable",cls:"tag-print"}],                                        availability:"Download Free",    video:"Video 03", desc:"iPad 6 Holder v3 — a 3D printed mount/holder for the iPad 6th generation. Designed by JesseC.", specs:[{label:"Type",value:"Mount"},{label:"Files",value:"Free STL"},{label:"Ships",value:"No"}], actions:[{label:"⬇ Download",note:"Free",type:"primary"}]},

  {id:'p3',icon:'🎪',label:'Live Shows',  title:'Freejoy Club Live',      desc:'Dates and venues coming soon. Sign up to be the first to know.',                                          cta:'Get Notified',      ctaHref:'#'},
  {id:'p4',icon:'🌀',label:'Freejoy Club',title:'The Freejoy Club',       desc:'The collective. The universe. Music, art, inventions, and everything in between.',                        cta:'Enter',             ctaHref:'https://freejoy.club'},
  {id:'p5',icon:'🎨',label:'Clemmy G',    title:'Clemmy G',               desc:"Grant's universe. Silly songs, serious vibes.",                                                           cta:'Visit',             ctaHref:'/clemmy'},
  {id:'p6',icon:'🏆',label:'Lore',        title:'The Lore',               desc:'The Freejoy lore runs deep. Start at the game. Follow the breadcrumbs.',                                  cta:'Dig In',            ctaHref:'/game'},
  {id:'p7',icon:'📼',label:'Archive',     title:'The Archive',            desc:'Demos, outtakes, early recordings, and things that almost made the album.',                               cta:'Bandcamp',          ctaHref:'#'},
  {id:'p8',icon:'👕',label:'Merch',       title:'Freejoy Club Merch',     desc:"Shirts, hats, and things you didn't know you needed. All Freejoy, all the time.",                        cta:'Shop',              ctaHref:'/store'},
];

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
const TOTAL      = items.length;
const H_SPACING  = 170;
const ARC_DEPTH  = 40;
const ARC_TILT   = 1.5;
const SETS       = 3;
const SLOT_COUNT = TOTAL * SETS;
const OFFSET     = TOTAL;

let currentIdx      = 0;
let isTransitioning = false;
let currentView     = 'walk';

// ═══════════════════════════════════
// STL PARSER (binary STL, no external loader needed)
// ═══════════════════════════════════
async function loadSTL(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`STL fetch failed: ${url}`);
  const buf  = await resp.arrayBuffer();
  const view = new DataView(buf);

  // Detect ASCII vs binary
  const header = new Uint8Array(buf, 0, 5);
  const isBinary = !(header[0]===115 && header[1]===111 && header[2]===108 && header[3]===105 && header[4]===100);

  const positions = [];
  const normals   = [];

  if (isBinary) {
    const nTris = view.getUint32(80, true);
    let off = 84;
    for (let i = 0; i < nTris; i++) {
      const nx = view.getFloat32(off,    true);
      const ny = view.getFloat32(off+4,  true);
      const nz = view.getFloat32(off+8,  true);
      for (let v = 0; v < 3; v++) {
        positions.push(
          view.getFloat32(off+12+v*12,   true),
          view.getFloat32(off+12+v*12+4, true),
          view.getFloat32(off+12+v*12+8, true)
        );
        normals.push(nx, ny, nz);
      }
      off += 50;
    }
  } else {
    // ASCII STL
    const text   = new TextDecoder().decode(buf);
    const vRegex = /vertex\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)/g;
    const nRegex = /facet normal\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)/g;
    let vm, nm;
    const nArr = [];
    while ((nm = nRegex.exec(text)) !== null) {
      nArr.push([parseFloat(nm[1]), parseFloat(nm[2]), parseFloat(nm[3])]);
    }
    let ni = 0;
    while ((vm = vRegex.exec(text)) !== null) {
      positions.push(parseFloat(vm[1]), parseFloat(vm[2]), parseFloat(vm[3]));
      const n = nArr[Math.floor(ni/3)] || [0,1,0];
      normals.push(n[0], n[1], n[2]);
      ni++;
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(normals,   3));
  geo.computeBoundingSphere();

  // Normalize: center and scale to fit in unit sphere
  const r = geo.boundingSphere.radius;
  const s = 1.1 / (r || 1);
  geo.scale(s, s, s);
  geo.center();

  return geo;
}

// ═══════════════════════════════════
// PROCEDURAL GEOMETRY FALLBACK
// ═══════════════════════════════════
function buildProcGeo(shape) {
  if (shape === 'knot') {
    const curve = new THREE.Curve();
    curve.getPoint = t => {
      const a = 2 * Math.PI * t;
      return new THREE.Vector3(
        (Math.sin(a) + 2*Math.sin(2*a)) * 0.28,
        (Math.cos(a) - 2*Math.cos(2*a)) * 0.28,
        -Math.sin(3*a) * 0.28
      );
    };
    return new THREE.TubeGeometry(curve, 120, 0.10, 10, true);
  }
  return new THREE.TorusGeometry(0.60, 0.23, 20, 72);
}

// ═══════════════════════════════════
// THREE.JS — shared drag manager
// ═══════════════════════════════════
const torusInstances = {};
let _dragId=null, _dragPX=0, _dragPY=0, _tapStartX=0, _tapStartY=0;
window._canvasTouchActive = false;

function _instanceAt(el) {
  if (el.closest('#detailTorusCanvas') || el.id==='detailTorusCanvas') return torusInstances['detail']||null;
  const fo = el.closest('.float-object');
  if (!fo) return null;
  const slot = fo.closest('.pillar-slot');
  if (!slot) return null;
  return torusInstances[`slot-${slot.id.replace('slot-','')}`]||null;
}
function _startDrag(inst,cx,cy,isCanvas){
  if(!inst)return;
  _dragId=Object.keys(torusInstances).find(k=>torusInstances[k]===inst);
  if(!_dragId)return;
  inst.dragging=true; _dragPX=cx; _dragPY=cy; _tapStartX=cx; _tapStartY=cy;
  if(isCanvas) window._canvasTouchActive=true;
}
function _moveDrag(cx,cy){
  if(!_dragId)return;
  const inst=torusInstances[_dragId];
  if(!inst){_dragId=null;return;}
  inst.rotY+=(cx-_dragPX)*0.013; inst.rotX+=(cy-_dragPY)*0.013;
  _dragPX=cx; _dragPY=cy;
}
function _endDrag(cx,cy,isCanvas){
  if(_dragId){
    const inst=torusInstances[_dragId];
    if(inst){
      inst.dragging=false;
      const d=Math.sqrt((cx-_tapStartX)**2+(cy-_tapStartY)**2);
      if(d<12&&isCanvas&&_dragId!=='detail') openDetail(currentIdx);
    }
  }
  _dragId=null;
  if(isCanvas) window._canvasTouchActive=false;
}
window.addEventListener('mousedown',e=>{const i=_instanceAt(e.target);if(i){_startDrag(i,e.clientX,e.clientY,true);e.stopPropagation();}});
window.addEventListener('mousemove',e=>{if(_dragId)_moveDrag(e.clientX,e.clientY);});
window.addEventListener('mouseup',  e=>{if(_dragId)_endDrag(e.clientX,e.clientY,true);else window._canvasTouchActive=false;});
window.addEventListener('touchstart',e=>{const i=_instanceAt(e.target);if(i)_startDrag(i,e.touches[0].clientX,e.touches[0].clientY,true);},{passive:true});
window.addEventListener('touchmove', e=>{if(_dragId)_moveDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
window.addEventListener('touchend',  e=>{const w=!!_dragId;_endDrag(e.changedTouches[0].clientX,e.changedTouches[0].clientY,w);window._canvasTouchActive=false;},{passive:true});

function destroyTorus(id){
  const t=torusInstances[id]; if(!t)return;
  t.dead=true;
  try{const gl=t.renderer.getContext();const ext=gl.getExtension('WEBGL_lose_context');if(ext)ext.loseContext();}catch(e){}
  t.renderer.dispose();
  const old=t.renderer.domElement;
  if(old&&old.parentNode){const f=document.createElement('canvas');f.className=old.className;f.id=old.id;old.parentNode.replaceChild(f,old);}
  delete torusInstances[id];
}

// ═══════════════════════════════════
// makeTorus — now async, loads STL or falls back to procedural
// itemId: used to look up STL_FILES map
// ═══════════════════════════════════
async function makeTorus(canvas, id, shape='torus', itemId=null) {
  if (!canvas || torusInstances[id]) return;

  const W = canvas.clientWidth  || 140;
  const H = canvas.clientHeight || 140;

  const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0, 0);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(38, W/H, 0.1, 100);
  camera.position.set(0, 0.35, 3.1);
  camera.lookAt(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xc8781a, 0.5));
  const key = new THREE.DirectionalLight(0xf5d080, 1.6);
  key.position.set(2, 3, 2); scene.add(key);
  const rim = new THREE.DirectionalLight(0x5ab0f0, 0.3);
  rim.position.set(-2, -1, -2); scene.add(rim);

  // Try to load STL, fall back to procedural
  let geo;
  const stlUrl = itemId ? STL_FILES[itemId] : null;
  if (stlUrl) {
    try {
      geo = await loadSTL(stlUrl);
    } catch (err) {
      console.warn(`STL load failed for item ${itemId}, using fallback:`, err.message);
      geo = buildProcGeo(shape);
    }
  } else {
    geo = buildProcGeo(shape);
  }

  // Material: STL items get warm bronze, knot gets steel, torus gets bronze
  const color = (shape==='knot') ? 0x5c6a8b : 0x8b5c1a;
  const mat = new THREE.MeshStandardMaterial({color, metalness:0.8, roughness:0.22});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = Math.PI * 0.25;
  scene.add(mesh);

  const instance = {renderer,scene,camera,mesh,dead:false,rotY:0,rotX:0.25,dragging:false};
  torusInstances[id] = instance;

  (function loop(){
    if(instance.dead) return;
    requestAnimationFrame(loop);
    if(!instance.dragging) instance.rotY += 0.006;
    mesh.rotation.y = instance.rotY;
    mesh.rotation.x = instance.rotX;
    renderer.render(scene, camera);
  })();
}

// ═══════════════════════════════════
// PAINTINGS
// ═══════════════════════════════════
const paintingDefs = [
  {gapAfterItem:0, data:paintings[0]},
  {gapAfterItem:2, data:paintings[1]},
  {gapAfterItem:4, data:paintings[7]},
];

function buildWall(){
  const layer=document.getElementById('paintingsLayer');
  layer.innerHTML='';
  paintingDefs.forEach((def,pi)=>{
    const p=def.data;
    const el=document.createElement('div');
    el.className='painting'; el.id=`painting-${pi}`;
    const isGame=p.id==='p2';
    const fc=isGame?`<img src="/lab/gamepaint.jpg" alt="${p.label}" loading="lazy">`:`<div class="frame-icon">${p.icon}</div><div class="frame-label">${p.label}</div>`;
    el.innerHTML=`<div class="painting-light"></div><div class="frame-outer"><div class="frame-mount"><div class="frame-inner">${fc}</div></div></div>`;
    el.addEventListener('click',e=>{e.stopPropagation();openPainting(p);});
    layer.appendChild(el);
  });
}

function updatePaintings(animate){
  const cx=window.innerWidth/2;
  paintingDefs.forEach((def,pi)=>{
    const el=document.getElementById(`painting-${pi}`);
    if(!el)return;
    const offset=(def.gapAfterItem+0.5-(virtualIdx-OFFSET))*H_SPACING*0.4;
    const sx=cx+offset;
    const off=Math.abs(offset)>window.innerWidth*1.2;
    el.style.transition=animate?'left 0.58s cubic-bezier(0.4,0,0.2,1),opacity 0.3s':'none';
    el.style.left=sx+'px';
    el.style.opacity=off?'0':'0.78';
    el.style.pointerEvents=off?'none':'all';
  });
}

// ═══════════════════════════════════
// BUILD GALLERY
// ═══════════════════════════════════
function buildGallery(){
  const track=document.getElementById('galleryTrack');
  track.innerHTML='';
  for(let s=0;s<SLOT_COUNT;s++){
    const itemIdx=s%TOTAL;
    const item=items[itemIdx];
    const slot=document.createElement('div');
    slot.className='pillar-slot'; slot.id=`slot-${s}`; slot.dataset.item=itemIdx;
    const ctaHTML=item.actions.map(a=>`<button class="cta-btn cta-${a.type}">${a.label}</button>${a.note?`<span class="cta-note">${a.note}</span>`:''}`).join('');
    slot.innerHTML=`
      <div class="pillar-wrap">
        <div class="float-object"><canvas class="float-canvas" id="canvas-${s}"></canvas></div>
        <div class="capital">
          <div class="cap-slab"></div><div class="cap-ogee"></div>
          <div class="cap-shelf"></div><div class="cap-neck"></div>
        </div>
        <div class="column-shaft"></div>
        <div class="pillar-below">
          <div class="item-label">
            <div class="item-number">JC — ${String(item.id).padStart(2,'0')}</div>
            <div class="item-name">${item.name}</div>
          </div>
          <div class="item-cta">${ctaHTML}</div>
        </div>
      </div>`;
    slot.addEventListener('click',e=>{
      if(e.target.closest('.cta-btn')||e.target.closest('.float-canvas'))return;
      const dist=s-virtualIdx;
      if(dist===0) openDetail(itemIdx);
      else navigate(dist>0?1:-1);
    });
    track.appendChild(slot);
  }
  virtualIdx=OFFSET; currentIdx=0;
  renderGallery(false); buildDots();
  setTimeout(()=>{
    const dc=document.getElementById('detailTorusCanvas');
    if(dc) makeTorus(dc,'detail','torus',null);
  },200);
}

// ═══════════════════════════════════
// RENDER GALLERY
// ═══════════════════════════════════
function renderGallery(animate=true){
  const tr=animate?'transform 0.58s cubic-bezier(0.4,0,0.2,1),opacity 0.5s ease,filter 0.5s ease':'none';
  for(let s=0;s<SLOT_COUNT;s++){
    const slot=document.getElementById(`slot-${s}`);
    if(!slot)return;
    const dist=s-virtualIdx, absDist=Math.abs(dist), focused=dist===0;
    slot.classList.toggle('focused',focused);
    if(absDist>3){slot.style.opacity='0';slot.style.pointerEvents='none';slot.style.transition='none';continue;}
    const x=dist*H_SPACING, z=-(absDist*absDist*ARC_DEPTH*0.5), ry=-dist*ARC_TILT;
    let opacity,blur,zIdx;
    if(absDist===0){opacity=1;blur=0;zIdx=20;}
    else if(absDist===1){opacity=0.78;blur=0;zIdx=10;}
    else if(absDist===2){opacity=0.45;blur=1;zIdx=8;}
    else{opacity=0.18;blur=2;zIdx=4;}
    const fs=focused?`clamp(1.0,${(Math.min(window.innerWidth,window.innerHeight)/480).toFixed(2)},1.65)`:'1';
    slot.style.transition=tr;
    slot.style.transform=`translateX(calc(-50% + ${x}px)) translateY(-50%) translateZ(${z}px) rotateY(${ry}deg) scale(${focused?fs:1})`;
    slot.style.opacity=opacity;
    slot.style.filter=blur>0?`blur(${blur}px)`:'none';
    slot.style.zIndex=zIdx;
    slot.style.pointerEvents=(focused||absDist<=2)?'all':'none';
  }
  updatePaintings(animate);
  document.getElementById('counter-text').textContent=`${String(currentIdx+1).padStart(2,'0')} / ${String(TOTAL).padStart(2,'0')}`;
  document.querySelectorAll('.counter-dot').forEach((d,i)=>d.classList.toggle('active',i===currentIdx));
}

function buildDots(){
  const c=document.getElementById('counterDots'); c.innerHTML='';
  items.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='counter-dot'+(i===0?' active':'');
    d.onclick=()=>{virtualIdx=OFFSET+i;currentIdx=i;renderGallery(true);};
    c.appendChild(d);
  });
}

// ═══════════════════════════════════
// TORUS SLIDING WINDOW
// ═══════════════════════════════════
function updateTorusWindow(){
  const toInit=[];
  for(let s=0;s<SLOT_COUNT;s++){
    const absDist=Math.abs(s-virtualIdx);
    if(absDist<=2){
      const slot=document.getElementById(`slot-${s}`);
      if(slot){const c=slot.querySelector('.float-canvas');if(c&&!torusInstances[`slot-${s}`])toInit.push({c,s});}
    } else {
      if(torusInstances[`slot-${s}`])destroyTorus(`slot-${s}`);
    }
  }
  toInit.sort((a,b)=>Math.abs(a.s-virtualIdx)-Math.abs(b.s-virtualIdx));
  toInit.forEach(({c,s},i)=>{
    setTimeout(()=>{
      if(!torusInstances[`slot-${s}`]){
        const itemIdx=s%TOTAL;
        const item=items[itemIdx];
        makeTorus(c,`slot-${s}`,item.shape, item.shape==='stl'?item.id:null);
      }
    },i*60);
  });
}

// ═══════════════════════════════════
// NAVIGATE
// ═══════════════════════════════════
let virtualIdx=OFFSET;

function navigate(delta){
  if(isTransitioning)return;
  isTransitioning=true;
  _hintOnNavigate();
  virtualIdx+=delta;
  currentIdx=((virtualIdx-OFFSET%TOTAL+TOTAL*100)%TOTAL);
  const afterTransition=()=>{
    if(virtualIdx<TOTAL+1||virtualIdx>TOTAL*2-2){virtualIdx=OFFSET+currentIdx;renderGallery(false);}
    isTransitioning=false;
    updateTorusWindow();
  };
  renderGallery(true);
  setTimeout(updateTorusWindow,300);
  setTimeout(afterTransition,640);
}

// ═══════════════════════════════════
// DETAIL / PAINTING PANELS
// ═══════════════════════════════════
function openDetail(idx){
  const item=items[idx];
  document.getElementById('dNum').textContent=`JC — ${String(item.id).padStart(2,'0')}`;
  document.getElementById('dTitle').textContent=item.name;
  document.getElementById('dTags').innerHTML=item.tags.map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join('');
  document.getElementById('dVideo').innerHTML=`<span style="font-size:0.85rem;opacity:0.24;">▶</span><span>${item.video}</span><span>Soon</span>`;
  document.getElementById('dDesc').textContent=item.desc;
  document.getElementById('dSpecs').innerHTML=item.specs.map(s=>`<div class="spec-row"><span class="spec-label">${s.label}</span><span class="spec-value">${s.value}</span></div>`).join('');
  document.getElementById('dActions').innerHTML=item.actions.map(a=>`<div class="action-wrap"><button class="action-btn action-${a.type}">${a.label}</button>${a.note?`<span class="action-note">${a.note}</span>`:''}</div>`).join('');
  document.getElementById('detailPanel').classList.add('open');
  setTimeout(()=>{const dc=document.getElementById('detailTorusCanvas');if(dc&&!torusInstances['detail'])makeTorus(dc,'detail','torus',null);},50);
}
function closeDetail(){document.getElementById('detailPanel').classList.remove('open');}
function handlePanelClick(e){if(e.target===document.getElementById('detailPanel'))closeDetail();}

function openPainting(p){
  document.getElementById('pIcon').textContent=p.icon;
  document.getElementById('pTitle').textContent=p.title;
  document.getElementById('pDesc').textContent=p.desc;
  const cta=document.getElementById('pCta');cta.textContent=p.cta;cta.href=p.ctaHref;
  document.getElementById('paintingPanel').classList.add('open');
}
function closePainting(){document.getElementById('paintingPanel').classList.remove('open');}
function handlePaintingClick(e){if(e.target===document.getElementById('paintingPanel'))closePainting();}

// ═══════════════════════════════════
// GRID
// ═══════════════════════════════════
function buildGrid(){
  const list=document.getElementById('gridList');list.innerHTML='';
  items.forEach((item,i)=>{
    const row=document.createElement('div');row.className='grid-item';
    row.innerHTML=`<div class="grid-num">JC-${String(item.id).padStart(2,'0')}</div><div class="grid-thumb">${item.icon}</div><div class="grid-vid">▶</div><div class="grid-info"><div class="grid-name">${item.name}</div></div><div class="grid-avail">${item.availability}</div>`;
    row.addEventListener('click',()=>openDetail(i));
    list.appendChild(row);
  });
}

function setView(v){
  currentView=v;
  document.getElementById('gallery-view').style.display=v==='walk'?'block':'none';
  document.getElementById('grid-view').classList.toggle('active',v==='grid');
  document.getElementById('btn-walk').classList.toggle('active',v==='walk');
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
}

// ═══════════════════════════════════
// INPUT
// ═══════════════════════════════════
document.addEventListener('keydown',e=>{
  if(document.getElementById('detailPanel').classList.contains('open')||document.getElementById('paintingPanel').classList.contains('open')){if(e.key==='Escape'){closeDetail();closePainting();}return;}
  if(e.key==='ArrowRight')navigate(1);
  if(e.key==='ArrowLeft')navigate(-1);
  if(e.key==='Enter'||e.key===' ')openDetail(currentIdx);
});
let tX=0,tY=0;
document.addEventListener('touchstart',e=>{tX=e.touches[0].clientX;tY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(document.getElementById('detailPanel').classList.contains('open'))return;
  if(document.getElementById('paintingPanel').classList.contains('open'))return;
  if(window._canvasTouchActive)return;
  const dx=tX-e.changedTouches[0].clientX,dy=tY-e.changedTouches[0].clientY;
  const ax=Math.abs(dx),ay=Math.abs(dy);
  if(ax>ay&&ax>36){navigate(dx>0?1:-1);return;}
  if(ay>ax&&dy>40)openDetail(currentIdx);
},{passive:true});

// ═══════════════════════════════════
// SMART HINT
// ═══════════════════════════════════
let _hintNavCount=0,_hintTriggered=false,_hintStopped=false,_hintCycleTimer=null;
function _showHint(){
  if(_hintStopped)return;
  const h=document.getElementById('toggleHint');if(!h)return;
  h.style.opacity='1';
  clearTimeout(_hintCycleTimer);
  _hintCycleTimer=setTimeout(()=>{h.style.opacity='0';if(!_hintStopped)_hintCycleTimer=setTimeout(_showHint,10000);},3000);
}
function _triggerHint(){if(_hintTriggered||_hintStopped)return;_hintTriggered=true;_showHint();}
function _stopHint(){_hintStopped=true;clearTimeout(_hintCycleTimer);const h=document.getElementById('toggleHint');if(h)h.style.opacity='0';}
setTimeout(()=>{if(!_hintStopped)_triggerHint();},5000);
function _hintOnNavigate(){_hintNavCount++;if(_hintNavCount>=2)_triggerHint();}
const _origOpenDetail=openDetail;
openDetail=function(idx){_stopHint();_origOpenDetail(idx);};

// ═══════════════════════════════════
// HAMBURGER
// ═══════════════════════════════════
function toggleMenu(){
  const m=document.getElementById('mobileMenu'),h=document.getElementById('hamburger');
  const open=m.classList.toggle('open');h.classList.toggle('open',open);
}
document.addEventListener('touchstart',e=>{
  const m=document.getElementById('mobileMenu'),h=document.getElementById('hamburger');
  if(m.classList.contains('open')&&!m.contains(e.target)&&!h.contains(e.target)){m.classList.remove('open');h.classList.remove('open');}
},{passive:true});

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
buildWall();
buildGallery();
buildGrid();
setTimeout(()=>{renderGallery(false);updateTorusWindow();},80);

function doToggleShine(){const t=document.querySelector('.view-toggle');if(t){t.classList.add('hint-shine');setTimeout(()=>t.classList.remove('hint-shine'),900);}}
setTimeout(doToggleShine,2500);
setInterval(doToggleShine,6000);
</script>
