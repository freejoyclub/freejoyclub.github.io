<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics / Chords</title>
    <style>
        @font-face {
            font-family: 'GoldenTrail';
            src: url('/GoldenTrail-KC.otf') format('opentype');
        }

        body {
            font-family: Arial, sans-serif;
            font-weight: bold;
            /* Updated to brown gradient */
            background: linear-gradient(to bottom, #2c1e14, #5e4610);
            text-align: center;
            padding: 20px;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        h1 {
            font-family: 'GoldenTrail', sans-serif;
            font-size: 3.45rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Fade in and out animation for the button */
        @keyframes pulse-fade {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        .button-container {
            margin-top: 10px;
        }

        .custom-button {
            font-size: 2rem; /* Big fat button */
            background: linear-gradient(to bottom, #856917, #5e4610);
            color: white;
            padding: 25px 50px;
            border: 2px solid #ac9042;
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            animation: float 4s ease-in-out infinite, pulse-fade 5s ease-in-out infinite;
        }

        .custom-button:hover {
            transform: scale(1.1) translateY(-5px);
            background: linear-gradient(to bottom, #ac9042, #856917);
            box-shadow: 0px 15px 30px rgba(0,0,0,0.5);
            animation-play-state: paused; /* Optional: stops floating on hover for stability */
            opacity: 1 !important;
        }

        .home-button {
            margin-top: 50px;
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>fearjoy - lyrics & chords</h1>

    <div class="button-container">
        <a href="https://drive.google.com/drive/folders/1X3AbAV6poAGM58tuHHNDhvO1PlmXzohv" target="_blank" class="custom-button">
            📂 OPEN DRIVE FOLDER
        </a>
    </div>

    <a href="https://freejoy.club" class="home-button">🏠 Back to Home</a>

</body>
</html>
