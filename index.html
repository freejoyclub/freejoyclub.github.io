<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Freejoy Club</title>
    <style>
        /* Font Definitions */
        @font-face {
            font-family: 'KCOraleSans';
            src: url('/KCOraleSans.otf') format('opentype');
        }
        @font-face {
            font-family: 'StrikerSans';
            src: url('/StrikerSans.otf') format('opentype');
        }

        :root {
            --glow-color: rgba(255, 255, 255, 0.7);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            color: #000;
            text-align: center;
            overflow-x: hidden;
        }

        /* Darkened Warm Sweeping Gradient */
        body {
            background: linear-gradient(45deg, #8b443a, #5c2a22, #7a4a31, #3d1a1a);
            background-size: 400% 400%;
            animation: sweep 20s ease infinite;
        }

        @keyframes sweep {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Content Container */
        .content {
            position: relative;
            z-index: 1;
            padding: 60px 20px 150px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Typography & Glow */
        @keyframes flicker {
            0%, 100% { text-shadow: 0 0 8px var(--glow-color), 0 0 15px var(--glow-color); opacity: 1; }
            33% { text-shadow: 0 0 12px var(--glow-color), 0 0 22px var(--glow-color); opacity: 0.9; }
            66% { text-shadow: 0 0 5px var(--glow-color); opacity: 1; }
        }

        h1 {
            font-family: 'KCOraleSans', sans-serif;
            font-size: 4rem;
            margin: 0;
            animation: flicker 4s infinite;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .floating-text {
            font-family: 'StrikerSans', sans-serif;
            font-size: 1.2rem;
            margin: 20px 0 40px 0;
            text-shadow: 0 0 10px var(--glow-color);
            letter-spacing: 1px;
            line-height: 1.6;
        }

        /* Button Styling */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            margin-top: 2rem;
        }

        .btn {
            font-family: 'StrikerSans', sans-serif;
            text-decoration: none;
            color: #000;
            border: 1.5px solid #000;
            padding: 14px 20px;
            border-radius: 50px;
            width: 260px;
            background: transparent;
            box-shadow: 0 0 8px var(--glow-color);
            transition: all 0.3s ease;
            display: block;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 18px var(--glow-color);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Form Styling */
        form {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
            background: rgba(0, 0, 0, 0.15);
            padding: 20px;
            border-radius: 25px;
            backdrop-filter: blur(5px);
        }

        form input, form textarea {
            font-family: 'StrikerSans', sans-serif;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid #000;
            margin-bottom: 10px;
            width: 240px;
            background: rgba(255, 255, 255, 0.8);
        }

        .success-message {
            display: none;
            font-family: 'StrikerSans', sans-serif;
            color: #fff;
            margin-top: 1rem;
            text-shadow: 0 0 10px green;
        }

        /* Logo Animation */
        .logo-group {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 40px 0;
        }

        .floating-logo {
            width: 60px;
            height: 60px;
            transition: transform 0.3s ease;
        }
        
        .floating-logo:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Nav Cluster */
        .nav-cluster {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .nav-cluster a {
            font-family: 'StrikerSans', sans-serif;
            text-decoration: none;
            color: #fff;
            padding: 10px 18px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .nav-cluster a:hover {
            color: #ffecd2;
            text-shadow: 0 0 10px var(--glow-color);
        }

        .nav-divider {
            width: 1px;
            height: 15px;
            background: rgba(255, 255, 255, 0.2);
            align-self: center;
        }
    </style>
</head>
<body>

<div class="content">
    <h1>We're Fearjoy</h1>

    <p class="floating-text">
        Our debut album is on the way.<br>
        Here's a preview:
    </p>

    <iframe 
        src="https://samply.app/embed/347SJuDJQmYf8BWVJWvf" 
        frameborder="0"
        allowtransparency="true"
        style="width: 80%; max-width: 500px; height: 130px; border-radius: 25px; border: 10px solid rgba(255, 255, 255, 0.12); box-shadow: 0 0 20px rgba(0,0,0,0.3);"
    ></iframe>

    <div class="logo-group">
        <a href="https://www.instagram.com/fearjoymusic" target="_blank">
            <img src="images/instagram-logo.png" alt="Instagram" class="floating-logo">
        </a>
        <a href="https://www.twitch.tv/fearjoymusic" target="_blank">
            <img src="images/twitch-logo2.png" alt="Twitch" class="floating-logo">
        </a>
    </div>

    <div class="button-stack">
        <a href="mailto:grant@freejoy.club" class="btn">Reach Us</a>
        <button class="btn" id="mailingListButton">Send Me the Album</button>
        <a href="/store" class="btn">Store</a>
        <a href="/game" class="btn">The Game</a>
    </div>

    <form id="emailForm">
        <input type="email" id="email" name="email" required placeholder="Your email" />
        <textarea name="message" id="message" placeholder="A quick note..." required></textarea>
        <button type="submit" class="btn" style="width: 100%">Send</button>
    </form>
    
    <p class="success-message" id="successMessage">Thanks for subscribing! We'll send it over.</p>
</div>

<div class="nav-cluster">
    <a href="https://freejoy.club">Home</a>
    <div class="nav-divider"></div>
    <a href="/breathe">Breathe</a>
    <div class="nav-divider"></div>
    <a href="/move">Move</a>
    <div class="nav-divider"></div>
    <a href="/game">Game</a>
    <div class="nav-divider"></div>
    <a href="/store">Store</a>
</div>

<script>
    const mailingListButton = document.getElementById('mailingListButton');
    const emailForm = document.getElementById('emailForm');
    const successMessage = document.getElementById('successMessage');

    mailingListButton.addEventListener('click', () => {
        emailForm.style.display = 'flex';
        emailForm.scrollIntoView({ behavior: 'smooth' });
    });

    emailForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(emailForm);

        try {
            const response = await fetch('https://formspree.io/f/mpwwljpd', {
                method: 'POST',
                headers: { Accept: 'application/json' },
                body: formData,
            });

            if (response.ok) {
                successMessage.style.display = 'block';
                emailForm.reset();
                emailForm.style.display = 'none';
                setTimeout(() => successMessage.style.display = 'none', 3000);
            } else {
                alert('Problem submitting. Try again?');
            }
        } catch (error) {
            alert('Submission error. Try again?');
        }
    });
</script>

</body>
</html>
