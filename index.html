<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FEARJOY</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
/* Font Definitions */
@font-face {
font-family: 'KCOraleSans';
src: url('/KCOraleSans.otf') format('opentype');
}
@font-face {
font-family: 'KCStrikerSans';
src: url('/KCStrikerSans.otf') format('opentype');
}

:root {
--glow-color: rgba(255, 255, 255, 0.7);
--btn-tan-start: #e8dcc4;
--btn-tan-end: #d2b48c;
}

html, body {
margin: 0;
padding: 0;
width: 100%;
min-height: 100vh;
color: #000;
text-align: center;
overflow-x: hidden;
position: relative;
}

/* Lightened Warm Sweeping Gradient */
body {
background: linear-gradient(45deg, #a65a4e, #7a3e34, #945d42, #5c2b2b);
background-size: 400% 400%;
animation: sweep 20s ease infinite;
}

/* Vignette Overlay */
body::before {
content: "";
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: radial-gradient(circle, rgba(0,0,0,0) 20%, rgba(0,0,0,0.6) 100%);
pointer-events: none;
z-index: 1;
}

@keyframes sweep {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

/* Increased Float Animation Distance */
@keyframes subtleFloat {
0% { transform: translate(0, 0) rotate(0deg); }
25% { transform: translate(6px, -12px) rotate(1.5deg); }
50% { transform: translate(-3px, -6px) rotate(-1.5deg); }
75% { transform: translate(-8px, 4px) rotate(0.8deg); }
100% { transform: translate(0, 0) rotate(0deg); }
}

@keyframes shineLoop {
0% { left: -150%; }
30% { left: 150%; }
100% { left: 150%; }
}

.content {
position: relative;
z-index: 2;
padding: 60px 20px 180px 20px;
display: flex;
flex-direction: column;
align-items: center;
min-height: 100vh;
box-sizing: border-box;
}

/* Typography & Glow */
@keyframes flicker {
0%, 100% { text-shadow: 0 0 8px var(--glow-color), 0 0 15px var(--glow-color); opacity: 1; }
33% { text-shadow: 0 0 12px var(--glow-color), 0 0 22px var(--glow-color); opacity: 0.9; }
66% { text-shadow: 0 0 5px var(--glow-color); opacity: 1; }
}

h1 {
font-family: 'KCOraleSans', sans-serif;
font-size: 4.2rem;
margin: 0;
animation: flicker 4s infinite, subtleFloat 6s ease-in-out infinite;
letter-spacing: 4px;
text-transform: uppercase;
}

.floating-text {
font-family: 'KCStrikerSans', sans-serif;
font-size: 1.6rem;
margin: 20px 0 40px 0;
text-shadow: 0 0 10px var(--glow-color);
letter-spacing: 1px;
line-height: 1.6;
animation: subtleFloat 8s ease-in-out infinite reverse;
}

/* Button Styling */
.button-stack {
display: flex;
flex-direction: column;
gap: 15px;
align-items: center;
margin-top: 2rem;
}

.btn {
position: relative;
overflow: hidden;
font-family: 'KCStrikerSans', sans-serif;
text-decoration: none;
color: #000;
border: 1.5px solid #000;
padding: 16px 20px;
border-radius: 50px;
width: 280px;
background: linear-gradient(135deg, var(--btn-tan-start), var(--btn-tan-end));
box-shadow: 0 0 10px var(--glow-color);
transition: all 0.3s ease;
display: flex;
justify-content: center;
align-items: center;
cursor: pointer;
font-size: 1.6rem;
animation: subtleFloat 7s ease-in-out infinite;
box-sizing: border-box;
}

/* Shine Effect */
.btn::after {
content: "";
position: absolute;
top: 0;
left: -150%;
width: 100%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
transform: skewX(-20deg);
animation: shineLoop 6s infinite ease-in-out;
}

.btn:hover {
transform: translateY(-5px) scale(1.05);
box-shadow: 0 0 22px var(--glow-color);
}

.btn:hover::after {
animation: shineLoop 2s infinite linear;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
}

/* Form Styling */
form {
display: none;
flex-direction: column;
align-items: center;
margin-top: 2rem;
background: rgba(0, 0, 0, 0.15);
padding: 25px;
border-radius: 30px;
backdrop-filter: blur(8px);
animation: subtleFloat 10s ease-in-out infinite;
}

form input, form textarea {
font-family: 'KCStrikerSans', sans-serif;
padding: 12px;
border-radius: 15px;
border: 1px solid #000;
margin-bottom: 10px;
width: 250px;
background: rgba(255, 255, 255, 0.8);
font-size: 1rem;
}

.success-message {
display: none;
font-family: 'KCStrikerSans', sans-serif;
color: #fff;
margin-top: 1rem;
text-shadow: 0 0 10px green;
font-size: 1.2rem;
}

.logo-group {
display: flex;
justify-content: center;
gap: 24px;
margin: 40px 0;
}

.floating-logo {
width: 60px;
height: 60px;
transition: transform 0.3s ease;
animation: subtleFloat 5s ease-in-out infinite alternate;
}

.floating-logo:hover {
transform: scale(1.2) rotate(10deg);
}

/* Nav Cluster centered */
.nav-cluster {
position: fixed;
bottom: 40px;
left: 50%;
transform: translateX(-50%);
display: flex;
background: rgba(0, 0, 0, 0.3);
backdrop-filter: blur(12px);
border: 1px solid rgba(255, 255, 255, 0.15);
border-radius: 100px;
padding: 8px 15px;
box-shadow: 0 10px 40px rgba(0,0,0,0.6);
z-index: 100;
white-space: nowrap;
}

.nav-cluster a {
font-family: 'KCStrikerSans', sans-serif;
text-decoration: none;
color: #fff;
padding: 8px 12px;
font-size: 0.8rem;
text-transform: uppercase;
letter-spacing: 1.5px;
transition: all 0.3s;
}

.nav-cluster a:hover {
color: #ffecd2;
text-shadow: 0 0 12px var(--glow-color);
transform: scale(1.1);
}

.nav-divider {
width: 1px;
height: 14px;
background: rgba(255, 255, 255, 0.2);
align-self: center;
margin: 0 4px;
}

@media (max-width: 600px) {
.nav-cluster {
padding: 6px 10px;
width: 90%;
justify-content: center;
}
.nav-cluster a {
font-size: 0.65rem;
padding: 8px 6px;
}
}
</style>
</head>
<body>

<div class="content">
<h1>We're Fearjoy</h1>

<p class="floating-text">
Our debut album is on the way.<br>
Here's a preview:
</p>

<iframe 
src="https://samply.app/embed/347SJuDJQmYf8BWVJWvf" 
frameborder="0"
allowtransparency="true"
style="width: 85%; max-width: 500px; height: 130px; border-radius: 25px; border: 10px solid rgba(255, 255, 255, 0.12); box-shadow: 0 0 25px rgba(0,0,0,0.4); animation: subtleFloat 9s ease-in-out infinite;"
></iframe>

<div class="logo-group">
<a href="https://www.instagram.com/fearjoymusic" target="_blank">
<img src="images/instagram-logo.png" alt="Instagram" class="floating-logo">
</a>
<a href="https://www.twitch.tv/fearjoymusic" target="_blank">
<img src="images/twitch-logo2.png" alt="Twitch" class="floating-logo">
</a>
</div>

<div class="button-stack">
<a href="/game" class="btn">🎲 The Game (beta) 🏆</a>
<a href="mailto:grant@freejoy.club" class="btn">Contact Us</a>
<button class="btn" id="mailingListButton">Get the Album</button>
<a href="/store" class="btn">Store (coming soon)</a>
</div>

<form id="emailForm">
<input type="email" id="email" name="email" required placeholder="Your email" />
<textarea name="message" id="message" placeholder="A quick note..." required></textarea>
<button type="submit" class="btn" style="width: 100%; animation: none;">Send</button>
</form>

<p class="success-message" id="successMessage">Thanks! We'll send it over when it's done.</p>
</div>

<div class="nav-cluster">
<a href="https://freejoy.club">Home</a>
<div class="nav-divider"></div>
<a href="https://freejoy.club">Stream</a>
<div class="nav-divider"></div>
<a href="/store">Store</a>
<div class="nav-divider"></div>
<a href="/game">Game</a>
<div class="nav-divider"></div>
<a href="/breathe">Breathe</a>
<div class="nav-divider"></div>
<a href="/move">Move</a>
</div>

<script>
const mailingListButton = document.getElementById('mailingListButton');
const emailForm = document.getElementById('emailForm');
const successMessage = document.getElementById('successMessage');

mailingListButton.addEventListener('click', () => {
emailForm.style.display = 'flex';
emailForm.scrollIntoView({ behavior: 'smooth' });
});

emailForm.addEventListener('submit', async (event) => {
event.preventDefault();
const formData = new FormData(emailForm);

try {
const response = await fetch('https://formspree.io/f/mpwwljpd', {
method: 'POST',
headers: { Accept: 'application/json' },
body: formData,
});

if (response.ok) {
successMessage.style.display = 'block';
emailForm.reset();
emailForm.style.display = 'none';
setTimeout(() => successMessage.style.display = 'none', 4000);
} else {
alert('Problem submitting. Try again?');
}
} catch (error) {
alert('Submission error. Try again?');
}
});
</script>

</body>
</html>
