        /* VIGNETTE OVERLAY */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* A dark radial gradient that is transparent in the center and black on the edges */
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.7) 100%);
            z-index: 0; /* Behind content, in front of body background */
            pointer-events: none; /* Allows clicks to pass through */
        }

        @keyframes sweep {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* INCREASED DISTANCE Float Animation on all axes */
        @keyframes subtleFloat {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(4px, -8px) rotate(1deg); } /* Doubled distance */
            50% { transform: translate(-2px, -4px) rotate(-1deg); } /* Doubled distance */
            75% { transform: translate(-6px, 2px) rotate(0.6deg); } /* Doubled distance */
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .content {
            position: relative;
            z-index: 1; /* Content above vignette */
            padding: 60px 20px 180px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Typography & Glow */
        @keyframes flicker {
            0%, 100% { text-shadow: 0 0 8px var(--glow-color), 0 0 15px var(--glow-color); opacity: 1; }
            33% { text-shadow: 0 0 12px var(--glow-color), 0 0 22px var(--glow-color); opacity: 0.9; }
            66% { text-shadow: 0 0 5px var(--glow-color); opacity: 1; }
        }

        h1 {
            font-family: 'KCOraleSans', sans-serif;

            text-transform: uppercase;
        }

        .floating-text {

            font-size: 1.6rem;

            letter-spacing: 1px;

        /* SHINE EFFECT (Pseudo-element) */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%; /* Start off-screen to the left */
            width: 50%;
            height: 100%;
            /* Diagonal white gradient shine */
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); /* Slant the shine */
            transition: all 0.3s;
        }

        /* Trigger shine automatically on a loop */

            animation: subtleFloat 7s ease-in-out infinite, shine-loop 8s infinite;
